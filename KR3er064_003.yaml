body:
  text: 卷三喉舌緩急砭藥不同解二十一咽與喉會厭與舌此四者同在一門而其用各異喉以候氣故喉氣通於天咽以咽物故咽氣通於地會厭與喉上下以司開合食下則吸而掩氣上則呼而出是以舌抵上齶則會厭能閉其咽矣四者相交為用闕一則飲食廢而死矣此四者乃氣與食出入之門戶最急之處故難經言七衝門而會厭之下為吸門及其為病也一言可了一言者何曰火內經曰一陰一陽結謂之喉痹王太僕注云一陰者手少陰君火心主之脈氣也手少陽相火三焦之脈氣也二火皆主脈並絡於喉氣熱則內結結甚則腫脹腫脹甚則痹痹甚而不通則死矣夫足少陰循喉嚨挾舌本少陰上挾咽此二者誠是也至於足陽明下人迎循喉嚨足太陰挾咽連舌本手太陽循咽下膈足厥陰循喉嚨之後此數經皆言咽喉獨少陽不言咽喉而內經言一陰一陽謂之喉痹何也蓋人讀十二經多不讀靈樞經中經別第十一篇具載十二經之正其文云足少陽之正繞脾入毛際合於厥陰別者入季脅間循胸裡屬膽散之上肝貫心以上挾咽出頤頜散於面系目系合少陽於外眥也又手心主之正別下淵腋三寸入胸中別屬三焦出循喉嚨出耳後合少陽完骨之下是手少陽三焦之氣與手心主少陰之氣相合而行於喉嚨也推十二經惟足太陽別項下其餘皆湊於喉嚨然內經何為獨言一陰一陽結為喉痹蓋君相二火獨勝則熱結正絡故痛且速也余謂一言可了者火是也故十二經中言嗌乾嗌痛咽腫頷腫舌本強皆君火為之也唯喉痹急速相火之所為也夫君火者猶人火也相火者猶龍火也人火焚木其勢緩龍火焚木其勢速內經之言喉痹則咽與舌在其間耳以其病同是火故不分也後之醫者各詳其狀強立八名曰單乳蛾雙乳蛾單閉喉子舌脹木舌脹纏喉風走馬喉閉熱氣上行結薄於喉之兩旁近外腫作以其形似是謂乳蛾一為單二為雙也其比乳蛾差小者名閉喉熱結於舌下復生一小舌子名曰子舌脹熱結於舌中舌為之腫名曰木舌脹木者強而不柔和也熱結於咽項腫繞於外且麻且癢腫而大者名曰纏喉風喉痹暴發暴死者名走馬喉痹此八種之名雖詳若不歸之火則相去遠矣其微者可以咸軟之而大者以辛散之今之醫者皆有其藥也如薄荷烏頭殭蠶白礬朴硝銅緑之類也至於走馬喉痹何待此乎其生死人反掌之間耳其最不誤人者無如砭針出血血出則病已易曰血去惕出良以此夫昔余以治一婦人木舌脹其舌滿口諸藥不愈余以扉針小而鋭者砭之五七度腫減三日方平計所出血幾至盈斗又治一男子纏喉風腫表裡皆作藥不能下余以涼藥灌於鼻中下十餘行外以拔毒散敷之陽起石燒赤與伏龍肝各等分細末每日以新水掃百遍三日熱始退腫始消又嘗治一貴婦喉痹蓋龍火也雖用涼藥而不可使冷服為龍火宜以火逐之人火者烹飪之火是也乃使曝於烈日之中登於高堂之上令侍婢攜火爐坐藥銚於上使藥常極熱不至大沸通口時時呷之百餘次龍火自散此法以熱行寒不為熱病扞格故也大抵治喉痹用針出血最為上策但人畏針委曲旁求瞬息喪命凡用針而有針創者宜搗生薑一塊調以熱白湯時時呷之則創口易合銅人中亦有灸法然痛微者可用病速者恐遲則殺人故治喉痹之火與救火同不容少待內經火鬱發之發謂發汗然喉咽中豈能發汗故出血者乃發汗之一端也後之君子毋執小方而曰吾藥不動臟腑又妙於出血若幸遇小疾而獲功不幸遇大病而死矣毋遺後悔可矣五積六聚治同郁斷二十二先賢説五積六聚甚明惟治法獨隱其言五積曰肝之積名曰肥氣在左脅下如覆杯有頭足久不已令人發咳逆痎瘧連歲不已者是也心之積名曰伏梁起於臍大如臂上至心下久不已令人病煩心脾之積名曰痞氣在胃脘大如覆盤久不已令人四肢不收發黃疸飲食不為肌膚俗呼為食勞黃也肺之積名曰息賁在右脅下大如覆杯久不愈令人灑淅寒熱喘嗽發肺癰腎之積名曰賁豚發於少腹上至心下若豚狀或上或下無時久不已令人喘逆骨痿少氣此五積之狀前賢言之豈不分明遍訪醫門人人能道及問治法不過三稜廣朮乾漆硇砂陳皮礞石巴豆之類復有不明標本者又從而補之豈有病積之人大邪不出而可以補之乎至於世之磨積取積之藥余初學醫時亦曾用之知其不效遂為改轍因考內經驟然大悟內經曰木鬱則達之火鬱發之土鬱奪之金鬱泄之水鬱折之王太僕曰達謂吐發謂汗奪謂下泄為利小便折謂折其沖逆此五者五運為司天所制故立此五法與五積若不相似然蓋五積者因受勝己之邪而傳於己之所勝適當旺時拒而不受復還於勝己者勝己者不肯受因留結為積故肝之積得於季夏戊巳日心之積得於秋庚辛日脾之積得於冬壬癸日肺之積得於春甲乙日腎之積得於夏丙丁日此皆抑鬱不伸而受其邪也豈待司天克運然後為之郁哉且積之成也或因暴怒喜悲思恐之氣或傷酸苦甘辛咸之食或停溫涼熱寒之飲或受風暑燥寒火濕之邪其初甚微可呼吸按導方寸大而去之不幸而遇庸醫強補而留之留而不去遂成五積夫肥氣者不獨氣有餘也其中亦有血矣蓋肝藏血故也伏梁者火之郁也以熱藥散之則益甚以火灸之則彌聚況伏梁證有二名同而實異不可不詳焉其一伏梁上下左右皆有根在腸胃之外有大膿血此伏梁義同肚癰其一伏梁身體髀股胻皆腫環臍而痛是為風根不可動動則為水溺澀之病此二者內經雖言不可動止謂不可大下非謂全不可下恐病去而有害痞氣者舉世皆言寒則痞內經以為濕則痞雖因飲冷而得其陽氣為濕所蓄以熱攻之則不散以寒攻之則濕去而寒退矣息賁者喘息憤而上行也此舊説也余以謂賁者賁門也手太陰之筋結胸裡而貫賁入賁下抵季脅其病支轉筋痛甚則成息賁手心主結於臂其病胸痛息賁又云肺下則居賁迫肝善脅下痛肝高則上支賁兩脅悗為息賁若是言之是積氣於賁而不散此靈樞説五臟處言此賁自是多故豫發之賁豚者賁與奔同銅人言或因讀書得之未必皆然也腎主骨此積最深難療大忌吐湧以其在下止宜下之故豫嘗以獨聖散吐肥氣揃以木架必燠室中吐兼汗也肝之積便言風也吐出數升後必有血一二滴勿疑病當然也續以磨積之藥調之嘗治伏梁先以茶調散吐之兼汗以禹功導水奪之繼之以降火之藥調之又嘗治痞氣萬舉萬全先以瓜蒂散吐其酸苦黃膠腥腐之物三二升次以導水禹功下二三十行末以五苓淡劑等藥調之又嘗治息賁用瓜蒂散不計四時置之燠室中更以火一爐以助其汗吐汗二法齊行此病不可逗留久則傷人又嘗治賁豚以導水通經三日一下之一月十下前後百行次用治血化氣磨積之藥調之此積雖不傷人亦與人偕老若六聚之物在腑屬陽而無形亦無定法故此而行之何難之有或言余之治積太峻豫曰不然積之在臟如陳莖之在江河且積之在臟中間多著脂膜曲折之處區臼之中陳莖之在江河不在中流多在汀灣洄薄之地遇江河之溢一漂而去積之在臟理亦如之故豫先以丸藥驅逐新受之食使無梗塞其碎著之積已離而未下次以散藥滿胃而下橫江之筏一壅而盡設未盡者以藥調之惟堅積不可用此法宜以漸除內經曰堅者削之今人言塊癖是也因述九積圖附於篇末以俟來哲知余用心獨苦久矣而世無知者食積酸心腹滿大黃牽牛之類甚者礞石巴豆酒積目黃口乾葛根麥蘖之類甚者甘遂牽牛氣積噫氣痞塞木香檳榔之類甚者枳殼牽牛涎積咽如拽鋸硃砂膩粉之類甚者瓜蒂甘遂痰積涕唾稠黏半夏南星之類甚者瓜蒂藜蘆癖積兩脅刺痛三稜廣朮之類甚者甘遂蠍梢水積足脛脹滿郁李商陸之類甚者甘遂芫花血積打撲肭瘀産後不月桃仁地榆之類甚者虻蟲水蛭肉積疒贅瘤核癘膩粉白丁香砭刺出血甚者硇砂信石九積皆以氣為主各據所屬之狀而對治之今人總此諸藥併為一方曰可治諸積大謬也吾無此病焉用此藥吾無彼病焉用彼藥十羊九牧何所適從非徒無益而又害之斥十膈五噎浪分支派疏二十三病派之分自巢氏始也病失其本亦自巢氏始也何者老子曰少則得多則惑且俗謂噎食一證在內經苦無多語惟曰三陽結謂之膈三陽者謂大腸小腸膀胱也結謂結熱也小腸熱結則血脈燥大腸熱結則後不圊膀胱熱結則津液涸三陽既結則前後閉塞下既不通必反上行此所以噎食不下縱下而復出也謂胃為水穀之海日受其新以易其陳一日一便乃常度也今病噎者三日五日或五七日不便是乖其度也亦明矣豈非三陽俱結於下廣腸枯涸所食之物為咽所拒縱入太倉還出咽嗌此陽火不下推而上行也故經曰少陽所至為嘔湧溢食不下此理豈不曉然又氣厥論云肝移寒於心為狂膈中陽氣與寒相搏故膈食而中不通此膈陽與寒為之也非獨專於寒也六節臟象又云人迎四盛以上為格陽王太僕云陽盛之極故膈拒而食不得入正理論曰格則吐逆故膈亦當為格後世強分為五噎謂氣憂食思勞也後又分為十膈五噎其派既多其惑滋甚人之溢食初未必遽然也初或傷酒食或胃熱欲吐或胃風欲吐醫氏不察本原火里燒薑湯中煮桂丁香未已豆蔻繼之蓽茇未已胡椒繼之雖曰和胃胃本不寒雖曰補胃胃本不虛設如傷飲止可逐飲設如傷食止可逐食豈可言虛便將熱補素問無者於法猶非素熱之人三陽必結三陽既結食必上潮醫氏猶云胃寒不納燔針鑽肉炷艾灼肌苦楚萬千三陽熱結分明一句到了難從不過抽薪最為緊要揚湯止沸愈急愈增歲月彌深為醫所誤人言可下退陽養陰張眼吐舌恐傷元氣止在沖和閉塞不通經無來路腸宜通暢是以鳴腸腸既不通遂成噎病世傳五噎寬中散有薑有桂十膈散有附有烏今豫既斥其方信乎與否以聽後賢或云憂恚氣結亦可下乎余曰憂恚磐礴便同火鬱太倉公見此皆下法廢以來千年不復今代劉河間治膈氣噎食用承氣三湯獨超近代今用藥者不明主使如病風狂嘻嘻不及觀其效猶昧本原既懶問咨妄興非毀今豫不恤姑示後人用藥之時更詳輕重假如閉久慎勿陡攻縱得攻開必慮後患宜先潤養小著湯丸纍纍加之關扃自透其或咽噎上阻涎痰輕用苦酸微微湧出因而治下藥勢易行設或不行蜜鹽下導始終勾引兩藥相通結散陽消飲食自下莫將巴豆耗卻天真液燥津枯留毒不去人言此病曾下奪之從下奪來轉虛轉痞此為巴豆非大黃牽牛之過箕城一酒官病嘔吐逾年不愈皆以胃寒治之丁香半夏青陳薑附種種燥熱燒錐燎艾莫知其數或少愈或復劇且十年大便澀燥小便赤黃命豫視之豫曰諸痿喘嘔皆屬於上王太僕云上謂上焦也火氣炎上之氣謂皆熱甚而為嘔以四生丸下三十行燥糞腸垢何啻數升其人昏困一二日頻以冰水呷之漸投涼乳酪芝麻飲時時咽之數日外大啜飲食精神氣血如昔繼生三子至五旬而卒飲當去水溫補轉劇論二十四留飲止證也不過蓄水而已王氏脈經中派之為四痰飲懸飲支飲溢飲千金方又派之為五飲皆觀病之形狀而定名也今豫皆不論此論飲之所得其來有五有憤鬱而得之者有困乏而得之者有思慮而得之者有痛飲而得之者有熱時傷冷而得之者飲證雖多無出於此夫憤鬱而不得伸則肝氣乘脾脾氣不化故為留飲肝主慮久慮而不決則飲氣不行脾主思久思而不已則脾結故亦為留飲人因勞役遠來乘困飲水脾胃力衰因而嗜臥不能布散於脈亦為留飲人飲酒過多腸胃已滿又復增之脬經不及滲泄久久如斯亦為留飲因隆暑津液焦涸喜飲寒水本欲止渴乘快過多逸而不動亦為留飲人若病飲者豈能出此五者之外乎夫水者陰物也但積水則生濕停酒則生燥久則成痰在左脅者同肥氣在右脅者同息賁上入肺則多嗽下入大腸則為瀉入腎則為湧水濯濯如囊漿上下無所之故在太陽則為支飲皆由氣逆而得之故濕在上者目黃面浮在下者股膝腫厥在中者支滿痞隔痰逆在陽不去者久則化氣在陰不去者久則成形今之用方者例言飲為寒積皆用溫熱之劑以補之燥之夫寒飲在中反以熱藥從上投之為寒所拒水濕未除反增心火火既不降水反下注其上焦枯其下寒栗內經曰出入廢則神機化滅升降息則氣立孤危渠不信夫況乎留飲下無補法氣方隔塞補則轉增豈知內經所謂留者攻之何後人不師古之甚也且以白朮參苓飲者服之尚加閉塞況燔針艾火其痞可知前人處五飲丸三十餘味其間有礬石巴豆附子烏頭雖是下攻終同燥熱雖亦有寒藥相參力孤無援故今代劉河間依仲景十棗湯制三花神佑丸而加大黃牽牛新得之疾下三五十丸氣流飲去昔有病此者數十年不愈豫診之左手脈三部皆微而小右手脈三部皆滑而大微小為寒滑大為燥余以瓜蒂散湧其寒痰數升汗出如沃次以導水禹功去腸胃中燥垢亦數升其人半愈然後以淡劑流其餘蘊以降火之劑開其胃口不逾月而痊夫黃連黃柏可以清上燥濕黃耆茯苓可以補下滲濕二者可以收後不可以先驅復未盡者可以苦葶藶杏仁桑白皮椒目逐水之藥伏水皆去矣夫治病有先後不可亂投邪未去時慎不可補也大邪新去恐反增其氣轉甚於未治之時也昔河內有人病飲醫者斷為脾濕以木香牽牛二味散之下十餘行因紿病人復變散為丸又下十餘行復變丸為散又十餘行病者大困睡幾晝夜既覺腸胃寬潤惟思粥食少許日漸愈雖同斷為濕但補瀉不同其差至此內經曰歲土太過雨濕流行腎水受邪甚則飲發中滿太陽司天濕氣變物水飲內蓄中滿不食注云此年太陰在泉濕監於地病之原始地氣生焉少陰司天濕土為四之氣民病鼽衄飲發又土鬱之發民病飲發注下跗腫身重又太陰所至為積飲痞隔又太陰所至蓄滿又太陰之勝與太陰之復皆云飲發於中以此考之土主濕化不主寒水主寒化不主濕天多黅雨地有積潦皆以為水在內經屬土冰霜凝沍風氣淒凜此水之化也故曰丑未太陰濕土辰戌太陽寒水二化本自不同其病亦異夫濕土太過則飲發於中今人以為脾土不足則軒岐千古之書可從乎不可從乎嗽分六氣毋拘以寒述二十五嗽與咳一證也後人或以嗽為陽咳為陰亦無考據且內經咳論一篇純説嗽也其中無咳字由是言之咳即嗽也嗽即咳也陰陽應象大論云秋傷於濕冬生咳嗽又五臟生成篇云咳嗽上氣又診要經終云春刺秋分環為咳嗽又示從容篇云咳嗽煩冤者腎氣之逆也素問惟以四處連言咳嗽其餘篇中止言咳不言嗽乃知咳嗽一證也或言嗽為別一證如傷寒書中説咳逆即咽中作梯磴之聲者是也此一説非內經止以嗽為咳生氣通天論云秋傷於濕上逆而咳應象大論文義同而無嗽字乃知咳即是嗽明矣余所以苦論此者孔子曰必也正名乎嗽之為病自古歸之肺此言固不易也素問言肺病喘咳逆又曰咳嗽上氣厥在胸中過在手太陰陽明靈樞十二經惟太陰肺經云肺脹滿膨膨而喘咳他經則不言素問咳論雖言五臟六腑皆有咳要之止以肺為主素問言皮毛者肺之合也皮毛先受邪氣注云邪為寒氣經又曰邪氣以從其合也其寒飲食入胃從脾脈上至於肺則肺寒肺寒則內外合邪因而客之則為肺咳後人見是言斷嗽為寒更不參較他篇豈知六氣皆能嗽人若謂咳止為寒邪何以歲火太過炎暑流行金肺受邪民病咳嗽歲木不及心氣晚治上勝肺金咳而鼽從革之紀金不及也其病嚏咳堅成之紀金太過也上徵與正商同其病咳少陽司天火氣下臨肺金上從咳嚏衄少陽司天火淫所勝咳唾血煩心少陽司天主勝則胸滿咳少陽司天之氣熱鬱於上咳逆嘔吐三之氣炎暑至民病咳嘔終之氣陽氣不藏而咳少陽之復枯燥煩熱驚瘈咳衄甚則咳逆而血泄少陰司天熱氣生於上清氣生於下寒熱凌犯而生於中民病咳喘三之氣天政布大火行餘火內格腫於上咳喘甚則血溢少陰司天客勝則鼽嚏甚則咳喘少陰之復燠熱內作氣動於左上行於右咳皮膚痛則入肺咳而鼻淵若此之類皆生於火與熱也豈可專於寒乎謂咳止於熱與火耶厥陰司天客勝則耳鳴掉眩甚則咳若此之類乃生於風豈可專於熱與火也謂咳專於風耶太陰司天濕淫所勝咳唾則有血太陰之復濕變乃舉飲發於中咳喘有聲若此之類乃生於濕豈可專於風也謂咳止於濕耶金鬱之發民病咳逆心脅痛歲金太過燥氣流行肝木受邪民病咳喘逆逆甚而嘔血陽明司天金火合德民病咳嗌塞陽明司天燥淫所勝咳腹中鳴陽明司天清復內余則咳衄嗌塞心膈中熱咳不止而目血出者死陽明之勝清發於中溢塞而咳陽明之復清氣大舉咳噦煩心若此之類皆生於燥豈可專於濕也謂咳止於燥耶太陽司天客氣勝則胸中不利出清涕感寒則咳若此之類乃生於寒豈可專於燥也又肺風之狀多汗惡風色皏然白時咳短氣晝日則瘥夜幕則甚亦風咳也勞風咳出青黃涕其狀如膿大如彈丸亦風咳也有所亡失所求不得則發肺鳴鳴則肺熱葉焦亦熱咳也陽明厥逆喘咳身熱亦熱咳也一陽發病少氣善咳亦火咳也喘咳者水氣並於陽明亦濕咳也風水不能正偃則咳亦濕咳也腎氣腹大脛腫喘咳身重亦濕咳也脾痹者四肢懈墮發咳嘔汁上為大寒亦寒咳也咳之六氣固然可以辨其六者之狀風乘肺者日夜無度汗出頭痛涎痰不利非風咳之云乎熱乘肺者急喘而嗽面赤潮熱手足寒乳子亦多有之非暑咳之云乎火乘肺者咳喘上壅涕唾出血甚者七竅血溢非火咳之云乎燥乘肺者氣壅不利百節內痛頭面汗出寒熱往來皮膚乾枯細瘡燥癢大便祕澀涕唾稠黏非燥咳之云乎寒乘肺者或因形寒飲冷冬月坐臥濕地或冒冷風寒秋冬水中感之嗽急而喘非寒咳之云乎其法治也風之嗽治以通聖散加半夏大人參半夏丸甚者汗之暑之嗽治以白虎湯洗心散涼膈散加蜜一匙為呷之火之嗽治以黃連解毒湯洗心散三黃丸甚者加以鹹寒大下之濕之嗽治以五苓散桂苓甘露散及白朮丸甚者以三花神佑丸下之燥之嗽治以木香葶藶散大黃黃連阿膠丸甚者以鹹寒大下之寒之嗽治以寧神散寧肺散有寒痰在上者以瓜蒂散越之此法雖已幾於萬全然老幼強弱虛實肥瘦不同臨時審定權衡可也病有變態而吾之方亦與之俱變然則枯礬乾薑烏梅罌粟殼其誤人也不為少矣嗚呼有人自幼咳嗽至老不愈而亦不死者余平生見此等無限或小年咳嗽不計男女不數月而殞者亦無限矣夫寧神寧肺散此等之人豈有不曾服者哉其不愈而死者以其非寒嗽故也彼執款冬花佛耳草至死不移者雖與之割席而坐可也曹魏時軍吏李成苦咳嗽晝夜不寐時吐膿血華他以謂咳之所吐非從肺來以苦劑二錢匕吐膿血二升余而瘥若此之嗽人不可不知也九氣感疾更相為治衍二十六天以氣而燾地以氣而持萬物盈乎天地之間咸以氣而生及其病也莫不以氣而得且風之氣和平而璺啓熱之氣暄而舒榮火之氣炎暑而出行濕之氣埃溽而貟盈燥之氣清徑而悽愴寒之氣寒霧而歸藏此六氣時化司化之常也及其變風之氣飄怒而反大涼熱之氣大暄而反寒火之氣飄風燔燎而反霜凝濕之氣雷霆驟注而反烈風燥之氣散落而反濕寒之氣寒雪霜雹而反白埃此六氣之變也故天久寒則治之以暑天久涼則治之以暄天久晦則治之以明天久晴則治之以雨夫天地之氣常則安變則病而況人稟天地之氣五運迭侵於其外七情交戰於其中是以聖人嗇氣如持至寶庸人役物而反傷大和此軒岐所以論諸痛皆因於氣百病皆生於氣遂有九氣不同之説氣本一也因所觸而為九所謂九者怒喜悲恐寒暑驚思勞也其言曰怒則氣逆甚則嘔血及飧泄故氣逆上矣王太僕曰怒則陽氣逆上而肝木乘脾故甚則嘔血及飧泄也喜則氣和志達榮衛通利故氣緩矣悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故氣消矣恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣王太僕云恐則陽精卻上而不下流下焦陰氣亦還回而不散故聚而脹也然上焦固禁下焦氣還故氣不行也新校正云不行當作下行寒則腠理閉氣不行故氣收矣王太僕云身寒則衛氣沉故皮膚文理及滲泄之處皆閉密而氣不流行衛氣收斂於中而不散也炅則腠理開榮衛通汗大出故氣泄矣王太僕云人在陽則舒在陰則慘故熱則膚腠開發榮衛大通津液外滲汗大泄驚則心無所依神無所歸慮無所定故氣亂矣勞則喘息汗出內外皆越故氣耗矣王太僕云疲勞役則氣奔速故喘息氣奔速則陽外發故汗出內外皆逾越於常紀故氣耗損也思則心有所存神有所歸正氣留而不行故氣結矣王太僕云繫心不散故氣亦停留此素問之論九氣其變甚詳其理甚明然論九氣所感之疾則略惟論嘔血及飧泄余皆不言惟靈樞論思慮悲哀喜樂愁憂盛怒恐懼而言其病其言曰知者知養生也必順四時而適寒暑和喜怒而安居處節陰陽而和剛柔如是則辟邪不至而長生久視是故怵惕思慮則傷神神傷則恐懼流淫而不止因悲哀動中者竭絶而失生喜樂者神憚散而不藏愁憂者氣閉塞而不行盛怒者神迷惑而不治恐懼者神蕩憚而不收怵惕思慮而傷神神傷則恐懼自失破䐃脫肉毛瘁色夭死於冬脾憂愁而不解則傷意意傷則恍亂四肢不舉毛瘁色夭死於春肝悲哀動中則傷魂魂傷則狂忘不精不正當人陰縮攣筋兩脅不舉毛瘁色夭死於秋肺喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛瘁色夭死於季夏腎盛怒而不止則傷志志傷則喜忘其前言腰脊不可俯仰屈伸毛瘁色夭死於季夏恐懼不解則傷精精傷則骨痿厥精時自下是故五臟主藏精者也不可傷傷則失守而陰虛虛則無氣無氣則死矣靈樞論神意魂魄志精所主之病然無寒暑驚勞四證余以是推而廣之怒氣所至為嘔血為飧泄為煎厥為薄厥為陽厥為胸滿脅痛食則氣逆而不下為喘渴煩心為消疸為肥氣為目暴盲耳暴閉筋解發於外為疽癰喜氣所至為笑不休為毛髮焦為內病為陽氣不收甚則為狂悲氣所至為陰縮為筋攣為肌痹為脈痿男為數溲血女為血崩為酸鼻辛頞為目昏為少氣不足以息為泣則臂麻恐氣所至為破䐃脫肉為骨酸痿厥為暴下緑水為面熱膚急為陰痿為懼而脫頤驚氣所至為潮涎為目睘為口呿為癡癇為不省人為僵仆久則為痛痹勞氣所至為咽噎病為喘促為嗽血為腰痛骨痿為肺鳴為高骨壞為陰痿為唾血為瞑視為耳閉男為少精女為不月衰甚則潰潰乎若環都汩汩乎不可止思氣所至為不眠為嗜臥為昏瞀為中痞三焦閉塞為咽嗌不利為膽疸嘔苦為筋痿為白淫為得後與氣快然如衰為不嗜食寒氣所至為上下所出水液澄沏清冷下痢清白吐痢腥穢食已不飢堅痞腹滿急痛癥瘕頽疝屈伸不便厥逆禁固熱氣所至為喘嘔吐酸暴注下迫轉筋小便混濁腹脹大而鼓之有聲如鼓瘡疽瘍疹瘤氣結核吐下霍亂瞀郁腫脹鼻窒鼽衄血溢血泄淋閉身熱惡寒甚則瞀瘈目昧不明耳鳴或聾躁擾狂越罵詈驚駭禁栗如喪神守氣逆衝上嚏腥湧溢食不下跗腫疼酸暴喑暴注暴病暴死凡此九者內經有治法但以五行相勝之理治之夫怒傷肝肝屬木怒則氣並於肝而脾土受邪木太過則肝亦自病喜傷心心屬火喜則氣並於心而肺金受邪火太過則心亦自病悲傷肺肺屬金悲則氣並於肺而肝木受邪金太過則肺亦自病恐傷腎腎屬水恐則氣並於腎而心火受邪水太過則腎亦自病思傷脾脾屬土思則氣並於脾而腎水受邪土太過則脾亦自病寒傷形形屬陰寒勝熱則陽受病寒太過則陰亦自病熱傷氣氣屬陽熱勝寒則陰受病熱太過則陽亦自病凡此七者更相為治故悲可以治怒以愴惻苦楚之言感之喜可以治悲以謔浪褻狎之言娛之恐可以治喜以恐懼死亡之言怖之怒可以治思以汙辱欺罔之言觸之思可以治恐以慮彼志此之言奪之凡此五者必詭詐譎怪無所不至然後可以動人耳目易人聽視若胸中無材器之人亦不能用此五法也熱可以治寒寒在外者以焠針㶼尉烙灸湯而汗之寒在內者以熱食溫劑平之寒可以治熱熱在外者以清房涼榻薄衣以清劑汗之熱在內者以寒飲寒劑平之惟逸可以治勞經曰勞者溫之溫謂溫存而養之今之醫者以溫為溫之藥差之久矣岐伯曰以平為期亦謂休息之也惟習可以治驚經曰驚者平之平謂平常也夫驚以其忽然而遇之也使習見習聞則不驚矣此九者內經自有至理庸工廢而不行今代劉河間治五志獨得言外之意謂五志所發皆從心造故凡見喜怒悲驚思之證皆以平心火為主至於勞者傷於動動便屬陽驚者駭於心心便屬火二者亦以平心為主今之醫者不達此旨遂有寒涼之謗群而聚譟之士大夫又從而惑之公議何時而定耶昔余治一書生勞苦太過大便結燥咳逆上氣時喝喝然有音唾嘔鮮血余以苦劑解毒黃連湯加木香漢防己煎服時時啜之復以木香檳榔丸泄其逆氣不月餘而痊余又嘗以巫躍妓抵以治人之悲結者余又嘗以針下之時便雜舞忽笛鼓應之以治人之憂而心痛者余嘗擊拍門窗使其聲不絶以治因驚而畏響魂氣飛揚者余又嘗治一婦人久思而不眠余假醉而不問婦果呵怒是夜困睡又嘗以酸棗仁丸治人多憂以白虎湯不計四時調理人之暑余又以無憂散瀉人冬月得水中之寒痹次以麻黃湯數兩作一劑煎之棗薑熱服汗出而愈如未愈者以瓜蒂散湧之以火助其汗治寒厥亦然余嘗治大暑之病諸藥無效余從其頭數刺其痏出血立愈余治此數者如探囊然惟勞而氣耗恐而氣奪者為難治喜者少病百脈舒和故也昔聞山東楊先生治府主洞泄不已楊初未對病人與衆人談日月星辰纏度及風雲雷雨之變自辰至未而病者聽之而忘其圊楊嘗曰治洞泄不已之人先問其所好之事好棋者與之棋好樂者與之笙笛勿輟又聞莊先生者治以喜樂之極而病者莊切其脈為之失聲佯曰吾取藥去數日更不來病者悲泣辭其親友曰吾不久矣莊知其將愈慰之詰其故莊引素問曰懼勝喜此二人可謂得玄關者也然華元化以怒郡守而幾見殺文摯以怒齊王而竟殺之千萬人中僅得一兩人而反招暴禍若乃醫本至精至微之術不能自保果賤技也哉悲夫三消之説當從火斷二十七八卦之中離能烜物五行之中惟火能焚物六氣之中惟火能消物故火之為用燔木則消而為炭焚土則消而為伏龍肝鍊金則消而為汁煅石則消而為灰煮水則消而為湯煎海則消而為鹽干汞則消而為粉熬錫則消而為丹故澤中之潦涸於炎暉鼎中之水干於壯火蓋五臟心為君火正化腎為君火對化三焦為相火正化膽為相火對化得其平則烹煉飲食糟粕去焉不得其平則燔灼臟腑而津液竭焉故入水之物無物不長入火之物無物不消夫一身之心火甚於上為膈膜之消甚於中則為腸胃之消甚於下為膏液之消甚於外為肌肉之消上甚不已則消及於肺中甚而不已則消及於脾下甚而不已則消及於肝腎外甚而不已則消及於筋骨四臟皆消盡則心始自焚而死矣故素問有消疸消中消渴風消膈消肺消之説消之證不同歸之火則一也故消疸者衆消之總名消中者善飢之通稱消渴者善飲之同謂惟風消膈消肺消此三説不可不分風消者二陽之病二陽者陽明也陽明者胃與大腸也心受之則血不流故女子不月脾受之則味不化故男子少精皆不能成隱曲之事火伏於內久而不已為風所鼓消渴腸胃其狀口乾雖飲水而不咽此風熱格拒於賁門也口者病之上源故病如是又經曰二陽結謂之消此消乃腸胃之消也其善食而瘦者名曰食㑊此消乃肌肉之消也膈消者心移熱於肺傳為膈消王太僕云心肺兩間中有斜膈膜下際內連橫膈膜故心移熱於肺久久傳化內為膈熱消渴而多飲者此雖肺金受心火之邪然止是膈消未及於肺也故飲水至鬥亦不能已其渴也其狀多飲而數溲或不數溲變為水腫者皆是也此消乃膈膜之消也肺消者心移寒於肺肺主氣經曰飲食入胃遊溢精氣上輸於脾脾之精氣上歸於肺通調水道下輸膀胱水精四布五經並行以為常也靈樞亦曰上焦如霧中焦如漚下焦如瀆今心為陽火先受陽邪陽火內郁火鬱內傳肺金受制火與寒邪皆來乘肺肺外為寒所搏陽氣得施內為火所燥亢極水復故皮膚索澤而闢著溲溺積濕而頻並上飲半升下行十合故曰飲一溲二者死膈消不為寒所搏陽氣得宣散於外故可治肺消為寒所搏陽氣自潰於中故不可治此消乃消及於肺臟者也又若脾風傳之腎名曰疝瘕少腹冤熱而痛出白液名曰蠱王太僕云消灼脂肉如蟲之蝕日漸損削此消乃膏液之消也故後人論三焦指以為腎消此猶可治久則變瘈不救必死此消乃消及於腎臟者也夫消者必渴渴亦有三有甘之渴有石之渴有火燥之渴肥者令人內熱甘者令人中滿其氣上溢轉為消渴經又曰味厚者發熱靈樞亦曰咸走血多食之人渴鹹入於胃中其氣上走中焦注於肺則血氣走之血與咸相得則凝干而善渴血脈者中焦之道也此皆肥甘之渴夫石藥之氣悍適足滋熱與熱氣相遇必內傷脾此藥石之渴也陽明司天四之氣嗌乾引飲此心火為寒水所郁故然少陽司天三之氣炎暑至民病渴太陽司天甚則渴而欲飲水行凌火火氣鬱故然少陰之復渴而欲飲少陽之復嗌絡焦稿渴飲水漿色變黃赤又傷寒五日少陰受之故口燥舌乾而渴腎熱病者苦渴數飲此皆燥熱之渴也故膏粱之人多肥甘之渴石藥之渴藜藿奔走之人多燥熱之渴二者雖殊其實一也故火在上者善渴火在中者消穀善飢火在上中者善渴多飲而數溲火在中下者不渴而溲白液火偏上中下者飲多而數溲此其別也後人斷消渴為腎虛水不勝火則是也其藥則非也何哉以八味丸治渴水未能生而火反助也此等本不知書妄引王太僕之注壯火之主以制陽光益火之源以消陰翳但益心之陽寒熱通行強腎之陰熱之猶可豈知王太僕之意以寒熱而行之也腎本惡燥又益之以火可乎今代劉河間自制神芎丸以黃芩味苦入心牽牛大黃驅火氣而下以滑石引入腎經此方以牽牛滑石為君以大黃黃芩為臣以芎連薄荷為使將離入坎真得黃庭之祕旨也而又以人參白朮湯消痞丸大人參散碧玉雞蘇散數法以調之故治消渴最為得體昔有消渴者日飲數升先生以生薑自然汁一盆置於密室中具罌勺於其間使其人入室從而鎖其門病人渴甚不得已而飲汁盡渴減內經辛以潤之之旨內經治渴以蘭除其陳氣亦辛平之劑也先生之湯劑雖用此一味亦必有旁藥助之初虞世曰凡渴疾未發瘡瘍便用大黃寒藥利其勢使大困大虛自勝如發瘡瘍膿血流漓而飧此真俗言也故巴郡太守奏三黃丸能治消渴余嘗以膈數年不愈者減去朴硝加黃連一斤大作劑以長流千里水煎五七沸放冷日呷之數百次以桂苓甘露散白虎湯生藕節汁淡竹瀝生地黃汁相間服之大作劑料以代飲水不日而痊故消渴一證調之而不下則小潤小濡固不能殺炎上之勢下之而不調亦旋飲旋消終不能沃膈膜之干下之調之而不減滋味不戒嗜欲不節喜怒病已而復作能從此三者消渴亦不足憂矣況靈樞又説心脈滑為善渴經又曰滑者陽氣勝又言五臟脈心脈微小為消疸又言五臟脆為消疸又言消疸之人薄皮膚而目堅固以深長沖直揚其心剛剛者多怒怒則氣逆上胸中蓄積血氣逆留臗皮充肌血脈不行轉而為熱熱則消肌膚故為消疸又言五臟皆柔弱者善病消疸夫柔弱者必有剛強剛強者多怒柔弱者易傷也余以是遂悟氣逆之人非徒病消渴若寒薄其外亦為癰腫少氣狂膈中肺消湧水者熱客其臟則亦為驚衄膈消柔痓虛腸澼死客其腑則為癃溺血口麋伏瘕為沉食㑊辛頞鼻淵衄衊瞑目蓋此二十一證皆在氣厥論中經曰諸逆衝上皆屬於火一言可了善讀書者以是求之蟲𧈟之生濕熱為主訣二十八巢氏之衍九蟲三𧈟詳矣然蟲之變不可勝窮要之皆以濕熱為主不可純歸三氣虛與食生具巢氏之衍九蟲也曰伏蛔白肉肺胃弱赤蟯伏蟲長四分群蟲之主也蛔蟲長一尺亦有長五六寸其發動則腹中痛發作腫聚往來上下痛有休息亦攻心痛口喜吐涎及吐清水貫傷心則死診其脈腹中痛其脈法當沉弱今脈反洪大是蛔蟲也白蟲長一寸相生子孫轉大長四五尺亦能殺人寸白蟲色白形扁小因飲白酒以桑枝貫牛肉炙食之並生粟所成又云食生魚後即飲乳酪亦生其發動則損人精氣腰腳疼此蟲長一尺則令人死肉蟲狀如爛杏令人煩滿肺蟲狀如蠶令人咳嗽胃蟲狀如蝦蟆令人嘔逆吐喜噦弱蟲狀如瓜瓣又名鬲蟲令人多唾赤蟲狀如生肉動則腹鳴蟯蟲至微形如菜蟲居肚腸中多則為痔極則為癩因人瘡處以生癰疽癬瘻癘瘑疥齲蟲無故不為人患亦不盡有有亦不必盡多或偏無者此諸蟲依腸胃之間若人臟腑氣實則不為害虛則侵蝕隨其蟲之動能變成諸疾也三𧈟者濕𧈟由脾胃虛為水濕所乘腹內蟲動侵蝕成𧈟若上唇生瘡是蟲蝕五臟則心煩懊若下唇生瘡是蟲蝕下部則肛門爛開心𧈟者因虛而動攻食心謂之心匿疳𧈟者有五曰白赤蟯𧈟黑凡五疳白者輕赤者次蟯者又次𧈟者又次黑者最重皆從腸里上食咽喉齒齦並生瘡下至穀道傷爛下利膿血嘔逆手足心熱腰腳痛嗜臥秋冬可春夏甚巢氏之論蟲𧈟為病之狀固詳矣然蟲之變此數者天地之間氣之所至百蟲爭出如厥陰所至為毛化其應春其蟲毛其畜犬其應夏其蟲羽其畜馬其應長夏其蟲倮其應秋其蟲介其畜雞其應冬其蟲鱗其畜彘其畜犬雞其蟲毛介其畜彘其蟲羽鱗其畜牛犬其蟲倮毛其畜雞羊其蟲介羽其畜彘牛其蟲鱗倮其臟肝脾其蟲毛介其髒心肺其蟲羽鱗其臟脾腎其蟲倮毛其臟肺肝其蟲介羽其臟腎心其蟲鱗倮地氣制己勝天氣制勝己天制色地制形色者青黃赤白黑形者毛羽倮介鱗其生也胎卵濕化其成也跂行飛走故五氣五味根於中五色五類形於外而有一歲之中互有勝復故厥陰司天毛蟲靜羽蟲育介蟲不成居泉毛蟲育倮蟲耗羽蟲不育少陰司天羽蟲靜介蟲育毛蟲不成居泉羽蟲育介蟲耗不育太陰司天倮蟲靜鱗蟲育羽蟲不成居泉倮蟲育鱗蟲不成少陽司天羽蟲靜毛蟲育倮蟲不成居泉羽蟲育介蟲耗毛蟲不育陽明司天介蟲靜羽蟲育介蟲不成居泉介蟲育毛蟲耗羽蟲不成太陽司天鱗蟲靜倮蟲育居泉鱗蟲耗倮蟲不育如風勝則倮蟲不滋此之類也皆五行之相剋也惟濕復則鱗見於陸為濕土相剋水長則反增水鱗雖多然見於陸則反當死故不同也切巢氏言脾胃虛而為水濕所乘者非也乃脾胃大甚熱為水濕多也以玄珠考之蟲得木之氣乃生得雨之氣乃化以知非厥陰風木之氣不生非太陰濕土之氣不成豈非風木主熱雨澤主濕所致耶故五行之中皆有蟲惟金之中其蟲寡冰之中無蟲且諸木有蠹諸果有螟諸菜有蟲諸菽有蚄五穀有螟螣蝥蠈麥杇蛾翻粟破蟲出草腐而螢蚊糞積而遊蠐若此者皆木之蟲也烈火之中有鼠爛灰之中有蠅若此者皆火之蟲也土中盤蛇坯中走蚓穴蟻牆蠍田螻崖蜴若此者皆土之蟲也科豆斗孕於古池蛭馬躍於荒湫魚滿江湖蛟龍藏海若此者皆水中之蟲也昔有冶者碎一破釜將入火爐其鐵斷處窠臼中有一蟲如米中蟲其色正赤此釜烹飪不啻千萬不知何以生了不可曉亦金火之氣也惟冰之中未嘗見蟲焉北方雖有冰鼠止是食冰非生於冰也乃知木火屬春夏濕土屬季夏水從土化故多蟲金從秋氣水從冬氣故無蟲焉若以生物有被曲有曲蟲醬有醬蟲醯有醯蟲飲食停久皆有蟲若以為動物不生蟲如戶樞不蠹之類然動勞之人亦有蠱豈有不動者耶且文籍衣服故不閲不衣而不蠹然非經季夏陰注或暴乾不待冷納於笥中亦不生蟲蠹也或甕旁地濕鼠婦來朋牆下壤干狗蚤居中豈均生於濕耶蓋蚤雖不生於濕亦有生於冬熱則蟲生寒則不生理故然也夫蟲之所居必於脾胃深處藥之所過在於中流蟲聞藥氣而避之群者安得取之豫之法先令飢甚次以檳榔雷丸為引豫別下蟲藥大下十數行可以搐而空濦上張子政用此法下蟲數百相銜長丈餘若夫瘡久而蟲蛆者以木香檳榔散敷之神良別有墜蛆之藥皆具方中此不具陳也補論二十九豫幼歲留心於醫而未嘗見其達者貞祐間自沃來河之南至頓丘而從遊張君仲傑之縣舍得遇太醫張子和先生誨仲傑以醫而及於遊公君寶及不肖猗歟大哉先生之學明妙道之淵源造化之根本講五運之抑鬱發越六氣之勝復淫郁定以所制之法配以所宜之方準繩既陳曲直自正規矩既設方圓自成先生之學其學者之準繩規矩歟雖為人天師可也望而知之以盡其神聞而知之以盡其聖問而知之以盡其工切而知之以盡其巧何假飲上池之水而照見人五臟乎一目而無餘矣至約之法其治有三所用之藥其品有六其治三則汗下吐其品六則辛甘酸苦咸淡也雖不云補理實具焉豫恐人之惑於補而莫之解故續補説於先生汗下吐三論之後我輩所當聞醫流所當觀而人之所當共知也豫考諸經檢諸方試為天下好補者言之夫人之好補則有無病而補者有有病而補者無病而補者誰與上而縉紳之流次而豪富之子有金玉以榮其身芻豢以悅其口寒則衣裘暑則臺榭動則車馬止則裀褥味則五辛飲則長夜醉飽之餘無所用心而因致力於床第以欲竭其精以耗散其真故年半百而衰也然則奈何以藥為之補矣或咨諸庸醫或問諸遊客庸醫以要用相求故所論者輕輕之則草木而已草木則蓯蓉牛膝巴戟天菟絲之類遊客以好名自高故所論者重重之則金石而已金石則丹砂起石硫磺之類吾不知此為補也而補何臟乎以為補心耶而心為丁火其經則手少陰熱則瘡瘍之類生矣以為補肝耶肝為乙木其經則足厥陰熱則掉眩之類生矣脾為己土而經則足太陰以熱補之則病腫滿肺為辛金而經則手太陰以熱補之則病憤郁心不可補肝不可補脾不可補肺不可補莫非為補腎乎人皆知腎為癸水而不知經則子午君火焉補腎之火火得熱而益熾補腎之水水得熱而益涸既熾其火又涸其水上接於心之丁火火獨用事肝不得以制脾土肺金不得以制肝木五臟之極傳而之六腑六腑之極遍而之三焦則百病交起萬疾俱生小不足言大則可懼不疽則中不中則暴喑而死矣以為無病而補之者所得也且如有病而補之者誰歟上而仕宦豪富之家微而農商市庶之輩嘔而補吐而補泄而補痢而補瘧而補咳而補勞而補産而補嘔吐則和胃丸丁沉煎瀉痢豆蔻丸御米殼散咳不五味則寧神散勞不桂附則山藥産不烏金則黑神吾不知此為補果何意耶殊不知嘔得熱而愈酸吐得熱而愈暴泄得熱而清濁不分痢得熱而休息繼至瘧得熱而進不能退咳得熱而濕不能除勞得熱而火益煩産得熱而血愈崩蓋如是而死者八九生者一二死者枉生者幸幸而一生憔悴之態人之所不堪也視其寒用熱以補之矣若言其補則前所補者此病何如豫請為言補之法大抵有餘者損之不足者補之是則補之義也陽有餘而陰不足則當損陽而補陰陰有餘而陽不足則當損陰而補陽熱則芒硝大黃損陽而補陰也寒則乾薑附子損陰而補陽也豈可以熱藥而云補乎哉而寒藥亦有補之義也經曰因其盛而減之因其衰而彰之此之謂也或曰形不足者溫之以氣精不足者補之以味執此溫補二字便為溫補之法惟用溫補之藥且溫補二字特為形精不足而設豈為病不病而設哉雖曰溫之止言其氣雖曰補之止言其味曷嘗言熱藥哉至於天之邪氣感則害人五臟實而不滿可下而已水穀之寒熱感則害人六腑滿而不實可吐而已地之濕氣感則害人皮肉筋脈邪從外入可汗而已然發表不遠熱而無補之意人之所稟有強有弱強而病病而愈愈而後必能復其舊矣弱而病病而愈愈而後不必復其舊矣是以有保養之説然有是説熱藥亦安所用哉慎言語節飲食是矣以日用飲食言之則黍稷禾麥之餘食粳者有幾雞豚牛羊之餘食血者有幾桃杏李梅之餘食梨者有幾蔥韭薤蒜之餘食葵者有幾其助則薑桂椒蒔其和則鹽油醯醬常而粥羹別而焦炒異而燒炙甚則以五辣生鮓而薦酒之肴以薑醋羹羊而按酒之病大而富貴比此尤甚小而市庶亦得以享此吾不知何者為寒何物為冷而以熱藥為補哉日用飲食之間已為太過矣嘗聞人之所欲者生所惡者死今反忘其寒之生甘於熱之死則何如由其不明素問造化之理本草藥性之源一切委之於庸醫之手醫者曰寒涼之藥雖可去疾奈何腑臟不可使之久冷脾胃不可使之久寒保養則固可溫補之是宜斯言方脫諸口已深信於心矣如金石之不可變山嶽之不可移以至於殺身而心無少悔嗚呼醫者之罪固不容誅而用之者亦當分受其責也病者之不誨不足怪也而家家若是何難見而難察耶人惟不學故耳亦有達者之論以素問為規矩準繩以本草為斤斧法則矣其藥則寒涼其劑則兩其丸則百人之聞者如享美饌而見蛆蠅惟恐去之不亟也何哉而所見者丘垤及見談泰山則必駭不取唾而遠則幸矣尚敢冀其言之能從乎茲正之所以難立而邪之所以易行也吾實憂之且天下之不知過不在天下而已在醫流尚不知何責於天下哉噫春秋之法責賢不責愚所謂我輩者猶且棄道學之本源而拘言語之末節以文章自富以談辨自強坐而昂昂立而行行闊其步翼其手自以為高人而出塵表以天下聰明莫己若也一旦疾之臨身矒然無所知茫若摶風之不可得迷若捕影之不可獲至於不得已則聽庸醫之裁判疾之愈則以為得人不愈則以為疾之既極無可奈何委之於命而甘於泉下矣嗚呼實與愚夫殆不相遠此吾所以言之喋喋也然而未敢必其聽之何如耳雖然吾之説非止欲我輩共知欲醫流共知欲天下共知也我輩共知醫流共知天下共知愜吾之意滿吾所望矣水解三十余昔訪靈臺間太史見銅壺之漏水焉太史召司水者曰此水已三環周水滑則漏迅漏迅則刻差當易新水余劃然而悟曰天下之水用之滅火則同濡稿則同至於性從地變質與物遷未嘗罔焉故蜀江濯錦則鮮濟源烹楮則㵿南陽之潭漸於菊其人多壽遼東之澗通於參其人多發晉之山産礬石泉可愈痘戎之麓伏硫磺湯可浴癘揚子宜荈淮菜宜醪滄滷能鹽阿井能膠澡垢以汙茂田以苦癭消於藻帶之波痰破於半夏之洳冰水咽而霍亂息流水飲而癃閉通雪水洗目而赤退鹹水濯肌而瘡干菜之以為齏鐵之以為漿曲之以為酒柏之以為醋千派萬種言不容盡至於井之水一也尚數名焉況其他者乎及酌而傾曰倒流出甃未放曰無根無時初出曰新汲將旦首汲曰井華夫一井之水而功用不同豈烹煮之間將行藥勢獨不擇夫水哉昔有患小溲閉者衆工不能瘥豫易之長川之急流取前藥而沸之一飲立溲元疇聞之曰精乎哉論也近讀靈樞經有半夏湯治不瞑以流水千里外者八升揚之萬遍取其清五升炊以葦薪火正與此論合乃知子和之與醫觸一事一物皆成治法如張長史草書妙天下得之公孫劍器用心亦勞矣後之用水者當以子和之言為制余於是乎作水解
