body:
  text: 卷十撮要圖外有風寒暑濕屬天之四令無形也內有飢飽勞逸屬天之四令有形也一者始因氣動而內有所成者謂積聚癥瘕瘤氣癭起結核狂瞀癲癇疏曰癥堅也積也瘕氣血也二者始因氣動而外有所成者謂癰腫瘡瘍疥癬疽痔掉瘈浮腫目赤熛痓胕腫痛癢之類是也三者不因氣動而病生於內者謂留飲癖食飢飽勞損宿食霍亂悲恐喜怒想慕憂結之類是也四者不因氣動而病生於外者謂瘴氣賊魅蟲蛇蠱毒伏尸鬼擊沖搏墜墮風寒暑濕斫射割刺之類是也風木鬱之病故民病胃脘當心而痛四肢兩脅咽膈不通飲食不下甚則耳鳴眩轉目不識人善僵仆筋骨強直而不用卒倒而無所知也暑火鬱之病故民病少氣瘡瘍癰腫脅肋胸背首面四肢䐜膹臚脹瘍痱嘔逆瘛瘲骨痛節疼及有動泄注下溫瘧腹中暴痛血溢流注精液衰少目赤心熱甚則瞀悶懊惱善暴死也濕土鬱之病故民病心腹脹腹鳴而為數後甚則心痛脅䐜嘔逆霍亂飲發注下肘腫身重脾熱之生也燥金鬱之病故民病咳逆心腹滿引少腹善暴痛不可反側嗌乾面塵色惡金勝而木病也寒水鬱之病故民病寒客心痛腰椎痛大關節不利屈伸不便善厥痞堅腹滿陰乘陽故也初之氣自大寒至立春春分厥陰風木之位陽用事而氣微故曰少陽得甲子元頭常準以大寒交初之氣分以六周甲子以應六氣下傲一月正月二月少陽三陰三陽亦同二之氣春分至小滿少陰君火之位陽氣清明之間又陽明之位三之氣小滿至大暑少陽相火之位陽氣發萬物俱成故亦云太陽旺其脈洪大而長天氣並萬物人脈盛衰造物造化亦同四之氣大暑至秋分太陰濕土之位天氣吉感夏後陰已用事故曰太陰旺此三陰三陽與天氣標本陰陽異矣脈緩大而長燥金旺緊細短澀以萬物乾燥明可見矣五之氣秋分至小雪陽明燥金之位氣衰陰盛故云金氣旺其脈細而微終之氣小雪至大寒太陽寒水之位陰極而盡天氣所收故曰厥陰旺厥者盡也風木肝酸達針與膽為表裡東方木也色青外應目主治血芍藥味酸微寒澤瀉鹹平烏梅酸熱諸風掉眩皆屬於肝木主動治法曰達者吐也其高者因而越之可刺大敦灸亦同暑火心苦發汗與小腸為表裡南方火色外應舌主血運諸經大黃苦寒木香苦溫黃連苦涼沒藥苦熱諸痛癢瘡瘍皆屬於心火治法曰熱者汗之令其疏散也可刺少衝灸之亦同濕土脾甘奪針與胃為表裡中央土也色黃應唇主肌肉應四時蜜甘涼甘草甘平諸濕腫滿皆屬於脾土治法曰奪者瀉也分陰陽利水道可刺隱白灸亦同燥金肺辛清針與大腸為表裡西方金也色白外應皮毛鼻亦行氣乾薑辛熱生薑辛溫薄荷辛涼諸氣膹郁皆屬於肺金治法曰清者清膈利小便解表可刺少商灸亦同寒水腎咸折針與膀胱為表裡北方水也色黑外應耳主骨髓牡蠣鹹寒水蛭鹹寒諸寒收引皆屬於腎水治法曰折之謂抑之制其沖逆可刺湧泉灸亦同大寒子上初之氣初之氣為病多發咳嗽風痰風厥涎潮痹塞口喎半身不遂失音風癲風中婦人胸中留飲兩臍腹微痛嘔逆噁心旋運驚悸狂惕心風搐搦顫掉初之氣病宜以瓜蒂散吐之在下泄之春分上脾二之氣二之氣為病多發風溫風熱經曰風傷於陽濕傷於陰微頭痛身熱發作風溫之候風傷於衛氣也濕傷於脾氣也是以風溫為病陰陽俱自浮汗出身重多眠鼻息語言難出此以上二證不宜下若與巴豆大毒丸藥熱證並生重者必死二之氣病宜以桂枝麻黃湯發汗而已小滿巳上三之氣三之氣為病多發熱皆傳足經者多矣太陽陽明少陽太陰少陰厥陰太陽者發熱惡寒頭項痛腰脊強陽明者身熱目疼鼻乾不得臥少陽者胸脅痛耳聾口苦寒熱往來而嘔此三陽屬熱太陰者腹滿咽乾手足自溫自利不渴或腹滿時痛少陰者故口燥舌乾而渴厥陰者腹滿囊縮喘熱悶亂四肢厥冷爪甲青色三之氣病宜以清涼上溫下養不宜用巴豆丸下之大暑未上四之氣四之氣為病多發暑氣頭痛身熱發渴不宜作熱病治宜以白虎湯得此病不傳染次發脾泄胃泄大腸泄小腸泄大瘕泄霍亂吐瀉下痢及赤白相雜水穀不分消腸鳴切痛面浮足腫目黃口乾脹滿氣痞手足無力小兒亦如此四之氣病宜滲泄五苓散之類也秋分酉上五之氣五之氣為病多發喘息嘔逆咳嗽及婦人寒熱往來痎瘧痹痔消渴中滿小兒斑癮瘡疱五之氣病宜以大小柴胡湯宜解治表裡之類小雪亥上終之氣終之氣為病多發風痰風寒濕痹四肢秋收多冬水復旺水濕相搏肺氣又衰冬寒甚故發則收則痿厥弱無以運用水液澄清冷大寒之疾積滯瘕塊寒疝血瘕凡氣之疾終之氣病宜破積發汗之類肝之經足厥陰風乙木是動則病腰痛不可以俯仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脫色是肝所生病者胸滿嘔逆飧泄狐疝遺溺閉癃為此諸病膽之經足少陽風甲木是動則病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目內眥痛缺盆中腫痛腋下腫馬刀挾癭汗出振寒瘧胸脅肋髀膝外至脛絶骨外踝前及諸節皆痛小指次指不用為此諸病心之經手少陰暑丁火是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛為此諸病小腸經手太陽暑丙火是動則病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛為此諸病脾之經足太陰濕己土是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大指不用為此諸病胃之經足陽明濕戊土是動則病灑灑振寒善呻數欠顏黑至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衄口喎唇疹頸腫喉痹大腹水腫膝臏腫痛循膺乳氣衝股伏兔骭外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒栗胃中寒則脹滿為此諸病心包絡手厥陰為母血是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中憺憺大動面赤目黃喜笑不休是主脈所生病者煩心心痛掌中熱為此諸病三焦經手少陽為父氣是動則病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者汗出目鋭眥痛耳後肩臑肘臂外皆痛小指次指不用為此諸病大腸經手陽明燥庚金是動則病齒痛頸腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒栗不復為此諸病肺之經手太陰燥辛金是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虛則肩背痛寒少氣不足以息溺色變為此諸病腎之經足少陰寒癸水是動則病飢不欲食面如漆柴咳唾則有血喝喝坐而欲起目䀮䀮如無所見心如懸若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所生病者口熱舌乾嗌腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛為此諸病膀胱經足太陽寒壬水是動則病沖頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所生病者痔瘧狂癲疾頭囟項痛目黃淚出鼽衄項背腰尻膕踹腳皆痛小指不用為此諸病風治法風淫於內治以辛涼佐以甘苦以甘緩之以辛散之防風通聖散天麻散防風湯祛風湯小續命湯消風散排風湯暑治法熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之白虎湯桂苓湯玉壺丸碧玉散玉露散石膏湯濕治法濕淫於內治以苦熱佐以鹹淡以苦燥之以淡泄之白朮木香散桂苓白朮丸五苓散葶藶木香散益元散神助散火治法火淫於內治以鹹寒佐以甘苦以酸收之以苦發之涼膈散解毒丸神功丸八正散調胃散大小承氣湯燥治法燥淫於內治以苦溫佐以甘辛以辛潤之以苦下之神功丸麻仁丸脾約丸潤體丸潤腸丸四生丸葶藶散寒治法寒淫於內治以甘熱佐以苦辛以辛散之以苦堅之薑附湯四逆湯二薑湯朮附湯大戊己丸附子理中湯六門病證藥方風門獨治於內者防風通聖散防風天麻丸防風湯小續命湯消風散祛風丸承氣湯陷胸湯神芎丸大黃丸備急丹暑門獨治於外者白虎湯桂苓甘露散化痰玉壺丸益元散玉露散石膏散拔毒散水澄膏魚膽丸金絲膏生肌散濕門兼治於內者五苓散葶藶木香散白朮木香散益元散大橘皮湯桂苓白朮丸神助散大柴胡湯小柴胡湯柴胡飲子防風通聖散防風當歸飲子火門兼治於外者涼膈散黃連解毒湯瀉心湯神芎丸八正散調胃散調胃承氣湯桂苓湯麻黃湯小建中湯升麻湯五積散燥門先治於內後治於外者神芎丸脾約丸麻仁丸潤體丸四生丸謂寒藥攻其里大黃兼牽牛之類謂熱藥攻其表桂枝麻黃升麻之類薑附湯四逆湯二薑湯朮附湯寒門先治於外後治於內者大已寒丸理中丸謂熱藥攻其表謂寒藥攻其里內經濕變五泄六氣屬天無形風暑濕火燥寒五形濕屬戊己濕入肺經為實六味屬地有質酸苦甘辛咸淡五臟濕屬脾胃濕入大腸為虛胃泄風濕夫胃泄者飲食不化完穀出色黃風乘胃也宜化劑之類脾泄暑濕夫脾泄者腹脹滿注實則生嘔逆三證宜和劑淡劑甘劑清劑之類大腸泄燥濕夫大腸泄者腸鳴切痛先宜寒劑奪之次宜甘劑分其陰陽也小腸泄熱濕夫小腸泄者溲而便膿血少腹痛宜寒劑奪之淡劑甘劑分之大瘕泄寒濕夫裡急後重數至圊而不能便先宜清劑寒劑奪之後以淡劑甘劑分之或莖中痛亦同金匱十全之法飧泄春傷於風夏必飧泄暮食不化亦成飧泄風而飧泄者先宜發劑次宜淡劑甘劑分劑之類洞泄春傷於風邪氣留連乃為洞泄泄下褐色治法同上又宜灸水分穴濕氣在下又宜以苦劑越之洞泄寒中洞泄寒中俗呼曰休息痢洞泄屬甲乙風木可灸氣海水分三里慎勿服峻熱之藥小便澀則生足腫腹脹滿者死於庚辛之日如尸臭者不治霍亂吐瀉水穀不化陰陽錯亂可服淡劑調以冰水令頓服之則愈注下火氣太過宜涼劑又宜淡劑調冰水令頓服之則愈此為暴下不止也腫蠱三焦閉澀水道不行水滿皮膚身體痞腫宜越劑發劑奪劑䐜脹濁氣在上不散可服木香檳榔丸青皮陳皮屬大腸為濁氣逆肺金為清氣逆氣化則愈矣腸鳴燥濕相摶為腸鳴中有濕亦為腸鳴火濕相攻亦為腸鳴治法同上治之大效支滿鶩溏上滿而後泄下泄而後復上滿治法同上久則反寒治法同寒中如鶩溏而腸寒者亦斯義風濕亦有支滿者腸澼大小便膿血治法同上又宜不二丸地榆散駐車丸及車前子等藥次宜淡劑甘劑分劑之類臟毒下血治法同上又宜苦劑奪劑以苦燥之如酒毒下血同大小便血大小便治法同上血溫身熱者死火之成數七日而死如尸臭者不治脫肛大腸熱甚也用酸漿水煎三五沸稍熱泄洗三五度次以苦劑堅之則愈廣腸痛治法同上又大黃牽牛丸散奪之法燥澀亦同痔漏廣腸痛腸風下血皆同臟毒治法乳痔腸風必肛門左右有核內經曰因而飽食筋脈橫解腸澼為痔屬大腸經可服枳殼之屬大癖生腸風乳痔相連金匱十全五泄法後論天之氣一也一之用為風火燥濕寒暑故濕之氣一之一也相乘而為五變其化在天為雨在地為泥在人為脾甚則為泄故風而濕其泄也胃暑而濕其泄也脾燥而濕其泄也大腸熱而濕其泄也小腸寒而濕其泄也大瘕若胃不已變而為飧泄飧泄不已變而為洞泄洞泄不已變而為脾泄寒中此風乘濕之變也若脾泄不已變而為霍亂霍亂不已變而為注下注下不已變而為腫蠱此暑乘濕之變也若大腸泄不已變而為䐜脹䐜脹不已變而為腸鳴腸鳴不已變而為支滿鶩溏此燥乘濕之變也若小腸泄不已變而為腸澼腸澼不已變而為臟毒臟毒不已變而為前後便血此熱乘濕之變也若大瘕泄不已變而為脫肛脫肛不已變而為廣腸痛廣腸痛不已變而為乳痔腸風此寒乘濕之變也凡此二十五變若無濕則終不成疾況脾胃二土共管中州脾好飲脾亦惡濕此泄之所由生也凡下痢之脈微且小者生浮大者死水腫則反是浮大者生沉細者死夫病在裡脈沉在表脈浮里當下之表當汗之下痢而脈浮滑水腫者脈沉細表裡俱受病故不治也凡臟血便血兩手脈俱弦者死絶俱滑大者生血溫身熱者死王太僕則曰若下血而身熱血溫是血去而外逸也血屬火故也七日而死者火之成數也夫飧泄得之於風亦汗可愈或伏驚怖則膽木受邪暴下緑水蓋謂戊己見伐於甲木也嬰兒泄緑水素問有嬰兒風理亦如之洞泄者飧泄之甚但飧泄近於洞泄洞泄久則寒中溫之可也治法曰和之則可也汗之則不可蓋在腑則易治入臟則難攻洞泄寒中自腑而入臟宜和解而勿爭水腫之作者未遽而然也由濕遍於大腸小溲自澀水濕既瀦腫滿日倍面黃腹大肢體如泥濕氣周身難專一法越其高而奪其下發其表而滲其中酸收而辛散淡滲而苦堅用攻劑以救其甚緩劑以平其餘如是則孤精得氣獨魄反陽亦可保形陳莝去而淨府潔矣彼豆蔻烏梅罌粟殼勿驟用也設病形一變必致大誤或通而塞或塞而通塞塞通通豈限一法世俗止知塞劑之能塞而不知通劑之能塞者拘於方也凡治濕皆以利小溲為主諸泄不已宜灸水分穴謂水穀之所別也臍之上一寸半灸五七壯腹鳴如雷水道行之候也凡濕勿針內經雖云繆刺其處莫若以張長沙治傷寒法治之蓋泄者亦四時傷寒之一也仲景曰上湧而下泄表汗而里攻半在表半在裡則宜和解之表裡俱見隨證滲泄此雖以治傷寒其於治濕也同仍察脈以視深淺問年壯以視虛實所投必如其意矣頃商水縣白堤酒監單昭信病飧泄逾年不愈此邑劉繼先命豫藥之為桂枝麻黃湯數兩一劑而愈因作五泄圖托難素本意書録於上刊而行之誠有望於後之君子戴人張子和述以上之圖校改為篇法
