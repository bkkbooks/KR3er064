body:
  text: 卷十四扁鵲華他察聲色定死生訣要病人五臟已奪神明不守聲嘶者死病人循衣縫詀語者不可治病人陰陽俱絶掣衣撮空妄言者死病人妄語錯亂及不能言者不治熱病者可治病人陰陽俱絶失音不能言者三日半死病人兩目眥有黃色起者其病方愈病人面黃目青者至期而死重出在下文病人面黃目赤不死赤如衃血者死病人面黃目白者不死白如枯骨者死病人面黃目黑者不死黑如炲死病人面黑目青者不死病人面目俱黃者不死病人面青目白者死病人面黑目白者不死病人面赤目青者六日死病人面黃目青者九日必死是謂亂經飲酒當風邪入胃經膽氣妄泄目則為青雖天救亦不可生病人面赤目白者十日死憂恚思心氣內索面色反好急棺槨病人面白目黑者死此謂榮華已去血脈空索病人面黑目白八日死腎氣內傷病因留積病人面青目白五日死病人著床心痛短氣脾氣內竭後百日復愈能起倣徨因坐於地其上倚床能治此者也病人耳目鼻口有黑色起入於口者必死病人目無精光若土色不受飲食者四日死病人目無精光及牙齒黑色者不治病人耳目及顴頰赤者死在五日中病人黑色出於額上髮際直鼻脊兩顴上者亦死在五日中矣病人黑色出天中下至上顴上者死病人及健人黑色若白色起入目及鼻口者死在三日中矣病人及健人面忽如馬肝色望之如青近之如黑者必死矣病人面黑直視惡風者死病人面黑唇青者死病人面青唇黑者死病人面黑兩脅下滿不能自轉反者死病人目不回直視者一日死病人頭目久痛卒視無所見者死病人陰結陽絶目睛脫恍惚者死病人陰陽結絶目眶陷者死病人眉系傾者七日死病人口如魚口不能復閉而氣出多不返者死病人臥遺尿不覺者死病人尸臭者不可治肝病皮白肺之日庚辛死心病目黑腎之日壬癸死脾病唇青肝之日甲乙死肺病頰赤目腫心之日丙丁死腎病面腫唇黃脾之日戊己死青欲如蒼璧之澤不欲如藍赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如枯骨黑欲如黑漆不欲如炭黃欲如羅裹雄黃不欲如土目赤色者病在心白在肺黑在腎黃在脾青在肝黃色不可名者病在胸中診目病赤脈從上下者太陽病也從下上者陽明病也從外入內者少陽病也診寒熱瘰癧目中有赤脈從上下至瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死診牙齒痛按其陽明之脈來太過者獨熱在右右熱熱在左左熱熱在上上熱熱在下下熱診血者脈多赤多熱多青多痛多黑多黃多痹多赤多黑多青皆見者寒熱身痛面色微齒垢黃爪甲上黃疸也安臥少黃赤脈小而澀者不嗜食診百病死生訣第七診傷寒熱盛脈浮大者生沉小者死傷寒已得汗脈沉小者生浮大者死溫病三四日以下不得汗脈大疾者生脈細小難得者死不治溫病穰穰大熱其脈細小者死千金穰穰作時行溫病下痢腹中痛甚者死不治溫病汗不出出不至足者死厥逆汗出脈堅強急者生虛緩者死溫病二三日身體熱腹滿頭痛食如故脈直而疾者八日死四五日頭痛腹痛而吐脈來細強十二日死八九日頭不痛身不痛目不變色不變而反利脈來喋喋按之不彈手時時心下堅十七日死熱病七八日脈不軟一作喘不散一作數者當有喑喑後三日溫汗不出者死熱病七八日其脈微細小便不利加暴口燥脈代舌焦乾黑者死熱病未得汗脈盛躁疾得汗者生不得汗者難瘥熱病已得汗脈靜安者生脈躁者難治熱病已得汗大熱不去者亦死熱病已得汗熱未去脈微躁者慎不得刺治熱病發熱熱甚者其脈陰陽皆竭慎勿刺不汗出必下利診人被風不仁痿蹶其脈虛者生堅急疾者死診癲病虛則可治實則死診癲病脈實堅者生脈沉細者死又癲疾脈得大滑者久而自已其脈沉小急實不可療小堅急者亦不可療也診頭痛目痛久視無所見者死診人心腹積聚其脈堅強急者生虛弱者死又實強者生沉者死其脈大腹大脹四肢逆冷其人脈形長者死腹脹滿便血脈大時絶極下血小疾者死腸澼便血身熱則死寒則生腸澼下白沫脈沉則生浮則死腸澼下膿血脈懸絶則死滑大則生腸澼之屬身熱脈不懸絶滑大者生懸澀者死以臟期之腸澼下膿血脈沉小留連者生數疾且大有熱者死腸澼筋攣其脈小細安靜者生浮大緊者死洞泄食不化不得留下膿血脈微小者生緊急者死泄注脈緩時小結者生浮大數者死蠶蝕陰注其脈虛小者生緊急者死咳嗽脈沉緊者死浮直者浮軟者生小沉伏匿者死咳嗽羸瘦脈形堅大者死咳脫形發熱脈小堅急者死肌瘦下脫形熱不去者必死咳而嘔腹脹且泄其脈弦急欲絶者死吐血衄血脈滑小弱者生實大者死汗若衄其脈小滑者生大躁者死吐血脈緊強者死滑者生吐血而咳上氣其脈數有熱不得臥者死上氣脈數者死謂損形故也上氣喘息低昂其脈滑手足溫者生脈澀四肢寒者必死上氣面浮腫肩息其脈大不可治加利必死上氣注液其脈虛寧伏匿者生堅強者死寒氣上攻脈實而順滑者生實而逆澀死太素云寒氣在上脈滿實何如曰實而滑則生實而逆則死矣其形盡滿何如曰舉形盡滿者脈急大堅尺滿而不應如是者順則生逆則死何謂順則生逆則死所謂順者手足溫也逆者手足寒也病疸脈實大病久可治脈弦小堅急病久不可治消渴脈數大者生細小浮短者死消渴脈沉小者生實堅大者死水病脈洪大者可治微細不可治水病脹閉其脈浮大軟者生沉細虛小者死水病腹大如鼓脈實者生虛則死卒中惡咯血數升脈沉數細者死浮大疾快者生卒中惡腹大四肢滿脈大而緩者生緊大而浮者死緊細而微亦生瘡腰脊強急瘛瘲皆不可治寒熱瘛瘲其脈代絶者死金瘡血出太多其脈虛細者生數實大者死金瘡出血脈沉小者生浮大者死斫瘡出血一二升脈來大二十日死斫刺俱有病多少血出不自止者其脈來大者七日死滑細者生從高頓僕內有血腹脹滿其脈堅強者生小弱者死人為百藥所中傷脈澀而疾者生微細者死洪大而遲者生千金遲作速人病甚而脈不調者難治脈洪大者易瘥人內外俱虛身體冷而汗出微嘔而煩擾手足厥逆體不得安靜者死脈實滿手足寒頭熱春秋生冬夏必死矣老人脈微陽羸陰強者生脈大加息者死陰弱陽強脈至而代期月而死尺脈澀而堅為血實氣虛也其發病腹痛逆滿氣上行此為婦人胞中絶傷有惡血久成結瘕得病以冬時黍穄赤而死尺脈細而微者血氣俱不足細而來有力者是穀氣不充病得節輒動棗葉生而死此病秋時得之左手寸口脈偏動乍大乍小不齊從寸至關關至尺三部之位其脈動各異不同其人病仲夏得之此脈桃花落而死右手寸口脈偏沉伏乍小乍大朝浮大而暮沉伏浮大即太過上出魚際沉伏即下不至關中往來無常時復來者榆葉枯落而死右手尺部脈三十動一止有頃更還二十動一止乍動乍疏連連相因因不與息數相應其人雖食谷猶不愈蘩草生而死右手尺部脈四十動而一止止而復來來逆如循張弓弦絙絙然如兩人共引一索至立冬死病機諸風掉眩皆屬於肝甲乙木也木鬱達之諸寒收引皆屬於腎壬癸水也水鬱泄之諸氣膹郁皆屬於肺庚辛金也金鬱折之諸濕腫滿皆屬於脾戊己土也土鬱奪之諸痛癢瘡瘍皆屬於心丙丁火也火鬱發之諸熱瞀瘈皆屬於火諸厥固泄皆屬於下下謂下焦肝腎氣也夫守司於下腎之氣也門戶束要肝之氣也故厥固泄皆屬下也厥謂氣逆也固謂禁固也滿氣逆上行反謂固不禁出入無度燥濕不恆皆由下焦主守也諸痿喘嘔皆屬於上上謂上焦心肺氣也炎熱薄爍承熱分化肺之氣也熱鬱化上故病屬上焦諸禁鼓栗如喪神守皆屬於火熱之內作諸頸項強皆屬於濕太陽傷濕諸逆衝上皆屬於火炎上之性用也諸脹腹大皆屬於熱熱鬱於內肺脹於上諸躁狂越皆屬於火熱盛於胃及四末也諸暴強直皆屬於風陽內鬱而陰行於外諸病有聲鼓之如鼓皆屬於熱諸熱胕腫疼酸驚駭皆屬於火諸轉反戾水液混濁皆屬於熱反戾筋轉也水液小便也諸病水液澄沏清冷皆屬於寒上下所出及吐出溺出諸嘔吐酸暴注下迫皆屬於熱故大要曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其血氣令其調達而致和平此之謂也五勝謂五行更勝也標本中氣歌少陽從本為相火太陰從本濕上坐厥陰從中火是家陽明從中濕是我太陽少陰標本從陰陽二氣相包裹風從火斷汗之宜燥與濕兼下之可萬病能將火濕分徹開軒岐無縫鎖辨十二經水火分治法膽與三焦尋火治肝和包絡都無異脾肺常將濕處求胃與大腸同濕治惡寒表熱小膀溫惡熱表寒心腎熾十二經最端的四經屬火四經濕四經有熱有寒時攻裡解表細消息濕同寒火同熱寒熱到頭無兩説六分分來半分寒寒熱中停真浪舌休治風休治燥治得火時風燥了當解表時莫攻裡當攻裡時莫解表表裡如或兩可攻後先內外分多少敢謝軒岐萬世恩爭奈醯雞笑天小治病不讀本草焉知藥性專泥藥性決不識病假饒識病未必得法識病得法工中之甲六陳藥有六味陳久為良狼茱半橘枳實麻黃十八反本草名言十八反半蔞貝蘞芨攻烏藻戟遂芫俱戰草諸參辛芍叛藜蘆運氣歌病如不是當年氣看與何年運氣同只向某年求治法方知都在至真中五不及坎一丁三土五中一七癸九是災宮勝復都來十一位誰知臟腑與宮同斷病人生死靈樞經云人有兩死而無兩生陽氣前絶陰氣後竭其人死身色必青陰氣前絶陽氣後竭其人死身色必赤故陰竭則身青而冷陽竭則身赤而溫四因夫病生之類其有四焉一者始因氣動而內有所成二者始因氣動而外有所成三者不因氣動而病生於內四者不因氣動而病生於外夫因氣動而內成者謂積聚癥瘕瘤氣癭起結核癩癇之類是也外成者謂癰腫瘡瘍痂疥疽痔掉瘈浮腫目赤瘭疹腑腫痛癢之類也不因氣動而病生於內者謂留飲澼食飢飽勞損宿食霍亂悲恐喜怒想慕憂結之類不因氣動而病生於外者謂瘴氣賊魅蟲蛇蠱毒蜚食鬼擊沖薄墜墮風寒暑濕斫射刺割撻朴之類也如此四類有獨治內而愈者有兼治內而愈者有獨治外而愈者有兼治外而愈者有先治內後治外而愈者有先治外後治內而愈者有須解毒而攻擊者有須無毒而調引者凡此之類方法所施或重或輕或緩或急或收或散或潤或燥或軟或堅方士之用見解不同各擅己心好丹非素故復問之五苦六辛五苦六辛從來無解蓋史家闕其疑也一日麻徵君以此質疑於張先生先生亦無所應行十五里忽然有所悟欣然回告於麻徵君以為五苦者五臟為里屬陰宜用苦劑謂酸苦湧泄為陰六辛者六腑為表屬陽宜用辛劑謂辛甘發散為陽此其義也徵君大服其識見深遠鑿昔人不傳之妙故曰知其要者一言而終不知其要者流散無窮
