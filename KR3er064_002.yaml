body:
  text: 卷二偶有所遇厥疾獲瘳記十一余昔過夏邑西有婦人病腹脹如鼓飲食乍進乍退寒熱更作而時吐嘔且三年矣師覡符咒無所不至惟俟一死會十月農隙田夫聚獵一犬役死磔於大樹根盤遺腥在其上病婦偶至樹根頓覺昏憒眩瞀不知人枕於根側口中蟲出其狀如蛇口眼皆具以舌舐其遺腥其人驚見長蟲兩袖裹其手按蟲頭極力而出之且二尺許重幾斤剖而視之以示諸人其婦遂愈蟲亦無名此正與華元化治法同蓋偶得吐法耳又有一書生瘧間日一作將秋試及試之日乃瘧之期書生憂甚誤以蔥蜜合食大吐涎數升瘀血宿食皆盡同室驚畏至來日入院瘧亦不發亦偶得吐法耳正隆間有聖旨取汴梁諸匠氏有木匠趙作頭鐵匠杜作頭行次失路迷至大宅乞宿主人不納曰家中有人重病不敢納君杜作頭紿曰此趙公乃汴梁太醫之家今蒙上司見召迷路至此蓋病者當愈而遇此公也主人默而入良久復出將邀二人入室與之食已主人起請曰煩太醫看病何如趙見而笑曰一藥可愈二人竊議曰來時所攜熟藥寄他車上此中實無奈何杜曰此甚易耳潛出門得牛糞一塊作三十粒下以溫水少頃病人覺胸中如蟲行一湧而出狀若小蜣蜋一二升以手探之又約一升頓覺病去明日主人出謝曰百歲老人未嘗見此神效之藥也禮餞二人遂歸嗚呼此二子小人也欲苟一時之寢遂以穢物治人亦偶得吐法耳又有一婦病風癇從六七歲因驚風得之自後三二年間一二作至五七年五七作逮三十餘歲至四十歲日作或一日十餘作以至昏癡健忘求死而已會興定歲大飢遂採百草而食於水瀕採一種草狀若蔥屬泡蒸而食之食訖向五更覺心中不安吐涎如膠連日不止約一二斗汗出如洗初昏困後三日輕健非曩之比病去食進百脈皆和省其所食不知何物訪問諸人乃憨蔥苗也憨蔥苗者本草所謂藜蘆苗是也圖經云藜蘆苗吐風病此亦偶得吐法耳又有一婦年三十餘病滑泄經年皆云虛中有積以無憂散五七日一服至二十服不效又服纏積丹軟金丸諸藥皆不效其人服藥愈速病勢愈甚食飲日減人或謂曰此休息痢也宜灸中脘及左右穴臍下氣海及膀胱穴以三里引之每年當冬至日夏至日灸之前後僅萬餘壯忽門外或者曰此病我屢諳蓋大傷飲之故即目桃花正開俟其落時以長棘針刺之得數十萼勿犯人手以白麵和作餅子文武火燒令熟嚼爛以米飲湯下之病人如其言服之不一二時瀉如傾前後瀉六七日僅數百行昏困無所知覺惟索冷水徐徐而飲至六七日少省爾後食日進神日昌氣血日和不數年生二子此人本不知桃花萼有取積之神效亦偶得瀉法耳余昔過株林見一童子誤吞銅鐵之物成疾而羸足不勝身會六七月淫雨不止無薪作食過飢數日一旦鄰牛死聞作葵羹粳飯病人乘飢頓食之良久瀉注如傾覺腸中痛遂下所吞之物余因悟內經中肝苦急食甘以緩之牛肉大棗葵菜皆甘物也故能寬緩腸胃且腸中久空又遇甘滑之物此銅鐵所以下也亦偶得瀉法耳頓有老人年八十歲臟腑澀滯數日不便每臨後時目前星飛頭目昏眩鼻塞腰痛積漸食減縱得食便結燥如彈一日友人命食血藏葵羹油泄菠薐菜遂頓食之日日不乏前後皆利食進神清年九十歲無疾而終圖經云菠菜寒利腸胃芝麻油炒而食之利大便葵寬腸利小溲年老之人大小便不利最為急切此亦偶得瀉法耳昔一士人趙仲溫赴試暴病兩目赤腫睛翳不能識路大痛不任欲自尋死一日與同儕釋悶坐於茗肆中忽鉤窗脫鉤其下正中仲溫額上髮際裂長三四寸紫血流數升血止自快能通路而歸來日能辨屋脊次見瓦溝不數日復故此不藥不針誤出血而愈矣夫出血者乃發汗之一端也亦偶得出血法耳嗚呼世人欲論治大病舍汗下吐三法其餘何足言哉此一說讀之者當大笑耳今之醫者宜熟察之可也人能謹察其真中之誤精究其誤中之真反復求之無病不愈余之所以書此者庶後之君子知余之用心非一日也又有病目不睹者思食苦苣頓頓不闕醫者以為有蟲曾不周歲兩目微痛如蟲行大眥漸明俄然大見又如北方貴人愛食乳酪牛酥羊生魚膾鹿脯豬臘海味甘肥之物皆蟲之萌也然而不生蟲者蓋筵會中多胡荽蕪荑醬滷汁皆能殺九蟲此二者亦偶得服食法耳智者讀此當觸類而長之攻裡發表寒熱殊塗箋十二有一言而可以該醫之旨者其惟發表攻裡乎雖千枝萬派不過在表在裡而已矣欲攻其里者宜以寒為主欲發其表者宜以熱為主雖千萬世不可易也內經言之詳矣今人多錯解其旨故重為之箋發表不遠熱攻裡不遠寒此寒熱二字謂六氣中司氣之寒熱司氣用寒時用藥者不可以寒藥司氣用熱時用藥者不可以熱藥此常理也惟攻裡發表則反之然而攻裡發表常分作兩塗若病在表者雖畏日流金之時不避司氣之熱亦必以熱藥發其表若病在裡者雖堅冰積雪之時不避司氣之寒亦必以寒藥攻其里所謂發表者出汗是也所謂攻裡者湧泄是也王太僕注云汗泄下痢皆以其不住於中也夫不住其中則其藥一去不留雖以寒藥犯司氣之寒熱藥犯司氣之熱亦無害也若其藥留而不出適足以司氣增邪是謂不發不攻寒熱內賊其病益甚無病者必生病有病者必甚若司氣用寒之時病在表而不在裡反以寒藥冰其里不湧不泄堅腹滿痛急下痢之病生矣若司氣用熱之時病在裡而不在表反以熱藥燥其中又非發汗則身熱吐下霍亂癰疽瘡癢瞀郁注下瞤瘛腫脹嘔吐鼽衄頭痛骨節攣肉痛血泄淋閉之病生矣以此知非熱不能解表非寒不能攻裡是解表常宜熱攻裡常宜寒若反此法是謂妄造今之用藥者以荊黃湯解表以薑桂藥攻裡此與以水濟水以火濟火何異哉故非徒不效輕者危甚者死夫本草一書不過酸苦甘辛咸淡六味而已聖人既以辛甘發散為陽酸苦湧泄為陰又以淡味滲泄為陽是辛甘淡三味以解表酸苦咸三味以攻裡發表與滲泄非解表而何湧泄非攻裡而何此二者聖人之法盡矣蔑以加矣然則醫之法果多乎哉攻裡以寒解表以熱而已矣雖然表病而里不病者可專以熱藥發其表里病而表不病者可專以寒藥攻其里表裡俱病者雖可以熱解表亦可以寒攻裡此仲景之大小柴胡湯雖解表亦兼攻裡最為得體今之用藥者只知用熱藥解表不察里之已病故前所言熱證皆作矣醫者不知罪由己作反謂傷寒變證以誣病人非一日也故劉河間自制通聖散加益元散名為雙解千古之下得仲景之旨者劉河間一人而已然今之議者以為雙解不可攻裡謗議紛紜坐井小天誠可憾也豈知雙解煎以蔥須豆豉湧而汗之一劑立雪所苦縱不全瘥亦可小瘳向所謂熱證亦復不作俟六經傳畢微下而已今醫者不知其濟物無窮之功乃妄作損胃無窮之謗憤劉河間有能醫之名設堅白之論以求世譽孰肯剖璞一試而追悔和氏之刖足哉余之所以屢書此者嘆知音之難遇也近者余之故人某官不欲斥言其名因病頭項強狀類傷寒服通聖散雖不得其法猶無害也醫者見其因通聖散也立毀其非仲景之藥也渠不察其熱已甚矣復以辛熱發之汗出不解發黃血泄竟如前所言後雖以承氣下之不能已又復下之至絶汗出其脈猶搏擊然余親見其子言之甚詳至今士大夫皆不知辛熱一發之過也獨歸罪於通聖散嗚呼甚矣道之難明也頃余之舊契讀孟堅漢書藝文志載五苦六辛之說而顏師古輩皆無注解渠特以問余余顧其內經諸書中亦不見其文既相別矣乘蹇且十里外颯然而悟欲復回以告豫之舊契已歸且遠乃令載之以示來者夫五者五臟也臟者里也六者六腑也腑者表也病在裡者屬陰分宜以苦寒之藥湧之泄之病在表者屬陽分宜以辛溫之劑發之汗之此五苦六辛之意也顏師古不注蓋闕其疑也乃知學不博而欲為醫難矣余又徐思五積六聚其用藥亦不外於是夫五積在臟有常形屬裡宜以苦寒之藥湧之泄之六聚在腑無常形屬表宜以辛溫之藥發之汗之與前五苦六辛亦合亦有表熱而可用柴胡之涼者猶宜熱而行之裡寒而可用姜附之熱者猶宜寒而行之余恐來者不明內經發表攻裡之旨故並以孟堅五苦六辛之說附於卷末汗下吐三法該盡治病詮十三人身不過表裡氣血不過虛實表實者里必虛裡實者表必虛經實者絡必虛絡實者經必虛病之常也良工之治病者先治其實後治其虛亦有不治其虛時粗工之治病或治其虛或治其實有時而幸中有時而不中謬工之治病實實虛虛其誤人之跡常著故可得而罪也惟庸工之治病純補其虛不敢治其實舉世皆曰平穩誤人而不見其跡渠亦自不省其過雖終老而不悔且曰吾用補藥也何罪焉病人亦曰彼以補藥補我彼何罪焉雖死而亦不知覺夫粗工之與謬工非不誤人惟庸工誤人最深如鯀湮洪水不知五行之道夫補者人所喜攻者人所惡醫者與其逆病人之心而不見用不若順病人之心而獲利也豈復計病者之死生乎嗚呼世無真實誰能別之今余著此吐汗下三法之詮所以該治病之法也庶幾來者有所憑藉耳夫病之一物非人身素有之也或自外而入或由內而生皆邪氣也邪氣加諸身速攻之可也速去之可也攬而留之何也雖愚夫愚婦皆知其不可也及其聞攻則不悅聞補則樂之今之醫者曰當先固其元氣元氣實邪自去世間如此妄人何其多也夫邪之中人輕則傳久而自盡頗甚則傳久而難已更甚則暴死若先論固其元氣以補劑補之真氣未勝而邪已交馳橫騖而不可制矣惟脈脫下虛無邪無積之人始可議補其餘有邪積之人而議補者皆鯀湮洪水之徒也今豫論吐汗下三法先論攻其邪邪去而元氣自復也況豫所論之法諳練日久至精至熟有得無失所以敢為來者言也天之六氣風暑火濕燥寒地之六氣霧露雨雹冰泥人之六味酸苦甘辛咸淡故天邪發病多在乎上地邪發病多在乎下人邪發病多在乎中此為發病之三也處之者三出之者亦三也諸風寒之邪結搏皮膚之間藏於經絡之內留而不去或發疼痛走注麻痹不仁及四肢腫癢拘攣可汗而出之風痰宿食在膈或上脘可湧而出之寒濕固冷熱客下焦在下之病可泄而出之內經散論諸病非一狀也流言治法非一階也至真要大論等數篇言運氣所生諸病各斷以酸苦甘辛鹹淡以總括之其言補時見一二然其補非今之所謂補也文具於補論條下如辛補肝咸補心甘補腎酸補脾苦補肺若此之補乃所以發腠理致津液通血氣至其統論諸藥則曰辛甘淡三味為陽酸苦鹹三味為陰辛甘發散淡滲泄酸苦鹹湧泄發散者歸於汗湧者歸於吐泄者歸於下滲為解表歸於汗泄為利小溲歸於下殊不言補乃知聖人止有三法無第四法也然則聖人不言補乎曰蓋汗下吐以若草木治病者也補者以穀肉果菜養口體者也夫穀肉果菜之屬猶君之德教也汗下吐之屬猶君之刑罰也故曰德教興平之粱肉刑罰治亂之藥石若人無病粱肉而已及其有病當先誅伐有過病之去也粱肉補之如世已治矣刑措而不用豈可以藥石為補哉必欲去大病大瘵非吐汗下未由也已然今之醫者不得盡汗下吐法各立門牆誰肯屈己之高而一問哉且豫之三法能兼衆法用藥之時有按有蹺有揃有導有減有增有續有止今之醫者不得豫之法皆仰面傲笑曰吐者瓜蒂而已矣汗者麻黃升麻而已矣下者巴豆牽牛朴硝大黃甘遂芫花而已矣既不得其術從而誣之豫固難與之苦辨故作此詮所謂三法可以兼衆法者如引涎漉涎嚏氣追淚凡上行者皆吐法也炙蒸熏泄洗尉烙針刺砭射導引按摩凡解表者皆汗法也催生下乳磨積逐水破經泄氣凡下行者皆下法也以余之法所以該衆法也然豫亦未嘗以此三法遂棄衆法各相其病之所宜而用之以十分率之此三法居其八九而衆所當才一二也或言內經多論針而少論藥者蓋聖人欲明經絡豈知針之理即所謂藥之理即今著吐汗下三篇各條藥之輕重寒溫於左仍於三法之外別著原補一篇使不預三法恐後之醫者泥於補故置之三篇之末使用藥者知吐中有汗下中有補止有三法內經曰知其要者一言而終是之謂也凡在上者皆可吐式十四夫吐者人之所畏且順而下之尚猶不樂況逆而上之不說者多矣然自胸以上大滿大實痰如膠粥微丸微散皆兒戲也非吐病安能出仲景之言曰大法春宜吐蓋春時陽氣在上人氣與邪氣亦在上故宜吐也湧吐之藥或丸或散中病則止不必盡劑過則傷人然則四時有急吐者不必直待春時也但仲景言其大法耳今人不得此法遂廢而不行試以名方所記者略數之如仲景傷寒論中以蔥根白豆豉湯以吐頭痛梔子厚朴湯以吐懊憹瓜蒂散以吐傷寒六七日因下後腹滿無汗而喘者如此三方豈有殺人者乎何今議豫好湧者多也又如孫氏千金方風論中數方往往皆效近代本事方中稀涎散吐膈實中滿痰厥失音牙關緊閉如喪神守萬全方以鬱金散吐頭痛眩運頭風噁心沐浴風近代普濟方以吐風散追風散吐口噤不開不省人事以皂角散吐涎潮總録方中以常山散吐瘧孫尚方以三聖散吐發狂神驗方吐舌不正補亡篇以遠志去心春分前服之預吐瘟疫此皆前人所用之藥也皆有效者何今之議豫好湧者多也惟養生必用方言如吐其涎令人跛躄校正方已引風門中碧霞丹為證豫不須辨也但內經明言高者越之然名醫録中惟見太倉公華元化徐文伯能明律用之自余無聞乃知此法廢之久矣今豫驟用於千載寂寥之後宜其驚且駭也惜乎黃帝岐伯之書伊摯仲景之論棄為閒物縱有用者指為山野無韻之人豈不謬哉豫之用此吐法非偶然也曾見病之在上者諸醫盡其技而不效余反思之投以湧劑少少用之頗獲徵應既久乃廣訪多求漸臻精妙過則能止少則能加一吐之中變態無窮屢用屢驗以至不疑故凡可吐令條達者非徒木鬱然凡在上者皆宜吐之且仲景之論胸上諸實郁而痛不能愈使人按之及有涎唾下痢十餘行其脈沉遲寸口脈微滑者此可吐之吐之則止仲景所謂胸上諸實按之及有涎唾者皆邪氣在上也內經曰下痢脈遲而滑者內實也寸口脈微滑者上實也皆可吐之王冰曰上盛不已吐而奪之仲景曰宿食在上脘當吐之又如宿飲酒積在上脘者亦當吐之在中脘者當下而去之仲景曰病人手足厥冷兩手脈乍結以客氣在胸中心下滿而煩欲食不能食者知病在胸中當吐之余嘗用吐方皆是仲景方用瓜蒂散吐傷寒頭痛用蔥根白豆豉湯以吐雜病頭痛或單瓜蒂名獨聖加茶末少許以吐痰飲食加全蠍梢以吐兩脅肋刺痛濯濯水聲者內經所謂濕在上以苦吐之者其是謂歟今人亦有竊豫之法者然終非口授或中或否或湧而不能出或出而不能止豈知上湧之法名曰撩痰撩之一字自有擒縱卷舒頃有一工吐陳下一婦人半月不止涎至數斗命懸須臾倉皇失計求豫解之豫使煎麝香湯下咽立止或問麝香何能止吐豫謂之曰瓜苗聞麝香即死吐者瓜蒂也所以立解如藜蘆吐者不止以蔥白湯解之以石藥吐者不止以甘草貫衆解之諸草木吐者可以麝香解之以本草考之吐藥之苦寒者有豆豉瓜蒂茶末梔子黃連苦參大黃黃芩辛苦而寒者有鬱金常山藜蘆甘苦而寒者有地黃汁苦而溫者有木香遠志厚朴辛苦而溫者有薄荷芫花辛而溫者有穀精草蔥根鬚辛而寒者有輕粉辛甘而溫者有烏頭附子尖酸而寒者有晉礬緑礬齏汁酸而平者有銅緑甘酸而平者有赤小豆酸而溫者有飯漿酸辛而寒者有膽礬酸而寒者有青鹽白米飲辛鹹而溫者有皂角甚咸而寒者有滄鹽甘而寒者有牙硝甘而微溫且寒者有參蘆頭甘辛而熱者有蠍梢凡此三十六味惟常山膽礬瓜蒂有小毒藜蘆芫花輕粉烏附尖有大毒外二十六味皆吐藥之無毒者各對證擢而用之此法宜先小服不滿積漸加之余之撩痰者以叉股雞羽探引不出以齏投之投之不吐再投之且投且探無不出者吐至昏眩慎勿驚疑書曰若藥不瞑眩厥疾弗瘳如發頭眩可飲冰水立解如無冰時新汲水亦可強者可一吐而安弱者可作三次吐之庶無損也吐之次日有頓快者有轉甚者蓋飲之而吐未平也俟數日當再湧之如覺渴者冰水新水瓜梨柿及涼物皆不禁惟禁貪食過飽硬物干脯難化之物心火既降中脘沖和陰道必強大禁房勞大憂悲思病人既不自責衆議因而噪之歸罪於吐法起謗其由此也故性行剛暴好怒喜淫之人不可吐左右多嘈雜之言不可吐病人頗讀醫書實非深解者不可吐主病者不能辨邪正之說不可吐病人無正性妄言妄從反覆不定者不可吐病勢巇危老弱氣衰者不可吐自吐不止亡陽血虛者不可吐諸吐血嘔血咯血衄血嗽血崩血失血者皆不可吐吐則轉生他病浸成不救反起謗端雖懇切求慎勿強從恐有一失愈令後世不信此法以小不善纍大善也必標本相得彼此相信真知此理不聽浮言審明某經某絡某臟某腑某氣某血某邪某病決可吐者然後吐之是豫之所望於後之君子也庶幾不使此道湮微以新傳新耳凡在表者皆可汗式十五風寒暑濕之氣入於皮膚之間而未深欲速去之莫如發汗聖人之刺熱五十九刺為無藥而設也皆所以開玄府而逐邪氣與汗同然不若以藥發之使一毛一竅無不啓發之為速也然發汗亦有數種世俗止知惟溫熱者為汗藥豈知寒涼亦能汗也亦有熏漬而為汗者亦有導引而為汗者如桂枝湯桂枝麻黃各半湯五積散敗毒散皆發汗甚熱之藥也如升麻湯葛根湯解肌湯逼毒散皆辛溫之藥也如大柴胡湯小柴胡湯柴胡飲子苦寒之藥也如通聖散雙解散當歸散子皆辛涼之藥也故外熱內寒宜辛溫外寒內熱宜辛涼平準所謂導引而汗者華元化之虎鹿熊猴鳥五禽之戲使汗出如敷粉百疾皆愈所謂熏漬而汗者如張苗治陳廩丘燒地布桃葉蒸之大汗立愈又如許胤宗治許太后感風不能言作防風湯數斛置於床下氣如煙霧如其言遂愈能言此皆前人用之有驗者以本草校之荊芥香白芷陳皮半夏細辛蒼朮其辛而溫者乎蜀椒胡椒茱萸大蒜其辛而大熱者乎生薑其辛而微溫者乎天麻蔥白其辛而平者乎青皮薄荷其辛苦而溫者乎防己秦艽其辛而且苦者乎麻黃人參大棗其甘而溫者乎葛根赤茯苓其甘而平者乎桑白皮其甘而寒者乎防風當歸其甘辛而溫者乎附子其甘辛而大熱者乎官桂桂枝其甘辛而大熱者乎厚朴其苦而溫者乎桔梗其苦而微溫者乎黃芩知母枳實地骨皮其苦而寒者乎前胡柴胡其苦而微寒者乎羌活其苦辛而微溫者乎升麻其苦甘且平者乎芍藥其酸而微寒者乎浮萍其辛酸而寒者乎凡此四十味皆發散之屬也惟不善擇者當寒而反熱當熱而反寒此病之所以變也仲景曰大法春夏宜汗春夏陽氣在外人氣亦在外邪氣亦在外故宜發汗然仲景舉其略耳設若秋冬得春夏之病當不發汗乎但春夏易汗而秋冬難耳凡發汗欲周身漐漐然不欲如水淋漓欲令手足俱周遍汗出一二時為佳若汗暴出邪氣多不出則當重發汗則使人亡陽凡發汗中病則止不必盡劑要在劑當不欲過也此雖仲景調理傷寒之法至於雜病復何異哉且如傷寒麻黃之類為表實而設也桂枝湯之類為表虛而設也承氣湯為陰虛而設也四逆湯為陽虛而設也表裡俱實者所謂陽盛陰虛下之則愈表裡俱虛者所謂陰盛陽虛汗之則愈也所謂陽為表而陰為里也如表虛亡陽發汗則死發汗之法辨陰陽別表裡定虛實然後汗之隨治隨應設若飧泄不止日夜無度完穀下出發汗可也內經曰春傷於風夏生飧泄此以風為根風非汗不出昔有人病此者腹中雷鳴泄注水穀不分小便澀滯皆曰脾胃虛寒故耳豆蔻烏梅罌粟殼乾薑附子曾無一效中脘臍下灸已數十燥熱轉甚小溲涸竭瘦削無力飲食減少命豫視之余以謂應象論曰熱氣在下水穀不分化生飧泄寒氣在上則生䐜脹而氣不散何也陰靜而陽動故也診其兩手脈息俱浮大而長身表微熱用桂枝麻黃湯以薑棗煎大劑連進三服汗出終日至旦而愈次以胃風湯和平臟腑調養陰陽食進病愈又貧家一男子年二十餘病破傷風搐牙關緊急角弓反張棄之空室無人問者時時呻呼余憐其苦以風藥投之口噤不能下乃從兩鼻竅中灌入咽喉約一中碗死中求生其藥皆大黃甘遂牽牛硝石之類良久上湧下泄吐且三四升下一二十行風搐立止肢體柔和旦已自能起口雖開尚未能言豫又以桂枝麻黃湯三兩作一服使啜之汗出周匝如洗不三日而痊又如小兒之病驚風搐搦涎潮熱鬱舉世皆用大驚丸抱龍丸鎮心丸等藥間有不愈者余潛用瓜蒂赤小豆等分共為細末以豬膽汁浸蒸餅為丸衣以螺青或丹砂以漿水乳汁送之良久風涎湧出一兩掬三五日一湧湧三五次漸以通聖散稍熱服之汗漐漐然病日已矣頃又治一狂人陰不勝其陽則脈流薄疾陽並乃狂難經曰重陽者狂重陰者癲陽為腑陰為臟非陽熱而陰寒也熱並於陽則狂狂則生寒並於陰則癲癲則死內經曰足陽明胃實則狂故登高而歌棄衣而走無所不為是熱之極也以調胃承氣大作湯下數十行三五日復上湧一二升三五日又復下之凡五六十日下百餘行吐亦七八度如吐時暖室置火以助其熱而汗少解數汗方平又治一酒病人頭痛身熱惡寒狀類傷寒診其脈兩手俱洪大三兩日不圊余以防風通聖散約一兩用水一中碗生薑二十餘片蔥鬚根二十莖豆豉一大撮同煎三五沸去滓稍熱分作二服先服一服多半須臾以叉股探引咽中吐出宿酒酒之香味尚然約一兩掬頭上汗出如洗次服少半立愈內經曰火鬱發之發為汗之令其疏散也又嘗治一稅官病風寒濕痹腰腳沉重浮腫夜則痛甚兩足惡寒經五六月間猶綿脛靴足腰膝皮膚少有跣露則冷風襲之流入經絡其痛轉劇走注上下往來無定其痛極處便攣急而腫起肉色不變腠理間如蟲行每遇風冷病必轉增飲食轉減肢體瘦乏須人扶掖猶能行立所服者烏附薑桂種種燥熱燔針著灸莫知其數前後三年不獲一愈一日命豫脈之其兩手皆沉滑有力先以導水丸通經散各一服是夜瀉三十餘行痛減半遂漸服赤茯苓湯川芎湯防風湯此三方在宣明論中治痹方是也日三服煎七八錢漐漐然汗出余又作玲瓏灶法熏蒸血熱病必增劇諸汗法古方亦多有之惟以吐發汗者世罕知之故余嘗曰吐法兼汗良以此夫凡在下者皆可下式十六下之攻病人亦所惡聞也然積聚陳莝於中留結寒熱於內留之則是耶逐之則是耶內經一書惟以氣血通流為貴世俗庸工惟以閉塞為貴又止知下之為瀉又豈知內經之所謂下者乃所謂補也陳莝去而腸胃潔癥瘕盡而榮衛昌不補之中有真補者存焉然俗不信下之為補者蓋庸工妄投下藥當寒反熱當熱反寒未見微功轉成大害使聰明之士亦復不信者此也所以謂寒藥下者調胃承氣湯泄熱之上藥也大小桃仁承氣次也陷胸湯又其次也大柴胡又其次也以涼藥下者八正散泄熱兼利小溲洗心散抽熱兼治頭目黃連解毒散治內外上下蓄熱而不泄者四物湯涼血而行經者也神芎丸解上下蓄熱而泄者也以溫藥而下者無憂散下諸積之上藥也十棗湯下諸水之上藥也以熱藥下者煮黃丸纏金丸之類也急則用湯緩則用丸或以湯送丸量病之微甚中病即止不必盡劑過而生愆仲景曰大法秋宜瀉謂秋則陽氣在下人氣與邪氣亦在下故宜下此仲景言其大概耳設若春夏有可下之疾當不下乎此世上之庸工局蹜遷延誤人大病者也皆曰夏月豈敢用過藥瀉脫胃氣嗚呼何不達造化之甚也內經稱土火之郁發四時之氣以五月先取化源瀉土補水又曰土鬱則奪之王太僕注曰奪謂下之令無壅礙也然則於五月先防土壅之發令人下奪素問之言非歟然隨證不必下奪在良工消息之也豫所以言此者矯世俗期不誤大病暴病耳故土鬱之為奪雖大承氣湯亦無害也試舉大承氣之藥論大黃苦寒通九竅利大小便除五臟六腑積熱芒硝鹹寒破痰散熱潤腸胃枳實苦寒為佐使散滯氣消痞滿除腹脹厚朴辛溫和脾胃寬中通氣此四味雖為下藥有泄有補卓然有奇功劉河間又加甘草以為三一承氣以甘和其中最得仲景之祕也余嘗以大承氣改作調中湯加以薑棗煎之俗見薑棗以為補脾胃而喜服不知其中有大黃芒硝也惡寒喜暖取補故自古及今天下皆然此內經之法抑屈而不伸也此藥治中滿痞氣不大便者下五七行殊不困乏次日必神清氣快膈空食進內經曰脾為之使胃為之市人之食飲酸鹹甘苦百種之味雜湊於此壅而不行蕩其舊而新之亦脾胃之所望也況中州之人食雜而不勞者乎中州土也兼載四象木金水火皆聚此中故脾胃之病奈何中州之醫不善掃除倉廩使陳莝積而不能去也猶曰我善補大罪也此藥有奇功皆謂服之便成傷敗乃好丹而非素者也或言男子不可久泄婦人不可久吐何妄論之甚也可吐則吐可下則下豈問男女乎大人小兒一切所傷之物在胃脘如兩手脈遲而滑者內實也宜下之何以別乎蓋傷宿食者惡食傷風者惡風傷寒者惡寒傷酒者惡酒至易辨也故凡宿食在胃脘皆可下之則三部脈平若心下按之而硬滿者猶宜再下之如傷寒大汗之後重復勞發而為病者蓋下之後熱氣不盡故也當再下之若雜病腹中滿痛不止者此為內實也金匱要略曰痛而腹滿按之不痛為虛痛者為實難經曰痛者為實腹中滿痛里壅為實故可下之不計雜病傷寒皆宜急下之宜大承氣湯或導水丸或泄水丸等藥過十餘行如痛不已亦可再服痛已則止至如傷寒大汗之後發熱脈沉實及寒熱往來時時有涎嗽者宜大柴胡湯加當歸煎服之下三五行立愈産後慎不可作諸虛不足治之必變作骨蒸寒熱飲食不入肌膚瘦削經水不行經曰寒則衰飲食熱則消肌肉人病瘦削皆粗工以藥消爍之故也嗚呼人之死者豈為命乎難經曰實實虛虛損不足而益有餘如此死者醫殺之耳至如目黃九疸食勞皆屬脾土可下之宜茵陳蒿湯或用導水丸禹攻散瀉十餘行次以五苓散桂苓甘露散白朮丸等藥服之則愈矣或腰腳胯痛可用甘遂粉二三錢以獖豬腰子薄批七八片摻藥在內以濕紙包數重文武火燒熟至臨臥細嚼以溫酒或米飲湯調下至平明見一二十行勿訝意欲止瀉則飲水或新水頓服之瀉立止次服通經和氣定痛烏金丸蹁馬丹之類則愈矣內經有不因氣動而病生於外者太僕以為瘴氣賊魅蟲毒蜚尸鬼擊沖薄墜墮風寒暑濕斫射剝割撞撲之類至如諸落馬墮井打撲閃肭損折湯沃火燒車碾犬傷腫發焮痛日夜號泣不止者豫尋常談笑之間立獲大效可峻瀉三四十行痛止腫消乃以通經散下導水丸等藥如瀉水少則可再加湯劑瀉之後服和血消腫散毒之藥病去如掃此法得之睢陽高大明侯德和使外傷者不致癃殘跛躄之患余非敢掩人之善意在救人耳曾有鄰人杖瘡發作腫痛焮及上下語言錯亂時時嘔吐數日不食皆曰不救余以通經散三四錢下神佑丸百餘丸相併而下間有嘔出者大半已下膈矣良久大瀉數行穢不可近膿血涎沫瘀毒約一二斗其病人困睡不醒一日一夜鄰問豫豫曰喘息勻停腫消痛減故得睡也來旦語清食進不數日痊救杖瘡欲死者四十年間二三百余追思舉世杖瘡死者皆枉死也自後凡見冤人被責者急以導水丸禹攻散大作劑料瀉驚涎一兩盆更無腫發痛焮之難如導水丸禹攻散泄瀉不動更加之通經散神佑丸瀉之瀉訖須忌熱物止可吃新汲水一二頓瀉止立愈至如沉積多年羸劣者不可便服陡攻之藥可服纏積丹三稜丸之類內經曰重者因而減之若人年老衰弱有虛中積聚者止可五日一服萬病無憂散故凡積年之患豈可一藥而愈即可減而去之以本草考之下之寒者有戎鹽之咸犀角之酸鹹滄鹽澤瀉之甘鹹枳實之苦酸膩粉之辛澤漆之苦辛杏仁之苦甘下之之微寒者有豬膽之苦下之大寒者有牙硝之甘大黃瓜蒂牽牛苦瓠子蘭汁牛膽羊蹄苗根之苦大戟甘遂之苦甘朴硝芒硝之苦辛下之溫者有檳榔之辛芫花之苦辛石蜜之甘皂角之辛鹹下之熱者有巴豆之辛下之辛涼者有豬羊血之咸下之平者有郁李仁之酸桃花萼之苦上三十味惟牽牛大戟芫花皂角羊蹄苗根苦瓠子瓜蒂有小毒巴豆甘遂膩粉杏仁之有大毒余皆無毒設若疫氣冒風中酒小兒瘡疹及産後潮熱中滿敗血勿用銀粉杏仁大毒之藥下之必死不死即危且如檳榔犀角皂角皆溫平可以殺蟲透關節除腸中風火燥結大黃芒硝朴硝等鹹寒可以治傷寒熱病時氣瘟毒發斑瀉血燥熱發狂大作湯劑以蕩滌積熱澤瀉羊蹄苗根牛膽蘭葉汁苦瓠子亦苦寒可以治水腫遍身腹大如鼓大小便不利及目黃濕毒九疸食癆疳蟲食土生米等物分利水濕通利大小便蕩滌腸胃間宿谷相搏又若備急丸以巴豆乾薑大黃三味蜜和丸之亦是下藥然止可施於辛苦勞力貧食粗辣之輩或心腹脹滿脅肋刺痛暴痛不住服五七丸或十丸瀉五七行以救急若施之富貴城郭之人則非矣此藥用砒石治瘧相類止可施之於貧食之人若備急丸治傷寒風溫中酒冒風及小兒瘡疹産後滿悶用之下膈不死則危及夫城郭之人富貴之家用此下藥亦不死則危矣奈何庸人畏大黃而不畏巴豆粗工喜巴豆而不喜大黃蓋庸人以巴豆性熱而不畏以大黃性寒而畏之粗工以巴豆劑小而喜以大黃劑大而不喜皆不知理而至是也豈知諸毒中惟巴豆為甚去油匱之蠟猶能下後使人津液涸竭留毒不去胸熱口燥他病轉生故下藥以巴豆為禁余嘗用前十餘藥如身之使臂臂之使手然諸洞泄寒中者不可下俗謂休息痢也傷寒脈浮者不可下表裡俱虛者不宜下內經中五痞心證不宜下厥而唇青手足冷內熱深者宜下寒者不宜下以脈別之小兒內瀉轉生慢驚及兩目直視魚口出氣者亦不宜下若十二經敗甚亦不宜下止宜調養溫以和之如下則必誤人病耳若其餘大積大聚大病大祕大涸大堅下藥乃補藥也余嘗曰瀉法兼補法良以此夫推原補法利害非輕說十七原補一篇不當作由近論補者與內經相違不得不作耳夫養生當論食補治病當論藥攻然聽者皆逆耳以豫言為怪蓋議者嘗知補之為利而不知補之為害也論補者蓋有六法平補峻補溫補寒補筋力之補房室之補以人參黃耆之類為平補以附子硫黃之類為峻補以豆蔻官桂之類為溫補以天門冬五加皮之類為寒補以巴戟肉蓯蓉之類為筋力之補以石燕海馬起石丹砂之類為房室之補此六者近代之所謂補者也若施之治病非徒功效疏闊至其害不可勝言者難經言東方實西方虛瀉南方補北方此言肝木實而肺金虛瀉心火補腎水也以此論之前所謂六補者了不相涉試舉補之所以為害者如瘧本夏傷於暑議者以為脾寒而補之溫補之則危峻補之則死傷寒熱病下之後若以溫辛之藥補之熱當復作甚則不救瀉血血止之後若溫補之血復熱小溲不利或變水腫霍亂吐瀉本風濕暍合而為之溫補之則危峻補之則死小兒瘡疱之後有溫補之必發癰腫焮痛婦人大産之後心火未降腎水未升如黑神散補之輕則危甚則死老人目暗耳聵腎水衰而心火盛也若峻補之則腎水彌涸心火彌盛老人腎虛腰脊痛腎惡燥腰者腎之府也峻補之則腎愈虛矣老人腎虛無力夜多小溲腎主足腎水虛而火不下故足痿心火上乘肺而不入脬囊故夜多小溲若峻補之則火益上行脬囊亦寒矣老人喘嗽火乘肺也若溫補之則甚峻補之則危停飲之人不可補補則痞悶轉增腳重之人不可補補則脛膝轉重男子二十上下而精不足女人二十上下而血不流皆二陽之病也時人不識便作積冷極憊治之以溫平補之夫積溫尚成熱而況燔針於臍下火灸手足腕骨內經本無勞證由此變而為勞煩渴咳嗽涎痰肌瘦寒熱往來寢汗不止日高則顏赤皆以為傳尸勞不知本無此病醫者妄治而成之耳夫二陽者陽明也胃之經也心受之則血不流脾受之則味不化故男子少精女子不月皆由使內太過故隱蔽委屈之事各不能為也惟深知湧瀉之法者能治之又如春三月風傷於榮榮為血故陰受之溫傷於衛衛為氣故陽受之初發之後多與傷寒相似頭痛身熱口乾潮熱數日不大便仲景所謂陰陽俱浮自汗出身重多眠睡目不欲開者是也若以寒藥下之則傷臟氣若以溫藥補之則火助風溫發黃發斑溫毒熱增劇矣風溫外甚則直視潮熱譫語尋衣撮空驚惕而死者溫補之罪也內經雖言形不足者溫之以氣精不足者補之以味氣屬陽天食人以五氣血屬陰地食人以五味者戒乎偏勝非便以溫為熱也又若經云損者補之勞者溫之此溫乃溫存之溫也豈以溫為熱哉又如虛則補其母實則瀉其子者此欲權衡之得其平也又烏在燔針壯火煉石燒砒硫薑烏附然後為補哉所謂補上欲其緩補下欲其急者亦焉在此等而為急哉自有酸苦甘辛咸淡寒涼溫熱平更相君臣佐使耳所謂平補者使陰陽兩停是謂平補奈時人往往惡寒喜溫甘受酷烈之毒雖死而不悔也可勝嘆哉余用補法則不然取其氣之偏勝者其不勝者自平矣醫之道損有餘乃所以補其不足也余嘗曰吐中自有汗下中自有補豈不信然余嘗用補法必觀病人之可補者然後補之昔維陽府判趙顯之病虛羸泄瀉褐色乃洞泄寒中證也每聞大黃氣味即注泄余診之兩手脈沉而軟令灸水分穴一百餘壯次服桂苓甘露散胃風湯白朮丸等藥不數月而愈又息城酒監趙進道病腰痛歲余不愈診其兩手脈沉實有力以通經散下五七行次以杜仲去粗皮細切炒斷絲為細末每服三錢豬腰子一枚薄批五七片先以椒鹽淹去腥水摻藥在內裹以荷葉外以濕紙數重封以文武火燒熟臨臥細嚼以溫酒送下每旦以無比山藥丸一服數日而愈又相臺監酒嶽成之病虛滑泄日夜不止腸鳴而口瘡俗呼為心勞口瘡三年不愈豫以長流水同薑棗煎五苓散五七錢空心使服之以治其下以宣黃連與白茯苓去皮二味各等分為末以白麵糊為丸食後溫水下三五十丸以治其上百日而愈又汝南節度副使完顏君寶病臟毒下衃血發渴寒熱往來延及六載日漸瘦弱無力面黃如染余診其兩手脈沉而身涼內經寒以為榮氣在故生可治先以七宣丸下五七行次以黃連解毒湯加當歸赤芍藥與地榆散同煎服之一月而愈若此數證余雖用補未嘗不以攻藥居其先何也蓋邪未去而不可言補補之則適足資寇故病蠲之後莫若以五穀養之五果助之五畜益之五菜充之相五臟所宜毋使偏傾可也凡藥皆毒也非止大毒小毒謂之毒雖甘草苦參不可不謂之毒久服必有偏勝氣增而久夭之由也是以君子貴流不貴滯貴平不貴強盧氏云強中生百病其知言哉人惟恃強房勞之病作矣何貴於補哉以太宗憲宗高明之資猶陷於流俗之蔽為方士燥藥所誤以韓昌黎元微之猶死於小溲不通水腫有服丹置數妾而死於暴脫有服草烏頭如聖丸而死於須瘡有服乳石硫黃小溲不通有習氣求嗣而死於精血有嗜酒而死於發狂見鬼有好茶而為癖乃知諸藥皆不可久服但可攻邪邪去則已近年運使張伯英病宿傷服硫黃薑附數月一日喪明監察陳威卿病嗽服鍾乳粉數年嘔血而殞嗚呼後之談補者尚監茲哉證口眼喎斜是經非竅辨十八口眼喎斜者俗工多與中風掉眩證一概治之其藥則靈寶至寶續命清心一字急風烏犀鐵彈丸其方非不言治此病也然而不愈者何也蓋知竅而不知經知經而不知氣故也何謂知竅而不知經蓋人之首有七竅如日月五星七政之在天也故肝竅目目為肝之外候肺竅鼻鼻為肺之外候心竅舌舌無竅心與腎合而寄竅於耳故耳與舌俱為心之外候俗工止知目病歸之肝口病歸之脾耳病歸之腎舌病歸之心更無改張豈知目之內眥上下二網足太陽及足陽明起於此目之鋭眥足少陽起於此手少陽至於此鼻之左右足陽明手陽明俠乎此口之左右亦此兩經還乎此故七竅有病不可獨歸之五臟當歸之六陽經也余曰俗工知竅而不知經者此也何謂知經而不知氣蓋世之談方藥者不啻千萬人止不過堅執本草性味其知十二經所出所入所循所環所交所合所過所注所起所會所屬所絡所上所下所俠所貫所布所散所結所繞所抵所連所繫所約所同所別千萬人中或見一二名明可謂難其人矣然而不過執此十二經便為病本將陽經為熱陰經為寒向本草中尋藥藥架上檢方而已矣病之不愈又何訝焉豈知靈樞經曰足之陽明手之太陽筋急則口目為僻此十二經及受病之處也非為病者也及為病者天之六氣也六氣者何風暑燥濕火寒是也故曰俗工知經而不知氣者此也然則口目喎斜者此何經也何氣也足之太陽足之陽明左目有之右目亦有之足之陽明手之陽明口左有之口右亦有之此兩道也靈樞又言足陽明之筋其病頰筋有寒則急引頰移口熱則筋弛縱緩不勝收故僻是左寒右熱則左急而右緩右寒左熱則右急而左緩故偏於左者左寒而右熱偏於右者右寒而左熱也夫寒不可徑用辛熱之劑蓋左中寒則逼熱於右右中寒則逼熱於左陽氣不得宣行故也而況風者甲乙木也口眼陽明皆為胃土風偏賊之此口目之所以僻也是則然矣七竅惟口目喎斜而耳鼻獨無此病者何也蓋動則風生靜者風息天地之常理也考之易象有足相符者震巽主動坤艮主靜動者皆屬木靜者皆屬土觀卦者視之理也視者目之用也目之上網則眨下網則不眨故觀卦上巽而下坤頤卦者養之理也養者口之用也口之下頷則嚼上頷則不嚼故頤卦上艮而下震口目常動故風生焉耳鼻常靜故風息焉當思目雖斜而目之眥眶未嘗斜口之喎而口之輔車未嘗喎此經之受病非竅之受病明矣而況目有風輪唇有飛門者耶余嘗治此證未嘗用世俗之藥非故與世參商方鑿圓枘自然齟齬者過穎一長吏病此命豫療之目之斜灸以承泣口之喎灸以地倉俱效苟不效者當灸人迎夫氣虛風入而為偏上不得出下不得泄真氣為風邪所陷故宜灸內經曰陷下則灸之正謂此也所以立愈又嘗過東杞一夫亦患此豫脈其兩手急數如弦之張甚力而實其人齒壯氣充與長吏不同蓋風火交勝豫調承氣湯六兩以水四升煎作三升分四服令稍熱啜之前後約瀉四五十行去一兩盆次以苦劑投之解毒數服以升降水火不旬日而愈脈訣云熱則生風若此者不可純歸其病於窗隙之間而得亦風火素感而然也蓋火勝則制金金衰則木茂木茂則風生若東杞之人止可流濕潤燥大下之後使加餐通郁為大靈樞雖有馬膏桂酒雙塗之法此但治其外耳非治其內也今人不知其本欲以單服熱水強引而行之未見其愈者也向之用姜附烏桂起石硫黃之劑者是耶非耶疝本肝經宜通勿塞狀十九疝有七前人論者甚多非靈樞素問銅人之論余皆不取非余好異也但要窮其原耳七疝者何寒疝水疝筋疝血疝氣疝狐疝㿗疝是謂七疝俗工不識因立謬名或曰膀胱或曰腎冷或曰小腸氣小兒曰偏氣立名既謬並喪其實何哉蓋醫者既斷為膀胱腎冷小腸氣又曰虛寒所致其藥之用也不鹿茸巴戟則杜仲蓯蓉不附子烏頭則乾薑官桂不楝實蘹香則金鈴補骨脂朝吞暮餌曾無殊效三二十年牢不可去間因微病稍似開通執此微芒寖成大錯標既不除本必歸甚處處相傳曾無覺者豈知諸疝皆歸肝經其奈通流歸之小腸脬囊夫膀胱水府專司滲泄小腸水道專主通流腎為少陰總統二水人之小溲自胃入小腸滲入膀胱膀胱者脬囊也氣化則水出莖端此常道也及其為疝乃屬足厥陰肝經蓋環陰器而上入小腹者足厥陰肝經也夫肝腎皆屬於下與沖任督相附然靈樞經言足厥陰肝經病則有遺溺癃閉狐疝主腎與膀胱小腸三經則不言疝是受疝之處乃肝之部分也且內經男子宗筋為束骨之會也而肝主筋睪者囊中之丸雖主外腎非厥陰環而引之與玉莖無由伸縮在女子則為篡戶其內外為二其一曰廷孔其二曰窈漏此足厥陰與衝任督之所會也靈樞言足厥陰之經筋聚於陰器其病傷於寒則陰縮入傷於熱則縱挺不收治在行水清陰氣故陽明與太陰厥陰之筋皆會於陰器惟厥陰主筋故為疝者必本之厥陰靈樞又言足厥陰之別名曰蠡溝去內踝五寸別走少陽循脛上睪結於莖其病氣逆睪腫卒疝實則挺長虛則暴癢取之所別矣豈非厥陰為受病之處耶靈樞又言邪在小腸連睪系屬於腎貫肝絡肺結心系氣盛厥逆上衝腸胃熏肝散於肓結於臍故取之肓原以散之刺太陰以平之取厥陰以下之取巨虛下臁以去之按其所過之經以調之此其初雖言邪在小腸至其治法必曰取厥陰以下之乃知諸疝關於厥陰可以無疑以脈考之素問云厥陰滑為狐疝少陽滑為肺風疝太陰滑為脾風疝陽明滑為心風疝太陽滑為腎風疝少陰滑為肝風疝凡此六疝雖見於他脈中皆言風疝者足厥陰肝經之氣也靈樞亦曰心脈微滑為心疝肝脈滑甚為潰癃腎脈滑甚為癃㿉凡此三臟脈之疝亦以滑為疝也素問又云脈大急皆為疝心脈滑傳為心疝肺脈沉傳為肺疝三陰急為疝三陽急為瘕王太僕云太陽受寒血凝為瘕太陰受寒氣聚為疝此言太陰受寒傳之肝經也可以溫藥逐之不可以溫藥補之若補之者是欲病去而強挽留之也歷考素問三陽為病發寒熱其傳為㿗疝此亦言膀胱非受病之處必傳於厥陰部分然後為疝也又言病在少腹腹痛不得大小便病名曰疝得之寒言脈急者曰疝瘕少腹痛凡言少腹者豈非厥陰之部分耶又言脾風傳胃名曰疝瘕此謂非肝木不能為風氣名曰厥疝蓋脾土虛而不能制水又為肝木所凌也又言督脈為沖疝蓋厥陰與沖任督俱會於前陰也豈不明哉至如運氣中又言歲太陽在泉寒淫所勝民病少腹控睪蓋寒客於小腸膀胱則肝木縮而不得伸行母傳之子也陽明司天燥淫所勝丈夫㿗疝婦人少腹痛此言肝氣不得上行為金所抑鬼賊故也又言太陰在泉土勝則寒氣逆滿食飲不下甚則為疝此亦言寒客太陰濕土土不勝水水傳之肝經也又嘗遍閲銅人俞穴亦相表裡如背上十三椎俞肝經言寒疝腹部中行惟陰交一穴言寒疝任脈之所發也關元一穴言暴疝小腸之募足三陰任脈之會也中極一穴言疝瘕膀胱之募亦足三陰任脈之會也曲骨一穴言㿉疝任脈足厥陰之會也其腹部第二行肓腧二穴言寒疝衝脈足少陰之會也四病上穴言疝瘕衝任脈足少陰腎之會也其腹部第三行大巨二穴言㿉疝足陽明脈氣之所發也氣衝二穴言㿗疝莖中痛兩丸寒痛亦足陽明脈氣之所發也其腹部第四行府合二穴言疝痛足太陰厥陰陰維之交會也亦太陰部三陰陽明之別也衝門二穴言陰疝足太陰厥陰之會也其在側脅者五樞二穴言寒疝陰邪上入少腹帶脈下三寸也其在足六經者足厥陰穴十名言疝者七謂大敦行間太衝中封蠡溝中都曲泉足少陽穴十四名言疝者一謂丘墟穴也足太陰穴十一名言疝者一謂陰陵泉也足陽明穴十五名言疝者一謂陰市穴也足少陰穴十名言疝者五謂然谷大溪照海交信築賓也足太陽穴十八名言疝者二謂金門合陽也由是言之惟厥陰言疝獨多為疝之主也其餘經穴雖亦治疝終非受疝之地但與足厥陰相連耳或在泉寒勝木氣攣縮禁於此經或司天燥勝木氣抑鬱於此經或忿怒悲哀憂抑頓挫結於此經或藥淋外固閉尾縮精壅於此經其病差別如此不知世間之藥多熱補從誰而受其方也信其方則素問靈樞銅人皆非也信素問靈樞銅人則俗方亦皆非也不知後之君子以孰為是嗚呼余立於醫四十餘歲使世俗之方人人可療余亦莫知敢廢也諳練日久因經識病然後不惑且夫遺溺閉隆陰痿脬痹精滑白淫皆男子之疝也不可妄歸之腎冷血涸不月月罷腰膝上熱足躄嗌乾癃閉少腹有塊或定或移前陰突出後陰痔核皆女子之疝也但女子不謂之疝而謂之瘕若年少而得之不計男子婦人皆無子故隱蔽委曲之事了不幹脬腎小腸之事乃足厥陰肝經之職也奈俗方止言脬腎小腸殊不言肝木一句惑人甚矣且肝經乙木也木屬東方為心火之母也凡疝者非肝木受邪則肝木自甚也不可便言虛而補之難經所謂東方實西方虛瀉南方補北方此言瀉火木自平金自清水自旺也昔審言為蔡之參軍也因坐濕地疝痛不可堪諸藥莫救余急以導水丸禹功散瀉三十餘行腫立消痛立減又項關一男子病卒疝暴痛不任倒於街衢人莫能動呼豫救之余引經證之邪氣客於足厥陰之絡令人卒疝故病陰丸痛也余急瀉大敦二穴大痛立已夫大敦穴者乃是厥陰之二穴也殄寇鎮一夫病㾬瘧發渴痛飲蜜漿劇傷冰水醫者莫知瀉去其濕反雜進薑附濕為燥熱所壅三焦閉澀水道不行陰道不興陰囊腫墜大於升斗余先以導水百餘丸少頃以豬腎散投之是夜瀉青赤水一斗遂失痛之所在近穎尾一夫病卒疝赤腫大痛數日不止諸藥如水投石余以導水一百五十丸令三次咽之次以通經散三錢空腹淡酒調下五更下臟腑壅積之物數行痛腫皆去不三日平復如故內經曰木鬱則達之達謂吐也令條達肝之郁本當吐者然觀其病之上下以順為貴仲景所謂上宜吐下宜瀉者此也敢列七疝圖於下以示後之君子庶幾有所憑藉者焉寒疝其狀囊冷結硬如石陰莖不舉或控睪丸而痛得於坐臥濕地或寒月涉水或冒雨雪或臥坐磚石或風冷處使內過勞宜以溫劑下之久而無子水疝其狀腎囊腫痛陰汗時出或囊腫而狀如水晶或囊癢而燥出黃水或少腹中按之作水聲得於飲水醉酒使內過勞汗出而遇風寒濕之氣聚於囊中故水多令人為卒疝宜以逐水之劑下之有漏針去水者人多不得其法筋疝其狀陰莖腫脹或潰或膿或痛而裡急筋縮或莖中痛痛極則癢或挺縱不收或白物如精隨溲而下久而得於房室勞傷及邪術所使宜以降心之劑下之血疝其狀如黃瓜在少腹兩旁橫骨兩端約中俗云便癰得於重感春夏大燠勞動使內氣血流溢滲入脬囊留而不去結成癰腫膿少血多宜以和血之劑下之氣疝其狀上連腎區下及陰囊或因號哭忿怒則氣鬱之而脹怒哭號罷則氣散者是也有一治法以針出氣而愈者然針有得失宜以散氣之藥下之或小兒亦有此疾俗曰偏氣得於父已年老或年少多病陰痿精怯強力入房因而有子胎中病也此疝不治惟築賓一穴針之狐疝其狀如瓦臥則入小腹行立則出小腹入囊中狐則晝出穴而溺夜則入穴而不溺此疝出入上下往來正與狐相類也亦與氣疝大同小異今人帶鉤鈐是也宜以逐氣流經之藥下之頽疝其狀陰囊腫縋如升如斗不癢不痛者是也得之地氣卑濕所生故江淮之間湫塘之處多感此疾宜以祛濕之藥下之女子陰戶突出雖亦此類乃熱則不禁固也不可便謂虛寒而澀之燥之補之本名曰瘕宜以苦下之以苦堅之王冰云陽氣下墜陰氣上爭上爭則寒多下墜則筋緩故睪垂縱緩因作㿗疝也以上七疝下去其病之後可調則調可補則補各量病勢勿拘俗法經所謂陰盛而腹脹不通者㿗癃疝也不可不下五虛五實攻補懸絶法二十虛者補之實者瀉之雖三尺之童皆知之矣至於五實五虛豈可以泛泛虛實用藥哉內經明言其狀如俗工不識何此二證所以見殺於委靡之手也坐視人之死猶相誇曰吾藥穩以誑病家天下士大夫亦誠以為然以誑天下後世豈不怪哉夫一身猶一國也如尋邑百萬圍昆陽此五實證也故蕭王親犯中原而篤戰如河內飢而又經火災此五虛證也故汲黯不避矯詔而發倉此可與達權知變者論不可與貪常嗜瑣者說也故曰庸人誤天下庸工誤病人正一理也內經曰五實者死五虛者亦死夫五實者謂五臟皆實也五虛者謂五臟皆虛也腑病為陽易治而鮮死臟病為陰難治而多死經明言脈盛皮熱腹脹前後不通悶瞀者五實也脈盛為心皮熱為肺腹脹為脾前後不通為腎悶瞀為肝五臟皆實之證也五虛者反是脈細皮寒氣少瀉利前後飲食不入者五虛也脈細為心皮寒為肺氣少為肝泄利前後為腎飲食不入為脾此五臟皆虛之證也夫五實為五臟俱太過五虛為五臟俱不及內經言此二證皆死非謂必死也謂不救則死救之不得其道亦死也其下復言將粥入胃則虛者活身汗後利則實者活此兩證自是前二證之治法也後人不知是治法只作辨驗生死之斷句直謂病人有此則生無此則死虛者聽其漿粥自入胃實者聽其自汗自利便委之死地豈不謬哉夫漿粥入胃而不注泄則胃氣和胃氣和則五虛皆實也是以生也汗以泄其表利以泄其里並泄則上下通上下通則五實皆啓矣是以生也此二證異常卻不宜用班氏所謂有病不服藥之言蓋其病大且篤故也余向日從軍於江淮之上一舟子病豫診之乃五實也余自幼讀醫經嘗記此五實之證竟未之遇也既見其人竊私料之此不可以常法治乃可大作劑而下之殊不動搖計竭智窮無如之何忽憶桃花萼丸頓下七八十丸連瀉二百餘行與前藥相兼而下其人昏困數日方已蓋大疾之已去自然臥憩不如此則病氣無由衰也徐以調和胃氣之藥饘粥日加自爾平復又嘗過鳴鹿邸中聞有人呻吟聲息瘦削痿然無力余視之乃五虛也余急以聖散子二服作一服此證非三錢二錢可塞也續以胃風湯五苓散等藥各大作劑使頓服注瀉方止而漿粥入胃不數日而其人起矣故五虛之受不加峻塞不可得而實也彼庸工治此二證草草補瀉如一杯水救一車薪之火也竟無成功反曰虛者不可補實者不可瀉此何語也籲不虛者強補不實者強攻此自是庸工不識虛實之罪也豈有虛者不可補實者不可泄之理哉豫他日又思之五實證汗下吐三法俱行更快五虛證一補足矣今人見五實證猶有塞之者見五虛證雖補之而非其藥本當生者反鈍滯遷延竟至於死耳夫聖散子有乾薑尋常瀉利勿用各有標本胃風五苓有桂所以溫經散表而分水道聖散子之澀燥胃風五苓之能分皆辛熱辛溫之劑也俗工往往聚訕以豫好用寒涼然豫豈不用溫補但不遇可用之證也譊譊謗喙咸欲誇己以標名從誰斷之悲夫
