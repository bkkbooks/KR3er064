body:
  text: 卷十二吐劑三聖散防風三兩去蘆瓜蒂三兩剝盡碾破以紙卷定連紙銼細去紙用粗籮子籮過另放末將渣炒微黃次入末一處同炒黃用藜蘆去苗及心加減用之或一兩或半兩或一分上各為粗末每服約半兩以齏汁三茶盞先用二盞煎三五沸去齏汁次入一盞煎至三沸卻將原二盞同一處熬二沸去滓澄清放溫徐徐服之不必盡劑以吐為度瓜蒂散瓜蒂七十五個赤小豆七十五粒人參半兩去蘆甘草半兩或三錢五分上為細末每服一錢或半錢或二錢量虛實加減用之空心齏汁調下服之稀涎散豬牙皂角不蛀者去皮弦稱一兩炙用之緑礬藜蘆各半兩上為細末每服半錢或一二錢斡開牙關漿水調下灌之鬱金散鬱金滑石川芎各半兩上為細末每服一二錢量虛實加減以齏汁調下空心服之茶調散亦名二仙散瓜蒂不以多少好茶中停上為細末每服二錢齏汁調下空心用之獨聖散瓜蒂不以多少上為細末每服一錢或二錢齏汁調下服之脅痛加全蠍頭痛加鬱金碧雲散治小兒驚風有涎膽礬半兩銅青一分粉霜一錢輕粉一分上研為細末每服一字薄荷湯調下用之如中風用漿水調服常山散常山二兩甘草二兩半上為細末水煎空心服之青黛散豬牙皂角二個玄胡索一個青黛少許上為細末鼻內灌之其涎自出汗劑防風通聖散防風川芎當歸芍藥大黃薄荷麻黃去根不去節連翹芒硝以上各半兩石膏黃芩桔梗以上各二兩滑石三錢甘草二兩荊芥白朮山梔子以上各一兩上為粗末每服五七錢水一大盞生薑三片煎至七分去滓熱服如涎嗽加半夏五錢生薑制過雙解散通聖散與益元散相合中停水一鍾生薑豆豉蔥白同煎浮萍散治癩風浮萍一兩荊芥川芎甘草麻黃去根以上各一兩或加當歸芍藥上為粗末每服一兩水二盞煎至七分去滓溫服汗出則愈升麻湯升麻去土葛根芍藥甘草炒以上各一兩上為粗末每服三錢水一盞半煎至七分去滓溫服不拘時候麻黃湯麻黃一兩去根官桂七錢甘草三錢半炙杏仁二十二個去皮尖麩炒黃色用上為粗末每服三錢水一鍾煎至七分去滓溫服汗出自解桂枝湯桂枝一兩茯苓半兩芍藥一兩甘草七錢上為粗末每服三錢水一盞生薑棗一同煎溫服下劑導水丸大黃二兩黃芩二兩滑石四兩黑牽牛四兩另取頭末加甘遂一兩去濕熱腰痛泄水濕腫滿久病則加白芥子一兩去遍身走注疼痛或加朴硝一兩退熱散腫毒止痛久毒宜加郁李仁一兩散結滯通關節潤腸胃行滯氣通血脈或加樟柳根一兩去腰腿沉重上為細末滴水丸梧桐子大每服五十丸或加至百丸臨臥溫水下禹功散黑牽牛頭末四兩茴香一兩炒或加木香一兩上為細末以生薑自然汁調一二錢臨臥服通經散陳皮去白當歸各一兩甘遂以麵包不令透水煮百餘沸取出用冷水浸過去面焙乾上為細末每服三錢溫湯調下臨臥服神祐丸甘遂依前制用大戟醋浸煮焙乾用芫花醋浸煮各半兩黑牽牛一兩大黃一兩上為細末滴水丸小豆大每服五七十丸臨臥溫水下琥珀丸上為前神佑丸加琥珀一兩是也益胃散甘遂依前制過用上為細末每服三錢以獖豬腰子細批破以鹽椒等物淹透爛切摻藥在內以荷葉裹燒熟溫淡酒調服大承氣湯大黃半兩厚朴一兩枳實一枚麩炒芒硝半兩上為粗末每服三五錢水一盞煎至七分去滓服以意加減小承氣湯大黃厚朴以上各一兩枳實一枚上為粗末同前煎服調胃承氣湯大黃甘草炙朴硝以上各半兩上為粗末每服五七錢水一盞煎三五沸去滓溫服食後桃仁承氣湯桃仁十二個去皮尖官桂甘草芒硝以上各半兩上銼如麻豆大每服三五錢水一大盞煎至七分去滓溫服玉井散栝蔞根二兩甘遂一兩制用上為細末以麝香湯調下三錢臨臥服水煮桃紅丸黑牽牛頭末半兩瓜蒂末二錢雄黃一錢水飛過用之干胭脂少許上以黃酒調面為丸以水煮令浮熟取出冷水拔過麝香湯水下無憂散黃耆木通桑白皮陳皮以上各一兩胡椒白朮木香各半兩牽牛頭末四兩上為細末每服三五錢以生薑自然汁調下食後泄水丸又方藏用丸一料加芒硝半兩商陸半兩為末水丸依前服之大戟芫花甘遂海帶海藻郁李仁續隨子以上各半兩樟柳根一兩上為細末水煮棗肉為丸如小豆大每服五七十丸水下牛黃通膈丸黑牽牛大黃木通以上各半兩各另取末上為細末水丸如黍粒大量兒大小三五十丸或百丸水下四生丸一名潤腸丸黑牽牛大黃朴硝皂角去皮弦蜜炙以上各等份上為細末水丸如梧桐子大每服七八十丸食後溫水下內托散大黃牡蠣以上各半兩甘草三錢栝蔞二個上為末水一大盞煎三五沸去滓露冷服藏用丸大黃黃芩以上各二兩滑石黑牽牛各四兩上為末水丸桐子大每服五七十丸食後溫水下神芎丸藏用丸一料內加黃連薄荷川芎各半兩水丸桐子大水下進食丸牽牛一兩巴豆三粒去油心膜上為末水丸每服二三十丸食後隨所傷物送下牛黃白朮丸治腰腳濕黑牽牛末大黃以上各二兩白朮一兩上為末滴水丸桐子大每服三十丸食前生薑湯下要利加至百丸玉燭散以四物湯承氣湯朴硝各等份水煎去滓食前服之三和湯以四物湯涼膈散當歸各中停水煎服丁香化癖散治小兒脾白丁香密陀僧舶上硫黃以上各一錢硇砂半錢輕粉少許上為細末每兒一歲服半錢男病女乳調女病男乳調後用通膈泄抵當湯水蛭十個虻蟲十個去翅足熬大黃一兩桃仁七枚去皮尖捶上銼如麻豆作一服水二盞煎至七分去滓溫服抵當丸虻蟲五個桃仁六枚大黃三分水蛭五個上為細末只作一丸水一大盞煮一丸至七分頓服之十棗湯紫芫花醋浸煮大戟甘遂制以上各等分上為末每服半錢水一盞棗十枚同煎取半盞服除濕丹檳榔甘遂威靈仙赤芍藥澤瀉葶藶以上各二兩乳香另研沒藥另研以上各一兩黑牽牛末半兩大戟三兩炒陳皮四兩去白上為細末麵糊和丸如桐子大每服三五十丸水送下利膈丸牽牛四兩生槐角子一兩炒木香一兩青皮一兩皂角去皮酥炙半夏洗各二兩上為細末生薑麵糊為丸桐子大每服四五十丸水送下三一承氣湯大黃芒硝厚朴去皮枳實以上各五兩甘草一兩上銼如麻豆大每服半兩水一大盞生薑三片煎至六分入硝去滓熱服大陷胸湯大黃一兩半芒硝一兩八錢半甘遂末一字上以水一盞煮大黃至八分去滓入硝一沸下甘遂末溫服小陷胸湯半夏湯洗一錢五分黃連一分栝蔞實一枚用四分之一上銼麻豆大水二盞先煮栝蔞至一盞半下諸藥取八分去滓溫服未利再服握宣丸檳榔肉桂乾薑附子甘遂良薑韭子巴豆以上各等分入硫黃一錢上為細末軟米和丸桐子大早晨先椒湯洗手放溫揩乾用生油少許泥手心男左女右磨令熱握一丸宣一二行風門防風通聖散方在汗門中附防風天麻散防風天麻川芎羌活白芷草烏頭荊芥當歸焙制甘草滑石白附子以上各半兩上為末熱酒化蜜少許調藥半錢加至一錢少時覺藥行微麻為度如作丸煉蜜和彈子大熱酒化下一丸或半丸防風湯防風麻黃獨活秦艽去蘆黃芩石膏當歸白朮以上各半兩上為粗末入半夏片子令攪勻每服四錢水二中盞入生薑七片煎至一盞去滓取清汁六分入麝香少許帶熱食後服祛風丸川烏炮去皮臍草烏炮天南星半夏薑製蒸豆粉甘草川芎殭蠶藿香零陵香地龍去土蠍梢炒以上各一兩川薑半兩上為細末藥末一兩用蒸豆粉一兩以白麵二兩滴水和丸如桐子大陰乾細嚼茶清下三五丸至五七丸食後初服三丸以漸加之排風湯當歸去蘆杏仁去皮尖麩炒防風去蘆白蘚皮白朮芍藥官桂去粗皮川芎甘草炒各三兩獨活麻黃去節茯苓去皮各三兩上為粗末每用三錢水一盞半入生薑四片同煎至八分去滓溫服不拘時候小續命湯麻黃去節人參去蘆黃芩芍藥川芎甘草炙杏仁湯泡去皮尖炒防己官桂去皮防風去蘆各一兩附子半兩去皮臍上除附子杏仁外合搗為粗末後入二味攪勻每服三錢水一盞半生薑五片煎至一盞去滓少熱服食後消風散川芎羌活去蘆人參去蘆白茯苓去皮白殭蠶炒蟬殼去土以上各一兩陳皮去白厚朴去粗皮薑製以上各一兩上為細末每服二錢茶清調下川芎散川芎荊芥甘菊薄荷蟬殼蔓荊子以上各二兩甘草一兩炙上為細末茶酒任下三二錢食後服搜風丸一名人參半夏丸人參茯苓南星以上各半兩半夏乾生薑白礬生凝水石以上各一兩蛤粉二兩薄荷半兩藿香半兩上為細末與藏用丸末各中停水丸如豌豆大每服三十丸生薑湯送下當歸川芎散當歸川芎以上各半兩甘草二兩黃芩四兩薄荷一兩縮砂仁一分上為細末溫水調下一二錢愈風餅子川烏半兩炮製川芎甘菊白芷防風細辛天麻羌活荊芥薄荷甘草炙以上各一兩上為細末水浸蒸餅為劑捏作餅子每服三五餅子細嚼茶酒送下不計時候疏風丸通聖散一料加天麻羌活獨活細辛甘菊首烏各半兩上為細末煉蜜和丸彈子大硃砂為衣每服一丸細嚼茶酒下通頂散石膏川芎瓜蒂以上各等份藜蘆少許上為細末鼻內嗅之胃風湯人參去蘆茯苓去皮川芎官桂當歸芍藥白朮上件各等份為末每服三錢水一盞入陳粟米煎空心服之香芎散香附子炒川芎石膏水飛白芷甘草薄荷以上各一兩川烏半兩炒去皮臍上為細末每服二錢溫酒茶清調下無時鐵彈丸地龍去土防風白膠香沒藥木鱉去皮草烏頭水浸炮白芷五靈脂當歸以上各一兩細墨三錢麝香另研乳香另研升麻各二錢上為末糯粥丸彈子大每服一丸生薑酒下暑門瘧附白虎湯知母一兩半去皮甘草一兩糯米一合石膏四兩亂紋者另研為末上銼如麻豆大粳米拌勻另水一盞煎至六分去滓溫服無時日三四服或眩嘔者加半夏半兩薑汁製過用之桂苓甘露散官桂半兩人參藿香以上各半兩茯苓白朮甘草葛根澤瀉石膏寒水石以上各一兩滑石二兩木香一分上為細末每服三錢白湯點下新水或生薑湯亦可用之化痰玉壺丸南星半夏並生用天麻以上各半兩白麵三兩上為細末滴水丸如桐子大每服三十丸用水一大盞先煎令沸下藥煮候浮即熟漉出放溫另用生薑湯下不拘時服益元散滑石六兩甘草一兩上為細末每服三錢蜜調新水送下玉露散治暑寒水石滑石石膏栝蔞根以上各四兩甘草二兩上為細末每服五錢新水調下石膏散石膏一兩人參去蘆甘草炙各半兩上為細末新水蜜水調三錢生薑湯亦可辰砂丹治瘧信一錢雄黑豆六十個或二兩重上為細末硃砂為衣端午日合不令雞犬婦人見每服一丸無根水下溫脾丸信一錢甘草二錢紫河車三錢豆粉四兩上為末滴水丸每服半錢作十丸臨臥無根水下溫脾散紫河車緑豆以上各一兩甘草半兩砒一錢另研上為細末後入砒研勻每服半錢新水一盞調下如是隔日發直待臨睡服藥如頻日發只夜深服忌葷酒魚兔等濕門嗽附五苓散官桂澤瀉豬苓去黑皮茯苓去皮白朮各半兩上為細末每服二錢熱湯或新水調下葶藶木香散苦葶藶茯苓去皮豬苓去皮以上各一分木香半錢澤瀉木通甘草各半兩官桂一分滑石三錢上為細末每服三錢生薑湯調下食前服白朮木香散白朮豬苓澤瀉赤茯苓各半兩木香檳榔各三錢陳皮二兩去白官桂一錢滑石三兩上為細末每服五錢水一盞生薑三片同煎至六分溫服食後大橘皮湯橘皮一兩半木香一分滑石六兩檳榔三錢茯苓一兩豬苓去黑皮澤瀉白朮官桂以上各半兩甘草二錢上為末每服五錢水一盞生薑五片煎至六分去滓溫服食後神助散苦葶藶二兩炒黑牽牛三兩半