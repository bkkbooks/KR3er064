front:
  text: 新刻儒門事親序一氣之塊然乎太虛之間也氤氳摩蕩以生生萬物而其稟之駁者為禽獸為草木粹者為人而其粹者亦有厚薄強弱之不同加之六氣沴乎外七情侵乎內而諸疾生焉有寒有熱有表有里千狀萬證不可俱述而要之不過虛實兩者之間焉故經曰虛則補實則瀉嗚呼虛實者診病之標的而補瀉者施治之大要也哉長沙以還明哲輩出家擅專門人立異見諸說旁舞多歧亡羊至若張戴人薛立齋之學之術可謂百世之宗師矣而究其設施之方則戴人偏於瀉而立齋偏於補既有所偏則不能無弊苟不能無弊則又不可無辨焉予竊為二君之術一補一瀉雖有不同而各極其至庶乎聖之功亦莫以加焉然天下之病未必盡實則其偏於瀉也吾恐虛者之反受其害也未必盡虛則其偏於補也吾恐實者之亦反受其害也一得一失明於此而暗於彼此豈斯道之大成哉若長沙則不然可以補則補而不偏於補可以瀉則瀉而不偏於瀉虛實隨證補瀉應機嗚呼亦可謂大成矣擬諸古之聖賢二君之於長沙猶夷惠之於孔子也蓋補瀉之不可偏廢猶裘葛之不可一施也而今不核虛與實而致補瀉之各偏猶不審冬夏之異候而欲偏裘葛之御也豈其理也哉故曰少陰病下利清穀裡寒外熱者通脈四逆湯主之又曰少陰病自利清水色純青者宜大承氣湯補瀉不可偏廢也可見矣方今之世好補而惡瀉喜溫而畏寒大黃芒硝視如蛇蠍乾薑附子甘如飴蜜遇硝黃奏效則曰此惟取一時之快後必致寒中之患姜附錯投則曰姜附猶不驗歸之於命蓋亦不思之甚也故凡治療之書偏於補者盛行於世而梨棗日廣至於戴人此書傳誦甚罕予竊童蒙學醫者呫譁偏補之書而不講瀉實之方則虛虛實實其弊將有不可勝言者乃鳩工壽梓以廣其傳惟冀此書與立齋之書並行於世可以瀉則師戴人可以補則師立齋無致補瀉之偏勝使斯民同躋於仁壽之域矣正德辛卯八月望日渡邊榮元安甫書於洛陽松下睡鶴軒重刊儒門事親序是書也戴人張子和專為事親者著論議淵微調攝有法其術與東垣丹溪並傳名書之義蓋以醫家奧旨非儒不能明藥品酒食非孝不能備也故曰為人子者不可不知醫予幼失怙慈母在堂逾七望八滫髓既具未嘗不防以藥物每慮當有所饋委之時醫恐為盡道之累將欲遍閱方書諸家著述繁雜竊為是皇皇者數載矣近得是書如獲寶璐執是以證何慮臆說之能惑惜其板久失傳本多亥豕之訛因付儒醫聞忠校訂鋟梓與世之事親者共云嘉靖辛丑三月戊子復元道人邵輔序儒門事親後序醫道之大尚矣其上醫國其下醫人而身之所繫抑豈小哉觀抱朴子之金櫃肘後其用心亦以精矣功亦溥矣大矣邵君柏崖以玉牒之親存以於天下後世乃以是書命愚機之壽諸梓以廣其傳功豈在抱朴子下哉愚不學恐成後人之誚幸柏崖之去然日夜是懼不敢語盡以力至於析微剖奧剔謬辨非尚俟後之君子嘉靖十九年歲次庚子孟冬朔日錢唐者相聞忠機於南圃陋室中
