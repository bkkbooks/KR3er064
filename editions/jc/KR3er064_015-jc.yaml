body:
  text: 卷十五瘡瘍癰腫第一治螻蛄瘡良薑白芨瀝青以上各等份上為細末嚼芝麻水同熬為膏入冷水共定用緋絹片火熨斗作膏藥貼瘡上又方千年石灰茜根燒灰上為細末用水調雞翎塗上水沉金絲膏貼一切惡瘡瀝青白膠以上各一兩春秋宜用油夏宜油蠟二錢半冬宜用油蠟四錢上件熔開油蠟下瀝青白膠用槐枝攪勻綿子濾過入冷水中扯一千餘遍如瘡透了吃數丸作劑於瘡口填者亦妙攤紙上貼勿令火炙乳香散治下疳乳香沒藥輕粉黃丹龍骨烏魚骨黃連黃芩銅綠以上各等份麝香少許上為細末先以溫漿水洗過貼疳瘡上治蛇傷方上用蒲公英棵根作埿貼於傷處用白麵膏藥貼之大效紫金丹治疔瘡白礬四兩黃丹二兩上用銀石器內熔礬作汁下丹使銀釵子攪之令紫色成也用文武火無令太過不及如有瘡先以周圍挑破上藥用唾津塗上數度著無令瘡干其瘡潰動取疔出也兼瘡顏色紅赤為效如藥未成就再杵碎炒令紫色治疔瘡生蜜與隔年蔥一處研成膏上先將瘡周迴用竹針刺破然後用瘡藥於瘡上攤之用緋絹蓋覆如人行二十里覺疔出然後以熱醋湯洗之千金托裡散治一切發背疔瘡連翹一兩二錢黃耆一兩半厚朴二兩川芎一兩防風一兩桔梗一兩白芷一兩芍藥一兩官桂一兩木香三錢乳香三錢半當歸半兩沒藥三錢甘草一兩人參半兩上為細末每服三錢用酒一碗盛煎三沸和滓溫服膏子貼之二聖散治諸瘡腫黃丹二兩白礬二兩飛上為細末每服乾摻瘡口上後用保生錠子捏作餅子貼之保生錠子巴豆四十九個另研文武火燒熱金腳信二錢雄黃三錢輕粉半匣硇砂二錢麝香二錢上件為末用黃蠟一兩半化開將藥和成錠子冷水浸少時取出旋捏作餅子如錢眼大將瘡頭撥破每用貼一餅子次用神聖膏藥封貼然後服托裡散若瘡氣透里危者服破棺散用神聖膏貼之神聖膏藥貼治一切惡瘡當歸半兩沒藥三錢白芨二錢半乳香三錢藁本半兩琥珀二錢半黃丹四兩木鱉子五個去皮膽礬一錢粉霜一錢黃蠟二兩白膠三兩巴豆二十五個去皮槐柳枝一百二十條各長一把清油一斤上件一處先將槐柳枝下油內煮焦取出次後下其餘藥物煮得極焦亦撈出卻將油澄清再熬成膏子用緋絹上攤貼之破棺丹大黃一兩半甘草二兩荊三稜一兩半山梔子二兩半牽牛末二兩上為細末煉蜜為丸如彈子大每服半丸食後酒半盞研化服之忌冷水三聖散治臁瘡疔瘡搭手背疽等瘡蔥白一斤馬莧一斤石灰一斤上三味濕搗為團陰乾為細末貼瘡如有死肉者宜先用潰死肉藥潰死肉藥方炊飯尖半兩各三等一等半兩入巴豆二個一等半兩入巴豆三個一等半兩入巴豆五個各捻作白錠子上先用二巴豆納瘡如不潰再用納三巴豆又不潰用五巴豆者更用丹砂炒紅色摻瘡口追出清水其惡肉未盡至追出赤水是惡肉盡更用三聖散貼之用膏藥敷之治臁瘡久不愈者用川烏頭黃柏各等份為末用唾津調塗紙上貼之大有效矣治一切惡瘡方以天茄葉貼之或為細末貼之亦妙又方用臘月人中白燒灰油調塗瘡疥上又方以瓦松不拘多少陰乾為末先用槐枝蔥白湯洗之過摻之立效灸瘡久不斂者更妙又方以蒲公英搗之貼一切惡瘡諸刺替針丸治一切惡瘡川烏二錢草烏二錢五靈脂二錢輕粉一分粉霜一分又方加斑蝥二十個去足翅用巴豆二十個去皮用上將三件為末研令勻次入輕粉粉霜研勻又入斑蝥巴豆以水調糊為錠子如作散是謂針頭散懸蔞散治發背惡瘡懸蔞一個大黃一兩金銀花一兩當歸半兩皂角刺一兩上銼碎用酒一碗煎至七分去滓溫服如有頭者加黍黏子治附骨癰及一切惡瘡當歸半兩甘草一兩山梔子十二個木鱉子一個上為細末每服三五錢冷酒調服之治諸惡瘡白殭蠶直者大黃二味各等份上為細末生薑自然汁與蜜同和為劑丸如彈子大每服一丸細嚼治惡瘡死肉鋌子巴豆一錢去皮油五靈脂半兩黃丹二錢飛加枯白礬一錢上為細末以糊和丸鋌子入瘡內用之當歸活血散治瘡瘍未發出內痛不可忍及婦人產前後腹痛當歸二錢沒藥一錢半乳香半錢白芍藥三錢瘡瘍者加人參木香婦人加赤芍藥上為細末每服一錢水一中盞煎至七分和滓溫服日二服婦人酒煎瘡既發不須用熏惡瘡方紫花地丁一名米布袋收上取根曬乾用四個半頭磚壘成爐子燒著地丁用絡垤磚一枚蓋了使令磚眼內煙出熏惡瘡出黃水自愈治蛇瘡用蒲公英棵根作埿貼於傷處用白膏藥封之接骨散並治惡瘡金頭蜈蚣一個金色自然銅半兩燒紅醋碎研為細末用之乳香二錢為細末用之銅錢重半兩者取三文或五文燒紅醋焠研細金絲水蛭一錢半每個作三截瓦上爆去氣道為度沒藥三錢研細上為細末如瘡腫處津調半錢塗立止痛如見得出膿先用粗藥末少許小油少半匙同打勻再入少半匙再打勻又入前藥接骨散半錢再都用銀釵子打成膏子用雞翎掃在瘡腫處立止痛天明一宿自破便效如打折骨頭並損傷可用前項接骨散半錢加馬兜鈴末半錢同好酒一大盞熱調連滓溫服如骨折損立接定不疼如不折了吃了藥立便止住疼痛此方屢經效驗不可具述服藥覷可以食前服食後服又外用接骨藥陳爛麻根兩把羊耳朵一對亂絲一握多者更妙上取肥松節劈碎約量多少先放三兩根於新瓦上都於上外三味在上燒著存性就研為末如生再燒研為度後入五靈脂半兩如疼入好乳香少許和藥如茶褐色為度用布條子約纏一遭先攤小黃米粥勻上撒藥末勻纏定折處上又用軟帛三五重上又竹箅子纏勒得緊慢得中初三日換上一次再後五日換一次又七日再換上一次無有不接者赤龍散消散一切腫毒用野葡桃根紅者去粗皮為末新水調塗腫上頻掃新水便癰方本名血疝牡蠣大黃甘草以上各半兩懸蔞一個上酒浸露一宿服之以利為度又方冬葵子為末酒調下三兩服又方皂角不蛀者燒過陰乾為細末酒調服之立效又皂角子七個水調服之亦效又方胡桃七個燒過陰乾研為末酒調服之不過三服大效又方生蜜米粉調服休吃飯利小便為度治瘡無頭者蛇蛻皮於腫處貼之又方皂角刺燒灰陰乾上為末每服三錢酒調嚼葵菜子三五個前藥送下大效生肌斂瘡藥白蘞定粉各等份黃丹少許上同為細末洗淨瘡口干貼之治諸瘡水度腫者生白礬末水調塗之自消接骨藥銅錢半兩醋浸淬焦燒研為末木香一錢自然銅一錢麝香少許上為極細末如在上食後每服三匙頭嚼丁香一枚乳香一粒無灰酒一小盞在下食前如不折其藥反出服罷其痛不可當勿疑待一日如骨未接再服如前老者十餘日少者不過五七日萬聖神應丹出箭頭莨菪棵一名天仙子取著中一棵根本枝葉花實全者佳上於端午日前一日持不語尋見莨菪棵言道先生你卻在這裡那道罷用柴灰自東南為頭圍了用木椑子撅取了根周迴土次日端午日未出時依前持不語用鑊口一鑊取出土用淨水洗了不令雞犬婦人見於淨室中以石臼搗為泥丸如彈子大黃丹為衣以紙袋封了懸於高處陰乾如有人著箭不能出者用緋絹盛此藥訖放臍中用綿裹肚繫了先用象牙末於瘡口上貼之後用前藥如瘡口生合用刀子利開貼之治凍瘡臘月雀腦子燒灰研細小油調塗凍瘡口上又方以正黃柏為細末用乳汁調塗瘡口上又方以山藥少許生於新瓦上磨為地埿塗瘡口上治手足裂白芨不以多少為末水調塗裂處治面上瘡用𨫼子底黑煤於小油中以匙打成膏子攤在紙上貼瘡神效治金瘡血不止用白薇末貼之立止善應膏藥黃丹二斤南乳香另研沒藥另研當歸木鱉子生用白蘞生用白礬生用官桂三寸杏仁生白芷以上各一兩新柳枝一斤各長一寸上除黃丹乳沒等外八件用芝麻油五斤浸一宿用鐵鍋內煎令黃色藥不用次入黃丹鍋內柳條攪令黃色方可掇下用柳枝攪出大煙入乳沒勻令冷傾在瓷盆內候藥硬用刀子切作塊油紙裹接骨丹五靈脂一兩茴香一錢上二味為細末另研乳香為細末於極痛處摻上用小黃米粥塗了後用二味藥末摻於上再用帛子裹了用木片子纏了少壯人二日效老者五六日見效矣治癬如聖丸黃柏黃芩黃連防風以上各半兩白殭蠶一兩全蠍三分輕粉半錢上為細末羊蹄根汁浸蒸餅為丸如梧桐子大每服二三十丸嚼羊蹄根汁送下隨病人上下分食前後又羊蹄汁塗癬治小兒癬雜瘡白膠香黃柏輕粉上為細末羊骨髓調塗癬上治瘰癧方斑蝥去頭翅足赤小豆白殭蠶苦丁香白丁香磨刀泥上各等份為細末十歲以上服一錢二十歲以上服二錢五更用新汲水一盞調下比至辰時見效女人小便見赤白色三兩次男子於大便中見赤白色為效當日服白黏粥不得吃別物大忌油膩患三四年者只一服七八年者再一服玉餅子治瘰癧一切惡瘡軟癤上用白膠一兩瓷器內溶開去滓再於溶開後以蓖麻子六十四個作泥入膠內攪勻入小油半匙頭柱㸃水中試硬軟添減膠油如得所量瘡大小以緋帛攤膏藥貼之一膏藥可治三五癤又方治瘰癧小龍肚腸一條炮干鱉殼裙襴炮川楝子五個牡蠣大黃牛蒡子燒存性皂角子五十個上為細末蒸餅為丸如綠豆大每服十五丸食後艾湯下日三服又方將臘月貓糞用新瓦兩個合在內外用鹽泥固濟燒成灰以小油調塗瘡口上又方取小左盤龍不以多少為末陳米飯搜和得所丸如梧桐子大每服三五十丸卻用陳米湯送下治眉煉頭瘡小麥不以多少燒令黑色存性為末以小油調塗瘡上治小兒痜瘡羊糞熬湯洗去痂用屋懸煤炒羅為末以小油塗瘡上聖靈丹治打撲肭損痛不可忍者乳香三錢另研烏梅五個去核細切焙乾為末白萵苣子二兩八錢炒黃搗為末白米一捻另研細末上再入乳缽內研數百下煉蜜為丸如粟大細嚼熱湯下病在上食後在下食前出靨方上用蕎麥秸一擔不爛者燒灰存性入石灰半斤同灰一齊過令火滅然後以熱水淋灰窩淋下灰水用鐵器內煮以撩起攪成膏子於靨上㸃自出或先以草莖刺破亦可又方桑柴灰石灰淋汁熬成膏草莖刺破㸃以新水沃之忌油膩等物燒燙火方多年廟上𧉚與走獸為末小油調塗燒湯火瘡立效又方生地黃汁入小油蠟同熬成膏瓷器內盛用雞翎掃燙處又方培上青苔燒灰小油調塗燒燙處治燒燙方生地黃旋取新者爛搗取自然汁入小油黃蠟少許銀石器中熬成膏子用雞翎掃瘡上又方血餘灰用臘豬脂調塗又方寒水石燒過為細末水調塗之枯瘤方砒硇砂黃丹雄黃粉霜輕粉以上各等一錢斑蝥二十個生用硃砂一錢乳香三錢沒藥一錢同研為末粥糊為丸捏作棋子樣爆干先灸破瘤頂三炷為則上以瘡藥餅蓋上用黃柏末以水調貼之數日自然乾枯落下又方以銅綠為末草刺破瘤摻在上以膏藥塗之治頭面生瘤子用蛛絲勒瘤子根三二日自然退落乳香散貼杖瘡腫痛大黃黃連黃柏黃芩以上各三錢乳香另研沒藥另研以上各一錢腦子少許上四味為末後入三味冷水調勻攤於緋絹上貼杖瘡上治疳瘡馬明退燒灰三錢輕粉少許乳香少許上研為細末先以溫漿水洗淨乾摻之治疳瘡久不愈者海浮石燒紅醋淬數次金銀花上海石二停金銀花一停同為細末每服二錢半如簽茶一般日用二服瘡在上食後在下食前服如病一年服藥半年則愈瀉肺湯治肺癰喘急坐臥不安桑白皮銼燒甜葶藶隔紙焙各一兩上二味為粗末每服三錢水一盞煎至六分去滓食後溫服以利為度桔梗湯治肺癰吐膿桔梗銼炒一兩半甘草炙銼半兩上為粗末每服六七錢水二盞煎至半盞去滓空心服須臾吐