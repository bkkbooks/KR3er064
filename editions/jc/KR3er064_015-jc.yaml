正蛤粉炒黃色為細末上油臘就熱和為丸如皂子納於豬腰子中麻纏蒸熟食之可配米粥頭面風疾第四治䵟䵳風刺方苦參一斤紅芍藥冬瓜二味各四兩玄參一兩上為末每用一字用手洗面上豬蹄膏洗面上䵟藥上用豬蹄一副刮去黑皮切作細片用慢火熬如膏黏用羅子濾過再入鍋內用蜜半盞又用白芷黑豆去皮栝蔞一個白芨白蘞零陵香藿香各一兩鵝梨二個細切上將七味藥為末同梨入藥一處再熬滴水不散方成以絹濾過臨臥塗面次日用漿水洗面治面風益母草灰麵湯和燒七遍洗面用之治面䵟黑斑㸃方白附子一兩白芨白蘞密陀僧胡粉白茯苓以上各等份上為細末洗淨臨臥以乳汁調一錢塗面但洗光淨牛乳亦可治頭風苦丁香川芎藜蘆各等份上為細末噙水鼻內嗅之芎黃湯治頭目眩運大黃荊芥穗貫芎防風以上各等份上為粗末大作劑料水煎去滓服之以利為度耳聾方蓖麻子五十個去皮上與熟棗一枚同搗丸如棗子大更入小兒乳汁就和每用一丸綿裹納於聾耳內覺熱為度一日一易如藥難丸日中曝乾又方口噙甘草一枚耳中塞二塊用綿裹立通腦宣方皂角不蛀者去皮弦子蜜炙捶碎水中揉成濃汁熬成膏子鼻內嗅之口中咬箸良久涎出為度治耳底方以枯白礬為末填於耳中立效治鼻中肉螻蛄赤龍爪苦丁香以上各三十個苦葫蘆子不以多少麝香少許上為末用紙捻子㸃藥末用之胑臭方烏魚骨三錢枯白礬三錢密陀僧一錢上為末先用藥水洗臭處後用藥末擦之又方密陀僧不以多少研細先以漿水洗臭處乾擦烏頭藥細針砂炒蕎麵炒以上各一盞大麥亦同釅醋半升與前二味打糊凡用先使皂角水熱洗淨時前二味糊稀稠得所於髭鬢上塗之均勻先用荷葉包次用皮帽裹之三五時辰用溫漿水洗了卻收取元針砂其髭發淨後用黑藥塗之黑藥方沒食子石榴皮乾荷葉另搗以上各一兩五倍子訶子皮百藥煎金絲礬綠礬另研旋㸃諸藥上將七味為細末炒熟面五六匙入好醋打麵糊和藥末再塗髭發又用荷葉封裹後用皮帽裹之三五時間洗淨甚黑若更要黑光用豬膽漿水澤洗如鴉翎又方酸石榴五倍子芝麻葉上同杵碎用絹袋盛之於鐵器內水浸掠發自黑治大頭病兼治喉痹方歌曰人間治疫有仙方一兩殭蠶二大黃薑汁為丸如彈大井花調蜜便清涼又法以砭針刺腫處出血立效治時氣馬牙硝寒水石黍黏子鬼臼川大黃鬼箭草以上各等份腦子少許上六味為細末用新井花水一盞藥末一二錢入腦子吃外一半留用新水得稠雞翎掃在腫處有風涼處坐解利傷寒第五雙解丸巴豆六個去皮油天麻二錢半胭脂少許上將巴豆天麻為末滴水丸如秫米大胭脂為衣一日一丸二日二丸三日三丸已外不解先吃冷水一口後用熱水下如人行十里以熱湯投之又一法無藥處可用兩手指相交緊扣腦後風府穴向前禮百餘拜汗出自解又一法適於無藥處初覺傷寒傷食傷酒傷風便服太和湯百沸湯是避風處先飲半碗或以齏汁亦妙以手揉肚覺恍惚更服半碗又用手揉至恍惚更服以至厭飫心無所容探吐汗出則已不臥散川芎一兩半石膏七錢半藜蘆半兩去土甘草二錢半生上為細末口噙水鼻內各嗅之少時吃白湯半碗汗出解之川芎湯解利一切傷寒川芎藁本蒼朮上三件為細末沸湯㸃三錢須臾覺嘔逆便解如不解再服之諸腰腳疼痛第六皂角膏上用醇酒二大碗皂角一斤去皮弦搗碎熬至一半沸去滓再用前汁入銀石器熬為膏子隨痛處貼之治腰腳疼痛方天麻細辛半夏以上各二兩上用絹袋二個各盛藥三兩煮熟交互熨痛處汗出則愈牛黃白朮丸治腰腳濕黑牽牛大黃各二兩白朮一兩上為細末滴水丸桐子大每服三十丸食前生薑湯下如要快利加至百丸婦人病證第七如聖丹治婦人赤白帶下月經不來枯白礬蛇床子以上各等份上為末醋打麵糊丸如彈子大以胭脂為衣綿子裹納於陰戶如熱極再換詵詵丸療婦人無子當歸熟地黃以上各二兩玄胡索澤蘭以上各一兩半川芎赤芍藥白薇人參石斛牡丹皮以上各一兩上為末醋糊為丸每服五十丸桐子大空心酒下當歸散治月經欲來前後腹中痛當歸以米醋微炒玄胡索生用沒藥另研紅花生用上為末溫酒調下二錢服之治產婦橫生蓖麻子三十個研爛婦人頂上剃去發少許以上藥塗之須臾覺腹中提正便刮去藥卻於腳心塗之自然順生也治血崩蠶砂不以多少上為末每服三五錢熱酒調下服又方貫眾去須銼碎或用酒醋煎三錢煎至七分去滓溫服一服立止當歸散治血崩當歸一兩龍骨一兩燒赤香附子三錢炒棕毛灰半兩上為細末空心米飲調下三四錢忌油膩雞豬魚兔等物蓮殼散干蓮蓬燒灰存性棕櫚皮及毛各燒灰以上各半兩香附子二錢炒上為細末每服三四錢空心米飲湯調下服之治婦人血枯川大黃上為末醋熬成膏就成雞子大作餅子酒磨化之三分散治產後虛勞不進飲食或大崩後白朮茯苓黃耆川芎芍藥當歸熟乾地黃以上各一兩柴胡人參以上各一兩六錢黃芩半夏洗切甘草炙以上各六錢上為粗末每服一兩水一大盞煎至半盞去滓溫服日二服治產後惡物上潮痞結大小便不通芒硝蒲黃細墨各等份上為末用童子小便半盞水半盞調下服之治婦人產後虛弱和血通經當歸一兩焙芍藥二兩香附子三兩炒上為細末每服一二錢米飲調下服之無時治婦人產後惡物不出上攻心痛赤伏龍肝灶底焦土研細用酒調三五錢瀉出惡物立止治娠婦下痢膿血及咳嗽白朮黃芩當歸各等分上為末每服三五錢水煎去滓食前加桑皮止嗽百花散治婦人產中咳嗽黃柏桑白皮用蜜塗慢火炙黃色為度二味各等分上為細末每服一二錢水一盞入糯米二十粒同煎至六分以款冬花燒灰六錢攪在藥內同調溫服之治婦人吹奶以樺皮燒灰存性熱酒調下三錢食後服之又方馬明退五錢燒灰輕粉三錢麝香少許上為細末每服二錢熱酒調下服之又方以皂角燒灰蛤粉和熱酒將來調數字下得喉嚨笑呵呵又方以淘米木杓上砂子七個酒下以吹帚枝透乳孔甚妙咳嗽痰涎第八九仙散九尖蓖麻子葉三錢飛過白礬二錢上用豬肉四兩薄批棋盤利開摻藥二味荷葉裹文武火煨熱細嚼白湯送下後用干食壓之止嗽散半夏一兩半湯洗七次枯白礬四兩上二味為末生薑打麵糊和丸桐子大每服三二十丸空心溫酒送下八仙散款冬花佛耳草甘草鍾乳鵝管石白礬官桂井泉石以上各等份上為細末每服三錢水煎服之又一方摻咽喉中三才丸治嗽人參天門冬去心熟乾地黃以上各等分上為細末煉蜜為丸如櫻桃大含化服之三分茶茶二錢蜜二兩蕎麥麵四兩上以新水一大碗約打千餘數連飲之飲畢良久下氣不可停人喘自止石膏湯治熱嗽石膏亂文者一兩人參半兩去蘆甘草半兩炙上為末每服三錢新水或生薑汁蜜調下亦可三生丸治嗽胡桃仁一兩生薑一兩去皮細切杏仁一兩上二味同研為泥就和作劑可得十三四丸臨臥爛嚼一丸可數服即止化痰延壽丹天麻半兩枸杞子二兩半白礬一兩半半生半熟半夏一兩半湯洗七次乾生薑一兩半人參一兩上為細末好糯酒拌勻如砂糖用蒸餅劑蒸熟去皮杵臼搗四五十杵便丸如干入酒三㸃丸如小豆大每服三五十丸生薑湯下半夏湯治噦欲死者半夏一兩洗生薑二兩上二味細切水二盞煎至八分去滓作二服食後治肺痿喘嗽漢防己上為細末每服三錢漿水一盞同煎至七分和滓溫服之治年高上氣喘促睡臥難禁上蘿蔔子搗羅為末白湯浸調五七錢食後服之或炒或用糖蜜作劑為丸服之麻黃湯治因風寒衣服單薄致嗽麻黃不去節甘草生用杏仁生用上為粗末每服三二錢水煎食後溫服心氣疼痛第九失笑散治急心痛並男子小腸氣五靈脂半兩蒲黃半兩炒上為末每服三錢醋半盞煎二沸再入水半盞再煎二沸空心食前和滓溫服之又方醋一盞加生白礬一小塊如皂子大同煎至七分溫服立愈又方高良薑半兩山梔子半兩鬱金半兩又方以新嫩槐枝一握切去兩頭水二盞煎至一盞去滓分作二服熱服之又方沒藥乳香薑黃玄胡索以上各等份上為末每服三錢水煎食後服之小腸疝氣第十抽刀散川楝子一兩破四分進巴豆三個同炒黃色去巴豆用之茴香一兩鹽炒黃色去鹽用之上為細末每服三錢蔥白酒調下空心服之治陰痛不可忍吳茱萸二兩洗七遍焙乾微炒檳榔一兩茴香一兩上為細末醋糊為丸熱酒送下十丸食前服之治偏腫茴香甘遂上二味各等份為末酒調二錢食前服之又方巴戟去心川楝炒茴香炒各等份為末溫酒調二錢服之治小兒疝氣腫硬地龍不去土為末唾津調塗病處治小腸氣痛全蠍一兩茴香一兩炒黃上為細末醋糊和丸如梧桐子大如發時每服五七十丸溫酒送下食前服之治小便渾濁如精之狀沒藥木香當歸以上各等份上為末以刺棘心自然汁為丸如梧桐子大每服五七丸食前鹽湯下治小便頻滑數不禁知母黃柏以上各等份上銼碎酒浸透炒微黃為末水丸梧桐子大如服藥前一日休吃夜飯來日空心立服米飲湯下一百丸只用一服效後吃淡白粥一頓蕩疝丹川楝子炒茴香炒破故紙炒以上各半兩黑牽牛二錢青皮陳皮以上各三錢廣朮四錢木香四錢上八味為細末用好酒打麵糊為丸如梧桐子大空心食前溫酒下三十丸灸疝法放疝邊豎紋左右交弦灸七壯腸風下血第十一神應散治腸風痔漏牛頭角腮一隻酌中者豬牙皂角七錠穿山甲四十九片或圓取或四方取或一字取之蝟皮一兩蛇蛻皮一條上五味錘碎盛在小口瓷器內鹽泥固定日中曝乾瓶口微露出煙用文武火燒紅赤煙微少取出放冷為細末如服藥日先一日臨臥細嚼胡桃仁半個如糊用溫醇糯酒一盞送下不語便睡至次日交五更服藥驗病年月遠近或秤三錢五七錢用水半大碗醇糯酒半大盞相合熱和藥服之至辰時再服又一服再依前服藥不須用胡桃仁久病不過七服忌油膩魚鱉雞兔豬犬等物大有神效溫白丸治臟毒下血椿根白皮凡引者去粗皮酒浸曬乾服上為末棗肉為丸如梧桐子大每服三五十丸淡酒送或酒糊丸治脫肛痔瘻胡荽子一升乳香少許粟糠半升或一升上先泥成爐子止留一小眼可抵肛門大小不令透煙火熏之治脫肛蔓陀羅花子蓮殼一對橡碗十六個上搗碎水煎三五沸入朴硝熱洗其肛自上治痔漏下血不止紫皮蒜十個獨棵者妙大椒六十個豆豉四兩上搗爛為泥丸彈子大空心細嚼一丸鹽湯下日進三服效治痔漏白牽牛頭末四兩沒藥一錢上同為細末如欲服藥先一日不食晚飯明日空心將獖豬精肉四兩燒令香熟薄批摻藥末在內裹之漸又細嚼食盡然後用宿蒸餅壓之取下膿血為效量病大小虛實加減服之忌油膩濕面酒色三日外不忌一服必效或用淡水煮肉熟用上法亦可又云服前一日不食午飯並夜飯明日空心用之又方黑白牽牛一合炒黃為末豬肉四兩切碎炒熟與藥末攪勻只作一服用新白米飯三二匙壓之取下白蟲為效又坐藥黑鯉魚鱗二三甲以薄編蠒裹如棗核樣納之痛即止淨固丸治痔漏下血癢痛槐花炒枳殼去穰以上各一兩上為細末醋糊為丸如梧桐子大每服二十丸米飲湯下空心食前十服見效黃連貫眾散治腸風下血黃連雞冠花貫眾大黃烏梅以上各一兩甘草三錢炙枳殼炮荊芥以上各一兩上為細末每服二三錢溫米飲調服食前槐荊丸治痔漏荊芥槐花等份為末水煎一大碗服丸亦可又方豆豉炒槐子炒各等份上為末每服一兩水煎空心下熏渫藥鳳眼草赤皮蔥椒三味搗粗同漿水滾過坐盆令熱氣熏痔但通手渫之如此不過三次愈矣小兒病證第十二治小兒脾疳蘆薈使君子以上各等份上為細末米飲調下一二錢服之玉箸散治小兒馬脾風甘草一寸煎水甘遂末一字上同油蜜生薑銀釵兒攪調下後用冷水半盞調奪命散奪命散治小兒胸膈喘滿檳榔大黃黑牽牛白牽牛各等份皆當各半生熟用之上為細末蜜水調服之治小兒斑瘡入眼麩炒蒺藜炙甘草羌活防風等份搗每服二錢漿水下撥雲見日直到老治瘡疹黑陷鐵腳威靈仙一錢炒末腦子一分上為末用溫水調下服之取下瘡痂為效治小兒黃瘦腹脹乾雞糞一兩丁香末一兩上為末蒸餅為丸如小豆大每服二十丸米湯下黃連散治小兒頭瘡川黃連黃柏去粗皮用草決明輕粉以上各等份上為細末用生小油調藥於瘡上塗之立愈治斑瘡倒壓方胡桃一個燒灰存性干胭脂三錢上為末用胡荽煎酒調下一錢服之又方人牙燒灰存性研入麝香少許每服三錢溫酒調下少許服之不拘時又方小豬兒尾尖取血三五㸃研入腦子少許新水調下食後與服之又方人中白臘月者最佳通風處以火煅成煤水調三五錢陷者自出消毒散治瘡疹已未出咽喉腫痛牛蒡子二兩炒甘草半兩銼炒荊芥一分上為粗末每服三錢水一盞半煎至七分去滓溫服無時治小兒斑瘡入眼豬懸蹄甲二兩坩堝內鹽泥固濟燒焦為末用蟬殼二兩去土取末一兩羚羊角鎊為細末研之用上二味為末研入羚羊角細末一分拌勻每用一字百日外兒服半錢三歲以上服三錢新水或溫水調下日三四服夜一二服一年以外則難治之又方透耳藥硃砂一錢粉霜八分上研為細末水調少許用匙杓頭傾一兩㸃於耳內中後用白菊花綠豆皮穀精草夜明砂上四味為末用米泔半碗熬成去滓入乾柿十餘個再同熬每日吃三兩個仍飲煮乾柿湯又方治小兒斑瘡入眼硃砂腦子水銀麝香以上各等份上四味研為細末用水銀調滴入耳中發斑藥珠子七個研碎用新水調勻服之破傷風邪第十三陰毒傷寒亦附於此辰砂奪命丹鳳凰臺川烏頭生以上各二錢麝香少許硃砂少許上為細末棗肉和為丸如彈子大硃砂為衣鰾酒送下量病人年甲虛實加減用之小兒半丸以吐為度不止以蔥白湯解之治破傷風病人耳塞並爪甲上刮末唾津調塗瘡口上立效無瘡口者難用治破傷風烏梢尾一個兩頭尖四個全蠍四個上三味為細末另用石灰五升柴灰五升沸湯五升淋灰水澄清下藥熬之鐵鍋器內攪成膏子如稠用唾津調先用溫漿水洗淨瘡口後塗藥即時藥行吐黃水一日以新水漱口即愈又方天南星半生半熟防風去蘆二味各等份上為末清油調塗瘡上追去黃水為驗又方白芷生用草烏頭尖生用去皮二味等份上為末每用半錢冷酒一盞入蔥白少許同煎服之如人行十里以蔥白熱粥投之汗出立愈甚者不過二服又方蜈蚣散蜈蚣頭烏頭尖附子底蠍梢四味各等份上為細末每用一字或半字熱酒調下如禁了牙關用此藥斡開灌之治陰毒傷寒破傷風草烏頭七個文武火燒熟去牙頭麝香半錢硃砂一錢上為細末每服一字以熱酒調下食前服之汗出為度忌豬兔魚鱉𦍩羖肉治陰毒病者用芥末以新水調膏藥貼臍上汗出為效又方牡蠣乾薑末新水調塗手心握外腎汗出為效諸風疾症第十四不老丹治一切諸風常服烏髭駐顏明目延年蒼朮四斤米泔水浸軟竹刀子刮去皮切作片子內一斤用椒三兩去白炒黃去椒一斤鹽三兩炒黃去鹽一斤好醋一升煮汁盡一斤好酒一升煮令汁盡何首烏二斤米泔水浸軟竹刀子刮去皮切作片子用瓦甑蒸先鋪黑豆三升干棗二升上放何首烏上更鋪棗二升黑豆三升用炊單復著上用盆合定候豆棗香熟取出不用棗豆地骨皮去粗皮重二斤上件於石臼內搗為細末候有椹汁搜和如軟面劑相似瓷盆內按平上更用椹汁藥上高三指用紗綿帛覆護之晝取太陽夜取太陰使干再搗羅為細末煉蜜和丸如梧桐子大空心溫酒下六十丸忌五辛之物四仙丹春甲乙採杞葉夏丙丁採花秋庚辛採子冬壬癸採根皮上為末以桑椹汁為丸每服五十丸茶清酒任下起死神應丹治癱瘓四肢不舉風痹等疾麻黃去根節河水五升熬去滓可成膏子五斤白芷二兩桑白皮二兩蒼朮二兩去皮甘松二兩去土川芎三兩苦參三兩半加浮萍二兩以上各為細末用膏子和丸如彈子大每服一丸溫酒一盞化下臨臥服之微汗出勿慮如未安隔三二日再服手足即時軟快及治卒中風邪涎潮不利小兒驚風服之立效愈風丹芍藥川芎白殭蠶炒桔梗細辛去葉羌活以上各半兩麻黃去節防風去蘆白芷天麻全蠍炙以上各一兩甘草三錢南星半兩生薑制用硃砂半兩為衣上為末煉蜜丸如彈子大每服一丸細嚼茶酒吞下香芎散治偏正頭風貫芎香附子炒石膏亂紋者良水飛白芷甘草薄荷以上各一兩一方川烏頭半兩炮去臍皮用之上為細末每服二錢溫酒或茶清調下服之妙功十一丸治癇丁香木香沉香乳香麝香荊三稜炮廣朮炮黑牽牛微炒黃連雷丸炒鶴蝨炒胡黃連黃芩大黃焙陳皮青皮雄黃熊膽甘草炙各二錢半赤小豆三百六十粒煮白丁香直尖者三百六十個輕粉四錢巴豆七粒上二十三味為細末赤小豆爛煮研泥同蕎麵打糊和作十一丸硃砂為衣陰乾服時水浸一宿化一丸大便出隨病各有形狀取出為驗或作化一番不可再服曾經火灸者不治遠年愈效硃砂滾涎散治五癇硃砂水飛白礬生用赤石脂硝石以上各等份上同為細末研蒜膏如丸綠豆大每服三十丸食後荊芥湯下又方硃砂不以多少水飛研為細末上用豬心血浸蒸餅為丸如綠豆大每服二十丸空心金銀湯下之治諸風疥癬及癩浮萍一兩荊芥川芎甘草麻黃以上各半兩或加芍藥當歸上為粗末每服一兩水一碗入蔥白根豆豉同煎至一半無時服汗出為度治癩塗眉法半夏生用羊糞燒以上各等份上為末生薑自然汁調塗五九散治癩地龍去土蟬殼白殭蠶凌霄全蠍以上各等九個上同為末只作一服熱酒調下浴室中汗出黏臭氣為效苦參散治癘風苦參取頭末秤二兩豬肚一個去脂上以苦參末摻豬肚內用線縫合隔宿煮軟取出洗去元藥先不吃飯五頓至第二日先飲新水一盞後將豬肚食之如吐了再食之食罷待一二時用肉湯調無憂散五七錢取出小蟲一二萬為效後用皂角一斤不蛀者去皮弦及子捶碎用水四碗煮至一碗用生絹濾去滓再入苦參末攪熟稀麵糊膏子相似取出放冷後入余藥相和藥附後何首烏二兩防風一兩半芍藥五錢人參三錢當歸一兩焙上為細末入皂角膏子為丸如桐子大每服三五十丸溫酒或茶清送下不拘時候日進三服後用苦參荊芥麻黃煎湯洗冷水腫黃疸第十五治通身黃腫瓜蒂焙乾三四錢上為細末每用半字於鼻內吹上日一度並吹三日如不愈後用黃芩末之煎湯五錢下治蠱氣取環腸草不以多少曝乾水煎利小便為度治黃疸面目遍身如金色瓜蒂一十四個母丁香一個黍米四十九粒上先搗瓜蒂為末次入二味同為細末每用半字夜臥令病人先噙水一口兩鼻內各半字吐了水令病人便睡至夜或明日取下黃水旋用熟帛搵了直候取水定便服黃連散病輕者五日重半月黃連散治黃疸大小便秘澀壅熱黃連三兩川大黃一兩銼碎醋拌炒過用之黃芩甘草炙各一兩上為細末每服二錢食後溫水調下一日三服治水腫不利小便非其法也故內經云濕氣在上以苦吐之濕氣在下以苦瀉之吐瀉後長服益元散加海金沙煎以長流水服之則愈矣大忌腳膝上針刺出水取一時之效後必死矣尤忌房室濕面酒醋鹽味犯之必死木通散治水腫海金沙舶上茴香巴戟大戟甘遂芫花木通滑石通草以上各等份上為細末每服三錢以大麥面和作餅子如當二錢大爛嚼生薑湯送下下痢泄瀉第十六治痢紫菀桔梗赤芍藥白朮以上各等份上為細末每服三五錢細切羊肝拌之作面角兒燒服之後用白湯送下食前治痢杜蒺藜炒碾為末酒調下三兩服蒜豉丸治痢蒜為泥豉為末上二味相和作丸如梧桐子大米飲湯下五七十丸食前服之治大人小兒吐瀉腹脹胸膈痞閉五靈脂青皮陳皮硫黃芒硝以上各等份上將硝黃於銚子內以文武火熔開用匙刮聚自然結成砂子取出研碎與前三藥同末麵糊為丸如綠豆大小兒麻子黃米大每服二十丸量虛實加減米飲湯送下無時又方治瀉車前子不以多少上為細末每服二錢米飲湯調下服之水穀分吐瀉止諸雜方藥第十七治消渴揀黃連二兩八九節者良上銼如㕮咀以水一碗煎至半碗去滓頓服立止百日還丹佛茄子樟柳根以上各等份上為末枸杞汁和丸如雞頭大每服十丸新水送下酒症丸巴豆十六個全蠍十五個雄黃一塊白麵五兩上為末滴水丸如豌豆大每一丸如痛飲者二丸立應丸治臟腑泄痢膿血不止腹中疼痛乾薑一兩炮另末百草霜一兩巴豆連皮一兩炒用杏仁一兩同巴豆和皮炒黑色杵為泥後入霜研用上用黃蠟四兩熔開蠟次入前四味用鐵器攪勻旋丸桐子大每服三五丸甘草湯下白痢用乾薑湯下食前若水瀉溫水下反胃黃柏末熱酒調三五錢食後服之治小便多滑數不禁金剛骨為末以好酒調下三錢服之又方白茯苓去黑皮乾山藥去皮白礬水內湛過慢火焙乾用之上二味各等份為細末稀米飲調下服之治卒淋痛芫花三錢茴香二錢微炒黃色上為細末水煎服之治趼方以水調白麵稀稠得所糊趼上以紙封之明日便乾如不曾破者剝去面便行治大便秘生麻子不以多少研爛水調服之坐劑治大便久秘攻之不透者用之又用蜜不計多少慢火熬令作劑稀則黏手硬則脆稀稠得所堪作劑搓作劑樣如棗核大粗如箸長一寸許蘸小油內於肛門中坐良久自透有加鹽少許以素問咸以軟之交加飲子治久瘧不已山嵐瘴氣肉豆蔻十一個麵裹燒一個草豆蔻二個同上法用厚朴二寸一半生用一半用生薑汁製過用甘草二寸半一半生用一半炙用生薑二塊如棗紙裹煨過半生半熟上為末每服分一半水一碗銀石器內煎至一大盞去滓溫服發日空心未愈則再服天真丸補虛損佛袈裟男用女女用男以新水四擔洗盡血水以酒煮爛為泥威靈仙一兩當歸半兩縮砂一兩蓮子肉二兩炒熟乾地黃一兩酒浸廣朮半兩甘草二兩牡丹皮一兩牛膝一兩酒浸木香半兩白朮一兩白茯苓一兩上為細末與君主同搗羅為細末酒浸蒸餅為丸如桐子大每服三五十丸日三服取雕青水蛭取陰乾為末先以白馬汗擦青處後用白馬汗調藥塗之治蚰蜒入耳中上用貓尿灌耳中立出取貓尿用盆盛貓以生薑擦牙大妙又方黑驢乳灌耳中亦出又方以濕生蟲研爛塗於耳邊自出辟穀絕食第十八辟穀方大豆五升洗淨蒸三遍去皮為細末大麻子五升湯浸一宿漉出蒸三遍令口開去皮為細末用糯米五升淘淨同白茯苓一處蒸熟用之白茯苓五兩去皮同上糯米一處蒸熟為用上將麻仁末一處搗爛如泥漸入豆黃末同和勻便團如拳大再入甑蒸從初更著火至半後夜住火至寅時出甑午時曝乾搗為末服之以飽為度不得吃一切物用麻子汁下第一頓一月不飢第二頓四十日不飢第三頓一千日不飢第四頓永不飢顏色日增氣力加倍如渴飲麻仁汁轉更不渴滋潤五臟若待吃食時分用葵菜子三合為末煎湯放冷服之取其藥如後初間吃三五日白米稀粥湯少少吃之三日後諸般食飲無避忌此藥大忌欲事又方茯苓餅子白茯苓四兩為末頭白麵一二兩上同調水煎餅面稀調以黃蠟代油爆成煎餅蠟可用三兩飽食一頓便絕食至三日覺難受三日後氣力漸生熟果芝麻湯米飲涼水微用些小潤腸胃無令涸竭開食時用葵菜湯並米飲稀粥少少服之又方保命丹人參五兩麻子仁二兩炒去皮乾地黃栝蔞子炒菟絲子酒浸以上各二兩生地黃干大棗各三兩大豆黃卷一升煮去沫黑附子一兩生用一兩炮去皮用之白茯苓茯神地骨皮去粗皮蔓荊子煮熟用杏仁去皮尖用麥門冬炒去心用地膚子蒸七遍黍米作粉粳米作粉白糯米作粉天門冬去心車前子蒸側柏葉煮三遍以上各二兩五錢上同為細末各揀選精粹者臘月內合者妙他時不可合日月交蝕不可合如合時須揀好日淨室焚者志心修合勿令雞犬婦人見又將藥末用蠟一斤半濾去滓白蜜一斤共二斤半一處溶開和勻入臼杵二千下微入酥油丸如梧桐子大每服十丸服至五日如來日服藥隔宿先吃糯米一頓粳米白麵皆可次日空心用糯米粥飲送下如路行人服如遇好食吃不妨要止便止如吃些小蒸餅嚼爛咽或乾果子以助藥力不吃更妙忌鹽醋日後退下藥來於長流水中洗淨再服可百年不飢矣
