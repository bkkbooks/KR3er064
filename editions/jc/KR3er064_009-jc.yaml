body:
  text: 卷九雜記九門誤中湧法嗽張板村鹿子春一小兒七八歲夏月病嗽羸甚戴人慾湧之子春以為兒幼弱懼其不勝少難之一日因飲酒家人與之酒傷多乃大吐吐定而嗽止蓋酒味苦苦屬湧劑子春乃大悟戴人之言也疥貨生藥焦百善云有蕘夫來買苦參欲治疥不識藥性緩急但聞人言可治濃煎一碗服之須臾大吐涎一盆三二日疥作痂矣赤眼一小兒名德孫眼發赤其母買銅綠欲洗兒目煎成家人誤與兒飲之須臾大吐吐訖立開感風寒焦百善偶感風寒壯熱頭痛其巷人㸃蜜茶一碗使啜之焦因熱服之訖偶思戴人語曰凡苦味皆能湧百善兼頭痛是病在上試以箸探之畢其痛立解誤中寒涼經閉一婦人年二十餘歲病經閉不行寒熱往來咳嗽潮熱庸醫禁切無物可食一日當暑出門忽見賣涼粉者以冰水和飲大為一食頓覺神清骨健數月經水自下下血一男子臟毒下血當六月間熱不可堪自甘於死忽思冰蜜水猛舍性命飲一大盂痛止血住痢一男子病膿血惡痢痛不可忍忽見水浸甜瓜心酷喜之連皮食數枚膿血皆已人言下痢無正形是何言也人止知痢是虛冷溫之燥之澀之截之此外無術矣豈知風暑火濕燥寒六者皆為痢此冰蜜甜瓜所以效也臨變不惑湧法戴人在西華夏公宅其僕鄭驢病法當吐命女僮下藥藥失不制又用之太多湧之不出反悶亂不醒乃告戴人戴人令以薪實馬糟既平舁鄭驢臥其上倒垂其頭須臾大吐吐訖而快戴人曰先宜少進不湧旋加西華一老夫病法當吐令門人欒景先下藥景先初學其人不吐反下走二行乃告戴人戴人令取溫齏汁飲二碗再下湧藥一錢以雞翎探之乃吐既藥行方大吐吐訖又安戴人曰凡用吐藥先以齏汁一碗橫截之藥既嚥下待少傾其雞翎勿令離口酸苦鹹雖能吐人然不撩何由出也李仲安宅四婦人病同日下湧劑置燠室中火兩盆其一婦人發昏眾人皆驚戴人笑曰內火見外火故然舁之門外使飲冰雪水立醒時正雪晴戴人曰熱見寒則醒眾由是皆服非老手諳練必不能鎮眾人之驚也湧嗽楊壽之妻病嗽十餘年法當吐之一日不止以麝香湯止之夜半猶不定再止之明旦頗覺噁心更以人參湯止之二日稍寧自下藥凡三來問戴人不顧謂欒景先曰病久嗽藥已擒病自然遲解湧後調理數日乃止戴人常言湧後有頓快者有徐快者有反困悶者病未盡也有反熱者不可不下也大抵三日後無不快者凡下不止者以冰水解之凡藥熱則行寒則止矣當禁不禁病愈後犯禁而死孟太亨病腫既平當節食及鹽血房室等不慎病再適戴人歸家無救之者乃死郾城董德固病勞嗽戴人曰愈後當戒房事其病愈恃其安觸禁而死死後妻生一子正當病瘥之日也董初堅諱至是乃彰一宦家小兒病痢自郾頭車載至朱葛寺入門而死戴人曰有病遠行不可車載馬馱病已擾矣又以車馬動搖之是為重擾其即死陽夏韓氏為犬所齧大痛不可忍偏癢燥自莊頭載至家二十里一夕而死時人皆不知車之誤也戴人常言傷寒之後忌葷肉房事勞水腫之後禁房及油鹽滋味等三年滑泄之後忌油膩此三者決不可不禁也戴人常曰病久痞閉忽得湧泄氣血沖和心腎交媾陽事必舉尤切戒房室元氣新至犯之則病再作恐罪於湧泄不忌反忌不忌口得愈一男子病泄十餘年豆蔻阿膠訶子龍骨枯礬皆用之矣中脘臍下三里歲歲灸之皮肉皴槁神昏足腫泄如泔水日夜無度戴人診其兩手脈沉且微曰生也病人忽曰羊肝生可食乎戴人應聲曰羊肝止泄尤宜服病人悅而食一小盞許可以漿粥送之病人飲粥數口幾半升續又食羊肝生一盞許次日泄幾七分如此月餘而安此皆忌口太過之罪也戴人常曰胃為水穀之海不可虛怯虛怯則百邪皆入矣或思葷茹雖與病相反亦令少食圖引漿粥此權變之道也若專以淡粥責之則病人不悅而食減久則病增損命世俗誤人矣不可忌口戴人常曰臟毒酒毒下血嘔血婦人三十以下血閉六月七月間膿血惡痢疼痛不止婦人初得孕擇食者以上皆不忌口高技常孤戴人常曰人言我不接眾工戴人曰余豈不欲接人但道不同不相為謀醫之善惟素問一經為祖有平生不識其面者有看其文不知其義者此等雖曰相親欲何說止不過求一二藥方而已矣大凡藥方前人所以立法病有百變豈可執方設於富貴之家病者數工同治戴人必不能從眾工眾工亦不能從戴人以此常孤惟書生高士推者復來日不離門戴人又曰我之術止可以教書生不能受醫者忽授老書生曰我是書生豈不知書生書生固多許可以易慢戴人問之曰彼未嘗見予治病故有是言若親見予治病數十人自反思矣凡謗我者皆望風取信於群醫之口也孔子曰浸潤之譖膚受之愬不行焉可謂明也已矣群言難正謗吐或言人有病不可吐人身骨節間皆有涎若吐出骨節間涎令人偏枯戴人聞之曰我之藥止是吐腸胃間久積或膜盲間宿沫皆是胃膈中溢出者天下與吐一理也但病有上下故用藥有逆順耳謗三法或言戴人汗下吐三法欲該天下之醫者非也夫古人醫法未備故立此三法後世醫法皆備自有成說豈可廢后世之法而從遠古譬猶上古結繩今日可廢書契而從結繩乎戴人問之曰易之法雖多不離八卦五行刑章雖多不過笞杖徒流岐伯曰知其要者一言而終然則岐伯亦誑人乎大抵舉綱則簡計目則繁謗峻藥或言戴人用藥皆峻激乃本草中下品藥也豈可服哉戴人曰甚矣人之不讀書本草言上藥為君中品為臣下品為佐使者所以辯其性剛柔也內經言所謂君臣佐使者非本草中三品之謂也主治之為君次君之謂臣應臣之為佐使假如大黃能治此病則大黃為君甘遂能治此病則甘遂為君矣若專以人參黃耆治人之邪氣此庸工所以常誤人命也李嗣榮言京中閒人云戴人醫殺二婦遂辭太醫之職而去又有人云昔曾醫殺穎守私遁而去麻知幾初聞亦疑之乃載見戴人於穎陽觀其用藥百發百中論議該贍應變無窮其所治之疾則不三二十年即十年或五六年應手輒愈群醫之領袖無以養生及其歸也謗言滿市皆曰戴人醫殺倉使耿四而去時倉使以病卒與余未嘗通姓名耿四病嗽咯血曾問戴人戴人曰公病消困不可峻攻宜以調養戴人已去後而卒矣麻先生乃肖李嗣榮所言皆誣也凡余所治之病皆眾壞之證將危且死而治之死則當怨於戴人又戴人所論按經切理眾誤皆露以是嫉之又戴人治病多用峻激之藥將愈未愈之間適戴人去群醫毀之曰病為戴人攻損急補之遂用相反之藥如病愈則我藥可久服攻疾之藥可暫用我方攻疾豈欲常服哉疾去則止藥若果欲養氣五穀五肉五菜非上藥耶亦安在枯草死木之根核哉病人負德愈後吝財南鄉刀鑷工衛氏病風半身無汗已再中矣戴人以三法療之尋愈恐其求報乃紿曰余夜夢一長髯人針余左耳故愈巫者武媼年四十病勞三年羸瘦不足觀諸醫技絕適五六月間求治願奉白金五兩戴人治之五六日而安止答曰白金三兩乃曰一道士投我一符焚而吞之乃痊如此等人不可勝計若病再作何以求治至有恥前言而不敢復求治療而殺其身者此所以世之庸工當正病時以犀珠龍麝丁沉木乳乘其急而巧取之然君子博愛賢愚亦不當效若輩也同類妒才群口誣戴人有扶救之功如死我則有攻擊之罪明者不可不察也麻先生常見他醫言戴人能治奇病不能治常病能治雜病不能治傷寒他日見戴人問以傷寒事超然獨出仲景言外之意謂余曰公慎勿殢仲景紙上語惑殺世人余他日再讀仲景方省其旨戴人云人常見傷寒疫氣動時輒避曰夫傷寒多變須朝夕再視若十人病已不能給況闔郡之中皆親故人乎其死生常在六七日之間稍不往視別變矣以此他醫咸誚之以為不能治傷寒蓋未常窺其涯涘浪為之訾云
