body:
  text: 卷五瘡癤瘤腫五十一夫大人瘡癤小兒赤瘤腫發之時疼痛不止內經曰夫諸痛癢瘡瘍皆生於心火可用一咒法禁之法者是心法咒曰龍鬼流兮諸毒腫癰瘡膿血甚被痛忘心稱意大悲咒三唾毒腫隨手消上一氣唸咒三遍望日月燈火取氣一口吹在瘡腫丹瘤之上右手在瘡上虛收虛撮三次左手不動每一氣念三遍虛收虛攝三次百無禁忌如用之時心正為是此法得於祖母韓氏相傳一百餘年用之救人百發百中若不食葷酒之人其法更靈病瘡腫者大忌雞豬魚兔發熱動風之物此法不得輕侮無藥處可用之瘡腫丹毒五十二夫大人小兒瘡腫丹毒發熱疼痛不止者又有一法面北端想北海雪浪滔天冰山無際大寒嚴冷之氣取此氣一口吹在瘡腫處立止用法之人大忌五辛之菜五厭之肉所病之人切忌雞豬魚兔酒醋濕面等物無藥之處可用此法救之凍瘡五十三夫凍瘡者因寒月行於冰雪中而得之有經年不愈用陂野中淨土曝乾以大蒜搗如泥和土捏作餅子如大觀錢厚簿量瘡口大小而貼之泥餅子上以火艾灸之不計艾壯數多少以泥干為度去幹餅以換濕餅貼定灸之不問灸數多少有灸一二日者直至瘡痂內覺癢微痛是凍瘡活也然後口含漿水澄清用雞翎一二十莖縛作刷子於瘡口上洗淨以此而洗之後肌膚微痛也用軟帛拭乾次用木香檳榔散敷之夏月醫之大妙金瘡五十四夫一切刀箭所傷有刀箭藥用風化石灰一斤龍骨四兩二味為細末先於端四日採下刺薊菜於端午日五更合杵臼內搗和得所團作餅子若酒麴中心穿眼懸於背陰處陰乾搗羅為細末於瘡口上摻貼亦治裡外臁並諸瘡腫大效又有咒法咒曰今日不祥正被物傷一禁不疼二禁不痛三禁不膿不作血急急如律令奉敕攝又每念一遍以右手收一遍收在左手中如此七遍則放手吹去卻望太陽取氣一口吹在所傷處如陰晦夜間望北斗取氣亦得所傷之人大忌雞豬魚兔酒醋熱面動風之物如食之則瘡必發又一法默想東方日出始取氣一口日出一半取氣一口日大圓滿取氣一口吹在所傷之處如此三次則止用法之人並無所忌所傷之人禁忌同前可於無藥之處用之誤吞銅鐵五十五夫誤吞銅鐵以至羸瘦者宜用肥豬脂與葵菜羹同飧數頓則銅鐵自然下也神驗如不食葷腥者宜以調胃承氣湯大作其劑下之亦可也魚刺麥芒五十六夫魚刺麥芒一切竹木簽刺咽喉及鬚髮惹伴在咽嗌中不能下者內經曰不因氣動而病生於外可用道藏經一咒法治之咒曰吾請老君東流順老君奉敕攝攝攝法毒水吾託大帝尊不到稱吾者各各現帝身急急如律令奉敕攝一氣念遍又以左手屈中指無名指作三山印印上坐淨水一盞右手掏卯文作金槍印左手在下右手在上左手象地右手象天虛挽虛卓九次為定左足橫右足豎作丁字立如作法時望日月燈火取氣一口吹在盞內此法百無禁忌用法之時以正神氣是也如所傷物下不可便與米湯米飯吃恐米粒誤入瘡口中潰作膿也姑以拌麵羹養之數日可也蛇蟲所傷五十七夫犬咬蛇傷不可便貼膏藥及生肌散之類謂毒氣不出也內經曰先治內而後治外可也當先用導水丸禹功散或通經散瀉十餘行即時痛減腫消然後用膏藥生肌散敷貼愈此是先治內而後治外之法也杖瘡五十八夫一切蟲獸所傷及背瘡腫毒杖瘡焮發或透入里者可服木香檳榔丸七八十丸至百丸或百五十丸至二百丸生薑湯下過五七行量虛實加減則可矣禁蠍五十九夫禁蠍有一咒法咒曰玉女傳仙攝敕斬蛜蜥滅上如有蠍螫之人來求治者於蠍螫處望而取氣一口默唸七遍怒著作法吹在蠍螫處內經曰蜂蠆之毒皆屬於火可用新水一盆浸之如浸不得處速以手帛蘸水搭之則痛止也用法之人大忌五厭肉落馬墜井六十夫一切男子婦人落馬墜井因而打撲便生心恙是痰涎發於上也內經曰不因氣動而病生於外可用三聖散空心吐訖如本人虛弱疲瘁可用獨聖散吐之吐訖可服安魂寧魄之藥定志丸酸棗仁茯神之類是也婦人月事沉滯六十一夫婦人月事沉滯數月不行肌肉不減內經曰此名為瘕為沉也沉者月事沉滯不行也急宜服桃仁承氣湯加當歸大作劑料服不過三服立愈後用四物湯補之更可用宣明方檳榔丸血崩六十二夫婦人年及四十以上或悲哀太甚內經曰悲哀太甚則心系急心系急則肺布葉舉而上焦不通熱氣在中故經血崩下心系者血山也如久不愈則面黃肌瘦慎不可與燥熱之藥治之豈不聞血得熱而流散先以黃連解毒湯次以涼膈散四物湯等藥治之而愈四物者是涼血也乃婦人之仙藥也量虛實加減以意消息用之腰胯疼痛六十三夫婦人腰胯疼痛兩腳麻木惡寒喜暖者內經曰乃是風寒濕痹先可服除濕丹七八十丸量虛實以意加減次以禹功散投之瀉十餘行清冷積水青黃涎沫為驗後以長流水同生薑棗煎五苓散服之風濕散而血氣和也頭風眩運六十四夫婦人頭風眩運登車乘船亦眩運眼澀手麻發退健忘喜怒皆胸中有宿痰使然也可用瓜蒂散吐之吐訖可用長流水煎五苓散大人參半夏丸兼常服愈風餅子則愈矣經血暴下六十五夫婦人年及五十以上經血暴下者婦人經血終於七七之數數外暴下內經曰火主暴速亦因暴喜暴怒憂結驚恐之致然也慎不可作冷病治之如下峻熱之藥則死止可用黃連解毒湯以清於上更用蓮殼灰棕毛以滲於下然後用四物湯加玄胡散涼血和經之藥是也赤白帶下六十六夫婦人赤白帶下或出白物如脂可服導水丸禹功散或單用無憂散量虛實加減瀉訖次用桂苓丸五苓散葶藶木香散同治濕治瀉法治之或用獨聖散上湧亦可也室女亦可月事不來六十七夫婦人月事不來室女亦同內經曰月事不來者是胞脈閉也胞脈者屬火而絡於脬中令氣上迫肺心氣不得下通故月事不來也可用茶調散吐之吐訖可用玉燭散當歸散或三和湯桂苓白朮散柴胡飲子量虛實選而用之降心火益腎水開胃進食分陰陽利水道之藥是也慎勿服峻熱之藥若服之則變成肺痿骨蒸潮熱咳嗽咯膿嘔血而喘小便澀滯寢汗不已漸至形瘦脈大雖遇良醫亦成不救嗚呼人之死者豈為命耶婦人無子六十八夫婦人年及二三十者雖無病而無子經血如常或經血不調乃陰不升陽不降之故也可獨聖散上吐訖冷痰三二升後用導水丸禹功散瀉訖三五行及十餘行或用無憂散瀉十餘行次後吃蔥醋白粥三五日胃氣既通腸中得實可服玉燭散更助以桂苓白朮丸散二藥是降心火益腎水既濟之道不數月而必有孕也若婦人有癃閉遺溺嗌乾之諸證雖服藥針灸亦不能孕也蓋沖任督三脈之病故不治也表證見內證及熱論中小產六十九夫婦人半產俗呼曰小產也或三月或四五六月皆為半產已成男女故也或因憂恐暴怒悲哀太甚或因勞力打撲傷損及觸風寒或觸暴熱不可用黑神散烏金散之類內犯乾薑之故止可用玉燭散和經散湯之類是也大產七十夫婦人大產十月滿足降誕者是也或臍腰痛乃敗血惡物之致然也舉世便作虛寒以燥熱治之誤人多矣難經曰諸痛為實實者熱也可用導水丸禹功散瀉五七行慎不可便服黑神散烏金散燥之同半產治之則可矣產後心風七十一夫婦人產後心風者則用調胃承氣湯一二兩加當歸半兩細銼用水三四盞同煎去滓分作二服大下三五行則愈如不愈三聖散吐之乳汁不下七十二夫婦人有天生無乳者不治或因啼哭悲怒鬱結氣溢閉塞以致乳脈不行用精豬肉清湯調和美食於食後調益元散五七錢連服三五服更用木梳梳乳周迴百餘遍則乳汁自下也又一法用豬蹄湯調和美味服之乳汁亦下合用熟豬蹄四枚食之亦效又一法針肩井二穴亦效產後潮熱七十三夫婦人產後一二日潮熱口乾可用新汲水調玉露散或冰水調服之亦可或服小柴胡湯加當歸及柴胡飲子亦可慎不可作虛寒治之乳癰七十四夫乳癰發痛者亦生於心也俗呼曰吹乳是也吹者風也風熱結薄於乳房之間血脈凝注久而不散潰腐為膿也可用一法禁之咒曰謹請東方護司族吹奶是灰奶子上用之時當先問病人曰甚病病人答曰吹奶取此氣一口但吹在兩手坎字文上用大拇指緊捏定面北立一氣念七遍吹在北方如此看三遍若作法時以左右二婦人面病人立於病乳上痛揉一二百數如此亦三次則愈雙身大小便不利七十五夫婦人雙身大小便不利者可用八正散大作劑料除滑石加葵菜籽煎服內經曰膀胱不利為癃癃者是小便閉而不通也如八正散加木香取效更捷經曰膀胱氣化則能出然後服五苓散三五服則愈矣雙身病瘧七十六夫雙身婦人病瘧可煎白虎湯小柴胡柴胡飲子等藥如大便結硬可用大柴胡散微溏過不可大吐瀉恐傷其孕也內經曰夏傷於暑秋必病瘧雙身傷寒七十七夫雙身婦人傷寒時氣溫疫頭痛身熱可用升麻湯一兩水半碗大煎劑料去滓分作二服先一服吐了後一服不吐次以長流水加生薑棗煎五苓散熱啜之汗出盡頭痛立止身重喑啞七十八夫婦人身重九月而喑啞不言者是脬之絡脈不相接也則不能言經曰無治也雖有此論可煎玉燭散二兩水一碗同煎至七分去滓放冷入蜜少許時時呷之則心火下降而肺金自清故能作聲也懷身入難七十九夫婦人懷身入難月可用長流水調益元散日三服欲其易產也產後自無一切虛熱血氣不和之疾如未入月則不宜服也以滑石滑胎故也眉煉八十夫小兒眉煉在面曰眉煉在耳曰輒耳在足曰靴癬此三者皆謬名也內經曰諸痛癢瘡瘍皆屬心火乃心火熱盛之致然也可用䤵針刺之而出血一刺不愈當再刺之二刺則必愈矣內經云血實者宜決之決者破其血也眉煉者不可用藥敷之其瘡多癢則必爬若藥入眼則眼必損矣牙疳八十一夫小兒牙疳牙疳者齒齲也齲者是牙齦腐爛也上下牙者是手足陽明二經也或積熱於內或服銀粉巴豆大毒之藥入於腸胃乳食不能勝其毒毒氣循經而上至於齒齦齒齦牙縫為嫩薄之分反為害也可以麝香玉線子治之乳母臨臥當服黃連解毒湯一服疳病則愈夜啼八十二夫小兒夜啼不止者當用燈花一枚研細隨乳汁下並三服則每服用燈花一枚服罷此藥於靜室中臥一兩日則止也丹瘤八十三夫小兒丹瘤浮赤走引或遍身者乃邪熱之毒在於皮膚以磁片撤出血則愈如不愈則以拔毒散掃三二十度必愈矣內經曰丹熛赤瘤火之色也相火之病是也疳眼八十四夫小兒疳澀眼數日不開者乃肝木風熱之致然也可調服涼膈散數服眼開而愈身瘦肌熱八十五夫小兒身瘦肌熱面黃腹大或吐瀉腹有青筋兩脅結硬如碗之狀名乳癰癖俗呼曰奶脾是也乳癰得之綿帛太厚乳食傷多大熱則病生肌大飽則必傷於腸胃生於肌表者赤眼丹瘤疥癬癰癤眉煉赤白口瘡牙疳宣爛及寒熱往來此乳母抱不下懷積熱熏蒸之故兩手脈浮而數也傷於腸胃者吐瀉驚疳哽氣腹脹肌瘦面黃肚大筋青喜食泥土揉鼻竅頭髮作穗乳瓣不化此皆大飽之致然也久而不愈則成乳癰兩手脈沉而緊也此其辨也以上諸症皆乳母懷抱奉養過度之罪癖之疾可以丁香化痹散取過數服牛黃通膈丸甘露散益黃散等藥磨之如不愈者有揉脾一法咒曰日精月華助吾手法勅斬減消驅毒敕攝上用法之人每念一遍望日取氣一口吹在手心自揉之如小兒病在左臂上用法之人亦左手揉之在右臂以右手揉之亦吹在乳脾上令母揉之男孩兒用單日女孩兒用雙日大忌風雨陰晦產婦孝子見之用之時宜於日中前晴明好日色可矣大小便不利八十六夫小兒大小便不通利者內經曰三焦約也約者不行也可用長流水煎八正散時時灌之候大小便利即止也久瀉不止八十七夫小兒久瀉不止者至八九月間變為秋深冷痢泄瀉清白時腹撮痛乳瓣不化可用養脾丸丸如黍米大每服二三十丸米飲下日三服則愈若治芻蕘之兒萬舉萬全富家且宜消息通身浮腫八十八夫小兒通身浮腫是水氣腫也小便不利者通小便則愈內經曰三焦閉塞水道不行水滿皮膚身體痞腫是風乘濕之症也可用長流水加燈心煎五苓散時時灌之更於不透風暖處頻浴汗出則腫消腫消則自愈內外兼治故也發驚潮搐八十九夫小兒三五歲時或七八歲至十餘歲發驚潮搐涎如拽鋸不省人事目瞪喘急將欲死者內經曰此皆得於母胎中所授悸惕怕怖驚駭恐懼之氣故令小兒輕者為驚吊重者為癇病風搐為腹中積熱為臍風以上證候可用吐涎及吐之藥如吐訖宜用朱犀腦麝清涼墜涎之藥若食乳之子母亦宜服安魂定魄之劑定志丸之類如婦人懷孕之日大忌驚憂悲泣縱得子必有諸疾拗哭不止九十夫小兒拗哭不止或一二日或三四日乃邪祟之氣湊於心拗哭不止也有藏經一法以綿絹帶縛手足訖用三姓婦人淨驢槽臥小兒於其中不令旁人知而覷之後移時則拗哭自止也身熱吐下九十一夫小兒身熱吐下腹滿不進乳者可急用牛黃通膈丸下過四五行則愈風熱涎嗽九十二夫小兒風熱涎嗽可用通聖加半夏多煎少少服之不過三五日愈水瀉不止九十三夫小兒水瀉不止可服五苓與益元各停用新水調下一二錢不拘時服瘡疥風癬九十四夫小兒瘡疥風癬可用雄黃散加芒硝少許油調敷之如面上有瘡癬不宜擦藥恐因而入眼則損目矣甜瘡九十五夫小兒甜瘡久不愈者俗呼曰香瘡是也多於面部兩耳前有一法令母口中嚼白米成膏子臨臥塗之不過三五上則愈矣小兒並乳母皆忌雞豬魚兔酒醋動風發熱之物如治甜指亦可白禿瘡九十六夫小兒白禿瘡者俗呼為雞糞禿者是也可用甜瓜蔓龍頭不以多少河水浸之一宿以砂鍋熬取極苦汁濾去瓜蔓以文武慢火熬成如稀糖狀盛於瓷器中可先剃頭去盡瘡痂死血出盡著河水洗淨卻用熬下瓜蔓膏子一水盞加半夏末二錢生薑自然汁一兩匙狗膽一枚同調不過三兩上立可大忌雞豬魚兔動風發熱之物瘧疾不愈九十七夫瘧疾連歲不愈者可用咒果法治之果者謂桃杏棗梨慄是也咒曰吾從東南來路逢一池水水裡一條龍九頭十八尾問伊食甚的只吃瘧病鬼上念一遍吹在果子上念七遍吹七遍在上令病人於五更雞犬不聞時面東而立食訖於淨室中安睡忌食瓜果葷肉熱物此十治八九無藥處可救人腰痛氣刺九十八夫一切男子婦人或因咳嗽一聲或因悲哭啼泣抬舁重物以致腰痛氣刺不能轉側及不能出氣者可用不臥散嚏之汗出痛止如不食可用通經散導水丸瀉十餘行瀉訖服烏金丸和血丹痛減則止矣赤瘤丹腫九十九夫小兒有赤瘤丹腫先用牛黃通膈丸瀉之後用陽起石掃敷則丹毒自散如未散則可用䤵針砭刺出血而愈矣瘡疱癮疹一百夫小兒瘡疱癮疹趺瘡丹熛等疾如遇火運勝時不可便用升麻湯解之升麻湯者是辛溫之劑止可用辛涼之劑解之太平之時可用辛溫之劑發散後便可用涼膈加當歸白虎湯化斑湯玉露散煎服之甚者解毒湯調胃承氣湯投之古人云瘡瘍者首尾俱不可下此言誤人久矣豈不聞揚湯止沸釜底抽薪內經曰五寅五申歲多發此病此言少陽相火之歲也少陽客氣勝丹熛瘡疱癮疹之疾生矣又內經曰諸痛癢瘡瘍皆屬於心火由是言之皆明心生不可用辛溫之劑發散以致熱勢轉增漸成臟毒下血咬牙搐搦為大熱之證明矣如白虎湯加人參涼膈加桔梗當歸不論秋冬但有瘡疱之證便可用之亦且瘡疱癮疹丹熛趺瘡者是天之一氣以傷人也且如瘡疱癮疹以少為吉以稠為凶稀少者不服藥而自愈稠密者以寒涼藥舍死而治之十全其一二敝家親眷相知信服此藥獲效多矣
