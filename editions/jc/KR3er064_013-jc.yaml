body:
  text: 卷十三劉河間先生三消論易言天地自太虛至黃泉有六位內經言人之身自頭至足亦有六位今余又言人胸腹之間自肺至腎又有六位人與天地造化五行同一爐韛知彼則知此矣故立天之氣曰金與火立地之氣曰土與水立人之氣曰風與火故金與火合則熱而清水土合則濕而寒風火合則溫而炎人胸腹之間亦猶是也肺最在上為金主燥心次之為君火主熱肝又次之為風木主溫膽又次之為相火主極熱脾又次之為濕土主涼腎又次之黃泉為寒水主寒故心肺象天脾腎象地肝膽象人不知此者不可與論人之病矣夫土為萬物之本水為萬物之元水土合德以陰居陰同處乎下以立地為氣萬物根於地是故水土濕寒若燥熱陽實則地之氣不立萬物之根索澤而枝葉枯矣五常政大論曰根於中者命曰神機是為動物根本在於中也根本者脾胃腎也食入胃則脾為布化氣味榮養五臟百骸故酸入肝而養筋膜苦入心而養血脈甘入脾而養肌肉辛入肺而養皮毛鹹入腎而養骨髓五氣亦然故清養肺熱養心溫養肝濕養脾寒養腎也凡此五味五氣太過則病不及亦病惟平則常安矣故六節藏象論曰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生是其理也又太陰陽明論云脾病而四肢不用者何也岐伯曰四肢皆稟氣於胃而不得至經必因於脾乃得稟也今脾病不能為胃行其津液不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉帝曰脾不主時何也岐伯曰脾者土也治中央常以四時長四臟各十八日寄治不得獨主於時也臟藏者常著胃土之精也土者生萬物而法天地故上下至頭足不得獨主於時也帝曰脾與胃以膜相連爾而能行其津液何也岐伯曰足太陰者三陰也其脈貫胃屬脾絡嗌故太陰為之行氣於三陰足陽明者表也五臟六腑之海也亦為之行氣於三陽臟腑各因其經而受氣以益陽明故為胃行其津液四肢不得稟水穀氣日以衰陰道不利筋骨肌肉皆無氣以生故不用焉不用者謂不能為之運用也由是觀之則五臟六腑四肢百骸皆稟受於脾胃行其津液相與濡潤滋養矣後之醫者欲以燥熱之劑以養脾胃滋土之氣不亦外乎況消渴之病者本濕寒之陰氣極衰燥熱之陽氣太甚更服燥熱之藥則脾胃之氣竭矣叔世不分五運六氣之虛實而一概言熱為實而虛為寒彼但知心火陽熱一氣之虛實而非臟腑六氣之虛實也蓋肺本清虛則溫心本熱虛則寒肝本溫虛則清脾本濕虛則燥腎本寒虛則熱假若胃冷為虛者乃胃中陰水寒氣實甚而陽火熱氣衰虛也非胃土濕氣之本衰故當溫補胃中陽火之衰退其陰水寒氣之甚又如胃熱為實者乃胃中陽火實而陰水虛也故當以寒藥瀉胃中之實火而養其虛水然此皆補瀉胃中虛熱水火所乘之邪非胃為濕者之本其餘例同法夫補瀉脾胃濕土之水氣者潤其濕者是補濕燥其濕者是瀉濕土本濕故也凡臟腑諸氣不必腎水獨當寒心火獨當熱要知每臟每腑諸氣和同宣而平之可也故余嘗謂五常之道陰中有陽陽中有陰孤陰不長獨陽不成但有一物皆備五行遞相濟養是謂和平交互克伐是謂衰興變亂失常患害由行故水少火多為陽實陰虛而病熱也水多火少為陰實陽虛而病寒也其為治者瀉實補虛以平為期而已矣故治消渴者補腎水陰寒之虛而瀉心火陽熱之實除腸胃燥熱之甚濟人身津液之衰使道路散而不結津液生而不枯氣血利而不澀則病日已矣況消渴者本因飲食服餌失宜腸胃乾涸而氣液不得宣平或耗亂精神過違其度或因大病陰氣損而血液衰虛陽氣悍而燥熱鬱甚之所成也故濟眾云三消渴者皆由久嗜咸物恣食炙爆飲酒過度亦有年少服金石丸散積久石熱結於胸中下焦虛熱血氣不能制石熱燥甚於胃故渴而引飲若飲水多而小便多者名曰消渴若飲食多而不甚飢小便數而漸瘦者名曰消中若渴而飲水不絕腿消瘦而小便有脂液者名曰腎消如此三消者其燥熱一也但有微甚耳余聞世之方多一方而通治三消渴者以其善消水穀而喜渴也然叔世論消渴者多不知本其言消渴者上實熱而下虛冷上熱故煩渴多飲下寒故小便多出本因下部腎水虛而不能制其上焦心火故上實熱而下虛冷又曰水數一為物之本五行之先故腎水者人之本命之元不可使之衰弱根本不堅則枝葉不茂元氣不固則形體不榮消渴病者下部腎水極冷若更服寒藥則元氣轉虛而下部腎水轉衰則上焦心火亢甚而難治也但以暖藥補養元氣若下部腎水得實而勝退上焦火則自然渴止小便如常而病愈也若此之言正與仲景相反所以巧言似是於理實違者也非徒今日之誤誤已久哉又如蔣氏藥證病原中論消渴消中消腎病曰三焦五臟俱虛熱惟有膀胱冷似冰又曰腰腎虛冷日增重又曰膀胱腎臟冷如泉始言三焦五臟俱虛熱惟有膀胱冷似冰復言五臟亦冷且腎臟水冷言為虛其餘熱者又皆言其虛夫陰陽興衰安有此理且其言自不相副其失猶小至於寒熱差殊用藥相反過莫大焉或又謂腎與膀胱屬水虛則不能制火虛既不能制火故小便多者愈失之遠矣彼謂水氣實者必能制火虛者不能制火故陽實陰虛而熱燥其液小便淋而常少陰實陽虛不能制水小便利而常多豈知消渴小便多者非謂此也何哉蓋燥熱太甚而三焦腸胃之腠理怫鬱結滯緻密壅塞而水液不能滲泄浸潤於外榮養百骸故腸胃之外燥熱太甚雖復多飲於中終不能浸潤於外故渴不止小便多出者如其多飲不能滲泄於腸胃之外故數溲也故余盡言原病式曰皮膚之汗孔者謂泄汗之孔竅也一名氣門者謂泄氣之門戶也一名腠理者謂氣液之隧道紋理也一名鬼門者謂幽冥之門也一名玄府者謂玄微之府也然玄府者無物不有人之臟腑皮毛肌肉筋膜骨髓爪牙至於萬物悉皆有之乃出入升降道路門戶也故經曰出入廢則神機化滅升降息則氣立孤危故非出入則無以生長壯老已非升降則無以生長化收藏是知出入升降無器不有故知人之眼耳鼻舌身意神識能為用者皆有升降出入之通利也有所閉塞則不能用也若目無所見耳無所聞鼻不聞香舌不知味筋痿骨痹爪退齒腐毛髮墮落皮膚不仁腸胃不能滲泄者悉有熱氣怫鬱玄府閉塞而致津液血脈榮衛清氣不能升降出入故也各隨鬱結微甚而有病之大小焉病在表則怫鬱腠理閉密陽氣不能散越故燥而無汗而氣液不能出矣叔世不知其然故見消渴數溲妄言為下部寒爾豈知腸胃燥熱怫鬱使之然也予之所以舉此世為消渴之證乃腸胃之外燥熱痞閉其滲泄之道路水雖入腸胃之內不能滲泄於外故小便數出而復渴此數句足以盡其理也試取內經凡言渴者盡明之矣有言心肺氣厥而渴者有言肝痹而渴者有言脾熱而渴者有言腎熱而渴者有言胃與大腸熱結而渴者有言脾痹而渴者有言小腸癉熱而渴者有因病瘧而渴者有因肥甘石藥而渴者有因醉飽入房而渴者有因遠行勞倦遇大熱而渴者有因傷害胃干而渴者有因腎熱而渴者有因病風而渴者雖五臟之部分不同而病之所遇各異其歸燥熱一也所謂心肺氣厥而渴者厥論曰心移熱於肺傳為膈消注曰心熱入肺久而傳化內為膈熱消渴多飲也所謂肝痹而渴者痹論曰肝痹者夜臥則驚多飲數小便如脾熱而渴者痿論曰脾氣熱則胃干而渴肌肉不仁發為肉痿所謂腎熱而渴者刺熱論曰腎熱病者先腰痛胻酸苦渴數飲身熱熱論曰少陰脈貫腎絡於肺系舌本故口燥舌乾而渴叔世惟言腎虛不能制心火為上實熱而下虛冷以熱藥溫補腎水欲令勝退心火者未明陰陽虛實之道也夫腎水屬陰而本寒虛則為熱心火屬陽而本熱虛則為寒若腎水陰虛則心火陽實是謂陽實陰虛而上下俱熱明矣故氣厥論曰腎氣衰陽氣獨勝宣明五氣論曰腎惡燥由燥腎枯水涸藏氣法時論曰腎苦燥急食辛以潤之夫寒物屬陰能養水而瀉心熱物屬陽能養火而耗水今腎水既不勝心火則上下俱熱奈何以熱藥養腎水欲令勝心火豈不謬哉又如胃與大腸熱結而渴者陰陽別論二陽結為之消注曰陽結胃及大腸俱熱結也腸胃藏熱善消水穀又氣厥論曰大腸移熱於胃善食而瘦脈要精微論曰癉成為消中善食而瘦如脾痹而渴者數飲而不得中氣喘而爭時發飧泄夫數飲而不得中其大便必不停留然則消渴數飲而小便多者止是三焦燥熱怫鬱而氣衰也明矣豈可以燥熱毒藥助其強陽以伐衰陰乎此真實實虛虛之罪也夫消渴者多變聾盲瘡癬痤痱之類皆腸胃燥熱怫鬱水液不能浸潤於周身故也或熱甚而膀胱怫鬱不能滲泄水液妄行而面上腫也如小腸癉熱而渴者舉痛論曰熱氣留於小腸腸中痛癉熱焦渴則便堅不得出矣注曰熱滲津液而小便堅矣如言病瘧而渴者瘧論曰陽實則外熱陰虛則內熱內外皆熱則喘而渴故欲飲冷也然陽實陰虛而為病熱法當用寒藥養陰瀉陽是謂瀉實補衰之道也如因肥甘石藥而渴者奇病論曰有口甘者病名為何岐伯曰此五氣之所溢也病名脾癉癉為熱也脾熱則四臟不稟故五氣上溢也先因脾熱故曰脾癉又經曰五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也此肥美之所發也此人必數食甘美而多肥也肥者令人內熱甘者令人中滿故其氣上溢轉而為消渴通評虛實論曰消癉僕擊偏枯痿厥氣滿發逆肥貴之人膏粱之疾也或言人惟胃氣為本脾胃合為表裡脾胃中州當受溫補以調飲食今消渴者脾胃極虛益宜溫補若服寒藥耗損脾胃本氣虛乏而難治也此言乃不明陰陽寒熱虛實補瀉之道故妄言而無畏也豈知腹中論云帝曰夫子數言熱中消中不可服芳草石藥石藥發癲芳草發狂注言多飲數溲謂之熱中多食數溲謂之消中多喜曰癲多怒曰狂芳美味也石謂英乳乃發熱之藥也經又曰熱中消中皆富貴人也今禁膏粱是不合其心禁芳草石藥是病不愈願聞其說岐伯曰芳草之味美石藥之氣悍二者之氣急疾堅勁故非緩心和人不可服此二者帝曰何以然岐伯曰夫熱氣慓悍藥氣亦然所謂飲一溲二者當肺氣從水而出也其水穀之海竭矣凡見消渴便用熱藥誤人多矣故內經應言渴者皆如是豈不昭晰歟然而猶有惑者諸氣過極反勝也者是以人多誤也如陽極反似陰者是也若不明標本認似為是始終乖矣故凡見下部覺冷兩膝如冰此皆心火不降狀類寒水宜加寒藥下之三五次則火降水升寒化自退然而舉世皆同執迷至如易素二書棄如朽壞良可悲夫故處其方必明病之標本達藥之所能通氣之所宜而無加害者可以制其方也已所謂標本者先病而為本後病而為標此為病之本末也標本相傳先當救其急也又云六氣為本三陰三陽為標蓋為病臟病最急也又云六氣為胃之本假若胃熱者胃為標熱為本也處其方者當除胃中之熱是治其本也故六氣乃以甚者為邪衰者為正法當瀉甚補衰以平為期養正除邪乃天之道也為政之理補賤之義也大凡治病明知標本按法治之何必謀於眾陰陽別論曰謹熟陰陽無與眾謀標本病傳論曰知標知本萬舉萬當不知標本是謂妄行至真要大論曰知標知本用之不殆明知逆順正行無問不知是者不足以言診適足以亂經故大要曰粗工嘻嘻以為可知言熱未已寒病復起同氣異形迷診亂經此之謂也夫標本之道要而博小而大可以言一而知百言標與本易而弗損察本與標氣可令調明知勝復為萬民式天之道畢矣天元紀大論曰至數極而道不惑可謂明矣所謂藥之巧能者溫涼不同寒熱相反燥濕本異云云前已言之矣斯言氣也至於味之巧能如酸能收甘能緩辛能散苦能堅咸能軟酸屬木也燥金主於散落而木反之土濕主於緩而水勝之故能然也若能燥濕而堅火者苦也易曰燥萬物者莫燥乎火凡物燥則堅也甘能緩苦急而散結甘者土也燥能急結故緩則急散也辛能散抑散結潤燥辛者金也金主散落金生水故也況抑結散則氣液宣行而津液生也藏氣法時論曰腎苦燥急食辛以潤之開腠理致津液通氣也咸能軟堅咸者水也水潤而柔故勝火之堅矣此五臟之味也其為五味之本也淡也淡胃土之味也胃土者地也地為萬物之本胃為一身之本天元紀大論曰在地為化化生五味故五味之本淡也以配胃土淡能滲泄利竅夫燥能急結而甘能緩之淡為剛土極能潤燥緩其急結令氣通行而致津液滲泄也故消渴之人其藥與食皆宜淡劑至真要大論曰辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或散或收或緩或急或燥或潤或堅或軟所以利而行之調其氣也本草云藥有三品上品為君主養命小毒以應天中品為臣主養性常毒以應人下品為佐使主治病大毒以應地不在三品者氣毒之物也凡此君臣佐使者所以明藥之善惡也處方之道主治病者為君佐君者為臣應臣之用者為佐使適其病之所根有君臣佐使奇偶小大之制明其歲政君臣脈位而有逆順反正主療之方隨病所宜以施用其治法多端能備所用者良工也寒者熱之熱者寒之溫者清之清者溫之結者散之散者收之微者逆而制之甚者從而去之燥者潤之濕者燥之堅者軟之軟者堅之急者緩之客者除之留者卻之勞者溫之逸者行之驚者平之衰者補之甚者瀉之吐之下之摩之益之薄之劫之開之發之灸之制之適足為用各安其氣必清必淨而病氣衰去臟腑和平歸其所宗此治之大體也陰陽應象論曰治不法天之紀不明地之理則災害至矣又六節臟象論曰不知年之所加氣之所衰不可以為功也今集諸經驗方附於篇末神白散治真陰素被損虛多服金石等藥或嗜炙爆咸物遂成消渴桂府滑石六兩甘草一兩生用上為細末每服三錢溫水調下或大渴欲飲冷者新汲水尤妙豬肚丸治消渴消中豬肚一枚黃連五兩栝蔞四兩麥門冬四兩去心知母四兩如無以茯苓代之上四味為末納豬肚中線縫安置甑中蒸極爛熟就熱於木臼中搗可丸如硬少加蜜丸如桐子大每服三十丸漸加至四五十丸渴則服之如無木臼於沙盆中用木杵研亦可以爛為妙矣葛根丸治消渴消腎葛根三兩栝蔞三兩鉛丹二兩附子一兩者炮去皮臍用上四味搗羅為細末煉蜜為丸如梧桐子大每服十丸日進三服治日飲碩水者春夏去附子胡粉散治大渴百方療不瘥者亦治消腎鉛丹胡粉各半兩栝蔞一兩半甘草二兩半炙澤瀉石膏赤石脂白石脂各半兩上八味為細末水服方寸匕日二服壯者一匕半一年病一日愈二年病二日愈渴甚者二服腹痛者減之如丸服亦妙每服十丸多則腹痛也三黃丸主治男子婦人五勞七傷消渴不生肌肉婦人帶下手足發寒熱者春三月黃芩四兩大黃二兩黃連四兩夏三月黃芩六兩大黃一兩黃連一兩秋三月黃芩六兩大黃二兩黃連三兩冬三月黃芩三兩大黃五兩黃連二兩上三味隨時加減搗為細末煉蜜和丸如大豆大每服五丸日三服不去者加七丸服一月病愈嘗試有驗矣人參白朮散治胃膈癉熱煩滿不欲食或癉成為消中善食而瘦或燥郁甚而消渴多飲而數小便或熱病或恣酒色誤服熱藥者致脾胃真陰血液損虛肝心相搏風熱燥甚三焦腸胃燥熱怫鬱而水液不能宣行則周身不得潤濕故瘦瘁黃黑而燥熱消渴雖多飲而水液終不能浸潤於腸胃之外渴不止而便注為小便多也叔世俗流不明乎此妄為下焦虛冷誤死多矣又如周身風熱燥郁或為目瘴癰疽瘡瘍上為喘嗽下為痿痹或停積而濕熱內甚不能傳化者變水腫腹脹也凡多飲數溲為消渴多食數溲為消中肌肉消瘦小便有脂液者為消腎此世之所傳三消病也雖無所不載以內經考之但燥熱之微甚者也此藥兼療一切陽實陰虛風熱燥郁頭目昏眩風中偏枯酒過積毒一切腸胃澀滯壅塞瘡癬痿痹並傷寒雜病煩渴氣液不得宣通並宜服之人參白朮當歸芍藥大黃山梔子澤瀉以上各半兩連翹栝蔞根乾葛茯苓以上各一兩官桂木香藿香各一分寒水石二兩甘草二兩石膏四兩滑石盆硝各半兩上為粗末每服五錢水一盞生薑三片同煎至半盞絞汁入蜜少許溫服漸加十餘錢無時日三服或得臟腑疏利亦不妨取效更妙後卻常服之或兼服消痞丸似覺腸胃結滯或濕熱內甚自利者去大黃芒硝人參散治身熱頭痛或積熱黃瘦或發熱惡寒蓄熱寒戰或膈痰嘔吐煩熱煩渴或燥濕瀉痢或目疾口瘡或咽喉腫痛或中風昏眩或蒸熱虛汗肺痿勞嗽一切邪熱變化真陰損虛並宜服之石膏一兩寒水石二兩滑石四兩甘草二兩人參半兩上為細末每服二錢溫水調下或冷水亦得三消之論劉河間之所作也因麻徵君寓汴梁暇日訪先生後裔或舉教醫學者即其人矣徵君親詣其家求先生平昔所著遺書乃出三消論氣宜病機三書未傳於世者文多不全止取三消論於卷首增寫六位藏象二圖其餘未遑潤色即付友人穆子昭子昭乃河間門人穆大黃之後也時覓官於京師方且告困徵君欲因是而惠之由是余從子昭授得一本後置兵火遂失其傳偶於鄉人霍司承君祥處復見其文然傳寫甚誤但依仿而錄之以待後之學者詳為刊正云時甲辰年冬至日錦溪野老書續方柏亭東久亭寺僧悟大師傳經驗方治飲水百杯尚猶未足小便如油或如杏色服此藥三五日小便大出毒歸於下十日永除根本此方令子和辨過云是重劑可用悟公師親驗過矣水銀四錢錫二錢用水銀研成砂子牡蠣一兩密陀僧一兩知母一兩紫花苦參一兩貝母一兩黃丹半兩栝蔞根半斤上為細末男子用不生兒豬肚一個納藥婦人用獖豬肚一個麻線縫之新瓦一合繩系一兩遭米一升更用栝蔞根末半斤卻於新水煮熟取出放冷用砂盆內研爛就和為丸如豬肚丸法用之
