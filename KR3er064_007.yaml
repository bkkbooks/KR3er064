body:
  text: 卷七燥形臂麻不便八十九郾城梁賈人年六十餘忽曉起梳髮覺左手指麻斯須半臂麻又一臂麻斯須頭一半麻比及梳畢從脅至足皆麻大便二三日不通往問他醫皆云風也或藥或針皆不解求治於戴人戴人曰左手三部脈皆伏比右手小三倍此枯澀痹也不可純歸之風亦有火燥相兼乃命一湧一泄一汗其麻立已後以辛涼之劑調之潤燥之劑濡之惟小指次指尚麻戴人曰病根已去此餘烈也方可針溪谷溪谷者骨空也一日晴和往針之用靈樞中雞足法向上臥針三進三引訖復卓針起向下臥針送入指間皆然手熱如火其麻全去昔劉河間作原病式常以麻與澀同歸燥門中真知病機者也大便燥結九十戴人過曹南省親有姨表兄病大便燥澀無他證常不敢飽食飽則大便極難結實如針石或三五日一如圊目前星飛鼻中血出肛門連廣腸痛痛極則發昏服藥則病轉劇烈巴豆芫花甘遂之類皆用之過多則困瀉止則復燥如此數年遂畏藥性暴急不服但臥病待盡戴人過診其兩手脈息俱滑實有力以大承氣湯下之繼服神功丸麻仁丸等藥使食菠菱葵菜及豬羊血作羹百餘日充肥親知見駭之嗚呼粗工不知燥分四種燥於外則皮膚皺揭燥於中則精血枯涸燥於上則咽鼻焦乾燥於下則便溺結閉夫燥之為病是陽明化也水寒液少故如此然可下之當擇之藥之巴豆可以下寒甘遂芫花可下濕大黃朴硝可以下燥內經曰辛以潤之咸以軟之周禮曰以滑養竅孕婦便結九十一戴人過東杞一婦人病大便燥結小便淋澀半生不娠惟常服疏導之藥則大便通利暫廢藥則結滯忽得孕至四五月間醫者禁疏導之藥大便依常為難臨圊則力努為之胎墜凡如此胎墜者三又孕已經三四月弦望前後溲溺結澀甘分胎隕乃訪戴人戴人診其兩手脈俱滑大脈雖滑大以其且妊不敢陡攻遂以食療之用花鹼煮菠菱葵菜以車前子苗作茹雜豬羊血作羹食之半載居然生子其婦燥病方愈戴人曰余屢見孕婦利膿血下迫極努損胎但同前法治之愈者莫知其數也為醫拘常禁不能變通非醫也非學也識醫者鮮是難説也偏頭痛九十二一婦人年四十餘病額角上耳上痛俗呼為偏頭痛如此五七年每痛大便燥結如彈丸兩目赤色眩運昏澀不能遠視世之所謂頭風藥餅子風藥白龍丸芎犀丸之類連進數服其痛雖稍愈則大便稍祕兩目轉昏澀其頭上針灸數千百矣連年著灸其兩目且將失明由病而無子一日問戴人戴人診其兩手脈急數而有力風熱之甚也余識此四五十年矣遍察病目者不問男子婦人患偏正頭痛必大便澀滯結硬此無他頭痛或額角是三焦相火之經及陽明燥金勝也燥金勝乘肝則肝氣鬱肝氣鬱則氣血壅氣血壅則上下不通故燥結於裡尋至失明治以大承氣湯令河水煎三兩加芒硝一兩煎殘頓令溫合作三五服連服盡蕩滌腸中垢滯結燥積熱下泄如湯二十餘行次服七宣丸神功丸以潤之菠菱葵菜豬羊血為羹以滑之後五七日十日但遇天道晴明用大承氣湯夜盡一劑是痛隨利減也三劑之外目豁首輕燥澤結釋得三子而終腰胯痛九十三一男子六十餘病腰尻脊胯皆痛數載不愈晝靜夜躁大痛往來屢求自盡天年旦夕則痛作必令人以手捶擊至五更雞鳴則漸減向曙則痛止左右及病者皆作神鬼陰譴白虎齧朝禱暮祝覡巫僧道禁師至則其痛以減又夢鬼神戰鬥相擊山川神廟無不祭者淹延歲月肉瘦皮枯飲食減少暴怒日增惟候一死有書生曰既云鬼神虎齧陰譴之禍如此禱祈何無一應聞陳郡有張戴人精於醫可以問其鬼神白虎與病乎彼若術窮可以委命其家人從之戴人診其兩手脈皆沉滯堅徑力如張絙謂之曰病雖瘦難於食然腰尻脊胯皆痛者必大便堅燥其左右曰有五六日或八九日見燥糞一兩塊如彈丸結硬不可言曾令人剜取之僵下一兩塊渾身燥癢皮膚皺揭枯澀如麩片戴人既得病之虛實隨用大承氣湯以薑棗煎之加牽牛頭末二錢不敢言是瀉劑蓋病者聞暖則悅聞寒則懼説補則從説瀉則逆此弊非一日也而況一齊人而敷之衆楚人咻之乎及煎成使稍熱咽之從少至多纍至三日天且晚臟腑下泄四五行約半盆以燈視之皆燥糞燥痹塊及瘀血雜臟穢不可近須臾痛減九分昏睡鼻息調如常人睡至明日將夕始覺飢而索粥溫涼與之又困睡一二日其痛盡去次令飲食調養日服導飲丸甘露散滑利便溺之藥四十餘日乃復嗚呼再傳三十六虎書三十六黃經及小兒三十六吊誰為之耶始作俑者其無後乎古人以醫為師故醫之道行今之人以醫闢奴故醫之道廢有志之士恥而不學病者亦不擇精粗一概待之常見官醫迎送長吏馬前唱諾真可羞也由是通今博古者少而師傳遂絶靈樞經謂刺與汗雖久猶可拔而雪結與閉雖久猶可解而決去腰脊胯痛者足太陽膀胱經也胯痛足少陽膽經之所過也難經曰諸痛為實內經曰諸痛癢瘡瘍皆屬心火注曰心寂則痛微心躁則痛甚人見巫覡僧道禁師至則病稍去者心寂也然去其後來者終不去其本也古之稱痛隨利減不利則痛何由去病者既痊乃壽八十歲故凡燥證皆三陽病也寒形因寒腰強不能屈伸九十四北人衛德新因之析津冬月飲寒則冷病腰常直不能屈伸兩足沉重難於行步途中以床舁遞程程問醫皆云腎虛以蓯蓉巴戟附子鹿茸皆用之大便反祕潮熱上周將經歲矣乃乞拯於戴人戴人曰此疾十日之效耳衛曰一月亦非遲戴人曰足太陽經血多病則腰似折膕如結腨如裂太陽所至為屈伸不利況腰者腎之府也身中之大關節今既強直而不利宜咸以軟之頓服則和柔矣難經曰強力入房則腎傷而髓枯枯則高骨乃壞而不用與此用同今君之證太陽為寒所遏血墜下滯腰間也必有積血非腎也節次以藥可下數百行約去血一二斗次以九曲玲瓏灶蒸之汗出三五次而愈初蒸時至五日問曰腹中鳴否德新曰未也至六日覺鳴七日而起以能揖人戴人曰病有熱者勿蒸蒸則損人目也寒疝亦名水疝九十五律科王敏之病寒疝臍下結聚如黃瓜每發繞腰急痛不能忍戴人以舟車丸豬腎散下四五行覺藥繞病三五次而下其瀉皆水也豬腎甘遂皆苦寒經言以寒治寒萬舉萬全但下後忌飲冷水及寒物宜食乾物以寒疝本是水故也即日病減八分食進一倍又數日以舟車丸百餘粒通經散四五錢服之利下候三四日又服舟車丸七八十粒豬腎散三錢乃健步如常矣一僧病疝發作冷氣上貫齒下貫腎緊若繩挽兩睪時腫而冷戴人診兩手脈細而弱斷之曰秋脈也此因金氣在上下伐肝木木畏金抑而不伸故病如是肝氣磅礴不能下榮於睪丸故其寒實非寒也木受金制傳之胃土胃為陽明故上貫齒病非齒之病肝木者心火之母也母既不伸子亦屈伏故下冷而水化乘之經曰木鬱則達之土鬱則泄之令湧泄四次果覺氣和睪丸癢而暖戴人曰氣已入睪中矣以茴香木茂之藥使常服之首尾一月而愈感風寒九十六戴人之常溪也雪中冒寒入浴重感風寒遂病不起但使煎通聖散單服之一二日不食惟渴飲水亦不多飲時時使人捶其股按其腹凡三四日不食日飲水一二十度至六日有譫語妄見以調胃承氣湯下之汗出而愈戴人常謂人曰傷寒勿妄用藥惟飲水最為妙藥但不可使之傷常令揉散乃大佳耳至六七日見有下證方可下之豈有變異哉奈何醫者禁人飲水至有渴死者病人若不渴強與飲水亦不肯飲耳戴人初病時鼻塞聲重頭痛小便如灰淋汁及服調胃承氣一兩半覺欲嘔狀探而出之汗出漐漐然須臾下五六行大汗一日乃瘳當日飲冰水時水下則痰出約一二碗痰即是病也痰去則病去也戴人時年六十一凍瘡九十七戴人女僮足有寒瘍俗云凍瘡戴人令服舟車丸浚川散大下之其瘡遂愈人或疑之戴人曰心火降則寒消何疑之有寒痰九十八一婦人心下臍上結硬如斗按之如石人皆作病胎針灸毒藥禱祈無數如捕風然一日戴人見之曰此寒痰診其兩手寸脈皆沉非寒痰而何以瓜蒂散吐之連吐六七升其塊立消過半俟數日後再吐之其涎沫類雞黃腥臭特殊約二三升凡如此者三後以人參調中湯五苓散調之腹已平矣瀉利惡寒九十九東門一男子病瀉利不止腹鳴如雷不敢冷坐坐則下注如傾諸醫例斷為寒證乾薑官桂丁香豆蔻之屬枯礬龍骨皆服之矣何針不燔何艾不炷遷延將二十載矣一日問於戴人戴人曰兩手寸脈皆滑余不以為寒然其所以寒者水也以茶調散湧寒水五七升無憂散瀉積水數十行乃通因通用之法也次以五苓散淡劑滲瀉利之道又以甘露散止渴不數日而冷食寒飲皆如故此法王啓玄稔言之矣奈何無人用之哉內傷形因憂結塊一百息城司侯聞父死於賊乃大悲哭之罷便覺心痛日增不已月餘成塊狀若覆杯大痛不住藥皆無功議用燔針炷艾病人惡之乃求於戴人戴人至適巫者在其旁乃學巫者雜以狂言以謔病者至是大笑不忍回面向壁一二日心下結塊皆散戴人曰內經言憂則氣結喜則百脈舒和又云喜勝悲內經自有此法治之不知何用針灸哉適足增其痛耳病怒不食一百一項關令之妻病食不欲食常好叫呼怒罵欲殺左右惡言不輟衆醫皆處藥幾半載尚爾其夫命戴人視之戴人曰此難以藥治乃使二娼各塗丹粉作伶人狀其婦大笑次日又令作角抵又大笑其旁常以兩個能食之婦誇其食美其婦亦索其食而為一嘗不數日怒減食增不藥而瘥後得一子夫醫貴有才若無才何足應變無窮不寐一百二一富家婦人傷思慮過甚二年不寐無藥可療其夫求戴人治之戴人曰兩手脈俱緩此脾受之也脾主思故也乃與其夫以怒而激之多取其財飲酒數日不處一法而去其人大怒汗出是夜困眠如此者八九日不寤自是而食進脈得其平驚一百三衛德新之妻旅中宿於樓上夜值盜劫人燒舍驚墜床下自後每聞有響則驚倒不知人家人輩躡足而行莫敢冒觸有聲歲余不痊諸醫作心病治之人參珍珠及定志丸皆無效戴人見而斷之曰驚者為陽從外入也恐者為陰從內出也驚者為自不知故也恐者自知也足少陽膽經屬肝木膽者敢也驚怕則膽傷矣乃命二侍女執其兩手按高椅之上當面前下置一小几戴人曰娘子當視此一木猛擊之其婦人大驚戴人曰我以木擊幾何以驚乎伺少定擊之驚也緩又斯須連擊三五次又以杖擊門又暗遣人畫背後之窗徐徐驚定而笑曰是何治法戴人曰內經云驚者平之平者常也平常見之必無驚是夜使人擊其門窗自夕達曙夫驚者神上越也從下擊幾使之下視所以收神也一二日雖聞雷而不驚德新素不喜戴人至是終身厭服如有言戴人不知醫者執戈以逐之兒寐不寤一百四陳州長吏一小兒病寐而不寤一日諸醫作睡驚治之或欲以艾火灸之或以大驚丸及水銀餅子治之其父曰此子平日無疾何驟有驚乎以子之病乃問於戴人戴人診其兩手脈皆平和戴人曰若驚風之脈當洪大而強今則平和非驚風也戴人竊問其乳母爾三日前曾飲醉酒否遽然笑曰夫人以煮酒見餉酒味甚美飲一罌而睡陳酒味甘而戀膈酒氣滿乳兒亦醉也乃銼甘草乾葛花縮砂仁貫衆煎汁使飲之立醒孕婦下血一百五劉先生妻有娠半年因傷損下血乞藥於戴人戴人診之以三和湯一名玉燭散承氣湯四物湯對停加朴硝煎之下數行痛如手拈下血亦止此法可與智識高明者言膏粱之家慎勿舉似非徒駭之抑又謗之嗚呼正道難行正法難用古今皆然收産傷胎一百六一孕婦年二十餘臨産召穩媼三人其二媼極拽婦之臂其一媼頭抵婦之腹更以兩手扳其腰極力為之胎死於腹良久乃下兒亦如血乃穩媼殺之也豈知瓜熟自落何必如此乎其婦因茲經脈斷閉腹如刀剜大渴不止小溲閉絶主病者禁水不與飲口舌枯燥牙齒黧黑臭不可聞食飲不下昏憒欲死戴人先以冰雪水恣意飲之約二升許痛緩渴止次以舟車丸通經散前後五六服下數十行食大進仍以桂苓甘露散六一散柴胡飲子等調之半月獲安又一婦人臨産召村嫗數人侍焉先産一臂出嫗不測輕重拽之臂為之斷子死於腹其母面青身冷汗漐漐不絶時微喘嗚呼病家甘於死忽有人曰張戴人有奇見試問之戴人曰命在須臾針藥無及急取稱鉤續以壯繩以膏塗其鉤令其母分兩足向外偃坐左右各一人腳上立足次以鉤其死胎命一壯力婦倒身拽出死胎下敗血五七升其母昏困不省待少頃以冰水灌之漸咽二口大醒食進次日四物湯調血數日方愈戴人常曰産後無他事因侍嫗非其人轉為害耳懷恐脅痛一百七洛陽孫伯英因誣獄妻子被系逃於故人是夜覺胃脅痛託故人求藥故人曰有名醫張戴人適在焉當與公同往時戴人宿酒未醒強呼之故人曰吾有一親人病欲求診戴人隔窗望見伯英曰此公伏大驚恐故人曰何以知之戴人曰面青脫色膽受怖也後會赦乃出方告戴人背疽一百八一富家女子十餘歲好食紫櫻每食即二三斤歲歲如此至十餘年一日潮熱如勞戴人診其兩手脈皆洪大而有力謂之曰他日必作惡瘡腫毒熱上攻目陽盛陰脫之證其家大怒不肯服解毒之藥不一二年患一背疽如盤痛不可忍其女忽思戴人曾有是言再三悔過請戴人戴人以扉針繞疽暈刺數百針去血一斗如此三次漸漸痛減腫消微出膿而斂將作痂時使服十補內托散乃痊終身忌口然目亦昏終身無子肺癰一百九舞水一富家有二子長者年十三歲幼者十一歲皆好頓食紫櫻一二斤每歲須食半月後一二年幼者發肺癰長者發肺痿相繼而死戴人常嘆曰人之死者命耶天耶古人有詩爽口味多終作疾真格言也天生百果所以養人非欲害人然富貴之家失教縱欲遂至於是咽中刺塞一百十戴人過濦陽強家一小兒約五六歲同隊小兒以蜀黍秸相擊逆芒倒刺於咽中數日不下粥藥腫大發其家告戴人戴人命取水依道經中咒水法以左手屈中指及無名指作三山印坐水盞於其上右手掐印文是金槍印腳踏丁字立望太陽或燈火取氣一口吹在淨水盞中咒曰吾取老君東流順老君奉敕攝去毒水吾託大帝尊所到稱吾者各各現帝身急急如律令攝念七遍吹在盞中虛攪卓三次為定其兒咽水下咽曰我可也三五日腫散乃知法亦有不可侮者誤吞物咽中一百十一一小兒誤吞一錢在咽中不下諸醫皆不能取亦不能下乃命戴人戴人熟思之忽得一策以淨白表紙令卷實如箸以刀縱橫亂割其端作鬅鬠之狀又別取一箸縛針鉤於其端令不可脫先下咽中輕提輕抑一探之覺鉤入於錢竅然後以紙卷納之咽中與鉤尖相抵覺鉤尖入紙卷之端不礙肌肉提之而出腸澼下血一百十二棠溪欒彥剛病下血醫者以藥下之默默而死其子企見戴人而問之曰吾父之死竟無人知是何證戴人曰病銼其心也心主行血故被銼則血不禁若血溫身熱者死火數七死必七日治不當下若下之不滿數企曰四日死何謂病銼心戴人曰智不足而強謀力不足而強與心安得不銼也欒初與邢爭屋不勝遂得此病企由是大服拜而學醫水腫睪丸一百十三霍秀才之子年十二歲睪丸一旁腫膇戴人見之曰此因驚恐得之驚之為病上行則為嘔血下則腎傷而為水腫以琥珀通經散一瀉而消散伏驚一百十四上渠卜家一男子年二十八歲病身弱四肢無力面色蒼黃左脅下身側上下如臂狀每發則痛無時食不減大便如常小便微黃已二三載矣諸醫計窮求戴人治之視其部分乃足厥陰肝經兼足少陽膽經也張曰甲膽乙肝故青其黃者脾也診膽脈小此因驚也驚則膽受邪腹中當有驚涎緑水病人曰昔曾屯軍被火自是而疾戴人夜以舟車百五十丸浚川散四五錢加生薑自然汁平旦果下緑水四五行或問大加生薑何也答曰辛能伐木也下後覺微痛令再下之比前藥減三之一又下緑水三四行痛止思食反有力戴人謂卜曰汝妻亦當病卜曰太醫未見吾妻何以知之曰爾感此驚幾年矣卜省曰當被火時我正在草堂中熟寐人驚喚我睡中驚不能言火已塞門我父拽出我火中今五年矣張曰汝膽伏火驚甲乙乘脾土是少陽相火乘脾脾中有熱故能食而殺穀熱雖能化谷其精氣不完汝必無子蓋敗經反損婦人汝妻必手足熱四肢無力經血不時卜曰吾妻實如此亦已五年矣他日門人因觀內經言先瀉所不勝次瀉所勝之論其法何如以問張張曰且如膽木乘胃土此土不勝木也不勝之氣尋救於子己土能生庚金庚為大腸味辛者為金故大加生薑使伐木然先不開脾土無由行也遂用舟車丸先通其閉塞之路是先瀉其所不勝後用薑汁調浚川散大下之次瀉其所勝也大抵陽干克陽干腑克腑臟克臟外傷形孕作病治一百十五一婦人年四十餘得孕自以為年衰多病故疾復作以告醫氏醫者不察加燔針於臍兩旁又以毒藥攻磨轉轉腹痛食減形羸已在床枕來問戴人戴人診其脈曰六脈皆平惟右尺脈洪大有力此孕脈也兼擇食為孕無疑左右皆笑之不數月生一女子兩目下各有燔針痕幾喪其明凡治病婦當先問娠不可倉卒矣杖瘡一百十六戴人出遊道經故息城見一男子被杖瘡痛焮發毒氣入里驚涎堵塞牙禁不開粥藥不下前後月餘百治無功甘分於死戴人先以三聖散吐青蒼驚涎約半大缶次以利膈丸百餘粒下臭惡燥糞又一大缶復煎通聖散數錢熱服之更以酸辣蔥醋湯發其汗斯須汗吐交出其人活矣此法可以救冤落馬發狂一百十七一男子落馬發狂起則目瞪狂言不識親疏棄衣而走罵言湧出氣力加倍三五人不能執縛燒符作醮問鬼跳巫殊不知顧丹砂牛黃犀珠腦麝資財散去室中蕭然不遠二百里而求戴人一往戴人以車輪埋之地中約高二丈許上安之中等車輪其輞上鑿一穴如作盆之狀縛狂病人於其上使之伏臥以軟裀襯之令一大人於下坐機一枚以捧攪之轉千百遭病人吐出青黃涎沫一二斗許繞車輪數匝其病人曰我不能任可解我下從其言而解之索涼水與之冰水飲數升狂方罷矣太陽脛腫一百十八麻先生兄村行為犬所齧舁至家脛腫如罐堅若鐵石毒氣入里嘔不下食頭痛而重往問戴人女僮曰痛隨利減以檳榔丸下之見兩行不瘥適戴人自舞陽回謂麻曰脛腫如此足之二陰三陽可行乎麻曰俱不可行如是何不大下之乃命夜臨臥服舟車丸百五十粒通經散三四錢比至夜半去十四行腫立消作胡桃紋反細於不傷之脛戴人曰慎勿貼膏紙當令毒氣出流膿血水常行又一日戴人恐毒氣未盡又服舟車丸百餘粒浚川散三四錢見六行病人曰十四行易當六行反難何也戴人曰病盛則勝藥病衰則不勝其藥也六日其膿水盡戴人曰膿水行時不畏風盡後畏風也乃以愈風餅子日三服之又二日方與生肌散一敷之而成痂嗚呼用藥有多寡使差別相懸向使不見戴人則利減之言非也以此知知醫已難用醫尤難足閃肭痛一百十九谷陽鎮酒監張仲溫謁一廟觀匠者砌露臺高四尺許因登之下臺或肭一足外踝腫起熱痛如火一醫欲以扉針刺腫出血戴人急止之曰肭已痛矣更加針二痛俱作何以忍也乃與神祐丸八九十丸下二十餘行禁食熱物夜半腫處發癢痛止行步如常戴人曰吾之此法十治十愈不誑後人膝肭跛行一百二十葛冢馮家一小兒七八歲膝被肭跛行行則痛數日矣聞戴人不醫令人問之戴人曰小病耳教來是夜以舟車丸通經散溫酒調而下之夜半湧泄齊行上吐一碗下泄半缶既上床其小兒謂母曰膝臏癢不可往來日使服烏金丸壯其筋骨一月疾愈而走矣杖瘡入水一百二十一小渠袁三因強盜入家傷其兩胻外臁作瘡數年不已膿血常涓涓然但飲冷則瘡間冷水浸淫而出延為濕瘡來求治於戴人曰爾中焦當有緑水二三升涎數掬袁曰何也戴人曰當被盜時感驚氣入腹驚則膽傷足少陽經也兼兩外臁皆少陽之部此膽之甲木受邪甲木色青當有緑水少陽在中焦如漚既伏驚涎在中焦飲冷水咽為驚涎所阻水隨經而旁入瘡中故飲水則瘡中水出乃上湧寒痰汗如流水次下緑水果二三升一夕而痂干真可怪也
