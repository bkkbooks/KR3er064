body:
  text: 卷六風形因驚風搐一新寨馬叟年五十九因秋欠稅官杖六十得驚氣成風搐已三年矣病大發則手足顫掉不能持物食則令人代哺口目張睒唇舌嚼爛抖擻之狀如線引傀儡每發市人皆聚觀夜臥發熱衣被盡去遍身燥癢中熱而反外寒久欲自盡手不能繩傾産求醫至破其家而病益堅叟之子邑中舊小吏也以父母病訊戴人戴人曰此病甚易治若隆暑時不過一湧再湧奪則愈矣今已秋寒可三之如未更刺腧穴必愈先以通聖散汗之繼服湧劑則痰一二升至晚又下五七行其疾小愈待五日再一湧出痰三四升如雞黃成塊狀如湯熱叟以手顫不能自探妻與代探咽嗌腫傷昏憒如醉約一二時許稍稍省又下數行立覺足輕顫減熱亦不作是亦能步手能巾櫛自持匙箸未至三湧病去如濯病後但覺極寒戴人曰當以食補之久則自退蓋大疾之去衛氣未復故宜以散風導氣之藥切不可以熱劑溫之恐反成它病也風搐反張二呂君玉之妻年三十餘病風搐目眩角弓反張數日不食諸醫皆作驚風暗風風癇治之以天南星雄黃天麻烏附用之殊無少效戴人曰諸風掉眩皆屬肝木曲直動搖風之用也陽主動陰主靜由火盛制金金衰不能平木肝木茂而自病先湧風痰二三升次以寒劑下十餘行又以扉針刺百會穴出血二杯愈飧泄三趙明之米穀不消腹作雷鳴自五月至六月不愈諸醫以為脾受大寒故並與聖散子豆蔻丸雖止一二日藥力盡而復作諸醫不知藥之非反責明之不忌口戴人至而笑曰春傷於風夏必飧泄飧泄者米穀不化而直過下出也又曰米穀不化熱氣在下久風入中中者脾胃也風屬甲乙脾胃屬戊己甲乙能克戊己腸中有風故鳴經曰歲木太過風氣流行脾土受邪民病飧泄診其兩手脈皆浮數為風在表也可汗之直斷曰風隨汗出以火二盆暗置床之下不令病人見火恐增其熱紿之入室使服湧劑以麻黃投之乃閉其戶從外鎖之汗出如洗待一時許開戶減火一半須臾汗止泄亦止因風鼻塞四常仲明常於炎暑時風快處披露肌膚以求爽為風所賊三日鼻窒雖坐於暖處少通終不大解戴人使服通聖散入生薑蔥根豆豉同煎三兩服大發汗鼻立通矣風痰五常仲明之子自四歲得風痰疾至十五歲轉甚每月發一兩次發必頭痛痛則擊數百拳出黃緑涎一兩盞方已比年發益頻目見黑花發作昏不知人三四日方省諸醫皆用南星半夏化痰之藥終無一效偶遇戴人於濦水之南鄉戴人以雙解散發汗次以苦劑吐痰病去八九續以分劑平調自春至秋如此數次方獲全瘥癩六朱葛解家病癩疾求治於戴人戴人辭之待五六月間可治之時也今春初尚寒未可服藥我已具行裝到宛邱待五六月製藥朱葛解家以為託辭後戴人果以六月間到朱葛乃具大蒜浮萍等藥使人召解家曰藥已成矣可來就治解為他藥所惑竟不至戴人曰向日我非托也以春寒未可發汗暑月易發汗內經論治癩疾自目眉毛再生針同發汗也但無藥者用針一汗可抵千針故高俱奉採萍歌曰不居山兮不在岸採我之時七月半選甚癱風與瘓風些小微風都不算豆淋酒內下三丸鐵幞頭上也出汗噫文士相輕醫氏相疾文士不過自損醫氏至於害人其解家之謂與陽夏張主簿病癩十餘年眉須皆落皮膚皴澀如樹皮戴人斷之曰是有汗者可治之當大發汗其汗出當臭其涎當腥乃置燠室中遍塞風隙以三聖散吐之汗出周身如臥水中其汗果黏臭不可聞痰皆腥如魚涎兩足心微有汗次以舟車丸浚川散大下五七行如此數次乃瘳手足風裂七陽夏胡家婦手足風裂其兩目昏漫戴人曰厥陰所至為璺又曰鳴紊啓坼皆風之用風屬木木鬱者達之達為吐也先令湧之繼以調胃承氣湯加當歸瀉之立效胃脘痛八一將軍病心痛不可忍戴人曰此非心痛也乃胃脘當心痛也內經曰歲木太過風氣流行民病胃脘當心而痛乃與神祐丸一百餘粒病不減或間曰此胃脘有寒宜溫補將軍素知戴人明瞭復求藥於戴人戴人復與神祐丸二百餘粒作一服大下六七行立愈矣搐搦九黃如村一叟兩手搐搦狀如拽鋸冬月不能覆被適戴人之舞陽道經黃如不及用藥針其兩手大指後中注穴上戴人曰自肘以上皆無病惟兩手搐搦左氏所謂風淫末疾者此也或刺後溪手太陽穴也屈小指握紋盡處是穴也面腫風十南鄉陳君俞將赴秋試頭項遍腫連一目狀若半壺其脈洪大戴人出視內經面腫者風此風乘陽明經也陽明氣血俱多風腫宜汗乃與通聖散入生薑蔥根豆豉同煎一大盞服之微汗次日以草莖鼻中大出血立消驚風十一戴人常曰小兒風熱驚搐乃常病也當搦時切戒把捉手足握持太急必半身不遂也氣血偏勝必痹其一臂漸成細瘦至老難治當其搐時置一竹簟鋪之涼地使小兒寢其上待其搐風力行遍經絡茂極自止不至傷人風溫十二陽夏賀義夫病傷寒當三日以里醫者下之而成結胸求戴人治之戴人曰本風溫證也不可下又下之太早故發黃結胸此已有瘀血在胸中欲再下之恐已虛惟一湧可愈但出血勿驚以茶調瓜蒂散吐之血數升而衄且噎逆乃以巾卷小針而使枕其刃不數日平復風水十三張小一初病疥爬搔變而成腫喘不能食戴人斷為風水水得風而暴腫故遍身皆腫先令浴之乘腠理開發就燠室中用酸苦之劑加全蠍一枚吐之節次用藥末至三錢許出痰約數升汗隨湧出腫去八九分隔一日臨臥向一更來又下神祐丸七十餘粒三次咽之至夜半動一行又續下水煮桃紅丸六十丸以麝香湯下又利三四行後二三日再以舟車丸通經散及白朮散調之愈又曹典吏妻産後憂恚抱氣渾身腫繞陰器皆腫大小便如常其脈浮而大此風水腫也先以齏水撩其痰以火助之發汗次以舟車丸浚川散瀉數行後四五日方用苦劑湧訖用舟車丸通經散過十餘行又六日舟車浚川復下之末後用水煮桃紅丸四十餘丸不一月如故前後湧者二瀉凡四通約百餘行當時議者以為倒布袋法耳病再來則必死世俗只見塵市貨藥者用銀粉巴豆雖腫者暫去復來必死以為驚俗豈知此法乃內經治郁之玄缺兼此藥皆小毒其毒之藥豈有反害者哉但愈後忌慎房室等事況風水不同從水無復來之理小兒風水十四郾之營兵秋家小兒病風水諸醫用銀粉粉霜之藥小溲反澀飲食不進頭腫如腹四肢皆滿狀若水晶家人以為勉強求治於戴人戴人曰此證不與壯年同壯年病水者或因留飲及房室此小兒才七歲乃風水證也宜出汗乃置燠室以屏帳遍遮之不令見火若內火見外火必昏憒也使大服胃風湯而浴之浴汔以布單重覆之凡三五重其汗如水腫乃減五分隔一二日乃依前法治之汗出腫減七分乃二汗而全減尚未能食以檳榔丸調之兒已喜笑如常日矣腎風十五桑惠民病風面黑色畏風不敢出爬搔不已眉毛脫落作癩醫三年一日戴人到棠溪來求治於戴人戴人曰非癩也乃出素問風論曰腎風之狀多汗惡風脊痛不能正立其色炲面痝然浮腫今公之病腎風也宜先刺其面大出血其血當如墨色三刺血變色矣於是下針自額上下扉針直至顱頂皆出血果如墨色偏腫處皆針之惟不針目鋭眥外兩旁蓋少陽經此少血多氣也隔日又針之血色乃紫二日外又刺其血色變赤初針時癢再刺則額覺痛三刺其痛不可任蓋邪退而然也待二十餘日又輕刺一遍方已每刺必以冰水洗其面血十日黑色退一月面稍赤三月乃紅白但不服除根下熱之藥病再作戴人在東方無能治者勞風十六戴人見一男子目下腫如臥蠶狀戴人曰目之下陰也水亦陰也腎以水為之主其腫至於目下故也此由房室交接之時勞汗遇風風入皮腠得寒則閉風不能出與水俱行故病如是不禁房則死中風十七高評事中風稍緩張令湧之後服鐵彈丸在普濟加減方中或問張曰君常笑人中風服鐵彈丸今自用之何也張曰此收後之藥也今人用之於大勢方來之時正猶蚍蜉撼大樹不識次第故也暑形中暑十八小鄭年十五田中中暑頭痛困臥不起戴人以雙解散汗之又以米醋湯投之未解薄晚又以三花神祐丸大下之遂愈又張叟年七十一暑月田中因飢困傷暑食飲不進時時嘔吐口中常流痰水腹脅作痛醫者概用平胃散理中丸導氣丸不效又加針灸皆云胃冷乃問戴人戴人曰痰屬胃胃熱不收故流痰水以公年高不敢上湧乃使箸探之不藥而吐之痰涎一升次用黃連清心散導飲丸玉露散以調之飲食加進惟大便祕以生薑大棗煎調胃承氣湯一兩奪之遂愈痎瘧十九故息城一男子病瘧求治於戴人診兩手脈皆沉伏而有力內有積也此是肥氣病者曰左脅下有肥氣腸中作痛積亦痛形如覆杯間發止今已三年祈禳避匿無所不至終不能療戴人曰此痎瘧也以三花神祐丸五七十丸以冷水送過五六行次以冷水止之冷主收斂故也濕水既盡一二日煎白虎湯作頓啜之瘧猶不愈候五六日吐之以常山散去冷痰涎水六七次若翻漿次以柴胡湯和之間用妙功丸磨之瘧悉除火形馬刀二十襄陵馬國卿病左乳下二脅間期門穴中發癰堅而不潰痛不可忍醫瘍者皆曰乳癰或曰紅系漏或曰覷心瘡使服內托散百日又服五香連翹湯數月皆無驗國卿傴僂而來求治於戴人遇諸市戴人見之曰此馬刀癰也足少陽膽經之病出靈樞十二經以示之其狀如馬刀故曰馬刀堅而不潰乃邀之於食肆中使食水浸湯餅國卿曰稍覺緩次日先以滄鹽上湧又以涼劑滌去熱勢約數十行腫已散矣又朱葛黃家妾左脅病馬刀癰憎寒發痛已四五日矣戴人適避暑於寺中來乞藥戴人曰此足少陽膽經病也少血多氣堅而不潰不可急攻當以苦劑湧之以五香連翹湯托之既而痛止然癰根未散有一盜醫過見之曰我有妙藥可潰而為膿不如此何時而愈既紝毒藥痛不可忍外寒內熱嘔吐不止大便黑色食飲不下號呼悶亂幾至於死諸姑惶懼夜投戴人戴人曰當尋元醫者余不能治其主母亦來告至於再三戴人曰脅間皮薄肉淺豈可輕用毒藥復令洗出以涼劑下之痛立止腫亦消也項瘡二十一戴人在西華寄於夏官人宅忽項上病一瘡狀如白頭瘡腫根紅硬以其微小不慮也忽遇一故人見邀以羊羔酒飲雞魚醢蒜皆在焉戴人以其故舊不能辭又忘其禁忌是夜瘡疼痛不可忍項腫及頭口發狂言因見鬼神夏君甚懼欲報其家戴人笑曰請無慮來日當平乃以酒調通經散六七錢下舟車丸百餘粒次以熱面羹投之上湧下泄一時齊作合去半盆明日日中瘡腫已平一二日腫消而愈夏君見大奇之代指痛二十二麻先生妻病代指痛不可忍酒調通經散一錢半夜大吐吐畢而痛減余因嘆曰向見陳五曾病此醫以為小蟲傷或以草上有毒物手因觸之遷延數月膿盡方已以今日觀之可以大笑瘰癧二十三一婦人病瘰癧延及胸臆皆成大瘡相連無好皮肉求戴人療之戴人曰火淫所勝治以鹹寒命以滄鹽吐之一吐而著痂次用涼膈散解毒湯等劑皮肉乃復如初咽喉腫塞二十四一婦人病咽喉腫塞漿粥不下數日腫不退藥既難下針亦無功戴人以當歸荊芥甘草煎使熱漱之以冷水拔其兩手不及五六日痛減腫消飲食如故咽喉之病甚急不可妄用針藥舌腫二十五南鄰朱老翁年六十餘歲身熱數日不已舌根腫起和舌尖亦腫腫至滿口比元舌大二倍一外科以燔針刺其舌下兩旁廉泉穴病勢轉凶將至顛巇戴人曰血實者宜決之以扉針磨令鋒極尖輕砭之日砭八九次血出約一二盞如此者三次漸而血少痛減腫消夫舌者心之外候也心主血故血出則愈又曰諸痛癢瘡瘍皆屬心火燔針艾火是何義也腰胯痛二十六戴人女僮冬間自途來面赤如火至濦陽病腰胯大痛裡急後重痛則見鬼神戴人曰此少陽經也在身側為相火使服舟車丸通經散瀉至數盆病猶未瘥人皆怪之以為有祟戴人大怒曰驢鬼也復令調胃承氣湯二兩加牽牛頭末一兩同煎服之大過數十行約一二缶方舍其杖策但發渴戴人恣其飲水西瓜梨柿等戴人曰凡治火莫如冰水天地之至陰也約飲水一二桶猶覺微痛戴人乃刺其陽陵穴以伸其滯足少陽膽經之穴也自是方寧女僮自言此病每一歲須瀉五七次今年不曾瀉故如是也常仲明悟其言以身有濕病故一歲亦瀉十餘行病始已此可與智者言難與愚者論也狂二十七一叟年六十值徭役煩擾而暴發狂口鼻覺如蟲行兩手爬搔數年不已戴人診其兩手脈皆洪大如絙繩斷之曰口為飛門胃為賁門曰口者胃之上源也鼻者足陽明經起於鼻交頞之中旁納太陽下循鼻柱交人中環唇下交承漿故其病如是夫徭役煩擾便屬火化火乘陽明經故發狂故經言陽明之病登高而歌棄衣而走罵詈不避親疏又況肝主謀膽主決徭役迫遽則財不能支則肝屢謀而膽屢不能決屈無所伸怒無所泄心火磅礴遂乘陽明經然胃本屬土而肝屬木膽屬相火火隨木氣而入胃故暴發狂乃命置燠室中湧而汗出如此三次內經曰木鬱則達之火鬱則發之良謂此也又以調胃承氣湯半斤用水五升煎半沸分作三服大下二十行血水與瘀血相雜而下數升取之乃康以通聖散調其後矣痰厥二十八一夫病痰厥不知人牙關緊急諸藥不能下候死而已戴人見之問侍病者口中曾有涎否曰有戴人先以防風藜蘆煎湯調瓜蒂末灌之口中不能下乃取長蛤甲磨去刃以紙裹其尖灌於右鼻竅中嘓然下咽有聲後灌其左竅亦然戴人曰可治矣良久涎不出遂以砒石一錢又投之鼻中忽偃然仰面似覺有痛斯須吐噦吐膠涎數升頗腥砒石尋常勿用以其病大非如此莫能動然無瓜蒂亦不可便用宜消息之大凡中風涎塞往往只斷為風專求風藥靈寶至寶誤人多矣劉河間治風舍風不論先論二火故令將此法實於火形中滑泄乾嘔二十九麻先生妻當七月間病臟腑滑泄以祛濕降火之藥治之少愈後腹脹及乳痛狀如吹乳痛重壯熱面如渥丹寒熱往來嗌乾嘔逆胸脅痛不能轉側耳鳴食不可下又復瀉余欲瀉其火臟腑已滑數日矣欲以溫劑止痢又禁上焦已熱實不得其法使人就諸葛寺禮請戴人比及戴人至因檢劉河間方惟益元散正對此證能降火解表止渴利小便定利安神以青黛薄荷末調二升置之枕右使作數次服之夜半遍身冷汗如洗元覺足冷如冰至此足大暖頭頓輕肌涼痛減嘔定痢止及戴人至余告之已解戴人曰益元固宜此是少陽證也能使人寒熱遍劇他經縱有寒熱亦不至甚既熱而有痢不欲再下何不以黃連解毒湯服之乃令診脈戴人曰娘子病來心常欲痛哭為快否婦曰欲如此余亦不知所謂戴人曰少陽相火凌爍肺金金受屈制無所投告肺主悲但欲痛哭而為快也麻先生曰余家諸親無不敬服脈初洪數有力自服益元散後已半又聞戴人之言使以當歸芍藥以解毒湯中數味服之大瘥矣笑不止三十戴人路經古亳逢一婦病喜笑不止已半年矣衆醫治者皆無藥術矣求治於戴人戴人曰此易治也以滄鹽成塊者二兩余用火燒令通赤放冷研細以河水一大碗同煎至三五沸放溫分三次啜之以叉探於咽中吐出熱痰五升次服大劑黃連解毒湯是也不數日而笑定矣內經曰神有餘者笑不休此所謂神者心火是也火得風而成焰故笑之象也五行之中惟火有笑矣隔食中滿三十一遂平李官人妻病咽中如物塞食不下中滿他醫治之不效戴人診其脈曰此痰隔也內經曰三陽結為隔王啓玄又曰格陽雲陽盛之極故食格拒而不入先以通經散越其一半後以舟車丸下之凡三次食已下又以瓜蒂散再越之健啖如昔日矣目盲三十二戴人女僮至西華目忽暴盲不見物戴人曰此相火也太陽陽明氣血俱盛乃刺其鼻中攢竺穴與頂前五穴大出血目立明小兒悲哭不止三十三夫小兒悲哭彌日不休兩手脈弦而緊戴人曰心火甚而乘肺肺不受其屈故哭肺主悲王太僕云心爍則痛甚故爍甚悲亦甚今浴以溫湯漬形以為汗也肺主皮毛汗出則肺熱散矣浴止而啼亦止乃命服涼膈散加當歸桔梗以竹葉生薑朴硝同煎服瀉膈中之邪熱小兒手足搐搦三十四李氏一小兒病手足搐搦以示戴人戴人曰心火勝也勿持捉其手當從搐搦此由乳母保抱太極所致乃令掃淨地以水灑之干令復灑之令極濕俯臥兒於地上良久渾身轉側泥涴皆滿仍以水洗之少頃而瘥矣目赤三十五李民範目常赤至戊子年火運君火司天其年病目者往往暴盲運火炎烈故也民範是年目大發遂遇戴人以瓜蒂散湧之赤立消不數日又大發其病之來也先以左目內眥赤發牽睛狀如鋪麻左之右次鋭眥發亦左之右赤貫瞳子再湧之又退凡五次交亦五次皆湧又刺其手中出血及頭上鼻中皆出血上下中外皆奪方能戰退然不敢觀書及見日張云當候秋涼再攻則愈火方旺而在皮膚雖攻其里無益也秋涼則熱漸入里方可擒也惟宜暗處閉目以養其神水暗與靜屬水明與動屬火所以不宜見日也蓋民範因初愈後曾冒暑出門故痛連發不愈如此湧泄之後不可常攻使服黍黏子以退翳方在別集中矣熱形沙石淋三十六酒監房善良之子年十三病沙石淋已九年矣初因瘡疹餘毒不出作便血或告之令服太白散稍止後又因積熱未退變成淋閉每發則見鬼神號則驚鄰適戴人客鄧牆寺以此病請戴人曰諸醫作腎與小腸病者非也靈樞言足厥陰肝之經病遺溺閉癃閉為小溲不行癃為淋瀝也此乙木之病非小腸與腎也木為所抑火來乘之故熱在脬中下焦為之約結成沙石如湯瓶煎煉日久熬成湯鹼今夫羊豕之脬吹氣令滿常不能透豈真有沙石而能漏者邪以此知前人所説服五石丸散而致者恐未盡然內經曰木鬱則達之先以瓜蒂散越之次以八正散加湯鹼等分頓啜之其沙石自化而下又屈村張氏小兒年十四歲病約一年半矣得之麥秋發則小腸大痛至握其脧跳躍旋轉號呼不已小溲數日不能下下則成沙石大便祕澀肛門脫出一二寸諸醫莫能治聞戴人在朱葛寺避暑乃負其子而哀請戴人戴人曰今日治今日效時日在辰巳間矣以調胃承氣僅一兩加牽牛頭末三錢汲河水煎之令作三五度咽之又服苦末丸如芥子許六十粒日加晡上湧下泄一時齊出有膿有血湧瀉既覺定令飲新汲水一大盞小溲已利一二次矣是夜凡飲新水二三十遍病去九分只哭一次明日困臥如醉自晨至暮猛然起走索食與母歌笑自得頓釋所苦繼與太白散八正散等調一日太瘥恐暑天失所養留五日而歸戴人曰此下焦約也不吐不下則下焦何以開不令飲水則小溲何以利大抵源清則流清者是也又柏亭劉十三之子年六歲病沙石淋戴人以苦劑三湧之以益腎散三下之立愈膏淋三十七鹿邑一閥閲家有子二十三歲病膏淋三年矣鄉中醫不能治往京師遍訪多作虛損補以溫燥灼以針艾無少減聞戴人僑居濦東見戴人曰惑蠱之疾也亦曰白淫實由少腹冤熱非虛也可以湧以泄其人以時暑憚其法峻不決者三日浮屠一僧曰豫以有暑病近覺頭痛戴人曰亦可湧願與君同之毋畏也於是湧痰三升色如黑礬汁內有死血並黃緑水又瀉積穢數行尋覺病去方其來時面無人色及治畢次日面如醉戴人慮其暑月路遠又處數方使歸以自備云二陽病三十八常仲明病寒熱往來時咳一二聲面黃無力懶思飲食夜多寢汗日漸瘦削諸醫作虛損治之用二十四味燒肝散鹿茸牛膝補養二年口中痰出下部轉虛戴人斷之曰上實也先以湧劑吐痰二三升次以柴胡飲子降火益水不月餘復舊此證名何乃內經中曰二陽病也二陽之病發心脾不得隱曲心受之則血不流故女子不月脾受之則味不化故男子少精此二證名異而實合仲明之病味不化也小兒面上赤腫三十九黃氏小兒面赤腫兩目不開戴人以扉針刺輕砭之除兩目尖外亂刺數十針出血三次乃愈此法人多不肯從必欲治病不可謹護頭熱痛四十丹霞僧病頭痛常居暗室不敢見明其頭熱痛以布環其頭上置冰於其中日易數次熱不能已諸醫莫識其證求見戴人戴人曰此三陽蓄熱故也乃置炭火於暖室中出汗湧吐三法並行七日方愈僧顧從者曰此神仙手也勞嗽四十一駝口鎮一男子年二十餘歲病勞嗽數年其聲欲出不出戴人問曰曾服藥否其人曰家貧未嘗服藥戴人曰年壯不妄服藥者易治先以苦劑湧之次以舟車浚川大下之更服重劑果瘥一田夫病勞嗽一湧一泄已減大半次服人參補肺湯臨臥更服檳榔丸以進食又東門高三郎病嗽一年半耳鳴三月矣嗽膿血面多黑點身表俱熱喉中不能發聲戴人曰嗽之源心火之勝也秋傷於濕冬生咳嗽冬水既旺水濕相接隔絶於心火火不下降反而炎上肺金被爍發而為嗽金爍既久聲反不發醫者補肺腎皆非也戴人令先備西瓜冰雪等物其次用湧泄之法又服去濕之藥病日已矣勞嗽咯血四十二濦陽劉氏一男子年二十餘歲病勞嗽咯血吐唾黏臭不可聞秋冬少緩春夏則甚寒熱往來日晡發作狀如痎瘧寢汗如水纍服麻黃根敗蒲扇止汗汗自若也又服寧神散寧肺散止嗽嗽自若也戴人先以獨聖散湧其痰狀如雞黃汗隨湧出昏憒三日不省時時飲以涼水精神稍開飲食加進又與人參半夏丸桂苓甘露散服之不經數日乃愈吐血四十三嶽八郎常日嗜酒偶大飲醉吐血近一年身黃如橘昏憒發作數日不省漿粥不下強直如厥兩手脈皆沉細戴人視之曰脈沉細者病在裡也中有積聚用舟車丸百餘粒浚川散五六錢大下十餘行狀若葵菜汁中燥糞氣穢異常忽開兩目伸挽問左右曰我緣何至此左右曰你吐血後數日不省得戴人治之乃醒自是五六日必以瀉凡四五次其血方止但時咳一二聲潮熱未退以涼膈散加桔梗當歸各稱二兩水一大盂加老竹葉入蜜少許同煎去滓時時呷之間與人參白虎湯不一月復故嘔血四十四棠溪李民範初病嗽血戴人以調胃湯一兩加當歸使服之不動再以舟車丸五六十粒過三四行又嘔血一碗若庸工則必疑不再宿又與舟車丸百餘粒通經散三四錢大下之過十餘行已愈過半仍以黃連解毒湯加當歸煎服之次以草莖鼻中出血半升臨晚又用益腎散利數行乃愈因藥燥熱四十五高爍巡檢之子八歲病熱醫者皆為傷冷治之以熱藥攻矣欲飲水水禁而不與內水涸竭煩躁轉生前後皆閉口鼻俱干寒熱往來嗽咳時作遍身無汗又欲灸之適遇戴人戴人責其母曰重裀厚被暖炕紅爐兒已不勝其熱矣尚可灸乎其母謝以不明戴人令先服人參柴胡飲子連進數服下爛魚腸之類臭氣異常渴欲飲水聽其所欲冰雪涼水連進數杯節次又下三四十行大熱方去又與牛黃通膈丸復下十餘行兒方大痊前後約五十餘行略無所困冰雪水飲至一斛向灸之當何如哉肺癰四十六武陽仇天祥之子病發寒熱諸醫作骨蒸勞治之半年病愈甚以禮來聘戴人戴人往視之診其兩手脈尺寸皆潮於關關脈獨大戴人曰癰象也問其乳媼曾有痛處否乳媼曰無戴人令兒去衣舉其兩手觀其兩脅下右脅稍高戴人以手側按之兒移身乃避之按其左脅則不避戴人曰此肺部有癰也非肺癰也若肺癰已吐膿矣此不可動止可以藥托其里以待自破家人皆疑之不以為然服藥三日右脅有三點赤色戴人連辭云此兒之病若早治者談笑可已今已失之遲然破之後方驗其生死矣若膿破黃赤白者生也膿青黑者死也遂辭而去私告天祥之友李簡之曰數月之後即此兒必有一證也其證乃死矣肺死於巳至期而頭眩不舉不數日而死也其父曰群醫治之斷為骨蒸證戴人獨言其肺有癰也心終疑之及其死家人輩以火焚其棺既燃天祥以杖破其脅下果出青黑膿一碗天祥仰天哭曰諸醫誤殺吾兒矣痿四十七宛丘營軍校三人皆病痿積年不瘥腰以下腫痛不舉遍身瘡赤兩目昏暗唇乾舌燥求療於戴人戴人欲投瀉劑二人不從為他醫溫補之藥所惑皆死其同病有宋子玉者俄省曰彼已熱死我其改之敬邀戴人戴人曰公之疾服熱藥久矣先去其藥邪然後及病邪可下三百行子玉曰敬從教先以舟車丸浚川散大下一盆許明日減三分兩足舊不仁是日覺痛癢纍至三百行始安戴人曰諸痿獨取陽明陽明者胃與大腸也此言不止謂針也針與藥同也口瘡四十八一男子病口瘡數年上至口中至咽嗌下至胃脘皆痛不敢食熱物一湧一泄一汗十去其九次服黃連解毒湯不十餘日皆釋虛勞四十九西華束茂之病虛勞寢汗面有青黃色自膝以下冷痛無汗腹中燥熱醫以薑附補之五晦朔不令飲水又禁梳頭作寒治之請於戴人戴人曰子之病不難愈難於將護恐愈後陰道轉茂子必不慎束生曰不敢戴人先以舟車丸浚川散下五七行心火下降覺渴與冰水飲之又令澡浴數日間面紅而澤後以河水煮粥溫養脾胃河水能利小溲又以活血當歸丸人參柴胡散五苓散木香白朮散調之病大瘥寢汗皆止兩足日暖食進戴人常曰此本肺痹當以涼劑蓋水之一物在目為涼在皮為汗在下為小溲谷多水少為常無水可乎若禁飲水必內竭內竭則燥熱生焉人若不渴與水亦不肯飲之矣束生既愈果忘其戒病復作戴人已去乃殂心痛五十酒官楊仲臣病心氣痛此人常好飲酒初飲三二杯必奔走跛懶兩足三五十次其酒稍散方能復席飲至前量一醉必五七次至明嘔青黃水數日後變魚腥臭六七日始安戴人曰宜湧乃吐蟲一條赤黃色長六七寸口目鼻皆全兩目膜瞞狀如蛇類以鹽淹干示人傷寒極熱五十一戴人之僕常與鄰人同病傷寒俱至六七日下之不通鄰人已死僕發熱極投於井中撈出以汲水貯之檻使坐其中適戴人遊他方家人偶記戴人治法曰傷寒三下不通不可再攻便當湧之試服瓜蒂散良久吐膠涎三碗許與宿食相雜在地狀如一帚頓快乃知世醫殺人多矣戴人之女僮亦嘗吐一吏傷寒吐訖使服太白散甘露散以調之失笑五十二戴人之次子自出妻之後日瘦語如甕中此病在中也常拈第三指失笑此心火也約半載日飲冰雪更服涼劑戴人曰惡雪則愈矣其母懼其大寒戴人罵曰汝親也吾用藥如鼓之應桴尚惡涼藥宜乎世俗之謗我也至七月厭冰不飲病日解矣赤目五十三安喜趙君玉目暴赤腫點洗不退偶思戴人語曰凡病在上者皆宜吐乃以茶調散湧之一湧赤腫消散君玉嘆曰法之妙其迅如此乃知法不遠人自遠法也目睘五十四青州王之一子年十餘歲目赤多淚衆工無效戴人見之曰此兒病目睘當得之母腹中被驚其父曰妊娠時在臨清被圍戴人令服瓜蒂散加鬱金上湧而下泄各去涎沫數升人皆笑之其母亦曰兒腹中無病何吐瀉如此至明日其目耀然爽明李仲安見而驚曰奇哉此法戴人其日又與頭上出血及眉上鼻中皆出血吐時次用通經散二錢舟車丸七十粒自吐卻少半又以通經散一錢投之明日又以舟車丸三十粒投之下十八行病更不作矣疱後嘔吐五十五河門劉光濟之子才二歲病疱後嘔吐發昏用丁香豆蔻之類不效適麻先生寄其家乃謂光濟曰余有小方無毒人皆知之公肯從乎光濟曰先生之言必中於理何敢不從麻先生曰劉河間常言涼膈散可治瘡疱張戴人用之如神況內經言少陽所至為嘔湧少陽者相火也非寒也光濟欣而從之此日利二行適王德秀自外入聞其利之也乃曰瘡疱首尾不可下麻自悔其多言業也已然姑待之比至食時下黃涎一合日午問之兒已索遊於街矣熱厥頭痛五十六彭吳張叟年六十餘歲病熱厥頭痛以其用湧藥時已一月間矣加之以火其人先利臟腑年高身困出門見日而僕不知人家人驚惶欲揉撲之戴人曰大不可擾續與西瓜涼水蜜雪少頃而蘇蓋病人年老湧泄目脈易亂身體內有炎火外有太陽是以自跌若是擾之便不救矣惟安定神思以涼水投之待之以靜靜便屬水自然無事若他醫必惑足以知戴人之諳練産前喘五十七武安胡産祥之妻臨難月病喘以涼膈散二兩四物湯二兩朴硝一兩分作二服煎令冷服之一服病減大半次又服之病痊效矣産之後第六日血迷又用涼膈散二兩四物湯三兩朴硝一兩都作一服大下紫黑水其人至今肥健戴人常曰孕婦有病當十月九月內朴硝無礙八月者當忌之七月卻無妨謂陽月也十月者已成形矣血崩五十八孟官人母年五十餘歲血崩一載僉用澤蘭丸黑神散保安丸白薇散補之不效戴人見之曰天癸已盡本不當下血蓋血得熱而流散非寒也夫女子血崩多因大悲哭悲甚則肺葉布心系為之恐血不禁而下崩內經曰陰虛陽搏為之崩陰脈不足陽脈有餘數則內崩血乃下流舉世以虛損治之莫有知其非者可服大劑大劑者黃連解毒湯是也次以揀香附子二兩炒白芍二兩焙當歸一兩焙三味同為細末水調下又服檳榔丸不拘日而安婦人二陽病五十九一婦月事不行寒熱往來口乾頰赤喜飲旦暮聞咳一二聲諸醫皆云經血不行宜虻蟲水蛭乾漆硇砂芫青紅娘子沒藥血竭之類惟戴人不然曰古方中雖有此法奈病人服之必臍腹發痛飲食不進乃命止藥飲食稍進內經曰二陽之病發心脾心受之則血不流故女子不月既心受積熱宜抑火升水流濕潤燥開胃進食乃湧出痰一二升下泄水五六行濕水上下皆去血氣自行沸流月事不為水濕所隔自依期而至矣亦不用虻蟲水蛭之類有毒之藥如用之則月經縱來小溲反閉他證生矣凡精血不足當補之以食大忌有毒之藥偏勝而成夭閼月閉寒熱六十一婦年三十四歲經水不行寒熱往來面色痿黃唇焦頰赤時咳三兩聲嚮者所服之藥黑神散烏金丸四物湯燒肝散鱉甲散建中湯寧肺散針艾百千病轉劇家人意倦不欲求治戴人憫之先湧痰五六升午前湧畢午後食進餘證悉除後三日復輕湧之又去痰一二升食益進不數日又下通經散瀉訖一二升後數日去死皮數重小者如膚片大者如葦膜不一月經水行神氣大康矣惡寒實熱六十一一婦身冷脈微食沸熱粥飯六月重衣以狐帽蒙其首猶覺寒泄注不止常服薑附硫黃燥熱之劑僅得平和稍用寒涼其病轉增三年不愈戴人診其兩手脈皆如絙繩有力一息六七至脈訣曰六數七極熱生多以涼布搭心次以新汲水淋其病處婦乃叫殺人不由病者令人持之復以冷水淋其三四十桶大戰汗出昏困一二日而向之所惡皆除此法華元化已曾用世無知者遇寒手熱六十二常仲明之妻每遇冬寒兩手熱痛戴人曰四肢者諸陽之本也當夏時散越而不痛及乎秋冬收斂則痛以三花神祐丸大下之熱遂去嘔逆不食六十三柏亭王論夫本因喪子憂抑不思飲食醫者不察以為胃冷血燥之劑盡用之病變嘔逆而瘦求治於戴人一視湧泄而愈愈後忘其禁忌病復作大小便俱祕臍腹撮痛嘔吐不食一日大小便不通十有三日復問戴人戴人曰令先食葵羹菠菱菜豬羊血以潤燥開結次與導飲丸二百餘粒大下結糞又令恣意飲冰水數升繼搜風丸桂苓白朮散以調之食後服導飲丸三十餘粒不數日前後皆通藥止嘔定食進此人臨別又留潤腸丸以防復結又留滌腸散大閉則用之凡服大黃牽牛四十餘日方瘳論夫自嘆曰向使又服向日熱藥已非今日人矣一僧問戴人云腸者暢也不暢何以此一句盡多痤癤六十四一省掾背項常有痤癤愈而復生戴人曰太陽血有餘也先令湧泄之次於委中以扉針出紫血病更不復作也牙痛六十五澤洲李繼之忽病牙痛皺眉不語欒景先見之曰何不藥也曰無牙痛藥曰曾記張戴人云陽明經熱有餘也宜大下之乃付舟車丸七十粒服畢遇數知交留飲強飲熱酒數杯藥為熱酒所發盡吐之吐畢而痛止李大笑曰戴人神仙也不三五日又痛再服前藥百餘粒大下數行乃愈淋六十六戴人過息城一男子病淋戴人令頓食鹹魚少頃大渴戴人令恣意飲水然後以藥治淋立通淋者無水故澀也口臭六十七趙平尚家一男子年二十餘歲病口中氣出臭如發廁雖親戚莫肯與對語戴人曰肺金本主腥金為火所煉火主焦臭故如是也久則成腐腐者腎也此極熱則反兼水化也病在上宜湧之先以茶調散湧而去其七分夜用舟車丸浚川散下五七行比旦而臭斷嗚呼人有病口臭而終其老者世訛以為肺系偏而與胃相通故臭妄論也濕形疝六十八汝南司侯李審言因勞役王事飲水坐濕地乃濕氣下行流入脬囊大腫痛不可忍以金鈴川楝子等藥不效求治於戴人曰可服泄水丸審言惑之又數日痛不可堪竟從戴人先以舟車丸浚川散下青緑沫十餘行痛止次服茴香丸五苓以調之三日而腫退至老更不作夫疝者乃肝經也下青沫者肝之色也水疝六十九律科王敏之病水疝其法在於寒形中留飲七十郭敬之病留飲四日浮腫不能食腳腫連腎囊痛先以苦劑湧之後以舟車丸浚川散瀉之病去如拾遺又棠溪張鳳村一田叟姓楊其病嘔酸水十餘年本留飲諸醫皆以燥劑燥之中脘臍胻以火艾燔針刺之瘡未嘗合戴人以苦劑越之其涎如膠乃出二三升談笑而愈黃疸七十一蔡寨成家一童子年十五歲病疸一年面黃如金遍身浮腫乏力惟食鹽與焦物戴人以茶調散吐之湧涎一盂臨晚又以舟車丸七八十粒通經散三錢下四五行待六七日又以舟車丸浚川散下四五行鹽與焦物見而惡之面色變紅後再以茶調散湧之出痰二升方能愈矣又一男子作贅偶病疸善食而瘦四肢不舉面黃無力其婦翁欲棄之其女子不肯曰我已生二子矣更適他乎婦翁本農者召壻意欲作勞見其病甚每日辱詬人教之餌膽礬丸三稜丸了不關涉針灸祈禳百無一濟戴人見之不診而療使服湧劑去積痰宿水一斗又以泄水丸通經散下四五十行不止戴人命以冰水一盂飲之立止次服平胃散等間服檳榔丸五七日黃退力生蓋脾疸之證濕熱與宿谷相搏故也俗謂之金勞黃又朱葛周黃劉三家各有僕病黃疸戴人曰僕役之職飲食寒熱風暑濕寒尋常觸冒也恐難調攝虛費治功其二家留僕於戴人所從其飲餌其一僕不離主人執役三人同服苦散以湧之又服三花神祐丸下之五日之間果二僕愈而一僕不愈如其言黃病七十二菜寨一女病黃遍身浮腫面如金色困乏無力不思飲餌惟喜食生物泥煤之屬先以苦劑蒸餅為丸湧痰一碗又舟車丸通經散下五七行如墨汁更以導飲丸磨食散氣不數日肌肉如初病發黃七十三安喜趙君玉為掾省日病發遍身黃往問醫者醫云君乃陽明證公等與麻知幾皆受訓於張戴人是商議吃大黃者難與論病君玉不悅歸自揣無別病乃取三花神祐丸八十粒服之不動君玉乃悟曰豫之濕熱盛矣此藥尚不動以舟車丸浚川散作劑大下一斗糞多結者一夕黃退君玉由此益信戴人之言水腫七十四南鄉張子明之母極肥偶得水腫四肢不舉戴人令上湧汗而下泄之去水三四斛初下藥時以草貯布囊高支兩足而臥其藥之行自腰以上水覺下行自足以上水覺上行水行之狀如蛇走隧如線牽四肢森然涼寒會於臍下而出不旬日間病大減餘邪未盡戴人更欲用藥竟不能從其言湧水七十五李七老病湧水證面黃而喘兩足皆腫按之陷而復起行則濯濯有聲常欲飲水不能睡臥戴人令上湧去痰而汗之次以舟車丸浚川散下之以益腎散復下之以分陰陽利水道之劑復下之水盡皆瘥停飲腫滿七十六涿郡周敬之自京師歸鹿邑道中渴飲水過多漸成腫滿或用三花神祐丸憚其太峻或用五苓散分利水道又太緩淹延數旬終無一效蓋粗工之技止於此耳後手足與腎皆腫大小便皆祕澀常仲明求治於戴人戴人令仲明付藥比及至已歿矣戴人曰病水之人其勢如長川泛溢欲以杯勺取之難矣必以神禹決水之法斯愈矣濕痹七十七常仲明病濕痹五七年矣戴人令上湧之後可泄五七次其藥則舟車浚川通經神祐益腎自春及秋必十餘次方能愈公之病不必針灸與令嗣皆宜湧但臘月非其時也欲候春時恐豫東適今姑屏病之大勢至春和時人氣在上可再湧之以去其根卒如所論矣又一衲子因陰雨臥濕地一半手足皆不隨若遇陰雨其病轉加諸醫皆作中風偏枯治之用當歸芍藥乳香沒藥自然銅之類久反大便澀風燥生經歲不已戴人以舟車丸下三十餘行去青黃沫水五升次以淡劑滲泄之數日手足皆舉戴人曰夫風濕寒之氣合而成痹水濕得寒而浮蓄於皮腠之間久而不去內舍六腑曰用去水之藥可也水濕者人身中之寒物也寒去則血行血行則氣和氣和則愈矣又息帥病腰股沉痛行步坐馬皆不便或作腳氣寒濕治之或作虛損治之烏附乳沒活血壯筋骨之藥無不用之至六十餘日目赤上熱大小便澀腰股之病如故戴人診其兩手脈皆沉遲沉者為在裡也在裡者泄之以舟車丸浚川散各一服去積水二十餘行至早晨服齏白粥一二頓與之馬已能矍鑠矣又棠溪李十八郎病腰腳大不伸傴僂蹩躠而行已數年矣服藥無效止藥卻愈因秋暮涉水病復作醫氏使服四斤丸其父李仲安乃乞藥於戴人戴人曰近日服何藥仲安曰四斤丸曰目昏赤未其父驚曰目正暴發戴人曰宜速來不來則喪明既來則策杖而行目腫無所見戴人先令湧之藥忽下走去二十行兩目頓明策已棄矣比再湧泄能讀官曆日調至一月令服當歸丸健步而歸家矣又息城邊校白公以隆暑時飲酒覺極熱於涼水池中漬足使其冷也為濕所中股膝沉痛又因醉臥濕地其痛轉加意欲以酒解痛遂以連朝而飲反成赤痛髮間止且六十年往往斷其寒濕腳氣以辛熱治之不效或使服神芎丸數服痛微減他日復飲疾作如前睪囊癢濕且腫硬臍下似有物難於行以此免軍役令人代之來訪戴人戴人曰余亦斷為寒濕但寒則陽火不行故為痛濕則經隧有滯故腫先以苦劑湧之次以舟車丸百餘粒浚川散四五錢微一兩行戴人曰如激劑尚不能攻何況於熱藥補之乎異日又用神祐丸百二十丸通經散三四錢是用僅得四行又來日以神祐八十丸投之續見一二行又次日服益腎散四錢舟車丸百餘粒約下七八行白公已覺膝睪寒者暖硬者軟重者輕也腫者亦退飲食加進又以湧之其病全瘳臨別又贈之以疏風丸並以其方與之此公以其不肯妄服辛熱藥故可治也屈膝有聲七十八嶺北李文卿病兩膝臏屈伸有聲剝剝然或以為骨鳴戴人曰非也骨不戛焉能鳴此筋濕也濕則筋急有獨緩者緩者不鳴急者鳴也若用豫之藥一湧一泄上下去其水水去則自無聲矣李文卿乃從其言既而果然矣白帶七十九息城李左衙之妻病白帶如水窈滿中綿綿不絶穢臭之氣不可近面黃食減已三年矣諸醫皆云積冷起石硫黃薑附之藥重重燥補汙水轉多常以袽日易數次或一藥以木炭十斤置藥在坩堝中鹽泥封固三日三夜炭火不絶燒令通赤名曰火龍丹服至數升汙水彌甚焫艾燒針三年之間不可勝數戴人斷之曰此帶濁水本熱乘太陽經其寒水不可勝如此也夫水自高而趨下宜先絶其上源乃湧痰水二三升次日下沃水十餘行三遍汗出周身至明旦病人云汙已不下矣次用寒涼之劑服及半載産一子內經曰少腹冤熱溲出白液帶之為病溶溶然若坐水中故治帶下同治濕法瀉痢皆宜逐水利小溲勿以赤為熱白為寒今代劉河間書中言之詳矣濕嗽八十趙君玉妻病嗽時已十月矣戴人處方六味陳皮當歸甘草白朮枳殼桔梗君玉疑其不類嗽藥戴人笑曰君怪無烏梅罌粟殼乎夫冬嗽乃秋之濕也濕土逆而為嗽此方皆散氣除濕解急和經三服帖然效矣瀉兒八十一一婦年三十四歲夜夢與鬼神交驚怕異常及見神堂陰府舟楫橋梁如此一十五年竟無娠孕巫祈覡禱無所不至鑽肌灸肉孔穴萬千黃瘦發熱引飲中滿足腫委命於天一日苦請戴人戴人曰陽火盛於上陰火盛於下鬼神者陰之靈神堂者陰之所舟楫橋梁水之用兩手寸脈皆沉而伏知胸中有痰實也凡三湧三泄三汗不旬日而無夢一月而有孕戴人曰余治婦人使有娠此法不誣濕癬八十二一女子年十五兩股間濕癬長三四寸下至膝發癢時爬搔湯火俱不解癢定黃赤水流痛不可忍灸焫熏泄硫黃䕡茹白殭蠶羊蹄根之藥皆不效其人恣性妍巧以此病不能出嫁其父母求療於戴人戴人曰能從余言則瘥父母諾之戴人以扉針磨令尖快當以癢時於癬上各刺百餘針其血出盡煎鹽湯洗之如此四次大病方除此方不書以告後人恐為癬藥所誤濕淫於血不可不砭者矣又蔡寨成家童子一歲病滿腹胸濕癬每爬搔則黃水出已年矣戴人先以苦末作丸上湧湧訖次以舟車丸浚川散下三五行次服涼膈加朴硝煎成時時呷之不數日而愈濕𧈟瘡八十三穎皋韓吉卿自髀至足生濕𧈟瘡大者如錢小者如豆癢則搔破水到則浸淫狀類蟲行褲襪愈而復生瘢痕成凹一年餘不瘥戴人哂之曰此濕𧈟瘡也由水濕而得故多在足下以舟車浚川大下十餘行一去如掃渠素不信戴人之醫至此大服泄瀉八十四古郾一講僧病泄瀉數年丁香豆蔻乾薑附子官桂烏梅等燥藥燔針燒臍焫腕無有闕者一日發昏不省檀那贈紙者盈門戴人診其兩手脈沉而有力脈訣云下利脈微小者生洪浮大者無瘥以瓜蒂散湧之出寒痰數升又以無憂散泄其虛中之積及燥糞僅盈斗次以白朮調中湯五苓散益元散調理數日僧已起矣非術精識明誰敢負荷如此洞泄八十五一講僧顯德明初聞家遭兵革心氣不足又為寇賊所驚得臟腑不調後入京不伏水土又得心氣以至危篤前後三年八仙丸鹿茸丸燒肝散皆服之不效乃求藥於戴人戴人曰此洞泄也以謀慮久不決而成肝主謀慮甚則乘脾久思則脾濕下流乃上湧痰半盆末後有血數點肝藏血故也又以舟車丸浚川散下數行仍使澡浴出汗自爾日勝一日常以胃風湯白朮散調養之一月而強食復故矣又李德卿妻因産後病泄一年餘四肢瘦乏諸醫皆斷為死證當時戴人在朱葛寺以舟載而乞治焉戴人曰兩手脈皆微小乃痢病之生脈況洞泄屬肝經肝木克上而成此疾亦是腸澼澼者腸中有積水也先以舟車丸四五十粒又以無憂散三四錢下四五行寺中人皆駭之病羸如此尚可過耶衆人雖疑然亦未敢誚且更看之復導飲丸又過之渴則調以五苓散向晚使人伺之已起而緝床前後約三四十年以胃風湯調之半月而能行一月而安健由此闔寺服德卿之昆仲咸大異之又劉德源病洞泄逾年食不化肌瘦力乏行步欹傾面色黧黑舉世治痢之藥皆用之無效適戴人治濦陽往問之戴人乃出示內經洞泄之説雖已不疑然畏其攻劑夜焚香禱神曰某以病久不瘥欲求治於戴人戴人以謂宜下之欲不從戴人名醫也欲從之形羸如此恐不任藥母已老矣無人侍養來日不得已須服藥神其相之戴人先以舟車丸無憂散下十餘行殊不困已頗喜食後以檳榔丸磨化其滯待數日病已大減戴人以為去之未盡當以再服前藥德源亦欣然請下之又下五行次後數日更以苦劑越之往問其家彼云已下村中收索去也忽一日入城面色極佳語言壯健但怪其跛足而立問何故如此德源曰足上患一癤戴人曰此里邪去而外現病痊之後凡病皆如是也大便少而頻八十六太康劉倉使病大便少而頻日七八十次常於兩股間懸半枚瓠蘆如此十餘年戴人見之而笑曰病既頻而少欲通而不得通也何不大下之此通因通用也此一服藥之力乃與藥大下三十餘行頓止暑泄八十七殷輔之父年六十餘暑月病泄瀉日五六十行自建碓鎮來請戴人於陳州其父喜飲二家人輩爭止之戴人曰夫暑月年老津液衰少豈可禁水但勸之少飲比及用藥先令速歸以緑豆雞卵十餘枚同煮卵熟取出令豆軟下陳粳米作稀粥攪令寒食雞卵以下之一二頓病減大半蓋粳米雞卵皆能斷痢然後制抑火流濕之藥調順而方愈腹滿面腫八十八蕭令腹滿面足皆腫痰黃而喘急食減三年之間醫者皆盡而不驗戴人以瓜蒂散湧之出寒痰三五升以舟車丸浚川散下之青黃涎沫缶平復以桂苓白朮散五苓散調之半月復舊矣
