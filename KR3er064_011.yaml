body:
  text: 卷十一風論論曰人之生也負陰而抱陽人居一氣道在其中矣外有八邪之相蕩內有喜怒之交侵真氣內弱風邪襲之風之傷人或為寒熱或為疼痛或為偏枯或為拘攣其候不一風者善行而數變此乃風者百病之始萬病之長也蓋內不得通外不得泄此謂之病生於變亂也或失音而昏冒或口目而喎斜可用三聖散吐之或不知人事者或牙關緊急者粥不能下不能咽者煎三聖散鼻內灌之吐出涎沫口自開也次服無憂散通解丸通聖涼膈人參半夏丸桂苓甘露散消風散熱除濕潤燥養液之藥排而用之切忌雞豬魚兔油膩酒醋蕎麵動風之物及引痰之食大凡頭風眩暈手足麻痹胃脘發痛心酸滿悶按之有聲皆因風風寒濕三氣雜至合而為痹也在上謂之停飲可用獨聖散吐之吐訖後服清上辛涼之藥通聖散加半夏之辛仲景云此痰結胸中而致也大凡風癇病發項強直視不省人事此乃肝經有熱也或有咬牙者先用葶藶苦酒湯吐之吐後可服瀉青丸下之次服加減通聖散顯咬牙證用導赤散治之則愈如病發者可用輕粉白礬礞石代赭石發過米飲調之經云重劑以鎮之大凡人病雷頭懶干俗呼之謬名也頭痛昏眩皆因浴發而得之即為首風此因邪風在於胸中熱甚化而為痰風之所致也可以茶調散吐之吐訖次用藏用丸下之後可服烏荊丸若是雷頭者上部多有赤腫結核或面熱無汗經云火鬱發之開導之決之可用䤵針出血則愈靈樞經云奪血者無汗奪汗者無血血汗俱蕩豈不妙哉衰老者可用涼膈解毒消風散熱為治年壯者可以蕩滌積熱大黃牽牛氣血宣通便無壅滯而愈凡人患目腫經年不瘥俗言頭風所注更加頭痛者豈非頭風者歟此乃足厥陰肝之經手少陰心之經兼五臟俱有大熱也可先用通解丸通利大小便後用大黃越桃飲子治肝熱者羌活決明散服之大有神效矣凡目有淚出俗言作冷淚者非也內經曰肝液不禁此大熱熏蒸於肝也熱極生風風衝於外火發於內風熱相摶此大淚出也內外皆治可以愈也治外以貝母一枚白膩者加胡椒七枚不犯銅鐵細研臨臥㸃之治內者祛風散熱之劑可用當歸飲子服之陽熱極甚者目睛發痛不可忍者可用四物湯加漢防己草龍膽送下神芎丸五七十丸利三五行則愈凡人病痰發者其證不一蓋有五焉一曰風痰二曰熱痰三曰濕痰四曰酒痰五曰食痰諸痰在於膈上使頭目不能清利涕唾稠黏或咳唾喘滿或時發潮熱可用獨聖散吐之次服加減飲子或疏風丸間而服之內經曰所謂流濕潤燥之義也凡人但冒風邪溫病前三日在表未入於裡其候頭項強痛身熱惡風寒有汗無汗腰痛不得俯仰可用益元散五錢通聖散五錢相合服之名曰雙解散用水一大碗生薑十餘片連須蔥白五七莖豆豉一撮煎至三五沸去滓先服大半良久以叉子探咽喉中吐出痰涎不可嗽口次又服少半投之如未汗出更用蔥醋酸辣湯再投之衣被蓋覆汗出則愈矣氣交變大論云歲火太過炎暑流行火氣太劇肺金受邪上應熒惑大而明現其病熱鬱可用辛涼之劑萬舉萬全夫擾攘之世藥宜辛涼以解火治世人民安靜如用升麻葛根湯敗毒散辛溫之劑亦無加害亦可加蔥白鹽豉上而越之表而解之內經曰因其輕而揚之揚者發揚也吐汗之後宜大將息旬日之後不可犯之犯之其病復作也凡傷寒疫癘一法若無藥之處可用酸齏汁一大碗煎三五沸去菜葉飲訖候少時用叉子咽喉中探吐如此三次再煎蔥醋湯投之衣被蓋覆汗出而瘥內經曰酸苦湧泄為陰傷寒三日頭痛身熱病在上宜湧之湧後以淡粥養之又一法用鳳凰臺散嗅於鼻內連嚏二三十次嗅藥時坐於暖室中嚏罷以漿水粥投之衣被蓋之汗出而愈嚏法同吐法用之一法導引若無藥處用之令人盤兩足而坐以兩手交十指攀頭後風池風府二穴此風之門也向前仰首數至於地如此連折㸃地一百二十數急以酸醋白湯投之汗出即解凡男子婦人小兒手足麻痹肌肉不仁者風寒濕三氣相雜至合為痹先用黃芩芍藥湯吐之吐訖次用通解丸通經而瀉之瀉訖更用辛甘之劑汗之汗瀉之後可用當歸清涼飲子兼烏荊丸除濕丹和血行經之藥則愈矣凡人病痰證發者比前論更多有三證顯證共成五也一曰風痰二曰熱痰三曰濕痰四曰酒痰五曰食痰諸痰在口上焦毒熏於頭者諸陽之會首也故令病人頭重目澀涕唾稠黏或咳嗽喘滿時發寒熱可用赤小豆湯吐之吐後各隨其證而治之可服消風去熱導濕化痰者可服通聖加半夏導氣之劑豈不妙哉如新暴風痰者形寒飲冷熱痰者火盛制金濕痰者停飲不散可服加減連翹飲子除濕丹無憂散亦有酒痰者解毒三聖丸主之五者食痰可用漢防己丸丹砂選而用之若依法服之決有神效論火熱二門凡傷寒中風溫疫時氣冒暑感四時不正之氣若邪毒之氣人或感之始於巨陽受之二日陽明受之三日少陽受之前三日在於表陽也後三日在於里陰也內經熱論通謂之傷寒熱病者言一身之熱氣也傷寒者外感於寒邪也夫傷寒之寒熱者惡寒為表熱里和故惡寒脈浮大也發熱為裡熱表和故發熱脈滑實也可以吐法而解之用拔雪湯主之生薑蔥白豆豉同煎葶藶苦酒湯上而越之若病人脈沉實者或不大便喘滿詀語不必拘日數急攻於裡可用通解丸胃中渴燥者大承氣湯下之慎不可用銀粉巴豆粉霜杏仁芫花熱性之藥用之必致危殆仲景云調理傷寒者皆在汗下之理當明表裡無不愈矣差之毫釐失之千里深可慎之汗下之後切宜慎口可服淡粥而養之不然其病復作又論傷寒七八日潮熱腹滿發黃有斑者何臟使然內經云手太陰肺經足太陰脾經足陽明胃經手少陰心經此四經受病也仲景云兩寸口脈俱浮滑胸中有痰攻上者可用瓜蒂散吐之吐後隨證調治處藥發黃之證皆因陽明中風太陽中濕瘀血與宿谷相摶令人發黃煎梔子茵陳蒿湯調加減五苓散服之後利小便快者如皂角色汁此為效矣發斑者心經受熱故有此證詳斑輕重用藥之理輕者斑紅可用越桃飲子重者斑紫毒氣胃中盛也大青四物湯元參升麻湯主之潮熱腹滿者謂邪熱在胃中也可以蕩滌邪熱流濕潤燥宜急治之雜病寸口脈沉實者亦在胸中有啓玄子注云上盈不愈者吐而奪之此病乃瘳矣斑黑者危而難治也黃病血病問其小便利與不利也驗又有頭痛數日不止者此乃六陽受病也手之三陽從手走至於頭足之三陽從上走至於下蓋六陽之聚會也久痛不愈者令人喪目以胸膈亦有宿痰故也先以羌活散湧之以川芎石膏散白虎湯選而服之則愈矣又一法治頭痛不愈者可煎連須蔥白豆豉湯多服之後吐為效吐後可服川芎薄荷湯辛涼之劑清上之藥疏風丸散之類仲景云傷寒頭痛脈寸口急而頭痛是也凡男子有病面黃身熱肌瘦寒熱往來如瘧狀更加涎嗽不止或喘滿面目浮腫者或身體俱熱或有自汗內經云病名傷寒夾勞之證也治之奈何病在上者其高者因而越之可用防己散吐之吐後初用通解丸一服次服人參黃耆散當歸飲子加減小柴胡湯擇而用之內經謂男女之證皆同類用其治法也依此調治無不取效矣凡人病心胸痞悶不欲飲食身體壯熱口燥舌乾大小便不利有一工治之說下元虛冷便投暖藥十數服其病不愈又一醫所論與前亦同又投暖藥五七日其證轉加困弱請余治之診脈而說曰審問日數飲食大小便何似小便赤色大便黑色便言傷寒瘀血之證初用大黃芍藥湯二劑次服犀角地黃湯二服後用通經丸一服換過大便黃色以為效驗此藥服十餘服方可病瘥矣凡男子婦人所顯證候皮膚髮熱肌肉消瘦四肢倦怠兼有頭痛頰赤心忪唇乾舌燥日晡潮熱夜有盜汗涕唾稠黏胸膈不利或時喘嗽五心煩熱睡臥不安飲食減少多思水漿經脈不通病名曰何病奇病論曰女子不月血滯之病也男子腎虛精不足也凡治此證降心火益腎水此之謂也可先用通解丸瀉三二行次服當歸飲子又用加減五苓散木香三稜丸人參黃耆散犀角散之類詳其虛實選而用之若咯膿咯血大小便血但亡血者不可宣吐勿服酸辛熱物姜附之類藥不可不戒慎也若犯諸亡血之證者不可發汗不可溫補脾胃之藥若服之雖進飲食不生肌肉此病轉加危篤乃成虛勞之病也凡醫人不明發表攻裡亂投湯劑有誤性命更大忌夏月燔灸中脘臍下關元氣海背俞三里等燔灸千百壯者全無一效使病者反受其殃豈不痛哉虛勞之疾私嗜肉食面辛酸之物不可食之但可食者謹按神農食療而與之菠稜葵菜冰水清涼之物不可禁也且圖寒涼滑利腸胃使氣血並無壅礙燥澀經曰谷入於胃脈道乃行水入於經其血乃成若不忌慎致令病人胃口閉澀則形體漸瘦此乃死之由也諸勞皆仿此但諸人咯膿血衄血大小便血者可服三黃丸黃連解毒丸涼膈散加桔梗當歸大黃芍藥犀角地黃湯大作劑料時時呷之內經曰所謂邪熱傷於肝心之病依此調治萬舉萬全矣凡人年四十以上日久多言以致虛損面色黧黑飲食無味心胸痞悶四肢倦怠肌體餘熱大小便不利治之奈何內經曰不可熱補之夫男子腎虛水不足也凡補虛之劑多用烏附天雄之類豈知腎惡燥也女子陰虛血不足也凡補虛多以陽劑是以知陽勝而陰虧也不可用性熱之藥補之空心可服加減八物丸當歸飲子減桂五苓散煩渴加益元名曰淡滲散更服通解丸顯仁丸亦可服之大有神效凡人有臟毒下血何謂也生氣通天論曰邪熱傷肝因而大飽筋脈橫解腸澼為痔故膿血者血隨熱行參差入於腸胃之間乃成瀉血也若身體壯熱則為難治身涼者可治也可先調中消血蕩除積血瀉之三二行瀉後服芍藥柏皮丸黃連解毒湯五苓散益元散各停新汲水調下五七錢甚者取地黃汁半盞服之則愈矣凡下利膿血腹痛不止者何也諸痛癢皆屬於心火也可用通解丸加減瀉之量其虛實用之次用消濕散加生薑大棗芍藥服之瀉訖又用新水調五苓散服之又一法煎燈心湯調下益元散五七錢此病大忌油膩腥葷熱物濕熱門凡吐嘔而瀉病名曰何也內經熱論云此乃轉筋霍亂之證也何氣使然此乃邪氣在於中焦使陰陽二氣不能升降其證心痛而吐吐則先腹痛而瀉心腹俱痛則吐瀉並作使致揮霍之間自然撩亂此證喜寒涼之物可用冰水調五苓益元則愈矣大忌熱物轉筋之病治之奈何經曰勞者溫之溫者溫存之意也又一法生薑湯益元散白朮散禹功散加冰沉冷細細呷之渴未止者頻頻飲之如無冰新汲水亦得用之大忌白粥米湯桂附種種之燥藥不可服之服之必死如無藥處可服地漿地漿者掘地作坑注新水於其中攪渾旋旋取澄清者飲三五盞立愈凡大人小兒暴注水瀉不止內經曰此病暴速注瀉久而不愈者為湧泄注下此乃火運太過之病也火注暴速故也急宜用新汲水調下甘露飲子五苓散天水散或用井華水煎此藥放冷服之病即瘥矣不可用御米殼乾薑豆蔻聖散子之類縱然瀉止腸胃氣滯不通變為腹脹此法宜分陰陽利水道乃為治法之妙也上古天真論云一陰一陽之謂道故男女有陰陽之質不同則天癸精血之形亦異陰靜而海滿血溢陽動而應合精泄二者通和故能有子易繫辭曰男女媾精萬物化生人稟天地而成形也風門凡中風失音悶亂口眼喎斜內經曰風之為病善行而數變感則害人有倉卒之變故百病皆生於風也可用三聖散鼻內灌之吐出涎口自開也如不省人事牙關緊閉粥藥不能下者用此藥如無此證可三聖散吐之次服通聖涼膈人參半夏丸桂苓甘露散等切忌雞豬魚兔酒醋蕎麵動風之物引痰之食吐痰之法在方論中凡頭風眩運手足麻痹胃脘發痛心腹滿悶按如水聲可用獨聖散吐之吐訖可用清上辛涼之藥仲景曰此寒痰結在胸中而致然也凡癇病至於呆證者用三聖散吐之於暖室中勿令透風可以汗下吐三法俱行次服通聖散百餘日則愈矣凡雷頭懶干俗呼之謬名也此疾胸中有寒痰由多沐之所致也可以茶調散吐訖三二升次用神芎丸下訖三五行然後服愈風餅子則愈矣此雷頭者是頭上有赤腫結核或如酸棗狀可用䤵針出血則愈凡赤目經年不愈是謂頭風所注更加頭痛可用獨聖散吐之次服洗心散八正散之類赤目腫作是足厥陰肝經有熱用利小便瀉肝經除風熱之寒藥則愈矣凡風沖泣下俗呼為冷淚者謬也內經曰太陽不能禁固因風衝於外火焚於內風熱相摶由此泣下內經曰熱則五液皆出熱甚則淚出治之以貝毋一枚白膩者佳胡椒七枚不犯銅鐵研細㸃之臨臥治法曰風宜辛散寒宜甘發氣遇寒則凝血得熱則散凡諸痰在於膈上使頭目不能清利涕唾稠黏或咳嗽喘滿時發潮熱可用獨聖散吐之次服搜風丸之類內經曰所謂流濕潤燥之義也凡冒風時氣溫病傷寒三日以里頭痛身熱惡寒可用通聖散益元散各五七錢水一大碗入生薑十餘片連須蔥白十餘莖豆豉一撮同煎三五沸去滓先服多半良久以叉子探於咽中吐了不得漱口次用少半投之更用酸辛蔥醋湯投之衣被蓋覆汗出則解夫擾攘之世常與內經歲火太過同法歲火太過炎暑流行火氣大劇金肺受邪上應熒惑大而明顯若用辛涼之劑解之萬舉萬全人民安靜則便同水化可以升麻湯葛根湯敗毒散辛溫之劑解之雖有潮熱亦無加害亦可加豆豉蔥白上湧而表汗自出內經曰因其輕而揚之揚者發揚也吐汗者以發寒熱之邪也吐汗之後必大將息旬日之後其邪不復作也凡大人小兒風濕寒三氣合而為痹及手足麻痹不仁內經曰榮虛衛實皮膚不仁痹而不知癢痛可用鬱金散吐之次服導水丸輕寒之藥泄之泄訖次以辛溫之劑發散汗出後常服當歸芍藥烏附行經活血之藥則愈矣凡風蛀牙疼久不愈者用針簽巴豆一枚以燈燎之煙盡存性於牙根盤上熏之則愈凡泄瀉米穀不化日夜無度腹中雷鳴下利完穀可用導水丸禹功散泄之或病人老弱氣虛可用無憂散泄之再觀病勢強弱候一二可服胃風湯以治其風如不愈者更服桂枝麻黃湯汗之則愈內經曰夫風之中為腸風飧泄啓玄子云風入胃中上熏於胃故食不化而下泄又云暮食不化為飧泄又經云春傷於風夏為飧泄故風宜出汗腸中鳴者風以動之動而有聲慎不可用罌粟豆蔻乾薑太燥之藥病漸者燥之去其濕則愈病甚者攻之不動反能為害經曰其減則漸其加則甚可用五苓散去豬苓加人參散服之凡富貴膏粱之家病瘧或間日或頻日發或熱多寒少或寒多熱少宜大柴胡湯下過三五行次服白虎湯或玉露散桂苓甘露散之類如不愈者是積熱太甚以神芎三花神佑丸調胃承氣湯等大作劑料下之下後以長流水煎五苓散服之或服小柴胡湯亦可或先以常山散吐之後服涼膈白虎之類必愈矣大忌發熱之物豬雞魚兔五辛之物犯之則再發也凡田野貧寒之家病瘧為飲食粗糲衣服寒薄勞力動作不與膏粱同法臨發日可用野夫多效方中溫脾散治之如不愈服辰砂丹治之必愈矣如吃罷此藥以長流水煎白虎湯服之不服食熱物為瘧疾是傷暑伏熱故也內經曰夏傷於暑秋必病瘧凡男子婦人骨蒸熱發皮膚枯乾痰唾稠黏四肢疼痛面赤唇焦盜汗煩躁睡臥不安或時喘嗽飲食無味困弱無力虛汗黃瘦等證內經曰男子因精不足女子因血不流而得此證可以茶調散輕湧訖次以導水丸禹功散輕瀉三五行後服柴胡飲子桂苓甘露散犀角散之類大搜風丸白朮丸調中湯木香檳榔丸人參散量虛實選而用之或咯血便血諸亡血者並不宜吐不可不知慎勿服峻熱薑附之藥若服之飲食難進肌肉消減轉加危篤五勞之病今人不明發表攻裡遂誤至此大忌暑月於手腕足踝上著灸以其手足者諸陽之表起於五指之外內經曰諸陽發四肢此穴皆是淺薄之處灸瘡最難痊也及胸穴中脘臍下背俞三里等穴或有灸數百壯者加以燔針略無寸效病人反受苦楚可不思之勞疾多饞所思之物但可食者宜照食療本草而與菠菜葵羹冰水涼物慎不可禁且因水穀入胃脈道乃行也若遇禁則胃口閉而形體漸瘦而脈大乃死之候也諸勞皆仿此凡病人虛勞多日無力別無熱證者宜補之可用無比山藥丸則愈矣凡痔瘻腫痛內經曰因而大飽筋脈橫解腸澼為痔而不愈變為瘻痔與瘻其治同法至真要大論云太陽之勝凝溧且至非時水冰痔瘧乃發注云水氣太勝陽火不行此言陽火畏水鬱而為痔又少陰之復痱疹瘡瘍癰疽痤痔注云火氣內蒸金氣外拒陽熱內郁故為痱疹瘡瘍疹甚亦為瘡也熱少則外生痱疹熱多則內結癰痤小腸有熱則中外為痔其復熱之變皆病於身後及外側也又靈樞云太陽經虛則為痔瘧癲疾蓋水虛則火所乘故也可先用導水丸禹功散瀉訖次服枳殼丸木香檳榔丸更以葵羹菠菜通利腸胃大忌房室及雞魚酒醋辛熱之物凡富貴之人痰嗽多是厚味所致內經云所謂味厚則發熱可服通聖散加半夏以止嗽更服人參半夏丸以化痰墜涎止嗽定喘貧乏之人多感風冷寒濕內經曰秋傷於濕冬生咳嗽可服寧神散寧肺散加白朮之類若咳極面赤煩冤半晌者此火化乘肺也宜詳辨之凡大人小兒病沙石淋及五種淋澀癃閉並臍腹痛益元散主之以長流水調下蓋因熱在膀胱燥其津液故俗謂冷淋者天下之通弊也五苓散減桂加益元散名曰淡滲散凡兩目暴赤痛者腫不止睛脹胬肉結成翳膜速宜用稈草左右鼻竅內彈之出血立愈病甚人囟上百會穴攢竹眉間皆可出血則愈矣口噙水緊扣衣領不可便噴水候血盡便吐了水蓋暴赤腫痛腫乃龍火之疾養成之熱也難經曰目得血而能視不得已而用之血化淚痛而所出經曰本病相傳先以治其氣急則治其標緩則治其本又一法兩目赤腫發痛不止用長流水煎鹽湯吐之次服神芎丸四物湯之類經曰暴病暴死皆屬於火也又曰治病有緩急急則治其標緩則治其本標者赤腫也本者火熱也鹽湯鹹寒所以制火兩目赤腫痛不能開者以青金散鼻內嗅之嚏之真氣上湧邪氣自出矣凡大人小兒口瘡唇緊用酸漿水洗去白痂臨臥貼赴筵散如不愈貼鉛白霜散必愈矣凡婦人男子喉閉腫痛不能言者刺兩手大拇指爪甲如韭葉少商井穴也以䤵針淺刺去血立愈如不愈以溫血湯口中含漱是以熱導熱之法也凡頭腫痛瘰癧及胸臆胠脅之間或有瘡痂腫核不消及膿水不止可用滄鹽一二兩炒過以長流水一大碗煎之放溫作三五次頓服訖良久於咽喉中以叉股探引吐之去冷痰三二升次服和血通經之藥內經曰鹹味湧泄為陰銅人記少陽起於目鋭眥行耳後下脅肋過期門瘰癧結核馬刀挾癭足少陽膽經多氣少血之病也凡癭袋脹悶養生論云兩山挾水其人多癭疾土厚水深其人多癭地勢使然也此可服人參化癭丹自消癭藥多用海藻海帶味屬鹹寒凡背瘡初發便可用藏用丸玉燭散大作劑料下臟腑一二十行次用䤵針於腫焮處循紅暈周匝內密刺三層出血盡以溫軟帛拭去血甚者百會委中皆出後用陽起散敷之不可便服十味內托散其中犯官桂更用酒煎男子以背為陽更以熱投熱無乃太熱乎凡便癰者謬名也乃男子血疝也難素所不載然而是厥陰肝之經絡乃血流行之道路也衝脈任脈督脈亦屬肝經之旁絡也難經曰男子七疝血疝者乃七疝之一也治以導水丸桃仁承氣湯或抵當湯投之同瘀血法聚而不散可以大作劑料大瀉一二十行次以玉燭散和血通經之類是也世人多用大黃牡蠣間有不愈者是不知和血通經之道也凡下疳久不愈者俗呼曰臊疳可以導水丸禹功散先瀉肝經訖以木香散敷之日上三兩度後服淡粥一二日止凡一切惡瘡久不愈者以木香檳榔散貼之則愈矣凡男子婦人咳逆俗呼曰吃忒乃陰陽不和之故火欲上行為寒所抑寒不勝火故作凝滯之聲傷寒亦有此證並宜既濟散治之濕門凡男子婦人病水濕瀉注不止因服豆蔻烏梅薑附酸熱之劑經曰陽氣耗減於內陰精損削於外三焦閉塞水道不行水滿皮膚身體痞腫面黃腹大小便赤色兩足按之陷而不起內經曰諸濕腫滿皆屬脾土可用獨聖散吐之如時月涼寒宜於燠室不透風處用火一盆借火力出汗次以導水禹功量病人虛實瀉十餘行濕去腫減則愈矣是汗下吐三法俱行三法行畢臟腑空虛先宜以淡漿粥養胃腸三兩日次服五苓益元同煎或燈心湯調下亦可如大勢未盡更服神功散可以流濕潤燥分陰陽利水道既平之後宜大將息慎忌油鹽酒果房室等事三年則不復作矣凡上喘中滿酸心腹脹時時作聲痞氣上下不能宣暢叔和云氣壅三焦不得昌是也可用獨聖散吐之次用導水禹功散輕瀉三四行使上下無礙氣血宣通並無壅滯後服平胃散五苓散益元甘露散分陰陽利水道之藥則愈矣凡老人久病大便澀滯不通者可用神功丸麻仁丸時時服葵羹菠菜自然通利也凡三消者內經所謂肺消渴等可取生藕汁服則愈寒門經曰寒瘍流水俗呼為凍瘡因冬月行於冰雪中而得此證或經年不愈者用坡野中淨土曬乾以大蒜研如泥捏作餅子如大觀錢厚薄量瘡口大小貼之以火艾加於餅上灸之不計壯數以泥干為度去幹餅子再換濕餅灸不問多少直至瘡痂覺痛癢是瘡活也然後口含漿水洗漬用雞翎一十二莖縛作刷子於瘡上洗刷淨以此洗刷不致肌肉損傷也以軟帛拭乾次用木香檳榔散敷之如夏月醫之更妙內傷凡一切冷食不消宿食不散亦類傷寒身熱惡寒戰栗頭痛腰脊強不可用雙解散止可導飲丸木香檳榔丸五六十丸量虛實加減利五七行所傷冷物宿酒推盡頭痛病自愈矣次以五苓散生薑棗煎用長流水煎取五六錢不可服酒症丸進食丸此藥皆犯巴豆有大毒故也凡膏粱之人起居閒逸奉養過度酒食所傷以致中脘留飲惡悶痞滿醋心可服木香導飲丸治之若田野芻蕘之人食疏衣薄動作勞役若酒食所傷心腹滿悶醋心時時吐酸水可用進食丸以其勝毒也病甚者每月瀉三五次凡一切沉積或有水不能食使頭目昏眩不能清利可茶調散吐之次服七宣丸木香檳榔丸凡人咳嗽一聲或作悲笑啼泣抬舁重物忽然腰痛氣刺不能轉側或不能出氣者可用不臥散嚏之汗出痛止外傷治法凡一切刀器所傷用風化石灰一斤龍骨四兩二味為細末先於端四日採下刺薊菜於端午日五更合搗和成糰子中間穿眼懸於背陰處陰乾搗羅為末於瘡上摻貼亦得裡外臁瘡並諸雜瘡皆效凡犬咬蛇傷不可便貼膏藥及生肌散之類內經云先治內而後治外可也先當用導水丸禹功散之類可瀉驚恐不散毒氣或瀉十餘行即時痛減腫消然後可用膏藥生肌散之類敷之則愈矣凡一切蟲獸所傷及背瘡腫毒杖瘡焮發或透入里可服木香檳榔丸七八十丸或至百餘丸生薑湯下五七行量虛實加減用之經曰先治內而後治外是也凡落馬墜井因而打撲便生心恙是痰涎散於上也內經曰所謂因氣動而病生於外宜三聖散空心服之如本人虛弱瘦瘁可用聖獨散吐之後服安魄之藥如定志丸之類牛黃人參硃砂之屬婦人風門凡婦人頭風眩運登車乘船眩運眼澀手麻發脫健忘喜怒皆胸中宿痰所致可用瓜蒂散吐之次以長流水煎五苓散大人參半夏丸凡婦人腰胯痛兩腳麻木惡寒喜暖內經曰風寒濕合而為痹先可服除濕丹七八十丸量虛實以意加減次以禹功散投之瀉十餘行清冷積水清黃涎沫為驗後用長流水煎生薑棗同五苓散服之風濕散而氣血自和也凡婦人乳癰發痛者亦生於心也俗呼吹奶是也吹者風也風熱結於乳房之間血脈凝注久而不散潰腐為膿宜用益元散生薑湯調下冷服或新汲水時時呷之勿輟晝夜可三五十次自解矣或煎解毒湯頓服之火類門凡婦人月事沉滯數月不行肌肉漸減內經曰小腸熱已滿移熱於大腸則伏瘕為沉沉者月事沉滯不行故云伏瘕急宜桃仁承氣湯加當歸大作劑料煎服不過三服立愈後用四物湯補之更宜服宣明中檳榔丸凡婦人血崩或年及四十以上或悲哀太甚故然內經曰悲哀太甚則心系急心系急則肺舉而上焦不通熱氣在中故經云血崩下心系者血山也如久不愈則面黃肌熱瘦弱慎不可以熱治之蓋血得熱而散故禁之宜以當歸散等藥治之凡婦人年五十以上經脈暴下婦人經血終於七七之數數外暴下者此乃內經所謂火主暴速亦因暴喜暴怒憂愁驚恐致然慎勿作冷病治之如下峻熱藥治之必死止宜黃連解毒湯以清上更用蓮殼棕毛灰以滲其下然後用四物湯玄胡索散涼血和經之藥也凡婦人月事不來室女亦同內經曰謂月事不來皆是胞脈閉也胞脈者屬心而絡於胞中令氣上通於肺心下不通故月事不來也可用茶調散吐之次用玉燭散芎藭湯三和湯桂苓白朮散之類降心火益腎水開胃進食分陰陽利水道之藥皆是也慎勿服峻熱有毒之藥若服之變成肺痿骨蒸潮熱咳嗽咯膿嘔血喘滿小便不利寢汗不止漸至形瘦脈大雖遇良醫亦成不救嗚呼人之死者豈命使之然也凡懷孕婦人病瘧可煎白虎湯小柴胡柴胡飲子等藥如大便結硬可用大柴胡湯下微利過不可大吐瀉恐傷其孕也經曰夏傷於暑秋必痎瘧凡雙身婦人傷寒時氣溫疫頭痛身熱可用升麻散一兩水半碗大作劑料去滓分作二服先一服吐了後一服勿吐次以長流水加生薑棗煎五苓散熱服之汗盡其痛立止凡婦人雙身大小便不利可用八正散大作劑料去滑石加葵菜子煎服經曰膀胱不利為癃癃者小便閉而不通也如八正散加木香取效更捷經曰膀胱氣化則能出焉然後服五苓散三五服則愈矣凡婦人身重九月而喑啞不言者是胞之絡脈不相續也故不能言經曰無治也然有是言不若煎玉燭散二兩水半碗同煎至七分去滓入蜜放溫時時呷之令火下降肺金自清故聲復出也肺主聲音也凡婦人難産者皆因燥澀緊斂故産戶不得開通宜先於降誕之月自月之日用長流水調益元散日三服産必易産後亦無一切虛熱氣血不和之疾如未入月則不宜服之以滑石滑胎故也凡婦人大産後或臍腹腰痛乃敗血惡物之致然也醫者便作虛冷以燥熱藥治之誤已久矣難經曰諸痛為實實者熱也可用導水丸禹功散瀉三五行然後以玉燭散和血通經降火益水之藥治之獨不可便服黑神散燥熱之藥當同半産治之凡婦人産後心風者不可便作風治之宜調胃承氣湯二兩加當歸半兩細銼用水三四盞同煎去滓分作二服大下三五行則愈矣如未愈以三聖散吐之蓋風狂便屬陽凡婦人産後一二日漸熱口乾可用新汲水調玉燭散或水調甘露散亦妙勿作虛寒治之濕門凡婦人赤白帶下或出白物如脂可服導水丸禹功散或單用無憂散量虛實加減泄訖服桂苓散五苓散葶藶木香散同治濕法或用獨聖散上湧亦是室女白帶下可用茶調散吐之吐訖可服導水丸禹功散瀉之次服葶藶木香散四物湯白朮散之類則愈矣治白帶者同瀉濕法則是也婦人有濁汙水不止亦同此法也寒門凡婦人年二三十無病而無子經血如常或經血不調者乃陰不升而陽不降此上下不得交通有所滯礙不能為用故也可用獨聖散湧訖寒痰二三升後用導水丸禹功散泄三五行或十餘行單用無憂散泄十餘行見寒熱虛實用之次服蔥白粥三五日胃氣宣通腸中得實可服玉燭散更助白朮散茯苓之類降火益水既濟之道當不數月而有孕內經曰婦人有癃痔遺溺嗌乾諸症雖服妙藥針灸亦不能孕蓋衝脈督脈任脈有此病不能孕故也半産凡婦人半産俗呼曰小産或三四月或五六個月皆為半産以男女成形故也或因憂恐暴怒悲哀太甚或因勞力撲打損傷及觸冒暑熱慎勿用黑神散以其犯熱藥恐轉生他疾止宜用玉燭散和經湯之類凡婦人天生無乳者不治或因啼泣暴怒鬱結氣血閉塞以致乳脈不通用精豬肉清湯調和美味於食後調益元散五七錢連服三五服更用木梳梳乳房周回則乳汁自下也又一法豬蹄調下益元散連服之又一法針肩井二穴良驗小兒風門凡小兒三五歲或七八歲至十餘歲發驚涎潮抽搦如拽鋸不省人事目瞪喘急將欲死者內經曰此者得之在母胎胞之所受悸惕驚駭恐懼之氣故令小兒輕者為驚風天吊重者為癇病風搐胎中積熱者為臍風以上諸風症可用吐涎散吐之吐訖宜珠犀龍麝清涼墜痰之藥其食乳子母皆宜服之安魂定魄之藥定志丸之類是也故婦人懷孕之月大忌悲憂驚怖縱得子必有前疾小兒風熱涎嗽者可以通聖加半夏同煎溫服凡小兒疳澀眼數日不開皆風熱所致可服涼膈散瀉肝經風熱鬱甚鬱結散而自開也凡小兒通身浮腫是風水腫也小便不通者宜利小便則愈內經曰三焦閉寒水道不利水滿皮膚身體痞腫是乘之故可用長流水加燈心煎五苓散時時呷之更於不透風處浴之汗出則腫消一汗減半再汗減七八分三汗消盡內外俱行也二火類凡小兒瘡疱癮疹麩瘡丹熛等疾如遇火運勝時熒惑亂行之者不可便用升麻散解之升麻湯味辛性溫內經曰積溫而成熱是謂重火止可以辛涼之劑解之如遇平時可以辛溫蓋平時無事便同水化然而更宜審察病機甚者亦不可以辛溫但發散之後便以涼膈散加當歸及白虎湯玉露散煎服之更甚者解毒湯調胃散下之古人云斑疹瘡疱首尾俱不可下皆誤矣豈不聞揚湯止沸不如抽薪內經曰五寅五申之歲多發此病者蓋明相火之所為也又曰少陽客氣勝丹疹外發又曰諸痛癢瘡瘍皆屬心火王太僕又謂百端之起皆自心生豈可便用辛溫發散乎致熱勢增劇漸成臟毒下血咬牙發搐大熱明矣如白虎加人參涼膈散加當歸桔梗勿問秋冬但見瘡疹用之神良凡小兒瘡疱癮疹麩瘡丹熛斑毒之後臟毒下血內經曰少陽客氣勝則丹熛瘡疹發於外也蓋餘熱不解故臟毒下血治以黃連解毒湯白虎湯涼膈散臨證選而用之所謂白虎舊說秋冬勿用皆誤也但有此症便用之蓋其證屬相火故也大人亦同凡小兒丹瘤浮腫毒赤走引遍身者乃邪熱之毒也可用磁片撥出紫血其病立愈如不愈者後用涼膈散加大黃芒硝利三五行為妙次用拔毒散掃三五度必愈矣經曰丹熛赤瘤火之色也相火主之凡小兒有赤瘤暴腫可先用牛黃通膈丸瀉之後用陽起石散敷之則腫毒自消如不消可用䤵針砭刺血出而愈矣凡小兒甜瘡久不愈者俗呼為香瘡是也多在面部兩耳前一法令母口中嚼白米成膏子臥塗之不過三上則愈矣小兒並母皆忌雞豬魚兔酒醋動風發熱之物如治甜指亦同此法凡小兒面上瘡謂眉煉瘡耳上謂之轍耳足上瘡謂之靴癬此三者一究其本皆謬名也經曰諸痛瘡瘍皆屬心火乃血熱劇而致然也或謂內經曰大概不可使熱以為皆然此不明造化之道也慎勿妄信可用䤵針刺之出血一刺不愈當復刺之再刺不愈則三刺必愈矣內經曰血實者決之眉煉不可用藥敷之以其瘡多癢癢則爬矣藥入眼則目必損矣凡小兒牙疳齒齲者是齦腐爛也下牙屬手陽明大腸之經燥金為主上牙屬足陽明胃經濕土上下是腸胃二經也或積熱於內或因服銀粉巴豆大毒之藥入於腸胃乳食不能勝其毒毒氣循經而至於齒齦牙縫嫩薄之分反為害也可以麝香玉線子治之乳母臨臥常服黃連解毒湯一服牙疳病則愈矣凡小兒身熱吐瀉腹滿不進飲食可急與牛黃通膈丸下過四五行則自愈矣蓋乳食便屬水甚則成濕以治濕法治之用燥熱之藥非也凡小兒水泄不止可用五苓散與益元散各停用新汲水調下三二錢頻服不拘時候若暴速注下甚者屬火涼膈通聖等散治之用者勿輕非深於造化者未易此語凡小兒大人小便不通內經謂三焦約約者不行也可用長流水煎八正散時時灌之大小便利則止若不因熱藥所攻而致此者易治或因多服熱藥而燥劇至此者非惟難治不幸夭耳亦可用蜜水調益元散送通膈丸凡小兒久瀉不止至八九月間變為秋深冷痢者泄瀉清白時時撮痛乳癖不化可用養脾丸如黍米大每服二三十丸米飲送下日進三服則愈益黃散亦可用之凡治小兒之法不可用極寒極熱之藥及峻補峻瀉之劑或誤用巴豆杏仁硫黃膩粉之藥若用此藥反生他病小兒易虛易實腸胃嫩弱不勝其毒若治之用分陰陽利水道最為急用桂苓甘露散之類
