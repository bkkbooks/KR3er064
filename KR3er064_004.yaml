body:
  text: 卷四風一夫風者厥陰風木之主也諸風掉眩風痰風厥涎潮不利半身不遂失音不語留飲飧泄痰實嘔逆旋運口喎抽搦僵仆目眩小兒驚悸狂妄胃脘當心而痛上支兩脅咽膈不通偏正頭痛首風沐風手足攣急肝木為病人氣在頭防風通聖散防風天麻湯防風湯祛風丸排風湯小續命湯消風散暑二夫暑者為少陰君火之主也諸痛癢瘡瘍癰疽腫毒及胃煩熱嗌乾咳喘唾血泄血胕腫肩胛皆內痛心痛肺脹腹脹鬱悶風溫病多發風傷於榮溫傷於衛血為榮氣為衛其脈兩手多沉自汗出身重多睡必鼾三日以里且宜辛涼解之或辛溫解之如不已表證未罷大不可下如下則胃中虛空四日之外表熱入里則譫語口乾發疹潮熱直視失溲者十死八九肺金為病人氣在胸及小兒瘡疹丹熛但發人氣在腹白虎湯桂苓甘露散化痰玉壺丸益元散玉露散石膏散濕三夫濕者為太陰濕土之主也諸濕腫滿霍亂泄注胕腫骨痛及腰膝頭項痛風痹痿厥唾有血心懸如飢熱痛始作三陽受之一日太陽二日陽明三日少陽可汗而已如四日太陰五日少陰六日厥陰可下而已或七日不愈再傳至十三日大邪皆去六經悉和則愈矣腎水為病五苓散葶藶木香散白朮木香湯益元散大橘皮湯神助散桂苓白朮丸火四夫火者少陽相火之主也諸暴死發熱惡寒痛病大作傳為水腫面黃身痿泄注膿血赤白為利癰腫疽毒丹熛瘍疹小兒疳瀉腹脹暴下如水心胸中熱甚則鼽衄胸脅皆痛耳聾口苦舌乾與臟毒下血米穀不化腸鳴切痛消渴上喘肺金為病涼膈散黃連解毒湯瀉心散神芎丸八正散調胃散調胃承氣湯燥五夫燥者是陽明燥金之主也諸氣憤郁腸胃乾涸皮膚皴揭脅痛寒瘧喘咳腹中鳴注泄鶩溏脅肋暴痛不可反側嗌乾面塵肉脫色惡及丈夫㿗疝婦人少腹痛帶下赤白瘡瘍痤癤喘咳潮熱大便澀燥及馬刀挾癭之瘡肝木為病神功丸脾約丸麻仁丸潤體丸四生丸寒六夫寒者是太陽寒水之主也諸寒冷濕痹肘臂攣急秋濕既多寒咳為嗽痰厥心痛心中淡淡大動胸脅胃脘痛不可食食已不飢吐利腥穢屈伸不便上下所出不禁目盲堅痞色炱渴而飲冷積水足浮腫囊縮四肢冷爪甲青心火為病薑附湯四逆湯二薑湯朮附湯大已寒丸理中湯解利傷寒七夫冒風時氣溫病傷寒三日以里頭痛身熱惡寒可用通聖散益元散各五七錢水一大碗入生薑十餘片蔥白連須者十餘莖豆豉一撮同煎三五沸去滓稍熱先以多半投之良久用叉子於咽喉中探引吐了不宜漱口次用少半亦稍熱投之更用蔥醋酸辣湯投之衣被蓋覆汗出則愈矣如遇世亂內經曰歲火太過炎暑流行火氣太盛肺金受邪上應熒惑大而明現若用辛涼之劑解之則萬舉萬全也若遇治世人安可用升麻湯葛根湯敗毒散辛溫之劑解之亦加蔥根白豆豉上湧而表汗內經曰因其輕而揚之揚者發揚也吐汗發揚寒熱之邪既吐汗之後必大將息旬日之後其邪不復作也又一法或於無藥之處可用酸齏汁一大碗煎三五沸去菜葉猛服訖少間用叉子咽喉中探引吐了如此三次後煎蔥酸辣湯投之以衣被蓋覆汗出則解內經曰酸苦湧泄為陰湧者吐也傷寒三日頭痛身熱是病在上也在上者固宜湧之然後以淡漿粥養之一二日則愈矣又一法可用不臥散解之於兩鼻內聞之連嚏噴三二十次以衣被蓋覆用此藥時當於暖室中嚏罷以酸辣漿粥投之汗出如洗嚏噴者用吐法也此法可與雙解散為表裡也又有導引一法可於一間處用之先教病人盤腳而坐次用兩手交十指攀腦後風池風府二穴乃是風門也向前叩首幾至於地如此連點一百二十數急以蔥醋粥辛辣湯投之汗出立解傷寒溫疫時氣冒風中暑俱四時不正之氣也人若初感之皆頭痛惡寒身熱及寒熱往來腰脊強是太陽經受之也內經曰可先治外而後治內先用生薑蔥白豆豉煎雙解散上湧及汗出則解如不解者至五六日或不大便喘滿詀語實熱兩手脈沉可用調胃大小承氣湯下之慎不可用銀粉巴豆霜杏仁芫花熱藥下之則必死此先治外而後治內也如大汗之後慎不可食葵羹藿菜及羊豬雞犬魚兔等肉惟不先明必致重困後必難治也傷寒七八日發黃有斑潮熱腹滿者或痰實作止雖諸承氣湯下過者仲景曰寸口脈浮滑者可用瓜蒂散吐之然傷寒寸口脈浮滑者可用雜病寸口脈沉者可吐叔和云寸脈沉兮胸有痰啓玄子曰上盛不已吐而奪之是也風八夫中風失音悶亂喎斜口眼內經曰風之為病善行而數變故百病皆生於風也可用三聖散吐之如不省人事牙關緊閉粥菜不能下者煎三聖散鼻內灌之吐出涎口自開也次服通聖散涼膈散大人參半夏丸桂苓甘露散等大忌雞豬魚兔酒醋蕎麵動風引痰之物吐痰之法在方論中頭風眩運手足時復麻痹胃脘發痛心腹滿悶按之如水聲可用獨聖散吐之吐訖可服辛涼清上之藥仲景曰此寒痰結於胸中之致然也痹九夫大人小兒風寒濕三氣合而為痹及手足麻木不仁者可用鬱金散吐之吐訖以導水丸通經散泄之泄訖以辛溫之劑發散汗出則可服當歸芍藥乳沒行經和血等藥如不愈則便不宜服此等藥痿十夫男女年少面黃身熱肌瘦寒熱往來如瘧更加涎嗽不止或喘滿面浮此名曰肺痿可用獨聖散吐之吐訖次用人參柴胡飲子小柴胡飲子加當歸桂苓甘露散之類內經曰男女之病皆同也男子精不足是味不化也女子血不流是氣不用也又曰形不足者溫之以氣精不足者補之以味是也厥十一夫厥之為病手足及膝下或寒或熱也舉世傳為腳氣寒濕之病豈知內經中本無腳氣陽氣衰於下則為寒厥陰氣衰於下則為熱厥熱厥為手足熱寒厥為手足寒也陽經起於足指之表陰經起於足心之下陽氣勝則足下熱陰氣勝則足下寒熱厥者寒在上也寒厥者熱在上也寒在上者以溫劑補肺金熱在上者以涼劑清心火則愈矣若尸厥痿厥風厥氣厥酒厥可以湧而醒次服降火益水和血通氣之藥使粥食調養無不瘥者若其餘諸厥仿此行之慎勿當疑似之間便作風氣相去邈矣癇十二夫癇病不至於目瞪如愚者用三聖散投之更用火盆一個於暖室中令汗下吐三法俱行次服通聖散百餘日則愈矣至於目瞪愚者不可治內經曰神不得守謂神亂也瘧十三夫富貴膏粱之人病瘧或間日或頻日或作熱或作寒或多寒少熱或多熱少寒宜以大柴胡湯下之下過三五行次服白虎湯玉露散桂苓甘露散之類如不愈者是積熱大甚宜以神芎藏用丸三花神祐丸調胃承氣湯等藥大作劑料下之下訖以長流水煎五苓散服之或服小柴胡湯數服亦可如不愈復以常山散吐之後服涼膈散白虎湯之類必愈矣大忌熱面及羊肉雞豬魚兔等物如食之瘧疾復作以至不救貧賤芻芻蕘之人病瘧以飲食疏糲衣服寒薄勞力動作不可與膏粱之人同法而治臨發日可用野夫多效方溫脾散治之如不愈用辰砂丹治之則愈矣如服藥訖宜以長流水煎白虎湯五苓散服之不宜食熱物及燥熱之藥以瘧疾是傷暑伏熱之故也內經曰夏傷於暑秋必痎瘧可不信哉忌物同前泄利十四夫大人小兒暴注瀉水不已內經曰注下也注下者水利也火運太過之病火主暴逆之故也急宜用水調桂苓甘露散五苓散益元散或以長流水煎過放冷服則愈慎不可驟用罌粟殼乾薑豆蔻聖散子之類縱瀉止則腸胃不通轉生他疾止可以分陰陽利水道而已疳利十五夫病疳利米穀不化日夜無度腹中雷鳴下利完穀出可用導水丸禹功散瀉訖一二日可服胃風湯不愈則又可與桂枝麻黃湯發汗則愈矣內經曰久風入中為腸風飧泄啓玄子云風在腸中上熏於胃所食不化而出又云飧泄者是暮食不化也又經云春傷於風夏必飧泄故可汗而愈內經曰風隨汗出痛隨利減若服豆蔻罌粟殼之類久而不輟則變為水腫以成不救也臟毒下血十六夫臟毒下血可用調胃承氣湯加當歸瀉訖次用芍藥柏皮丸黃連解毒湯五苓益元各停調下五七錢服之內經曰腸澼便血何如答曰澼者腸間積水也身熱則死寒則生熱為血氣敗故死寒為榮氣在則生七日而死者死於火之成數也下利膿血十七夫下利膿血腹痛不止可用調胃承氣湯加生薑棗煎更下藏用七八十丸量虛實加減瀉訖次用長流水調五苓散五七錢或加燈心煎調下亦得調益元散五七錢亦可大忌油膩一切熱物則愈矣水泄不止十八夫男子婦人病水濕瀉注不止因服豆蔻烏梅薑附峻熱之劑遂令三焦閉澀水道不行水滿皮膚身體痞腫面黃腹大小便赤澀兩足按之陷而復起內經曰諸濕腫滿皆屬脾土可用獨聖散吐之如時月寒涼宜於暖室不透風處用火一盆以借火力出汗次以導水禹功散量虛實瀉十餘行濕去腫減則愈矣是汗下吐三法齊行既汗下吐訖腑臟空虛宜以淡漿粥養腸胃二三日次服五苓散益元散同煎燈心湯調下如勢未盡更宜服神助散舊名葶藶散可以流濕潤燥分陰陽利小便不利小便非其法也既平之後宜大將息忌魚鹽酒肉果木房室等事如此三年則可矣如或不然決死而不救也痔漏腫痛十九夫痔漏腫痛內經曰因而大飽筋脈橫解腸澼為痔痔而不愈變而為漏同治濕法而治之可先用導水丸禹功散瀉訖次服枳殼丸木香檳榔丸更加以葵羹菠菜豬羊血等通利腸胃大忌房室雞魚酒醋等物勿食之霍亂吐瀉二十夫霍亂吐瀉不止者可用五苓散益元散各停冰水調下五七錢如無冰水可用新汲水調下桂苓甘露散玉露散清涼飲子調下五七錢或香薷湯調下五七錢亦可如無以上諸藥可服地漿三五盞亦可地漿者可於淨地掘一井子用新汲水一桶並於井子攬令渾候澄清連飲三五盞立愈大忌白朮湯薑桂烏附種種燥熱之藥若服之則必死矣巢氏云霍者揮霍而成疾亂者陰陽亂也皆由陰陽清濁二氣相干故也大便澀滯二十一夫老人久病大便澀滯不通者可服神功丸麻仁丸四生丸則愈矣時復服葵菜菠菜豬羊血自然通利也內經云以滑養竅是也此病不愈令人失明也五種淋瀝二十二夫大人小兒病沙石淋及五種淋瀝閉癃並臍腹痛益元散主之以長流水調下八正散石葦散依方服用此三藥皆可加減服之酒食不消散二十三夫一切冷食不消宿酒不散亦同傷寒身熱惡寒戰栗頭項痛腰脊強及兩手脈沉不可用雙解止可用導飲丸五六十丸量虛實加減利五七行所傷冷食宿酒若推盡則頭痛等病自愈也次以五苓散生薑棗長流水煎服五六服不可服酒症進食丸此藥皆犯巴豆有熱毒之故也酒食所傷二十四夫膏粱之人起居間逸奉養過度酒食所傷以致中脘留飲脹悶痞膈醋心可服木香導飲丸以治之夫芻蕘之人飲食粗糲衣服寒薄勞役動作一切酒食所傷以致心腹滿悶時嘔酸水可用進食丸治之沉積水氣二十五夫一切沉積水氣兩脅刺痛中滿不能食頭目眩者可用茶調散輕湧訖冷涎一二升次服七宣丸則愈矣木香檳榔丸導飲丸亦妙不可用巴豆銀粉等藥諸積不化二十六夫諸積不化可服無憂散每月瀉三五次可用桂苓白朮丸散妙功丸大忌生硬黏滑動風發熱等物骨蒸熱勞二十七夫男子婦人骨蒸熱勞皮膚枯乾痰唾稠黏四肢疼痛面赤唇乾煩躁睡臥不寧或時喘嗽飲食少味困弱無力虛汗黃瘦等疾內經曰男子因精不足而成女子因血不流而得也可先以茶調散輕湧訖次以導水禹功散輕瀉三兩行後服柴胡飲子桂苓甘露散搜風丸白朮調中湯木香檳榔丸人參犀角散之類量虛實選而用之如咯血吐血便血此乃亡血也並不宜吐吐之則神昏內經曰血者人之神也故亡血則不宜吐慎不可服峻熱薑附之藥若服之則飲食難進肌肉消削轉成危篤也五勞之病乃今人不明發表攻裡之過也大忌暑月於手腕足外踝上著灸手腕者陽池穴也此穴皆肌肉淺薄之處灸瘡最難痊可及胸次中脘臍下背俞三里等穴或有灸數十者及以燔針終無一效病人反受苦可不思之勞疾多饞所思之物但可食者宜食療本草而與之菠菜葵羹冰水涼物慎不可禁以圖水穀入胃脈道乃行也若過忌慎則胃口閉胃口閉則形必瘦形瘦脈空乃死之候也諸勞皆可仿此虛損二十八夫病人多日虛損無力補之以無比山藥丸則愈矣上喘中滿二十九夫上喘中滿醋心腹脹時時作聲痞氣上下不能宣暢叔和云氣壅三焦不得昌是也可用獨聖散吐之吐訖次用導水禹功輕瀉三五行不愈更以利膈丸瀉之使上下宣通不能壅滯後服平胃散五苓散益元散桂苓甘露散三和散分陰陽利水道之藥則愈一切涎嗽三十夫富貴之人一切涎嗽是飲食厚味熱痰之致然也先用獨聖散吐之吐訖可服人參散通聖散加半夏以此止嗽更服大人參半夏丸以之化痰也大忌酸鹹油膩生硬熱物也咳嗽三十一夫貧難之人咳嗽內外感風冷寒濕之致然也內經曰秋傷於濕冬生咳嗽可服寧神散寧肺散加白朮之類則愈矣忌法同前咳逆三十二夫男子婦人咳逆俗呼曰厄忒乃陰陽不和也乃傷寒亦有咳逆者並可用既濟散治之忌寒熱物宜食溫淡物以養胃氣耳風痰三十三夫風痰酒痰或熱在膈上頭目不清涕唾稠黏或咳嗽上喘時發潮熱可用獨聖散吐之吐訖可服搜風丸涼膈散之類內經曰流濕潤燥是也咯血衄血嗽血三十四夫男子婦人咯血衄血嗽血咳膿血可服三黃丸黃連解毒湯涼膈散加桔梗當歸大煎劑料時時呷之內經曰治心肺之病最近藥劑不厭頻而少時時呷之者是也消渴三十五夫三消渴內經曰三消渴者肺消膈消風消也上以繅絲煮繭湯澄清頓服之則愈或取生藕汁頓服之亦愈矣雷頭三十六夫雷頭懶於乃俗之謬名也此疾是胸中有寒痰多沐之致然也可以茶調散吐之吐訖冷痰三二升次用神芎丸下三五行然後服愈風餅子則愈矣雷頭者是頭上赤腫核或如生薑片酸棗之狀可用扉針刺而出血永除根本也頭痛不止三十七夫頭痛不止乃三陽之受病也三陽者各分部分頭與項痛者是足太陽膀胱之經也攢竹痛俗呼為眉楞痛者是也額角上痛俗呼為偏頭痛者是少陽經也如痛久不已則令人喪目以三陽受病皆胸膈有宿痰之致然也先以茶調散吐之後以香薷飲白虎湯投之則愈然頭痛不止可將蔥白鬚豆豉湯吐之吐訖可服川芎薄荷辛涼清上搜風丸香芎散之類仲景曰蔥根豆豉亦吐傷寒頭痛叔和云寸脈急而頭痛是也兩目暴赤三十八夫兩目暴赤發痛不止可以長流水煎鹽湯吐之次服神芎丸四物湯之類內經曰暴病皆屬火也又曰治病有緩急急則治其標緩則治其本標者赤腫也本者火熱也以草莖鼻中出血最妙目腫三十九夫目暴赤腫痛不能開者以清金散鼻內搐之鼻內出血更捷病目經年四十夫病赤目經年不愈者是頭風所加之令人頭痛可用獨聖散八正散之類赤目腫作是足厥陰肝經有熱利小便能去肝經風熱也風沖泣下四十一夫風沖泣下者俗呼風冷淚者是也內經曰太陽經不禁固也又曰熱則五液皆出肝熱故淚出風衝於外火發於內風火相搏由此而泣下也治之以貝母一枚白膩者胡椒七粒不犯銅鐵研細臨臥點之愈風蛀牙疼四十二夫風蛀牙疼久不愈者用針插巴豆一枚於燈焰上燎煙未盡急存性於牙窩根盤上熏之則愈口瘡四十三夫大人小兒口瘡唇緊用酸漿水洗去白痂臨困點緑袍散如或不愈貼赴筵散又不愈貼鉛白霜散則愈喉閉四十四夫男子婦人喉閉腫痛不能言微刺兩手大拇指去爪甲如韭葉是少商穴少商是肺金之井穴也以扉針刺血出立愈如不愈以溫白湯口中含漱是以熱導熱也癭四十五夫癭囊腫悶稽叔夜養生論云頸如險而癭水土之使然也可用人參化癭丹服之則消也又以海帶海藻昆布三味皆海中之物但得三味投之於水甕中常食亦可消矣背疽四十六夫背瘡初發便可用藏用丸玉燭散大作劑料下臟腑一二十行次以扉針於腫焮處亂刺血出如此者三後以陽起石散敷之不可便服內托散內犯官桂更用酒煎男子以背為陽更以熱投熱無乃太熱乎如瘡少愈或瘡口未合瘡痂未斂風癢時作可服內托散以闢風邪耳瘰癧四十七夫人頭目有瘡腫瘰癧及胸臆胠脅之間或有瘡痂腫核不消及有膿水不止可用滄鹽一二兩炒過以長流水一大碗煎放溫作三五次頓服訖候不多時於咽喉中探引吐涎三二升後服和血通經之藥如玉燭散四物湯之類是也內經曰鹹味湧泄為陰湧者吐也瀉者泄也銅人曰少陽起於目鋭眥行耳後下脅肋過期門瘰癧結核馬刀挾癭是少陽膽經多氣少血之病也便癰四十八夫便癰者乃男子之疝也俗呼為便癰言於大便處害一癰故名便癰也便癰者謬名也難素所不載也然足厥陰肝之經絡是氣血行流之道路也沖任督脈亦屬肝經之旁絡也難經曰男子有七疝是也便癰者血疝也治之以導水丸桃仁承氣湯或抵當湯投之同瘀血不散而治大作劑料峻瀉一二十行次以玉燭散和氣血通經絡之類則是也世之多用大黃牡蠣而已間有不愈者是不知和血通經之道也惡瘡四十九夫一切惡瘡久不愈者以木香檳榔散貼之則愈下疳五十夫下疳久不愈者俗呼曰臊疳是也先以導水禹功先瀉肝經外以木香散敷之日上三兩度然後服淡粥一二日則止
