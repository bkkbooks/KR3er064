body:
  text: 卷一七方十劑繩墨訂一方有七劑有十舊矣雖有説者辨其名而已敢申昔人已創之意而為之訂夫方者猶方術之謂也易曰方以類聚是藥之為方類聚之義也或曰方謂五方也其用藥也各據其方如東方瀕海滷斥而為癰瘍西方陵居華食而多頵腄贅癭南方瘴霧卑濕而多痹疝北方乳食而多藏寒滿病中州食雜而多九疸食癆中滿留飲吐酸腹脹之病蓋中州之地土之象也故脾胃之病最多其食味居處情性壽夭兼四方而有之其用藥也亦雜諸方而療之如東方之藻帶南方之丁木西方之薑附北方之參苓中州之麻黃遠志莫不輻輳而參尚故方不七不足以盡方之變劑不十不足以盡劑之用劑者和也方者合也故方如瓦之合劑猶羹之和也方不對病則非方劑不蠲疾則非劑也七方者大小緩急奇偶復也十劑者宣通補瀉輕重滑澀燥濕也夫大方之説有二有君一臣三佐九之大方有分兩大而頓服之大方蓋治肝及在下而遠者宜頓服而數少之大方病有兼證而邪不專不可以一二味治者宜君一臣三佐九之大方王太僕以人之身三折之上為近下為遠近為心肺遠為腎肝中為脾胃胞䐈膽亦有遠近以豫觀之身半以上其氣三天之分也身半以下其氣三地之分也中脘人之分也又手之三陰陽亦天也其氣高足之三陰陽亦地也其氣下戊己之陰陽亦人也其氣猶中州故肝之三服可並心之七服腎之二服可並肺之七服也小方之説亦有二有君一臣二之小方有分兩微而頻服之小方蓋治心肺及在上而近者宜分兩微而少服而頻之小方徐徐而呷之是也病無兼證邪氣專可一二味而治者宜君一臣二之小方故腎之二服可分為肺之九服及肝之三服也緩方之説有五有甘以緩之之緩方糖蜜棗葵甘草之屬是也蓋病在胸膈取甘能戀也有丸以緩之之緩方蓋丸之比湯散其氣力宣行遲故也有品件群衆之緩方蓋藥味衆則各不得騁其性也如萬病丸七八十味遞相拘制也有無毒治病之緩方蓋性無毒則功自緩矣有氣味薄藥之緩方蓋藥氣味薄則長於補上治上比至其下藥力已衰故補上治上制之以緩緩則氣味薄也故王太僕云治上補上方若迅急則上不任而迫走於下制緩方而氣味厚則勢與急同急方之説有五有急病急攻之急方如心腹暴痛兩陰溲便閉塞不通借備急丹以攻之此藥用不宜恆蓋病不容俟也又如中風牙關緊急漿粥不入用急風散之屬亦是也有湯散蕩滌之急方蓋湯散之比丸下咽易散而施用速也有藥性有毒之急方蓋有毒之藥能上湧下泄可以奪病之大勢也有氣味厚藥之急方藥之氣味厚者直趣於下而氣力不衰也故王太僕云治下補下方之緩慢則滋道路而力又微制急方而氣味薄則力與緩等奇方之説有二有古之單方之奇方獨用一物是也病在上而近者宜奇方也有數合陽數之奇方謂一三五七九皆陽之數也以藥味之數皆單也君一臣三君三臣五亦合陽之數也故奇方宜下不宜汗偶方之説有三有二味相配之偶方有古之復方之偶方蓋方之相合者是也病在下而遠者宜偶方也有數合陰陽之偶方謂二四六八十也皆陰之數也君二臣四君四臣六亦合陰之數也故偶方宜汗不宜下復方之説有二方有二方三方相合之復方如桂枝二越婢一湯如調胃承氣湯方芒硝甘草大黃外參以連翹薄荷黃芩梔子以為涼膈散是本方之外別加餘味者皆是也有分兩均劑之復方如胃風湯各等分是也以內經考之其奇偶四則反以味數奇者為奇方味數偶者為偶方下復云汗者不以奇下者不以偶及觀仲景之制方桂枝湯汗藥也反以三味為奇大承氣湯下藥也反以四味為偶何也豈臨事制宜復有增損者乎考其大旨王太僕所謂汗藥如不以偶則氣不足以外發下藥如不以奇則藥毒攻而致過必如此言是奇則單行偶則並行之謂也急者下本易行故宜單汗或難出故宜並蓋單行則力孤而微並行則力齊而大此王太僕之意也然太僕又以奇方為古之單方偶為復方今此七方之中已有偶又有復者何也豈有偶方者二方相合之謂也復方者二方四方相合之方歟不然何以偶方之外又有復方者歟此復字非重復之復乃反復之復何以言之蓋內經既言奇偶之方不言又有重復之方惟云奇之不去則偶之是為重方重方者即復方也下又云偶之不去則反佐以取之所謂寒熱溫涼反從其病也由是言之復之為方反復亦不遠內經之意也所謂宣劑者俚人皆以宣為瀉劑抑不知十劑之中已有瀉劑又有言宣為通者抑不知十劑之中已有通劑舉世皆曰春宜宣以為下奪之藥抑不知仲景曰大法春宜吐以春則人病在頭故也況十劑之中獨不見湧劑豈非宣劑即所謂湧劑者乎內經曰高者因而越之木鬱則達之宣者升而上也以君召臣曰宣義或同此傷寒邪氣在上宜瓜蒂散頭痛蔥根豆豉湯傷寒懊憹宜梔子豆豉湯精神昏憒宜梔子厚朴湯自瓜蒂以下皆湧劑也乃仲景不傳之妙今人皆作平劑用之未有發其祕者豫因發之然則為湧明矣故風癇中風胸中諸實痰飲寒結胸中熱蔚化上上而不下久則嗽喘滿脹水腫之病生焉非宣劑莫能愈也所謂通劑者流通之謂也前後不得溲便宜木通海金沙大黃琥珀八正散之屬裡急後重數至圊而不便宜通因通用雖通與瀉相類大率通為輕而瀉為重也凡痹麻蔚滯經隧不湍非通劑莫能愈也所謂補劑者補其不足也俚人皆知山藥丸鹿茸丸之補劑也然此乃衰老下脫之人方宜用之今往往於少年之人用之其舛甚矣古之甘平甘溫苦溫辛溫皆作補劑豈獨硫黃天雄然後為補哉況五臟各有補瀉肝實瀉心肺虛補腎經曰東方實西方虛瀉南方補北方大率虛有六表虛裡虛上虛下虛陰虛陽虛設陽虛則以乾薑附子陰虛則補以大黃硝石世傳以熱為補以寒為瀉訛非一日豈知酸苦甘辛鹹各補其臟內經曰精不足者補之以味善用藥者使病者而進五穀者真得補之道也若大邪未去方滿方悶心火方實腎水方耗而驟言鹿茸附子庸詎知所謂補劑者乎所謂瀉劑者泄瀉之謂也諸痛為實痛隨利減經曰實則瀉之實則散而瀉之中滿者瀉之於內大黃牽牛甘遂巴豆之屬皆瀉劑也惟巴豆不可不慎焉蓋巴豆其性燥熱毒不去變生他疾縱不得已而用之必以他藥制其毒蓋百千證中或可一二用之非有暴急之疾大黃牽牛甘遂芒硝足矣今人往往以巴豆熱而不畏以大黃寒而反畏庸詎知所謂瀉劑者哉所謂輕劑者風寒之邪始客皮膚頭痛身熱宜輕劑消風散升麻葛根之屬也故內經曰因其輕而揚之發揚所謂解表也疥癬痤痱宜解表汗以泄之毒以熏之皆輕劑也故桂枝麻黃防風之流亦然設傷寒冒風頭痛身熱三日內用雙解散及嚏藥解表出汗皆輕劑之云爾所謂重劑者鎮縋之謂也其藥則硃砂水銀沉香水石黃丹之倫以其體重故也久病咳嗽涎潮於上咽喉不利形羸不可峻攻以此縋之故內經曰重者因而減之貴其漸也所謂滑劑者周禮曰滑以養竅大便燥結小便淋澀皆宜滑劑燥結者其麻仁郁李之類乎淋澀者其葵子滑石之類乎前後不通者前後兩陰俱閉也此名曰三焦約也約猶束也先以滑劑潤養其燥然後攻之則無失矣所謂澀劑者寢汗不禁澀以麻黃根防己滑泄不已澀以豆蔻枯白礬木賊烏魚骨罌粟殼凡酸味亦同乎澀者收斂之意也喘嗽上奔以虀汁烏梅煎寧肺者皆酸澀劑也然此數種當先論其本以攻去其邪不可執一以澀便為萬全也所謂燥劑者積寒久冷食已不飢吐利腥穢屈伸不便上下所出水液澄沏清冷此為大寒之故宜用乾薑良薑附子胡椒輩以燥之非積寒之病不可用也若久服則變血溢血泄大枯大涸溲便癃閉聾瞽痿弱之疾設有久服而此疾不作者慎勿執以為是蓋疾不作者或一二誤死者百千也若病濕者則白朮陳皮木香防己蒼朮等皆能除濕亦燥之平劑也若黃連黃柏梔子大黃其味皆苦苦屬火皆能燥濕此內經之本旨也而世相違久矣嗚呼豈獨薑附之儔方為燥劑乎所謂濕劑者潤濕之謂也雖與滑相類其間少有不同內經曰辛以潤之蓋辛能走氣能化液故也若夫硝性雖咸本屬真陰之水誠濡枯之上藥也人有枯涸皴揭之病非獨金化為然蓋有火以乘之非濕劑莫能愈也指風痹痿厥近世差玄説二風痹痿厥四論內經言之詳矣今余又為之説不亦贅乎曰非贅也為近世不讀內經者指其差玄也夫風痹痿厥四證本自不同而近世不能辨一概作風冷治之下虛補之此所以曠日彌年而不愈者也夫四末之疾動而或徑者為風不仁或痛者為痹弱而不用者為痿逆而寒熱者為厥此其狀未嘗同也故其本源又復大異風者必風熱相兼痹者必風濕寒相合痿者必火乘金厥者或寒或熱皆從下起今之治者不察其源見其手足嚲曳便謂之風然左傳謂風淫末疾豈不知風暑燥濕火寒六氣皆能為四末之疾也哉敢詳條於下有意於救物者試擇焉可也夫風之為狀善行而數變內經曰諸風掉眩皆屬肝木掉搖眩運非風木之象乎紆曲徑直非風木之象乎手足掣顫斜目喎口筋急攣搐瘛瘲驚癇發作無時角弓反張甚則吐沫或泣或歌喜怒失常頓僵暴僕昏不知人茲又非風木之象乎故善行而數變者皆是厥陰肝之用也夫肝木所以自甚而至此者非獨風為然蓋肺金為心火所制不能勝木故也此病之作多發於每年十二月大寒中氣之後及三月四月之交九月十月之交何以言之大寒中氣之後厥陰為主氣巳亥之月亦屬厥陰用事之月皆風主之時也故三月四月之交多疾風暴雨振拉摧拔其化為冰雹九月十月之交多落木髮屋之變故風木鬱極甚者必待此三時而作凡風病之人其脈狀如弓弦而有力豈敢以熱藥投之更增其勢哉今人論方者偶得一方間曾獲效執以為能著灸施針豈由病者巧説病人使從己法不問品味剛柔君臣輕重何臟何經何部何氣凡見風證偏枯口眼喎斜涎潮昏憒便服靈寶至寶清心續命等藥豈知清心之雜以薑桂靈寶之亂以起石硫磺小續命湯藏以附子惟夫至寶其性尚溫經曰風淫於內治以辛涼如之何以金石大熱之藥以治風耶有以熱治熱者一之為甚其可再乎故今之劉河間自制防風通聖散搜風丸之類程參政祛風丸換骨丹用之者獲效者多矣而謗議百出以誣其實余嘗見內經氣交變論中言五郁之法鬱極則為病況風病之作倉卒之變生嘗治驚風癇病屢用汗下吐三法隨治隨愈內經中明有此法五郁中木鬱達之者吐之令其條達也汗者是風隨汗出也下者是推陳致新也此為汗下吐三法也愈此風病莫知其數如之何廢而不用也余恐來者侮此法故表而出之昔項開完顏氏風病搐先右臂並右足約搐六七十數良久左臂並左足亦搐六七十數不瘥兩目直視昏憒不識人幾月余求治於余先逐其寒痰三四升次用導水禹功丸散泄二十餘行次服通聖散辛涼之劑不數日而瘥故書此以證之夫痹之為狀麻木不仁以風濕寒三氣合而成之故內經曰風氣勝者為行痹風則陽受之故其痹行旦劇而夜靜世俗莫知反呼為走注疼痛虎咬之疾寒氣勝者為痛痹寒則陰受之故其痹痛旦靜而夜劇世俗不知反呼為鬼忤濕氣勝者為著痹濕勝則筋脈皮肉受之故其痹著而不去肌肉削而著骨世俗不知反呼為偏枯此疾之作多在四時陰雨之時及三月九月太陽寒水用事之月故草枯水寒為甚或瀕水之地勞力之人辛苦失度觸冒風雨寢處津濕痹從外入況五方七地寒暑殊氣剛柔異稟飲食起居莫不相戾故所受之邪各有淺深或痛或不痛或仁或不仁或筋屈而不能伸或引而不縮寒則蟲行熱則縱緩不相亂也皮痹不已而成肉痹肉痹不已而成脈痹脈痹不已而成筋痹筋痹不已而成骨痹久而不已內舍其合若臟腑俱病雖有智者不能善圖也凡病痹之人其脈沉澀今人論方者見諸痹證遽作腳氣治之豈知內經中本無腳氣之説或曰諸方亦有腳氣統論又有腳氣方藥若止取素問則諸方皆非耶曰痹病以濕熱為源風寒為兼三氣合而為痹奈何治此者不問經絡不分臟腑不辨表裡便作寒濕腳氣烏之附之乳之沒之種種燥熱攻之中脘灸之臍下燒之三里火之蒸之尉之湯之炕之以至便旋澀滯前後俱閉虛燥轉甚肌膚日削食飲不入邪氣外侵雖遇扁華亦難措手若此者何哉胸膈間有寒痰之故也痹病本不死死者醫之誤也雖亦用蒸之法必先湧去其寒痰然後諸法皆效內經曰五臟有俞穴六腑有合穴循脈之本分各有所發之源以砭石補之則痹病瘳此其內經中明白具載如之何不讀也陳下酒監魏德新因赴冬選犯寒而行真氣元衰加之坐臥冷濕食飲失節以冬遇此遂作骨痹骨屬腎也腰之高骨壞而不用兩胯似折面黑如炭前後廉痛痿厥嗜臥遍問諸醫皆作腎虛治之余先以玲瓏灶尉蒸數日次以苦劑上湧訖寒痰三二升下虛上實明可見矣次以淡劑使白朮除脾濕令茯苓養腎水責官桂伐風木寒氣偏勝則加薑附否則不加又刺腎俞太溪二穴二日一刺前後一月平復如故僕嘗用治傷寒汗下吐三法移為治風痹痿厥之法愈者多矣痿之為狀兩足痿弱不能行用由腎水不能勝心火心火上爍肺金肺金受火制六葉皆焦皮毛虛弱急而薄著則生痿躄躄者足不能伸而行也腎水者乃肺金之子也令腎水衰少隨火上炎腎主兩足故骨髓衰竭由使內太過而致然至真要大論云諸痿喘嘔皆屬於上者上焦也三焦者手少陽相火也痿喘嘔三病皆在膈上屬肺金之部分也故肌痹傳為脈痿濕痹不仁傳為肉痿髓竭足躄傳為骨痿房室太過為筋痿傳為白淫大抵痿之為病皆因客熱而成好以貪色強力過極漸成痿疾故痿躄屬肺脈痿屬心筋痿屬肝肉痿屬脾骨痿屬腎總因肺受火熱葉焦之故相傳於四臟痿病成矣直斷曰痿病無寒故痿之作也五月六月七月皆其時也午者少陰君火之位未者濕土庚金伏火之地申者少陽相火之分故痿發此三月之內以為熱也故病痿之人其脈浮而大今之行藥者凡見腳膝痿弱難於行步或一足不伸便作寒濕腳氣治之驟用烏附乳沒自然銅威靈仙之類燔針艾火湯煮袋蒸痿弱轉加如此而死豈亦天乎夫治痿與治痹其治頗異風寒濕痹猶可蒸湯灸燔時或一效惟痿用之轉甚者何也蓋以痿肺熱為本葉焦而成痿以此傳於五臟豈有寒者歟若痿作寒治是不刃而殺之也夫痿病不死死者用藥之誤也陳下一武辨宋子玉因駐軍息城五六月間暴得痿病腰胯兩足皆不任用躄而不行求治於豫察其兩手脈俱滑之而有力豫憑內經火淫於內治以鹹寒以鹽水越其膈間寒熱宿痰新者為熱舊者為寒或宿食宿飲在上脘者皆可湧之宿痰既盡因而下之節次數十行覺神志日清飲食日美兩足漸舉腳膝漸伸心降腎升便繼以黃連解毒湯加當歸等藥及瀉心湯涼膈散柴胡飲子大作劑煎時時呷之經曰治心肺之病最近用藥劑不厭頻而少治腎肝之病最遠用藥劑不厭頓而多此法人皆怪之然余治痿尋常用之如拾遺物豫若以此誑人其如獲罪於天何此宋子玉之證所以不得不書也且示信於來世故內經謂治痿之法獨取陽明經陽明經者胃脈也五臟六腑之海也主潤養宗筋宗筋主束骨束骨在臍下陰毛際上是也又主大利機關機關者身中大關節也以司曲伸是以陽明虛則宗脈縱宗脈縱則大脈不伸兩足痿弱然取陽明者胃脈也胃為水穀之海人之四季以胃氣為本本固則精化精化則髓充髓充則足能履也陰陽應象論曰形不足者溫之以氣精不足者補之以味味者五味也五味調和則可補精益氣也五味五穀五菜五果五肉五味貴和不可偏勝又曰恬憺虛無真氣從之精神內守病安從來若用金石草木補之者必久而增氣物化之常氣增而久夭之由也所以久服黃連苦參者而反化為熱久服熱藥之人可不為寒心哉余嘗用汗下吐三法治風痹痿厥以其得效者衆其敢誣於後人乎厥之為狀手足及膝下或寒或熱也舉世傳腳氣寒濕之病豈知內經中無腳氣之説王太僕亦云本無腳氣後世廣飾方論而立此名古之方謂厥者即今所謂腳氣者也然厥當分兩種次分五臟所謂兩種者有寒厥亦有熱厥陽氣衰於下則為寒厥陰氣衰於下則為熱厥熱厥為手足熱也寒厥為手足寒也陽經起於足指之表陰經起於足心之下陽氣盛足下熱陰氣盛足下寒又曰陽主外而厥在內陰主內而厥在外若此者陰陽之氣逆而上行故也夫春夏則陽多陰少秋冬則陰壯陽衰人或恃賴壯勇縱情嗜欲於秋冬之時則陽奪於內精氣下溢邪氣上行陽氣既衰真精又竭陽不榮養陰氣獨行故手足寒發為寒厥也人或醉飽入房氣聚於脾胃主行津液陰氣虛陽氣入則胃不和胃不和則精氣竭精氣竭則四肢不榮酒氣與穀氣相搏則內熱而溺赤氣壯而慓悍腎氣既衰陽氣獨勝故手足熱發而為熱厥也厥亦有令人腹暴滿不知人者或一二日稍知人者或卒然悶亂無覺知者皆因邪氣亂陽氣逆是少陰腎脈不至也腎氣微少精血奔逸使氣促迫上入胸膈宗氣反結心下陽氣退下熱歸陰股與陰相助令身不仁又五絡皆會於耳中五絡俱絶則令人身脈皆動而形體皆無所知其狀如尸故曰尸厥有涎如拽鋸聲在喉咽中為痰厥手足搐搦者為風厥因醉而得之為酒厥暴怒而得之為氣厥骨痛爪枯為骨厥兩足指攣急屈伸不得爪甲枯結為臂厥身強直如椽者為肝厥喘而啘者狂走攀登為陽明厥皆氣逆之所為也今人見茲厥者皆謂之豆及著掠著此是何等語也非徒其名之謬因其名之謬而乖其實也既言豆及著中著掠著必歸之風此清心靈寶至寶又為先驅矣鼻中嗅藥身上焫火豈知厥之為病如前所説者耶頃西華季政之病寒厥其妻病熱厥前後十餘年其妻服逍遙十餘劑終無寸效一日命余診之二人脈皆浮大而無力政之曰吾手足之寒時時漬以熱湯漬而不能止吾婦手足之熱終日以冷水沃而不能已者何也余曰寒熱之厥也此皆得之貪飲食縱嗜欲遂出內經厥論證之政之喜曰內經真聖書也十餘年之疑今而釋然縱不服藥逾過半矣僕曰熱厥者寒在上也寒厥者熱在上也寒在上者以溫劑補肺金熱在上者以涼劑清心火分處二藥令服之不輟不旬日政之詣門謝曰寒熱之厥皆愈矣其妻當不過數月而有娠何哉陰陽皆和故也凡尸厥痿厥風厥氣厥酒厥可一湧而醒次服降心火益腎水通血和氣之藥使粥食調養無不瘥者若其餘諸厥仿此行之慎勿當疑似之間便作風氣相去邈矣立諸時氣解利禁忌式三春之溫病夏之熱病秋之瘧及痢冬之寒氣及咳嗽皆四時不正之氣也總名之曰傷寒人之勞役辛苦者觸冒此四時風寒暑濕不正之氣遂成此疾人之傷於寒也熱鬱於內淺則發早為春溫若春不發而重感於暑則夏為熱病若夏不發而重感於濕則秋變為瘧痢若秋不發而重感於寒則冬為傷寒故傷寒之氣最深然而傷寒及溫熱但發必先發熱惡寒頭項痛腰脊強者一日在太陽經故也內經中雖言一日太陽者傳受常也亦有太陽證至了不傳者止可汗之如升麻湯解肌湯逼毒散五積散之類發散則愈也蓋病人熱甚更以辛溫則病必轉加今代劉河間先生自制辛涼之劑以通聖散益元散相合各五七錢水一中碗入生薑十餘片蔥須頭二十餘根豆豉一撮同煎至五七沸去滓分作二服先以多半服之頃以叉股於喉中探引盡吐前藥因其一湧腠理開發汗出周身復將余藥溫熱而服之仍以酸醋辛辣漿粥投之可以立愈解利傷寒溫濕熱病治法有二天下少事之時人多靜逸樂而不勞諸靜屬陰雖用溫劑解表發汗亦可獲愈及天下多故之時熒惑失常師旅數興飢饉相繼賦役既多火化大擾屬陽內火又侵醫者不達時變猶用辛溫茲不近於人情也止可用劉河間辛涼之劑三日以里之證十痊八九豫用此藥四十餘年解利傷寒溫熱中暑伏熱莫知其數非為炫也將以證後人之誤用藥者也豫嘗見世醫用升麻五積解利傷寒溫疫等病往往發狂譫語衄血泄血喘滿昏瞀懊憹悶亂勞復此數證非傷寒便有此狀皆由辛溫之劑解之不愈而熱增劇以致然也凡解利傷寒時氣疫疾當先推天地寒暑之理以人參之南陲之地多熱宜辛涼之劑解之朔方之地多寒宜辛溫之劑解之午未之月多暑宜辛涼解之子醜之月多凍宜辛溫解之少壯氣實之人宜辛涼解之老耆氣衰之人宜辛溫解之病人因冒寒食冷而得者宜辛溫解之因役勞冒暑而得者宜辛涼解之病人稟性怒急者可辛涼解之病人稟性和緩者可辛溫解之病人兩手脈浮大者可辛涼解之兩手脈遲緩者可辛溫解之如是之病不可一概而用偏熱寒涼及與辛溫皆不知變通者夫地有南北時有寒暑人有衰旺脈有浮沉劑有溫涼服有多少不可差玄病人禁忌不可不知昔有人春月病瘟三日之內以驢車載百餘里比及下車昏瞀不知人數日而殂又有人飲酒過傷內外感邪頭痛身熱狀如傷寒三四日間以馬馱還家六七十里到家百骨節皆痛昏憒而死此余親睹若此之類不容更述假如瘟病傷寒熱病中暑冒風傷酒慎勿車載馬馱搖撼頓挫大忌夫動者火之化靜者水之化也靜為陰動為陽陽為熱陰為寒病已內擾又復外擾是為至擾奈人之神詎能當之故遠行得疾者宜舟泛床抬無使外擾故病不致增劇又若傷寒時氣瘟病嘗六七日之間不大便心下堅硬腹脅緊滿止可大小承氣湯下之其腸胃積熱慎勿用巴豆杏仁性熱大毒之藥雖用一二丸下之利五七行必反損陰氣涸枯津液燥熱轉增發黃譫語狂走斑毒血泄悶亂輕者為勞復重者或至死間有愈者幸矣不可以為法故傷寒新愈之人慎勿食豬魚雜果釅酒濕面及沐浴房室事如犯病必再發愛其身者不可不慎又如正二三月人氣在上瘟疫大作必先頭痛或骨節疼與傷寒時氣冒暑風濕及中酒之人其狀皆相類慎勿便用巴豆大毒之藥治之元光春京師翰林應泰李屏山得瘟疫證頭痛身熱口乾小便赤澀渠素嗜飲醫者便與酒症丸犯巴豆利十餘行次日頭痛諸病仍存醫者不識復以辛溫之劑解之加之臥於暖炕強食蔥醋湯圖獲一汗豈知種種客熱疊發並作目黃斑生潮熱血泄大喘大滿後雖有承氣下之者已無及矣至今議者紛紛終不知熱藥之過往往獨歸罪於承氣湯用承氣湯者不知其病已危猶復用藥學經不明故也良可罪也然議者不歸罪於酒症丸者亦可責也夫瘟證在表不可下況巴豆之丸乎巴豆不已況復發以辛溫之劑乎必有仲尼方明冶長之非罪微生高之非直終不肯以數年之功苦讀內經但隨衆好惡為之譭譽若此者皆妄議者也不真知其理遽加譭譽君子之所不取以豫論之凡傷寒之氣有六禁初病之時甚似中酒傷食者禁大下之一禁也當汗之時宜詳時之寒暑用衾衣之厚薄禁沐浴之火炕重被熱粥燔針二禁也當汗之時宜詳解脈之遲數用辛涼之劑禁妄用熱藥三禁也當下之時宜審詳證下之藥禁巴豆銀粉丸方四禁也遠來之病人禁車載馬馱五禁也大汗之後禁雜食嗜欲憂思作勞六禁也故凡有此者宜清房涼榻使不受客熱之邪明窗皓室使易見斑出黃生之變病者喜食涼則從其涼喜食溫則從其溫清之而勿擾休之而勿勞可辛溫則辛溫解之可辛涼則辛涼解之所察甚微無拘彼此欲水之人慎勿禁水但飲之後頻與按摩其腹則心下自動若按摩其中脘久則必痛病人獲痛復若有水結則不敢按矣止當禁而不禁者輕者危重則死不當禁而禁者亦然今之士大夫多為俗論先錮其心雖有正論不得而入矣昔陸象先嘗云天下本無事庸人擾之為煩耳余亦曰正氣本不亂庸醫擾之為劇耳瘧非脾寒及鬼神辨四夫瘧猶酷瘧之瘧也以夏傷酷暑而成痎瘧也又有痎瘧連歲不已此肝經肥氣之積也多在左脅之下狀如覆杯是為痎瘧猶痎也久而不已令人瘦也內經既以夏傷於暑而為瘧何後世之醫者皆以脾寒治之世醫既不知邪熱蓄積之深為寒戰遂為寒戰所惑又不悟邪熱入而後出於表發為燥渴遂為交爭所惑相傳以薑附硫黃平胃異功散交解飲子治之百千之中幸其一效執以為是至使父子兄弟相傳及其瘧之甚者則歸之祟怪豈可不大笑耶內經拘於鬼神者不可與言至德何世俗之愚而難化也又或因夏日飲冷過常傷食生硬瓜果梨棗之屬指為食瘧此又非也豈知內經之論則不然夏傷於暑遇秋之風因勞而汗玄府受風復遇悽愴之水風閉而不出舍於腸胃之外與榮衛並行晝行於陽夜行於陰邪熱淺則連日而作邪熱深則間日而作併入於裡則熱併入於表則寒若此而論了不幹於脾後世論藥如此之差誤也以時言之治平之時常瘧病少擾攘之時常瘧病多治平之時雖用砒石辰砂有毒之藥治之亦能取效緣治平之時其民夷靜故雖以熱攻熱亦少後患至於擾攘之時其民勞苦不可遽用大毒大熱之藥若以熱攻熱熱甚則轉為吐血泄血癰疽瘡瘍嘔吐之疾蓋擾攘之時政令煩亂徭役紛冗朝戈暮戟略無少暇內火與外火俱動在侯伯官吏尤甚豈可與夷靜之人同法而治哉余親見泰和六年丙寅徵南師旅大舉至明年軍回是歲瘴癘殺人莫知其數昏瞀懊憹十死八九皆火之化也次歲瘧病大作侯王官吏上下皆病輕者旬月甚者彌年夫富貴之人勞心役智不可驟用砒石大毒之藥止宜先以白虎湯加人參小柴胡湯五苓散之類頓服立解或不愈者可服神佑丸減用神芎等甚者可大小承氣湯下之五七行或十餘行峻泄夏月積熱暑毒之氣此藥雖泄而無損於臟腑乃所以安臟腑也次以桂苓甘露散石膏知母湯大小柴胡湯人參柴胡飲子量虛實加減而用之此藥皆能治寒熱往來日晡發作與治傷寒其法頗同更不愈者以常山散吐之無不愈者余嘗用張長沙汗下吐三法愈瘧極多大忌錯作脾寒用暴熱之藥治之縱有愈者後必發瘡疽下血之病不死亦危余自先世授以醫方至於今日五十餘年苟不諳練豈敢如是決也又嘗觀刺瘧論五十九刺一刺則衰再刺則去三刺則已會陳下有病瘧二年不愈者止服溫熱之劑漸至衰羸命豫藥之余見其羸亦不敢便投寒涼之劑乃取內經刺瘧論詳之曰諸瘧不已刺十指間出血正當發時余刺其十指出血血止而寒熱立止咸駭其神余非炫術竊見晚學之人不考誥典謬説鬼疾妄求符籙祈禱辟匿法外旁尋以致病人遷延危殆瘧病除嵐瘴一二發必死其餘五臟六腑瘧皆不死如有死者皆方士誤殺之也或曰汝言瘧因於暑者春發之瘧亦傷暑乎余曰此瘧最深何哉暑伏於秋冬而不發至春始發此瘧之深者內經氣交變大論歲火太過炎暑流行金肺受邪啓玄子云火不以德邪害於肺金也故金肺先病以金氣不及故為病又經曰歲火太過大熱先發故民病瘧少氣咳喘血溢血注下嗌燥耳聾中熱肩背熱上應熒惑星見則山澤燔燎雨乃不降爍石消金涸泉焦草火星大而明見注曰火無德令縱熱害金水復製心故心火自病熒惑見則酷法大故瘧常與酷吏之政並行或酷政行於先而瘧氣應於後或瘧氣行於先而酷政應於後昔人有詩云大暑去酷吏此言雖不為醫設亦於醫巫之旨有以暗相符者也以前人論瘧者未嘗及於此故豫發之及知聖人立瘧之名必有所謂云小兒瘡疱丹熛癮疹舊蔽記五兒之在母腹也胞養十月蘊蓄濁惡熱毒之氣非一日及歲年而後發雖至貴與至賤莫不皆然輕者稀少重者稠密皆因胞胎時所感濁惡熱毒之氣有輕重非獨人有此疾凡胎生血氣之屬皆有蘊蓄濁惡熱毒之氣有一二歲而發者有三五歲至七八歲而作者有年老而發丹熛癮疹者亦有傷寒中溫毒而發斑者亦有陽毒發斑者斑有大小色有輕重大者為陰小者為陽均是熱也但色重赤者熱深色輕紅者熱淺凡治者輕者因而揚之重者因而減之內經曰少陽客勝則丹疹外發及為丹熛手少陽者三焦少陽相火也啓玄子云是五寅五申之歲即少陽相火司天故也他歲亦有之但內經獨明瘡疹者少陽相火之所為也俗呼曰斑疹傷寒此言卻有理為此證時與傷寒相兼而行必先發熱惡寒頭項痛腰脊強從太陽傳至四五日熛疹始發先從兩脅下有之出於脅肋次及身表漸及四肢故凡小兒瘡疱丹熛癮疹皆少陽相火客氣勝也內經曰諸痛癢瘡瘍皆屬心火豈有寒乎故治瘡疱與治傷寒時氣同法初覺頭痛身熱惡寒此小兒初發瘡疱之候也其脈息皆浮大而有力亦與傷寒時氣冒風驚風宿乳一概難辨宜先解之有二法遇亢陽炎熱之時以辛涼解之遇久寒凝冽之時以辛溫解之辛涼之劑者涼膈通聖之類是也辛溫之劑者升麻葛根之類是也此二法慎勿互用之既用此二法之後次以白虎湯加人參冷服之勿輟蓋防瘡疹發喘喘者必死人參止喘故也或云立秋之後不宜服白虎湯者非也假如秋深發瘧瘧者中暑而得之白虎大解暑毒既有白虎湯證豈可間以秋冬乎瘡疱癮疹丹熛皆是火之用也是肺金之不及也故曰白虎湯加人參一日不可闕也瘡疱熛疹或出不均大小如豆黍相親見其不齊也相天之寒溫以蟬殼燒灰操半字或一字以淡酒調少許飲之大人以淡酒溫調之不半日則均齊如或用百祥丸紫草飲子皆可服之俗以酒醋熏之者適足增其昏瞀耳至六七日疱疹出全可調胃涼膈下之同調理傷寒法或言瘡疹首尾俱不可下者此朱奉議公之言也適足使人戰戰兢兢而不敢用藥也錢仲陽之用百祥丸其間有大戟豈奉議公獨不見耶自奉議公斯言一出死者塞路矣豫家其親屬故舊小兒有患瘡疱黑陷腹內喘者余以白虎湯加人參涼膈散加當歸桔梗連進數服上灌下泄晝夜不止又使睡臥於寒涼之處以新水灌其面目手足膿水盡去蓋四肢者諸陽之本也兒方為瘡疱外燔沃以寒水使陰氣循經而入達於心肺如醉得醒是亦開昏破郁之端也如此救活者豈啻千數夫瘡疱黑陷喘而滿者十死八九若依此法尚能活其六七何世醫與病家至今猶未悟也近年豫之莊鄰沿蔡河來往之舟常艤於此一日舟師偶見敗蒲一束沿流而下漸迫舟次似聞啼聲而微舟師疑其人也探而出之開視之驚見一兒四五歲許瘡疱周匝密不容隙兩目皎然飢而索食因以粥飽其舟師之妻怒曰自家兒女多惹瘡疱傳染奈何私料此兒沿蔡河來其流緩必不遠持兒一鞋逆流而上遍河之人皆曰無此兒行且二十里至一村落舟師高唱曰有兒年狀如許不知誰是瘡疱病死棄之河中今復活矣聞酒邸中飲者喧譁有人出曰我某村某人也兒四五歲死於瘡疱舟師出其鞋以示之其父泣曰真吾兒也奔走來視驚見兒活大痛流涕拜謝舟師喜抱兒歸今二十餘歲矣此兒本死得水而生伏諗來者瘡疱之疾熱耶寒耶經曰諸痛癢瘡瘍皆屬心火啓玄子注云心寂則痛微心燥則痛甚百端之起皆自心生瘡疱之疾豈有寒歟余承醫學於先人閲病多矣苟誑後人罪將安逃誠如此法則原上之丘以瘡疱而死者皆誤殺人也故療小兒惟錢仲陽書中可採者最多但其方為閻孝忠所亂有識者宜擇而取之證婦人帶下赤白錯分寒熱解六君子非好與昔人辨以要譽也蓋昔人有一誤流為千百世之禍者苟不證其非雖曰謙讓其如人命何如精選聖惠方二十三卷論婦人赤白帶下云婦人帶下者由勞神過度損動經血致令身虛受於風冷風冷入於脬絡傳其血之所成也又有巢氏內篇四十四卷論任脈為經之海其任之為病女子則為帶下手太陽為小腸之經也手少陰為心之經也心為藏主於裡小腸為腑主於表二經之血在於婦人上為乳汁下為月水衝任之所統也衝任之脈既起於脬內陰陽過度則傷脬絡故風邪乘虛而入於脬中損衝任之經傷太陽少陽之血致令脬絡之間穢與血相兼帶而下冷則多白熱則多赤二家之説皆非也夫治病當先識經絡靈樞十二經中有是動之病有所生之病大經有十二奇經有八脈言十二經之外復有此八道經脈也十二經與八道經脈通身往來經絡共二十道上下流走相貫周環晝夜不息與天同度自手太陰肺經起行陽二十五度行陰亦二十五度復會於手太陰肺經也然此二十道經絡上下周流者止一十九道耳惟帶脈起少腹側季脅之端乃章門穴是也環身一周無上下之源絡脬而過如束帶之於身難經曰帶之為病溶溶如坐水中衝任者是經脈之海也循腹脅夾臍傍傳流於氣衝屬於帶脈絡於督脈督脈者起於關元穴任脈者女子在養胎孕之所督脈乃是督領婦人經脈之海也沖任督三脈同起而異行一源而三歧皆絡帶脈沖任督三脈皆統於篡戶巡陰器行廷孔溺孔上端沖任督三脈以帶脈束之因余經上下往來遺熱於帶脈之間熱者血也血積多日不流火則從金之化金曰從革而為白乘少腹間冤熱白物滑溢隨溲而下綿綿不絶多不痛也或有痛者則壅礙因壅而成痛也內經曰少腹冤熱溲出白液冤者屈滯也病非本經為他經冤抑而成此疾也冤一作客客猶寄也遺客熱於少腹久不去從金化而為白設若赤白痢赤者新積也從心火白者舊積也從肺金故赤白痢不可曲分寒熱止可分新舊而治之假如癰癤始赤血次潰白膿又豈為寒者哉而病者未信也此今之劉河間常言之矣皆云寒多則白以乾薑赤石脂桃花丸治痢雖愈後必生血疾如白帶下病徑以白芍藥乾薑白帶雖愈則小溲必不利治瀉痢與治帶下皆不可驟用峻熱之藥燥之燥之則內水涸內水涸則必煩渴煩渴則小溲不利小溲不利則足腫面浮漸至不治內經曰思想無窮所願不得意淫於外入房太甚發為筋痿淫衍白物如精之狀男子因溲而下女子綿綿而下左傳曰少男惑長女風落山之象是為惑蠱之疾其文三蟲同皿曰蠱乃是思慕色欲內生後蝕甚不可便用燥熱之藥攻之漸至形削羸瘦脈大者必死而不救且赤白痢者是邪熱傳於大腸下廣腸出赤白也帶下者傳於小腸入脬經下赤白也據此二證皆可同治濕法治之先以導水禹功瀉訖次以淡劑降心火益腎水下小溲分水道則自愈矣頃頓丘一婦人病帶下連綿不絶白物或來已三載矣命豫脈之診其兩手脈俱滑大而有力得六七至常上熱口乾眩運時嘔醋水余知其實有寒痰在胸中以瓜蒂散吐訖冷痰三二升皆醋水也間如黃涎狀如爛膠次以漿粥養其胃氣又次用導水禹功以瀉其下然後以淡劑滲泄之藥利其水道不數日而愈余實悟內經中所云上有病下取之下有病上取之又上者下之下者上之然有此法亦不可偏執更宜詳其虛實而用之故知精選聖惠方帶下風寒之言與巢氏論中赤熱白寒之説正與難素相違豫非敢妄論先賢恐後學混而不明未免從之而行也如其寡學之人不察病人脈息不究病人經脈妄斷寒熱信用群方暴熱之藥一旦有失雖悔何追嗚呼人命一失其復能生乎赤白痢與赤白帶下皆不死人內經惟腸澼便血血溫身熱者死赤白帶下白液白物蠱病腎消皆不能死人有死者藥之誤也霍亂吐瀉死生如反掌説七巢氏先賢也固不當非然其説有誤者人命所繫不可不辨也今之醫者家置本以為繩墨嗚呼何今之人信巢氏而不信素問也此豫不得不為之説且巢氏論霍亂吐瀉皆由溫涼不調陰陽清濁二氣相干致腸胃之間變而為霍亂寒氣客於脾則瀉寒氣客於胃則吐亦由飲酒食肉腥膾生冷過度或因居處坐臥濕地當風取涼風之氣歸於三焦傳於脾胃脾胃得冷水穀不消皆成霍亂其名有三一曰胃反胃氣虛逆反吐飲食二曰霍亂言其病揮霍之間便致撩亂也三曰晡食變逆者也霍亂者脈必代又云七月間食蜜令人暴下霍亂此皆巢氏霍亂之論也豫以為不然夫醫之治病猶書生之命題如秋傷於濕冬生咳嗽是獨以濕為主此書生之獨腳題也風濕暍三氣合而成霍亂吐瀉轉筋此猶書生之鼎足題也風者風木也內應足厥陰肝木濕者雨化也內應於足太陰脾土暍者火熱也內應於手少陰心火此風濕暍三氣之所生也內經曰土氣之下木氣乘之是肝木乘脾土也又曰厥陰所至為脅痛嘔泄少陽所至為嘔湧注云食不下也太陰所至為中滿霍亂吐下太陰所至為濡化也注云濕化也又曰太陰所至為濕生終為注雨故轉筋者風主肝肝主筋風急甚故轉筋也吐者暍也火主心心主炎上故嘔吐也泄注者土主濕濕主脾濕下注故泄注也此三者豈非風濕暍如書生鼎足題耶脾濕土氣為風木所克土化不行矣亢無雨火盛過極土怒發焉極則為雷霆驟雨烈風蓋土氣在上木氣乘之故也是以大水橫流山崩岸落石迸沙飛豈非太陰濕土怒發之象耶故人病心腹滿脹腸鳴而為數便甚則心痛脅䐜嘔吐霍亂厥發則注下胕腫身重啓玄子云已上病證皆脾熱所生也乃知巢氏所論正與素問啓玄子相違故內經治法病急則治其標緩則治其本先可用淡劑流其濕辛涼以退其風鹹苦以解其暍冰水以救其內涸大忌食粟米粥飲者立死偉哉王冰之言脾熱一句可以為方世俗止知取其頭巾而濯之以飲其水亦取黑豆皂礬頭垢寒涼然近似終不足以制其甚也又有以寒水沃其手足者大非也四肢已厥更以寒水沃之則益厥矣曷若以寒水沃其心之為愈也泰和間余親見陳下廣濟禪院其主僧病霍亂一方士用附子一枚及兩者乾薑一兩炮水一碗同煎放冷服之服訖嘔血而死頃合流鎮李彥甫中夜忽作吐瀉自取理中丸而服之醫者至以為有食積以巴豆下之三五丸藥亦不動至明而死可不哀哉遂平李仲安攜一僕一佃客至郾城夜宿邵輔之書齋中是夜僕逃仲安覺其逃也騎馬與佃客往臨穎急追之時七月天大熱炎風如箭埃塵幔天至辰時而還曾不及三時往返百二十里既不獲其人復宿於邵氏齋忽夜間聞呻呼之聲但言救我不知其誰也執火尋之乃仲安之佃客也上吐下泄目上視而不下胸脅痛不可動搖口欠而脫臼四肢厥冷此正風濕暍三者俱合之證也其壻曾聞余言乃取六一散以新汲水銼生薑而調之頓服半升其人復吐乃再調半升而令徐服之良久方息至明又飲數服遂能調養三日平復而去嗚呼若此三人其生死豈不如反掌哉彼世醫往往以謂六一散治得其病此無學之輩也可勝恨哉目疾頭風出血最急説八內經曰目得血而能視此一句聖人論人氣血之常也後世之醫不達其旨遂有惜血如金之説自此説起目疾頭風諸證不得而愈矣何以言之聖人雖言目得血而能視然血亦有太過不及也太過則目壅塞而發痛不及則目耗竭而失睛故年少之人多太過年老之人多不及但年少之人則無不及但年老之人其間猶有太過者不可不察也夫目之內眥太陽經之所起血多氣少目之鋭眥少陽經也血少氣多目之上網太陽經也亦血多氣少目之下網陽明經也血氣俱多然陽明經起於目兩旁交鼻頞之中與太陽少陽俱會於目惟足厥陰肝經連於目系而已故血太過者太陽陽明之實也血不及者厥陰之虛也故血出者宜太陽陽明蓋此二經血多故也少陽一經不宜出血血少故也刺太陽陽明出血則目愈明刺少陽出血則目愈昏要知無使太過不及以血養目而已此內經所謂目得血而能視者此也凡血之為物太多則益太少則枯人熱則血行疾而多寒則血行遲而少此常理也至於目者肝之外候也肝主目在五行屬木然木之為物太茂則蔽密太衰則枯瘁蔽密則風不疏通故多摧拉枯瘁則液不浸潤故無榮華又況人之有目如天之有日月也人目之有翳如日月之有云霧也凡云之興未有不因蒸騰而起者雖隆冬之時猶且然耳況於炎夏之時乎故目暴赤腫起羞明隱澀淚出不止暴寒目瞞皆工藝之所為也夫目之五輪乃五臟六腑之精華宗脈之所聚其氣輪屬肺金肉輪屬脾土赤脈屬心火黑水神光屬腎水兼屬肝木此世俗皆知之矣及有目疾則又不知病之理豈知目不因火則不病何以言之氣輪變赤火乘肺也肉輪赤腫火乘脾也黑水神光被翳火乘肝與腎也赤脈貫目火自甚也能治火者一句可了故內經曰熱勝則腫治火之法在藥則鹹寒吐之下之在針則神庭上星囪會前頂百會血之翳者可使立退痛者可使立已昧者可使立明腫者可使立消惟小兒不可刺囟會為肉分淺薄恐傷其骨然小兒水在上火在下故目明老人火在上水不足故目昏內經曰血實者宜決之又經曰虛者補之實者瀉之如雀目不能夜視及內障暴怒大憂之所致也皆肝主目血少禁出血止宜補肝養腎至於暴赤腫痛皆宜以扉針刺前五穴出血而已次調鹽油以塗髮根甚者雖至於再至於三可以也量其病勢平為期少白可黑落髮可生有此神驗不可輕傳人年四十五十不問男女目暴赤腫隱澀難開者以三稜針刺前頂百會穴出血大妙至如年少發早白落或白屑者此血熱而太過也世俗止知發者血之餘也血衰故耳豈知血熱而極發反不茂肝者木也火多水少木反不榮火至於頂炎上之甚也大熱病汗後勞病之後皆發多脫落豈有寒耶故年衰火勝之人最宜出血但人情見出血皆不悅矣豈知出血者乃所以養血也凡兔雞豬狗酒醋濕面動風生冷等物及憂忿勞力等事如犯之則不愈矣惟後頂強間腦戶風府四穴不可輕用針灸以避忌多故也若有誤不幸令人喑固宜慎之其前五穴非徒治目疾至於頭痛腰脊強外腎囊燥癢出血皆愈凡針此勿深深則傷骨唐甄權尤得出血之法世俗云熱湯沃眼十日明此言謬之久矣火方乘目更以熱湯沃之兩熱相搏是猶投賊以刃也豈知涼水沃之暫澀而久滑熱水沃之暫滑而久澀不然曷以病目者忌沐浴或曰世俗皆言涼水沃眼血脈不行余聞大笑之眼藥中用黃連硼砂朴硝龍腦熊膽之屬皆使人血脈不行耶何謬之甚也又若頭風之甚者久則目昏偏頭風者少陽相火也久則目束小大腸閉澀者目必昏何也久病滑泄者目皆明惟小兒利久反疳眼昏蓋極則反與此稍異其餘皆宜出血而大下之余嘗病目赤或腫或翳作止無時偶至親息帥府間病目百餘日羞明隱澀腫痛不已忽眼科薑仲安云宜上星至百會速以扉針刺四五十刺攢竹穴絲竹穴上兼眉際一十刺反鼻兩孔內以草莖彈之出血三處出血如泉約二升許來日愈大半三日平復如故余自嘆曰百日之苦一朝而解學醫半世尚缺此法不學可乎惟小兒瘡疱入眼者乃餘熱不散耳止宜降心火瀉肝風益腎水則愈矣若大人目暴病者宜汗下吐以其血在表故宜汗以其火在上故宜吐以其熱在中故宜下出血之與發汗名雖異而實同故録銅人中五穴照用過愛小兒反害小兒説九小兒初生之時腸胃綿脆易飢易飽易虛易實易寒易熱方書舊説天下皆知之矣然禮記曲禮及玉符潛訣論所云天下皆不知曲禮云童子不衣裘裳説云裘大溫消陰氣且人十五歲成童尚不許衣裘今之人養稚子當正夏時以綿夾裹腹日不下懷人氣相蒸見天稍寒即封閉密室睡氈下幕暖炕紅爐使微寒不入大暖不泄雖衰老之人尚猶不可況純陽之小兒乎然君子當居密室亦不當如是之暖也玉符潛訣論云嬰兒之病傷於飽也今人養稚子不察腸胃所容幾何但聞一聲哭將謂飢號急以潼乳納之兒口豈復知量不吐不已及稍能食應口輒與夫小兒初生別無伎倆惟善號泣為強良耳此二者乃百病之源也小兒除胎生病外有四種曰驚曰疳曰吐曰瀉其病之源止有二曰飽曰暖驚者火乘肝之風木也疳者熱乘脾之濕土也吐者火乘胃膈甚則上行也瀉者火乘肝與大腸而瀉者也夫乳者血從金化而大寒小兒食之肌肉充實然其體為水故傷乳過多反從濕化濕熱相兼吐痢之病作矣醫者不明其本輒以紫霜進食比金白餅之屬其中皆巴豆杏仁其巴豆大熱有大毒杏仁小熱有小毒小兒陽熱復以熱毒之藥留毒在內久必變生故劉河間先生以通聖涼膈神芎益元治之皆無毒之藥或曰此大人所服之藥非小兒所宜也余聞笑曰大人小兒雖年壯不同其五臟六腑豈復殊耶大人服多小兒服少其實一也故不可下者宜解毒可下者宜調胃瀉心然有逐濕為之方者故余嘗以牽牛大黃木通三味末之為丸以治小兒諸病皆效蓋食乳小兒多濕熱相兼故也今之醫者多以此藥謗豫彼既不明造化難與力辨故豫書此方以俟來世知道者然善治小兒者當察其貧富貴賤治之蓋富貴之家衣食有餘生子常夭貧賤之家衣食不足生子常堅貧家之子不得縱其欲雖不如意而不敢怒怒少則肝病少富家之子得縱其欲稍不如意則怒多怒多則肝病多矣夫肝者木也甚則乘脾矣又況貧家無財少藥故死少富家有財多藥故死多故貧家之育子雖薄於富家其成全小兒反出於富家之右其暗合育子之理者有四焉薄衣淡食少欲寡怒一也無財少藥其病自痊不為庸醫熱藥所攻二也在母腹中其母作勞氣血動用形得充實三也母既作勞多易生産四也此四者與富家相反也俚諺曰兒哭即兒歌不哭不僂儸此言雖鄙切中其病世俗豈知號哭者乃小兒所以泄氣之熱也老子曰終日號而不嗄余常授人以養子之法兒未坐時臥以赤地及天寒時不與厚衣布而不綿及能坐時以鐵鈴木壺雜戲之物連以細繩置之水盆中使一浮一沉弄之有聲當炎暑之時令坐其旁掬水弄鈴以散諸熱內經曰四肢者諸陽之本也手得寒水陰氣達於心中乃不藥之藥也余嘗告於陳敬之若小兒病緩急無藥不如不用庸醫但恐妻妾怪其不醫宜湯浸蒸餅令軟丸作白丸給其妻妾以為真藥使兒服之以聽天命最為上藥忽歲在丙戌群兒皆病泄瀉但用藥者皆死蓋醫者不達濕熱之理以溫燥行之故皆死惟陳敬之不與藥用余之言病兒獨存噫嗚呼班固真良史嘗曰有病不治得中醫除暴得大疾病服藥者當謹熟陰陽無與衆謀若未病之前從豫奉養之法亦復不生病縱有微疾雖不服藥可也服藥一差轉成他病説十語云子之所慎齊戰疾又曰丘未達不敢嘗此言服藥不可不畏慎也然世有百十年相襲之弊至今不除者敢略數一二使後車改轍不蹈前覆夫傷寒溫疫時氣中暑風溫風瘧與中酒傷食者其初相類此最誤人或先一日頭痛曾傷酒便歸過於灑曾傷食便歸過於食初覺滿悶醫者不察其脈不言其始徑用備急丹纏積丹軟金丸酒症丸此藥犯巴豆或出油不盡大熱大毒走泄五七行或十餘行其人必津液枯涸腸胃轉燥發黃瘀熱目赤口乾恍惚潮熱昏憒惑狂諸熱交作如此誤死者不可勝舉若其人或本因酒食致過亦能頭痛身熱戰栗惡寒醫者不察其脈不究其原反作傷寒發之桂枝麻黃升麻之屬以汗解之汗而不解輾轉疑惑反生他證如此誤死者可勝計哉又如久病咳嗽形體羸瘦食欲減少旦靜夜劇醫者不察便與烏梅罌粟殼紫菀枯礬如此峻攻嗽疾未除澀滯之病作矣嗽加之澀飲食彌減醫者不察更以熱劑養胃溫劑和脾致令頭面汗出燥熱潮發形容瘦瘁涎液上出流如湧泉若此死者不可勝數又如婦人産余之疾皆是敗血惡物發作寒熱臍腹撮痛乳潼枯涸食飲稍減醫者不察便謂産後血出數斗氣血俱虛便用溫熱之劑養血補虛止作寒治舉世皆然豈知婦人之孕如天地之孕物也物以陰陽和合而後生人亦以陰陽和合而後孕偏陰偏陽豈有孕乎此與禾黍瓜果之屬何異哉若水旱不時則華之與實俱痿落矣此又與孕而不育者復何異哉七月立秋後十八日寸草不結者猶天寒故也今婦人妊娠終十月無難而生反謂之寒何不察其理之甚也竊譬之冶磚者炎火在下以水沃其窯之巔遂成磚矣磚既出窯窯頓寒邪世俗竟傳黑神散之屬治産後一十八證非徒其不愈則經脈涸閉前後淋閉嘔吐嗽痰凡百熱證生矣若此誤死者不可計之曷若四物湯與涼膈散停對大作湯劑而下之利以數行惡物俱盡後服淡甘之劑自愈矣又如小兒腹滿喘嗽痰涎不利醫者不察便用白餅子之屬夫白餅子巴豆大熱有大毒兼用膩粉其後必生口瘡上喘咳嗽嘔吐不嗜飲食之疾然此治貧家小兒猶或可效膏粱之家必生他病又何疑哉又如瀉利之疾歲歲有之醫者不察便用聖散子之屬乾薑赤石脂烏梅罌粟殼官桂石榴皮龍骨牡蠣之屬變生小便癃閉甚者為脹又甚者水腫之疾生矣間有愈者病有微者也甚則必不愈矣又如人病停飲或因夏月傷冷過多皆為脾胃客氣有餘也宜逐而去之醫者不可以為脾衰而補之則痞者更痞滿者更滿復有巴豆丸下之者病雖少解必不嗜食上燥之病生矣又如人因閃肭膝髁肘腕大痛醫者不察便用扉針出血如未愈者再三刺血出血既多遂成跛躄內經曰足得血而能步血盡安得步哉若余治閃肭則不然以禹功散或通經二三錢下神祐丸或除濕丹百餘丸峻瀉一二十行則痛出當癢發痛屬夏癢屬秋出則夏衰矣此五行勝復之理也故凡腰胯脅痛杖瘡落馬墜墮打撲莫不同然蓋此痛得之於外非其先元虛元弱古人云痛隨利減宜峻瀉一二十行畢但忌熱酒可一藥而愈勿謂峻瀉輕侮此法昔有齒痛連月不止以鐵鈴鈕取之血不止而死又有人因上下齒痛凡百痛者輒取不數年上下齒盡至五十歲生硬之物皆不能食夫上下齒痛皆由手足陽明二經風熱甚而痛矣可用大小承氣湯藏用丸祛風丸等藥瀉之則痛當自止內經曰諸痛癢瘡瘍皆屬心火啓玄子云百端之起皆自心生心者火也火生土之故也出牙之誤不可不知又如治水腫痛者多用水銀輕粉白丸子大毒之藥下之水腫未消而牙齒落牙齒落而不進食水盡而立斃復有人於兩足針之水出如泉水盡亦斃矣
